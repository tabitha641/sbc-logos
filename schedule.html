 "Johnny and Moira meet with a key group of people, Alexis struggles with her new job, David offer's emotional support to his boss' daughter."], [1783336849, 1783338159, "Schitt's Creek", "The Motel Guest", "S2 E11", "Johnny and Moira have to deal with a surprise motel guest while Alexis and David go apartment hunting."], [1783338159, 1783339331, "Raising Hope", "Episode 25", "S1 E25", "Y2K"], [1783339331, 1783340634, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783340634, 1783341929, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783341929, 1783343225, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783343225, 1783344535, "Schitt's Creek", "Lawn Signs", "S2 E12", "Moira’s campaign takes a turn when some of her lawn signs mysteriously disappear. David and Alexis must work together to get David’s boss out of legal trouble."], [1783344535, 1783345844, "Schitt's Creek", "Happy Anniversary", "S2 E13", "Johnny and Moira go out for their anniversary and run into a couple they knew from their former life, while Alexis and David attend Mutt’s annual barn party, making up with some friends, and making out with others."], [1783345844, 1783347146, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783347146, 1783348450, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783348450, 1783349749, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783349749, 1783351044, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783351044, 1783352355, "Schitt's Creek", "Opening Night", "S3 E1", "Johnny struggles to find a new purpose, while Moira must confront the harsh realities of local politics."], [1783352355, 1783353665, "Schitt's Creek", "The Throuple", "S3 E2", "Johnny offers to help out an injured Twyla by waiting tables at the café, but soon gets in over his head. Alexis and Moira make a plan to have lunch, despite the fact that they're both anxious about spending time alone together. David and Stevie try to figure out the boundaries of their three-way relationship with Jake."], [1783353665, 1783354968, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783354968, 1783356226, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783356226, 1783357522, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783357522, 1783358818, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783358818, 1783360128, "Schitt's Creek", "New Car", "S3 E3", "Johnny decides to buy a new car, and he and Moira craft an increasingly elaborate ruse to avoid getting gouged by the dealership. David accompanies Stevie as she says goodbye to her great-aunt and confronts her own mortality in the process. Alexis and Ted negotiate the rules of their professional relationship when Ted receives a gift from a female client."], [1783360128, 1783361438, "Schitt's Creek", "Driving Test", "S3 E4", "As the new owner of the motel, Stevie is in over her head, and Johnny and Moira employ different strategies to discourage Stevie from selling. Meanwhile, Alexis drives a stressed-out David to his driving test, and Alexis finds herself in the unusual position of coaching her older brother."], [1783361438, 1783362739, "Raising Hope", "Jimmy and the Kid", "S2 E6", "Supermarket manager Barney's wicked ex Gloria is in town and gets him to employ her cute teenage son, Trevor. Jimmy's sympathy for the kid turns into panic when Sabrina clearly prefers his wittier humor and boyish charms and Trevor digs her."], [1783362739, 1783364042, "Raising Hope", "Burt's Parents", "S2 E7", "Jimmy, Virginia, Burt, Sabrina, Maw Maw and Hope borrow a house to impress Burt's wealthy parents who have decided at the last minute to celebrate Thanksgiving with the family. Things also get interesting when the real homeowners return early."], [1783364042, 1783365335, "The Goldbergs (2013)", "I Rode a Hoverboard", "S2 E8", "When Adam sustains a severe compound fracture, he lies in school about having ridden a hoverboard, just like Back to the Future II. However, the lie threatens his friendship with Emmy Mirsky. Meanwhile, when the Goldberg family is enamored with a new restaurant, China Garden, Beverly fears that her family does not appreciate her cooking. This leads to a war between her and restaurant employee Mrs."], [1783365335, 1783366632, "The Goldbergs (2013)", "The Most Handsome Boy on the Planet", "S2 E9", "Barry is excited when a modelling representative approaches him, but Erica thinks it's a scam."], [1783366632, 1783367942, "Schitt's Creek", "Rooms by the Hour", "S3 E5", "Johnny puts the motel in jeopardy when he rents rooms to a dubious enterprise and David helps Moira with a film audition."], [1783367942, 1783369251, "Schitt's Creek", "Murder Mystery", "S3 E6", "Johnny and Stevie visit a nearby golf course to pitch a package deal with the motel, but Johnny becomes distracted by his desire to play a round of golf. After agreeing to attend Twyla's murder mystery party, Moira must help her recruit other guests. Alexis entertains a suggestion from Ted to go back to school."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783273266, 1783275820, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783275820, 1783278460, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783278460, 1783281216, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783281216, 1783283920, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783283920, 1783286610, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783286610, 1783289249, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783289249, 1783292242, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783292242, 1783294882, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783294882, 1783297522, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783297522, 1783300162, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783300162, 1783302275, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783302275, 1783305162, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783305162, 1783307821, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783307821, 1783310415, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783310415, 1783313009, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783313009, 1783315623, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783315623, 1783318229, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783318229, 1783320839, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783320839, 1783323428, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783323428, 1783326071, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783326071, 1783328660, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783328660, 1783331293, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783331293, 1783333848, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783333848, 1783336487, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783365849, 1783368443, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"]]}, {"id": "70", "name": "Groovy TV", "a": "groovy-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/groovy-v2.png", "progs": [[1783271998, 1783275775, "Saturday Night Live", "Peter Boyle with Al Jarreau", "S1 E13", "Live from New York, It's...Chevy Chase\n\nSketches include \"The Valentine's Day Massacre,\" \"Samurai Divorce Court,\" \"Jason and Sunshine,\" \"The Corrida.\" \"All Pro Wrestling,\" \"Remembering of Things Past\", \"Dueling Brandos,\" \"A Home Movie\" (film), and \"The Orgy.\"  Al Jarreau performs \"We'll Get By.\""], [1783275775, 1783279773, "Saturday Night Live", "Desi Arnaz with Desi Arnaz Jr.", "S1 E14", "Live from New York, It's...Chevy Chase\n\nSketches include-- Gerald Ford gives a word association, Literary Recital, Very White(Chevy Chase)sings unsoulful songs, \"The Failed Pilots of I Love Lucy\", Cuban accupunture, Lucille Ball talks about Desi's book, Bisexual Minute."], [1783279773, 1783281120, "That '70s Show", "That Wrestling Show", "S1 E15", "Kitty thinks that it would be a good idea if Red and Eric become friends.  She forces Eric to invite Red to go with the gang to a wrestling event in Kenosha.  Bob tags along and seeks help from Fez and Hyde over Midge's decision to start therapy.  And Jackie is super nice to Kelso now that they've done the deed."], [1783281120, 1783282467, "That '70s Show", "First Date", "S1 E16", "Valentine's Day is coming up, so Eric decides to ask Donna out on their official first date and give her his class ring.  She breaks her study date with Hyde in order to go, leading Hyde to realize he only has one last chance with her.  Red and Kitty discover they don't have that much in common with Bob and Midge anymore.  And Jackie explains to Kelso how things are going to work now that they've "], [1783282467, 1783286454, "Saturday Night Live", "Jill Clayburgh with Leon Redbone", "S1 E15", "Live from New York, It's...Chevy Chase\n\nSketches include-- No More Falls, \"Great Moments in Herstory\", White Guilt Relief Fund, Inquisitive Girlfriend, Grable and Lombard, Car Yummies, Paying the Milkman, Jill Carson Guidance Counselor!, Andy Kaufman sings \"Old Macdonald\", \"The Mr. Bill Show\"."], [1783286454, 1783290512, "Saturday Night Live", "Anthony Perkins with Betty Carter", "S1 E16", "Live from New York, It's...Chevy Chase\n\nSketches include--'SNL is not ad-libbed' says Chevy Chase, A President's View on Marijuana, Dominatrix Cleaning Tips, \"Norman Bates School of Hotel Management\", Low-budget Movie Trailers, Sherry protest her B(ee), Policemen Dance Party, \"Hello Dolly\"."], [1783290512, 1783291859, "That '70s Show", "The Pill", "S1 E17", "Since no one else is around, Jackie confides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783291859, 1783293206, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783293206, 1783297209, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."], [1783297209, 1783301274, "Saturday Night Live", "Raquel Welch with Phoebe Snow and John Sebastian", "S1 E18", "Live from New York, It's...Chevy Chase\n\nSketches include-- \"Get to the fall Chevy!\", Purina Rat Chow, Joseph Franklin's 10-letter Metric Alphabet, \"The Claudine Longet Ski Invitational\", \"One Flew Over The Hornest Nest\", Chevy tries to convince Raquel to take off her shirt, Baba Wawa, Bisexual Moment, The Muppets are finished on SNL."], [1783301274, 1783302622, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to the prom.  As for the adults, they struggle with how to respond to Midge's idea for her future career."], [1783302622, 1783303968, "That '70s Show", "A New Hope", "S1 E20", "The guys go see Star Wars and are all completely blown away by it.  Red asks Eric to hang out with his boss's son now that he's started working at the plant full-time again.  David was an awkward kid the last time Eric saw him, but now he's a hunk who likes reading Donna's short stories.  Also, Laurie starts hitting on Kelso out of boredom."], [1783303968, 1783307930, "Saturday Night Live", "Madeline Kahn with Carly Simon", "S1 E19", "Live from New York, it's Chevy Chase!   Sketches are \"Ronald Reagan's Jam Session,\" Not for Ladies Only, Wilderness Comedian, \"Slumber Party,\" Bride of Frankenstein, \"Fondue Pots for Namibia,\" \"The Muppets Can Reunite the Beatles,\" New York's My Home (film), \"Super Absordent Dry Hose,\" and \"The Final Days.\" Carly Simon performs You're So Vain."], [1783307930, 1783311921, "Saturday Night Live", "Dyan Cannon with Leon & Mary Russell", "S1 E20", "Live from New York, It's...Chevy Chase\n\nSketches include--Chevy has to do the fall again, \"Hearing Test,\" \"The Adulterer,\" \"Vacationland Adventure\", \"Minister with Hiccups,\" \"Dyan Cannon's Dream,\" \"Orange Juice,\" \"The Bathwater of The Stars\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."], [1783311921, 1783313267, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783313267, 1783314613, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783314613, 1783318627, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get Laraine todo the fall, Samurai Tailor, \"Talk Back!\", \"Dell Stator's Toad Ranch Resturaunt\", \"Looks at Books\", The Crowd Audition, Peter Lemon Moodring, \"Not For Ladies Only\", Lorne Micheals offer to the Beatles."], [1783318627, 1783322592, "Saturday Night Live", "Elliott Gould with Leon Redbone and Harlan Collins & Joyce Everson", "S1 E22", "Sketches include \"Wax Museum,\" \"Phone Operator Academy,\" \"European Poker Player,\" \"Babs's Uvula,\" \"The Last Voyage of the Starship Enterprise,\" \"The Bee Honeymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783322592, 1783323942, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783323942, 1783325288, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783325288, 1783329288, "Saturday Night Live", "Louise Lasser with the Preservation Hall Jazz Band", "S1 E23", "Live from New York, It's...Chevy Chase\n\nSketches include--Belushi thinks Chevy has a big head, Louise Lasser locks herself dressing room, General \"V.D\" Amin, Sven and Inger, John Belushi tries to sell his clothes, Ode to Television, Louise apologizes to her dog, Jimmy Carter talks about the campagin."], [1783329288, 1783333281, "Saturday Night Live", "Kris Kristofferson with Rita Coolidge", "S1 E24", "Live from New York, It's...Chevy Chase\n\nSketches include--Kristofferson signs \"Help Me Make it Through The Night\", new SNL employer Sherry, Samurai General Practitioner, the Great White Athelete, Gerald Ford dosent want to talk about local issues, \"Talk Country\", My Blind Date is My Gynocologist, Andrew Young is a Suckup, Police State, \"Waiting For Don Pardo\"."], [1783333281, 1783334627, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783334627, 1783335711, "That '70s Show", "Episode 26", "S1 E26", "Groovy TV"], [1783335711, 1783337037, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783337037, 1783338363, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783338363, 1783339690, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783339690, 1783341017, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783341017, 1783342344, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783342344, 1783343670, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"], [1783343670, 1783344996, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783344996, 1783346332, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783346332, 1783347659, "That '70s Show", "Eric Gets Suspended", "S2 E9", "Donna is acting out over her parents' break up and takes up smoking. Eric gets caught holding one of her cigarettes in the school yard and is suspended. Even though Eric tries explaining what really happened, Red punishes him. Fez and Hyde go on a double date, set up by Fez's host parents; Hyde can't decide which girl he likes better. Jackie and Kelso argue over how many stuffed animals she can ha"], [1783347659, 1783348985, "That '70s Show", "Red's Birthday", "S2 E10", "It's Red's birthday and the roof collapses so Eric gets him some 2 x 4s to fix it. Bob and Midge take Red and Kitty out for dinner but they each bring a date and ditch them to do it in the car. Eric is mad at Donna for talking to Hyde about her parent's problems instead of talking to him."], [1783348985, 1783350309, "That '70s Show", "Laurie Moves Out", "S2 E11", "Laurie moves out and Red is annoyed when he finds out she moved in with a guy instead of with a girlfriend like she told him. She then moves back in when the guy goes back to his wife. Jackie suspects Kelso of being unfaithful."], [1783350309, 1783351635, "That '70s Show", "Eric's Stash", "S2 E12", "Eric's secret stash of money goes missing, and Hyde is the first and only suspect.  Hyde denies taking it, and everyone is shocked when the real culprit is revealed.  Fez and Kelso help Jackie prepare for a beauty pageant."], [1783351635, 1783352961, "That '70s Show", "Hunting", "S2 E13", "Red and Bob take the guys deer hunting; Hyde chills out, Fez bags dinner using only a few primitive weapons, Kelso is a menace with his gun, and Red and Eric bond in the deer blind. Meanwhile, Kitty and Midge have a girls' night with Donna, Jackie and Laurie, but with nothing to talk about, the end up playing poker."], [1783352961, 1783354288, "That '70s Show", "Red's New Job", "S2 E14", "Eric gets a job at Price Mart as a cashier while Red gets one as a supervisor. Kelso tries to break up with Laurie because she wants a real relationship but Laurie threatens to tell Jackie about her and Kelso."], [1783354288, 1783355614, "That '70s Show", "Burning Down the House", "S2 E15", "With her parents away, Jackie plans on throwing a small, classy dinner party.  Kelso tries to turn it into a fun party, and invites everyone he knows; Jackie is upset, and when Kelso tries to fix things, he only ends up making them worse.  Hyde makes it with a snobby girl from school, but the guys don't believe him.  Red finds out that Bob wears a toupee, and then has to spend an uncomfortable eve"], [1783355614, 1783356940, "That '70s Show", "The First Time", "S2 E16", "Bob and Midge are getting ready to renew their vows. Kitty is upset because her close friend Midge didn't ask her as a bridesmaid while Red is Bob's best man. Eric and Donna have sex for the first time."], [1783356940, 1783358267, "That '70s Show", "Afterglow", "S2 E17", "Contrary to what she tells Eric, Donna's review of their first sexual encounter is not good--or private; Red celebrates his first paycheck and buys a motorcycle."], [1783358267, 1783359593, "That '70s Show", "Kitty and Eric's Night Out", "S2 E18", "Eric is forced to go on a date with his mom. He is embarrassed seeing sex and drugs with his mom. But he warms up to it. Fez gets a cute new girlfriend. Jackie has to admit that she is jealous and has feelings for Fez."], [1783359593, 1783360920, "That '70s Show", "Parents Find Out", "S2 E19", "Kitty is devastated after the police catch Donna and Eric having sex in the Vista Cruiser."], [1783360920, 1783362247, "That '70s Show", "Kiss of Death", "S2 E20", "Eric lies after accidentally running over Donna's cat; Laurie sets Kelso up for a fall; Fez sees \"Fez's Angels\" while under anesthesia to have his appendix removed."], [1783362247, 1783363574, "That '70s Show", "Kelso's Serenade", "S2 E21", "Kelso wants to win Jackie back by writing her a song, while Jackie turns to the unlikeliest person for comfort. Meanwhile, Red, Kitty and Laurie visit bitter Aunt Pearl (Connie Sawyer) in a retirement home, and Eric and Donna get into communication problems."], [1783363574, 1783364900, "That '70s Show", "Jackie Moves On", "S2 E22", "Fez finally has a date with Jackie, but not the same Jackie he's coveted; Eric and Laurie have a war of embarrassing secrets; and Kitty reveals her secret about Red's mother's necklace."], [1783364900, 1783366226, "That '70s Show", "Holy Crap!", "S2 E23", "Kitty calls on a divine power, of sorts, when Eric and Laurie forsake going to church; Kelso's budding beard stirs Jackie."], [1783366226, 1783367553, "That '70s Show", "Red Fired Up", "S2 E24", "Eric appreciates another employee who draws Red's ire away from himself; Kelso and Laurie date openly, and receive separate cautions from Hyde and Kitty."], [1783367553, 1783368880, "That '70s Show", "Cat Fight Club", "S2 E25", "Hyde helps Jackie take a Zen approach to Kelso and Laurie, who introduce their relationship to Red at the Forman dinner table."]]}, {"id": "75", "name": "Late Nite", "a": "late-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/late-nite-v2.png", "progs": [[1783274288, 1783278347, "Saturday Night Live", "Anthony Perkins with Betty Carter", "S1 E16", "Live from New York, It's...Chevy Chase\n\nSketches include--'SNL is not ad-libbed' says Chevy Chase, A President's View on Marijuana, Dominatrix Cleaning Tips, \"Norman Bates School of Hotel Management\", Low-budget Movie Trailers, Sherry protest her B(ee), Policemen Dance Party, \"Hello Dolly\"."], [1783278347, 1783279729, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783279729, 1783281035, "In Living Color", "Spike's Joint", "S2 E3", "Sketches (not including intro) include:\n\n\"\"Flatuscents\"\"   \"\"Good Morning/Good Night (Magenta Thompson Show)\"\"   \"\"Cephus & Reesie's Broadway Tour\"\"   \"\"The Buttmans: Guess Who's Coming to Dinner\"\"   \"\"Spike's Joint\"\""], [1783281035, 1783281732, "Robot Chick p on \"Superheroes Tonight.\""], [1783359435, 1783360812, "In Living Color", "Men on Vacation", "S2 E26", "Best of episode of \"\"In Living Color.\"\" Sketches include:\n\n\"\"Amazing Grace - Rocky VI\"\"   \"\"Vera DeMilo: Veracosa, Mistress of Destruction\"\"   \"\"Mudhead's Funeral\"\"   \"\"Men On Vacation\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783360812, 1783362023, "In Living Color", "Homey The Sellout: Part 2", "S3 E1", "Sketches include Pee Wee's Adult Adventure / Crown Heights Story / Misery II / Homey D Clown Part 2 Of 2 / The Head Detective"], [1783362023, 1783362669, "Robot Chicken", "Shoe", "S3 E5", "Ted Kennedy and Jenna Jameson battle celebrities in politics and porn! Link's looking for a decent reward from Princess Zelda. The Homeless airlines sorta take flight. The SWAT Team finally \"gets\" Sonic the Hedgehog for speeding. Learn whatever happened to the Micro Machines Man. Skeletor's latest plot to destroy Eternia and He-Man goes a little too well."], [1783362669, 1783363371, "Robot Chicken", "Endless Breadsticks", "S3 E6", "Another black man in a fat suit movie. Big Jim tries to score. The Cat in the Hat has his way with the family pet and the kids need to get lost. Doug tells us about his life. When Snarf kicks it, Mumm-Ra sees his chance to destroy the ThunderCats as Lion-O's new nanny."], [1783363371, 1783364746, "In Living Color", "Men on Televison Part 2: What Happened To Blaine?", "S3 E2", "Sketches include Al Sharpton And Louise Farrakhan / Men On... Part 2 Of 2 / Black And White / Silence Of The Lambs II - Oswald Bates / Kung Fu Master '91"], [1783364746, 1783366109, "In Living Color", "Clarance Thomas's First Day", "S3 E3", "Sketches include Clarence Thomas / Rocketeer / Al Macafee / Prince / Anton / Benita Butrell"], [1783366109, 1783366593, "Robot Chicken", "Yancy the Yo-Yo Boy", "S3 E7", "The dinosaurs face their Armageddon. Barbie and Yasmin (of the Bratz) go head-to-head on MTV's Exposed. What happens on Tuesday when Wimpy has to pay for his burgers? The Greatest American Hero or greatest American nerd? Find out how infinite wealth has affected Richie Rich's teenage years."], [1783366593, 1783367166, "Robot Chicken", "More Blood, More Chocolate", "S3 E8", "An alien invasion isn't quite what it seems. Haunted houses are common, but not one with THIS kind of ghost! Can Bob the Builder take on the union? Probably. \"Inside the Battlefield\" revisits G.I. Joe's and Cobra's battle of the Weather Dominator, twenty years later."], [1783367166, 1783368452, "In Living Color", "Green Eggs and The Guvment Cheese", "S3 E4", "Sketches include Jesse Jackson Children's Books / Hey Mon / Funky Finger Productions / Fire Marshall Bill /Leaders of the New School perform \"Teachers Teachers\""]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783273268, 1783274732, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783274732, 1783276025, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783276025, 1783277320, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783277320, 1783278751, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783278751, 1783280177, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783280177, 1783281542, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783281542, 1783282908, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783282908, 1783284246, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783284246, 1783285584, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783285584, 1783287047, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783287047, 1783288511, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783288511, 1783289808, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783289808, 1783291106, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783291106, 1783292331, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783292331, 1783293807, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783293807, 1783295160, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783295160, 1783296512, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783296512, 1783297848, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783297848, 1783299180, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783299180, 1783300644, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783300644, 1783302106, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "I Heart 80s"], [1783302106, 1783303404, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783303404, 1783304698, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783304698, 1783305993, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783305993, 1783307361, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783307361, 1783308729, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783308729, 1783310064, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783310064, 1783311401, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783311401, 1783312739, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783312739, 1783314202, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783314202, 1783315665, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783315665, 1783316958, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783316958, 1783318253, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783318253, 1783319654, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783319654, 1783321056, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783321056, 1783322391, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783322391, 1783323727, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783323727, 1783325062, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783325062, 1783326397, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783326397, 1783327860, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "I Heart 80s"], [1783327860, 1783329324, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "I Heart 80s"], [1783329324, 1783330621, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783330621, 1783331918, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783331918, 1783333305, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783333305, 1783334699, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783334699, 1783335929, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783335929, 1783337268, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783337268, 1783338606, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783338606, 1783339942, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783339942, 1783341406, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "I Heart 80s"], [1783341406, 1783342871, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "I Heart 80s"], [1783342871, 1783344168, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783344168, 1783345465, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783345465, 1783346865, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783346865, 1783348235, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783348235, 1783349573, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783349573, 1783350911, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783350911, 1783352248, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783352248, 1783353586, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783353586, 1783355049, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "I Heart 80s"], [1783355049, 1783356514, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "I Heart 80s"], [1783356514, 1783357808, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783357808, 1783359105, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783359105, 1783360497, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783360497, 1783361845, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783361845, 1783363177, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783363177, 1783364509, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783364509, 1783365846, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783365846, 1783367184, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783367184, 1783368306, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "I Heart 80s"]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v1.png", "progs": [[1783274270, 1783277017, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783277017, 1783279773, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783279773, 1783282534, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783282534, 1783285319, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783285319, 1783289438, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783289438, 1783292223, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783292223, 1783294948, "Beverly Hills, 90210", "Everybody's Talkin' 'Bout It", "S2 E21", "Andrea is outraged when the school refuses to allow students to take part in a health survey that includes questions about sex. She goes before the school board and introduces a proposal to distribute condoms at West Beverly."], [1783294948, 1783297704, "Beverly Hills, 90210", "Baby Makes Five", "S2 E22", "Kelly confides in Brenda and Donna about her mother's pregnancy, but they can't keep a secret. David tells Donna that Mel is planning to propose, then learns about the pregnancy. He doesn't share the news with his father, who is clueless about Jackie's condition. Jackie assumes that Mel only wants to marry her to fulfill his obligation, so she dumps him.  Music: \"\"All 4 Love\"\" by Color Me Badd (#1"], [1783297704, 1783300488, "Beverly Hills, 90210", "Cardio Funk", "S2 E23", "Dylan's friend Sarah comes to an AA meeting. He offers his support, and she begins to rely on him. She seeks his help in throwing her abusive boyfriend out of the apartment.  Music: \"\"We Want the Funk\"\" by Gerardo (#16, 1991); \"\"Do Wah Diddy Diddy\"\" (Manfred Mann - #1, 1964), performed by the cast; \"\"Your Cheatin' Heart\"\" (Hank Williams), performed by Patricia Michel; \"\"Be Bop-a-Lul"], [1783300488, 1783303242, "Beverly Hills, 90210", "The Pit and the Pendulum", "S2 E24", "Brandon participates in a teen review committee that provides input to one of Jim's clients, who is building a gigantic new mall. Marcie, the developer's college-age daughter, aggressively pursues Brandon. Brandon is incensed to learn that the project would require the demolition of the Peach Pit. He squares off with Jim, who promises to stand up for Nat's interests. Brandon takes Marcie to the Pe"], [1783303242, 1783306027, "Beverly Hills, 90210", "Meeting Mr. Pony", "S2 E25", "Brenda is held up at gunpoint by an armed robber during an after-hours hold up at the Peach Pit. She starts having waking nightmares of the event and visits a psychiatrist who diagnoses Brenda with post traumatic stress disorder. Brenda identifies her attacker in a police line-up and is startled to learn that her attacker is only seventeen years old."], [1783306027, 1783308811, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"], [1783308811, 1783311512, "Beverly Hills, 90210", "Mexican Standoff", "S2 E27", "Brenda upsets her father by consistently violating her curfew. She promises to demonstrate more mature behavior. Jim and Cindy agree to let Brenda join Dylan for a weekend in Mexico. Brenda falls asleep while watching a movie at Dylan's, and doesn't come home until 4 AM. Her parents forbid her from taking the trip. Dylan encourages Brenda to stand up for herself, but she instead tells Jim and Cind"], [1783311512, 1783314231, "Beverly Hills, 90210", "Wedding Bell Blues", "S2 E28", "A furious Jim goes to the Mexican border to retrieve Brenda. Jim bans Dylan from the Walsh house. Jackie learns that Kelly covered for Brenda, and embarrasses her by yelling at her in front of Jake.\n\nMusic: \"\"Wedding Bell Blues\"\" by The Fifth Dimension (#1, 1969); \"\"Blue Moon\"\" (Glen Gray - #1, 1"], [1783314231, 1783316985, "Beverly Hills, 90210", "Misery Loves Company", "S3 E1", "Brenda drives her parents crazy with her constant sulking, and sneaks around with Dylan behind their backs. Dylan wants someone other than Jim to handle his trust, but Jim refuses to break his deal with Iris. Jim and Cindy join the beach club and catch Brenda making out with Dylan. Jim screams at Brenda and makes a scene. She packs up her belongings and moves in with Dylan. Brandon bets Steve that"], [1783316985, 1783319727, "Beverly Hills, 90210", "The Twins, the Trustee, and the Very Big Trip", "S3 E2", "Kelly bonds with her baby sister, Erin. She bows out of a six-week trip to study in Paris with Donna because she wants to spend time with her family. Brenda and Dylan clash over their new living arrangements. Cindy and Brandon realize that Brenda is unhappy, but she is too stubborn to give in. Jim threatens to freeze Dylan's account unless he helps convince Brenda to accept a trip to Paris. Dylan "], [1783319727, 1783322496, "Beverly Hills, 90210", "Too Little, Too Late/Paris 75001", "S3 E3", "Brenda and Donna have difficulty adjusting to life in France. Donna constantly complains about missing David, and Brenda soon begins to long for Dylan. They accidentally order brains at a restaurant, and Donna later spends an entire party eating pastries because she can't carry on a conversation in French. Andrea's boyfriend invites her to join him at the Republican Convention in Houston, where he"], [1783322496, 1783325238, "Beverly Hills, 90210", "Sex, Lies and Volleyball/Photo Fini", "S3 E4", "Donna is struggling in the French immersion program, and feels left out because Brenda and her classmates can speak fluent French. Donna catches the eye of a photographer, who offers her a modeling job. A man tries to entice Donna into signing a two-year modeling contract, but he's just trying to get her into bed. Steve finds the perfect partner for the mixed doubles volleyball tournament. He is h"], [1783325238, 1783328002, "Beverly Hills, 90210", "Shooting Star/American in Paris", "S3 E5", "Kelly feels guilty about kissing Dylan and tries to avoid him. She goes to his house to admit her feelings, and they share a passionate kiss. They spend a lot of time together, but reconsider their actions when David catches them kissing. Kelly turns down Dylan's offer to camp out on the beach (the night before Brenda is to return), but eventually joins him for a romantic evening. Brenda meets Ric"], [1783328002, 1783330769, "Beverly Hills, 90210", "Castles in the Sand", "S3 E6", "Andrea and the children nearly catch Dylan and Kelly sleeping on the beach. Kelly tells Dylan that they must forget their summer romance, but he doesn't want to do this. Brenda and Donna come home from Paris and are greeted with a party. Jim and Cindy agree to let Brenda resume her relationship with Dylan. Kelly tries to avoid Brenda and Dylan, and is annoyed when he continually inquires about her"], [1783330769, 1783333537, "Beverly Hills, 90210", "A Song of Myself", "S3 E7", "Brandon wants to quit the paper so that he can enjoy his senior year. Andrea enlists the help of new advisor and English teacher Gil Meyers to change his mind. Gil decides to have Brandon replace Andrea as editor. She accuses him of sexism and wants to resign. Gil resolves the dispute by making Andrea and Brandon co-editors. A depressed Kelly changes her entire schedule to avoid Brenda and Dylan. "], [1783333537, 1783336303, "Beverly Hills, 90210", "The Back Story", "S3 E8", "Brenda, Donna, Kelly, Steve and David prepare to take the SAT. Brenda constantly argues with Kelly, and also gets into hot water with her parents when they learn that she has been smoking since the Paris trip. Beth Nielson, a young producer from the tabloid show Back Story, seeks Brenda's help in putting together a story about Beverly Hills teens. The piece is intended to correct misconceptions, b"], [1783336303, 1783339069, "Beverly Hills, 90210", "Highwire", "S3 E9", "The gang must consider their future and meets with their guidance counselor, except for Kelly and Dylan who agree that college is not for everyone. Meanwhile, Jim and Cindy announce to Brenda and Brandon that they can afford a private college for only one of them. Also, Andrea has the same bad dreams involving walking a high-wire to get into her own college. Brandon and Nikki become even more clos"], [1783339069, 1783341836, "Beverly Hills, 90210", "Home and Away", "S3 E10", "West Beverly's undefeated football team prepares for a showdown with powerhouse Shaw High. The school decides to forfeit after two Shaw students are shot to death by gang members during a game. Brandon is furious because the West Beverly student body cares more about the homecoming dance (coordinated by Brenda) than the shootings. He and Jordan Bonner, editor of the Shaw paper, run each other's ed"], [1783341836, 1783344601, "Beverly Hills, 90210", "A Presumption of Innocence", "S3 E11", "Andrea tries to get to the bottom of a sexual assault accusation against Gil Meyers brought forth by Sue's mother. David and Donna join in on the investigation and find out about Sue's real emotional troubles. Meanwhile, Brandon reluctantly agrees to go out dancing with Nikki, despite not knowing how to dance. Also, Dylan develops a bad cough due to surfing in polluted water."], [1783344601, 1783347327, "Beverly Hills, 90210", "Destiny Rides Again", "S3 E12", "Brenda runs into Rick at a video store, as he has transferred to UCLA. She goes out with him and continues to pretend that she is French. He is understanding when she finally reveals the truth. The SAT review board accuses Dylan of paying someone to take his test. He annoys Brenda by refusing to re-take the test. After Dylan confesses that he had a summer fling, Brenda suggests that they take a br"], [1783347327, 1783350065, "Beverly Hills, 90210", "Rebel With a Cause", "S3 E13", "Kelly and Dylan go on a date, as Brenda insists that Dylan is free to see whomever he wishes. Brenda explodes when she and Rick run into Kelly and Dylan at a restaurant. Kelly denies that she is a bimbo and Brenda responds, \"I was always told that if it looks like a duck and walks like a duck...\" Kelly believes that Dylan is on the rebound, so she pushes him away. Brenda breaks up with Rick becaus"], [1783350065, 1783352773, "Beverly Hills, 90210", "Wild Horses", "S3 E14", "Dylan's Porsche breaks down near a secluded ranch. The wealthy owner takes him in and wants him to stay permanently (as her boy toy). Dylan is disappointed when she sells her favorite horse, and decides not to live in an environment where everything is for sale. Brenda and Kelly make up. David fires Steve as manager after he is humiliated at a showcase because he had to go on without a sound check"], [1783352773, 1783355539, "Beverly Hills, 90210", "The Kindness of Strangers", "S3 E15", "Brandon finds Jack Canner (the homeless vet he met at the beach club) rummaging through the dumpster behind the Peach Pit. He takes him home for Thanksgiving dinner, but Canner runs afoul of Jim, who accuses him of shirking his family responsibilities and hiding behind the flag. Brandon explains to Canner that Jim's father was a Marine; the two never spoke again after Jim refused to go to Vietnam."], [1783355539, 1783358276, "Beverly Hills, 90210", "It's a Totally Happening Life", "S3 E16", "Two talking stars narrate an account of the gang's events during the week before Christmas. Brenda, Kelly and Dylan decide to be friends, but the arrangement falls apart after both girls make out with Dylan. Andrea is accepted to Yale, but gets dumped by her boyfriend. Nikki tells Brandon that she is moving back to San Francisco. Brandon and Andrea share a kiss while watching \"\"It's a Wonderful Li"], [1783358276, 1783361044, "Beverly Hills, 90210", "The Game Is Chicken", "S3 E17", "Steve becomes friends with a guy in detention through their interest in cars. Steve and Brandon win a lot of money betting on Joe in a car race, but Dylan warns that the whole thing may be a scam. Steve and Brandon agree to bankroll Joe in a high-stakes race against drug dealer Frank Padilla. Brandon realizes that their opponent may be the guy who ran over Andrea. While Brandon contacts the police"], [1783361044, 1783363808, "Beverly Hills, 90210", "Midlife...Now What?", "S3 E18", "Cindy, Jackie and the girls spend the weekend at a health spa. Kelly is wary because Babette, a friend of Jackie's from her drug-using days, works at the facility. Brenda overhears a gossipy masseuse discussing a friend's affair with Mel. Kelly calls home and learns from David that Mel has been gone for several days. Babette tries to comfort Jackie by offering her drugs, but she resists temptation"], [1783363808, 1783366499, "Beverly Hills, 90210", "Back in the High Life Again", "S3 E19", "Jack is released from prison. He encourages Dylan to invite all his friends to a party, but only Kelly shows up. Dylan tells Kelly that he has chosen her over Brenda, and they kiss in the hotel pool. Dylan and Kelly take Brenda for a walk to inform her of Dylan's decision, and reveal their summer fling. She screams that she will never speak to them again. The financially destitute Jack wants to di"], [1783366499, 1783369208, "Beverly Hills, 90210", "Parental Guidance Recommended", "S3 E20", "Iris flies in from Hawaii, and Dylan and Jack try to soften her up to convince her to approve the dissolution of the trust. She is leery of Jack's motives, but elects not to stand in their way. Jack makes a clandestine phone call and promises someone that he will get the money. Brenda mopes around in her room and discards all mementos of Dylan. A visit from Iris convinces her to get past her pain,"]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783273634, 1783275038, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783275038, 1783276410, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783276410, 1783277800, "In Living Color", "Anton In The People's Court", "S1 E11", "Sketches include the homeless Anton defending himself in a people's court; a parody of rapper MC Hammer; Ted Turner's \"colorized classic\" version of \"The Kid.\""], [1783277800, 1783279191, "In Living Color", "Conspiracy", "S1 E12", "A cable repairman benefits when LaQuita tries to impress a producer. Also: a \"Ray Charles in Charge\" segment."], [1783279191, 1783280741, "Sex and the City", "The Drought", "S1 E11", "Carrie's relationship with Mr. Big has been going on for long enough that it is becoming less physical, especially after she farts in bed. Charlotte is dating a man who isn't interested in sex anymore thanks to the side-effects of Prozac. Samantha discovers that not having sex can be erotic. Miranda realizes that she hasn't had sex for months."], [1783280741, 1783282358, "Sex and the City", "Oh Come All Ye Faithful", "S1 E12", "After being introduced as \"a friend\" to his mother, Carrie realizes her relationship with Mr. Big is one-sided and breaks up with him. Miranda dates an up-and-coming playwright who is also an up-tight Catholic. Samantha falls in love with a perfect man, but he doesn't measure up to her requirements. Charlotte gets psychic readings to see if she'll ever marry."], [1783282358, 1783285160, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783285160, 1783287976, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783287976, 1783289382, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783289382, 1783290807, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783290807, 1783292211, "Saved by the Bell", "The Election", "S1 E13", "When Zack finds out that the elected student council president gets to leave school for a trip to Washington D.C., he runs against Jessie."], [1783292211, 1783293588, "Saved by the Bell", "The Zack Tapes", "S1 E14", "The new teacher, Mrs. Wentworth, teaches a class on subliminal advertising, so after Zack successfully uses it to get out of trouble with Mr. Belding, he tries to use hidden messages on a cassette music tape to get Kelly to go the Sweetheart's Dance with him and Lisa to go with Screech. But when the rest of the gang catches on, they all joins forces with the entire school including Mr. Belding to "], [1783293588, 1783294978
