<script>
const D = {"t0": 1783669784, "t1": 1783767638, "gen": 1783680300, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783670861, 1783672500, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783672500, 1783674136, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783674136, 1783675771, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783675771, 1783677408, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783677408, 1783679043, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783679043, 1783680693, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783680693, 1783682331, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783682331, 1783683968, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783683968, 1783685603, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783685603, 1783687205, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783687205, 1783688842, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783688842, 1783690478, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783690478, 1783692113, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783692113, 1783693747, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783693747, 1783695384, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783695384, 1783697023, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783697023, 1783698625, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783698625, 1783700276, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783700276, 1783701913, "The Twilight Zone", "The Trouble with Templeton", "S2 E9", "Booth Templeton is an aging actor who longs for the old days when his wife was alive.  Miraculously, he is given a sobering glimpse of the past he holds so dear."], [1783701913, 1783703550, "The Twilight Zone", "A Most Unusual Camera", "S2 E10", "Married couple Chester and Paula have broken into and robbed a curio shop, hoping to sell the loot for a handsome sum of money. Unfortunately, all of it turns out to be junk or fakes. All, that is, save for a mysterious camera. When they try taking a picture, it turns out to be from five minutes into the future. Soon Paula's brother Woodward joins them and the three decide to use the camera at a h"], [1783703550, 1783705149, "The Twilight Zone", "The Night of the Meek", "S2 E11", "A down-on-his-luck department store Santa Claus discovers a bottomless sack of toys."], [1783705149, 1783706788, "The Twilight Zone", "Dust", "S2 E12", "On a hot day, sympathetic Sheriff Koch and callous con man Peter Sykes are among the many who gather in a desert town to see young Luis Gallegos hanged for accidentally killing a child while drunk. Can some magic dust save Luis?"], [1783706788, 1783708425, "The Twilight Zone", "Back There", "S2 E13", "It's April 14, 1961. Peter Corrigan and friends are discussing time travel at their men's club. Corrigan suddenly becomes dizzy. When his head clears, he has moved back to April 14, 1865 - the date of Lincoln's assassination."], [1783708425, 1783710059, "The Twilight Zone", "The Whole Truth", "S2 E14", "A peculiar Model A automobile compels a used car dealer to tell only the truth."], [1783710059, 1783711696, "The Twilight Zone", "The Invaders", "S2 E15", "An old woman who lives alone in a ramshackle farm house comes face to face with alien invaders. She hears something on her roof and then finds a flying saucer, perhaps six or seven feet across from which emerges two small robots. She fights them as best she can and eventually succeeds in destroying their ship. The nature of the invaders however is not immediately obvious however."], [1783711696, 1783713332, "The Twilight Zone", "A Penny for Your Thoughts", "S2 E16", "The lucky flip of a coin seems to give a mild-mannered bank clerk the power to read minds. But he soon learns that you can't believe everything you read."], [1783713332, 1783714967, "The Twilight Zone", "Twenty Two", "S2 E17", "Miss Powell has a recurring nightmare about room 22 – a morgue."], [1783714967, 1783716602, "The Twilight Zone", "The Odyssey of Flight 33", "S2 E18", "Global Flight 33 is en route from London to New York in what appears to be a routine flight in a modern jetliner. Suddenly however, the jet's speed increases to an incredible 3000 knots and they arrive in New York rather quickly. Neither the captain or his well-trained crew can explain what happened - a strange tail-wind perhaps - but they are certainly not prepared for what they find as they surv"], [1783716602, 1783718228, "The Twilight Zone", "Mr. Dingle, the Strong", "S2 E19", "Luther Dingle is a meek and mild-mannered vacuum cleaner salesman. He spends some time in a bar but always seems to be in the middle of others arguments and always seems to get the worst of it. Courtesy of visiting - but invisible - aliens, he is given great strength, some 300 times greater than that of a normal human being. Dingle becomes something of a local celebrity but just how long will his "], [1783718228, 1783719842, "The Twilight Zone", "Static", "S2 E20", "Ed Lindsay hates television, so he gets his old radio out of the basement of the boardinghouse where he lives. He soon finds he can receive programs from the past when he's alone."], [1783719842, 1783721481, "The Twilight Zone", "The Prime Mover", "S2 E21", "Ace Larsen discovers his business partner has the ability to control objects with his mind. The pair head to Vegas to win big."], [1783721481, 1783723119, "The Twilight Zone", "Long Distance Call", "S2 E22", "A toy telephone given as a birthday gift becomes the link between young Billy Bayles and his newly deceased beloved grandmother, but this link becomes dangerous when she apparently wants him to join her on the other side."], [1783723119, 1783724723, "The Twilight Zone", "A Hundred Yards Over the Rim", "S2 E23", "In 1847 a western settler sets out to find medicine for his dying son - and stumbles into modern-day New Mexico."], [1783724723, 1783726370, "The Twilight Zone", "The Rip Van Winkle Caper", "S2 E24", "Thieves put themselves into suspended animation for 100 years after hiding a million dollars worth of gold bars."], [1783726370, 1783728007, "The Twilight Zone", "The Silence", "S2 E25", "Annoyed by fellow country club member Jamie Tennyson's constant chatter, Colonel Archie Taylor bets half a million dollars that Jamie cannot be completely silent for one year while living in a glass enclosure in the club's basement."], [1783728007, 1783729655, "The Twilight Zone", "Shadow Play", "S2 E26", "Convicted killer Adam Grant is trapped in a recurring nightmare in which he is sentenced to death by electrocution. He tries to convince those around him that they are imaginary and will cease to exist if he is executed."], [1783729655, 1783731291, "The Twilight Zone", "The Mind and the Matter", "S2 E27", "A book on the power of thought enables an irritable worker to re-create the world exactly as he wants it. But what he wants and what he gets are two different things!"], [1783731291, 1783732926, "The Twilight Zone", "Will the Real Martian Please Stand Up?", "S2 E28", "Following a frantic phone call about a crashed spaceship on a winter night, state troopers Bill Padgett and Dan Perry try to determine who among the bus passengers at a snowed-in roadside diner is a visitor from another world."], [1783732926, 1783734576, "The Twilight Zone", "The Obsolete Man", "S2 E29", "In a future state where religion and books have been banned, a librarian is judged obsolete and sentenced to death."], [1783734576, 1783736205, "The Twilight Zone", "Two", "S3 E1", "In a futuristic world a man and a woman, from opposing sides in a devastating war, meet in a deserted city. They don't share a common language and she is quite wary of her opponent, though he doesn't appear aggressive in any way. When she attempts to kill him, he goes off on his own. It's obvious that society and civilization has been destroyed and she begins to reconsider."], [1783736205, 1783737829, "The Twilight Zone", "The Arrival", "S3 E2", "A plane lands safely, but all its passengers, pilot and crew are missing."], [1783737829, 1783739456, "The Twilight Zone", "The Shelter", "S3 E3", "A dinner party for Bill Stockton's birthday is interrupted by a bulletin warning of an impending nuclear attack. As the neighbors scramble to prepare, they turn against the Stockton's, the only family that installed a bomb shelter."], [1783739456, 1783741081, "The Twilight Zone", "The Passersby", "S3 E4", "On the road home from the Civil War, a Confederate soldier stops at a burned-out house and gets to know the owner, a recent widow."], [1783741081, 1783742704, "The Twilight Zone", "A Game of Pool", "S3 E5", "Frustrated pool champion Jesse Cardiff has beaten everyone except for the deceased James Howard \"Fats\" Brown. Jesse can only curse his name. But guess who just walked into the pool room on Randolph Street?"], [1783742704, 1783744329, "The Twilight Zone", "The Mirror", "S3 E6", "After a poor but ambitious Central American farm worker overthrows his country's tyrannical leader, he believes he sees assassins everywhere. A look in the mirror reveals his most dangerous enemy."], [1783744329, 1783745953, "The Twilight Zone", "The Grave", "S3 E7", "Conny Miller rides into the hometown of Pinto Sykes, the man he's been tracking. He finds that Sykes has been gunned down by townsmen but no one knows who fired the fatal bullet. He is challenged by three of the townsmen to a grisly wager."], [1783745953, 1783747575, "The Twilight Zone", "It's a Good Life", "S3 E8", "On an isolated family farm in Peakesville, Ohio, young Anthony Fremont, who has vast mental powers but lacks emotional development, holds his terrified family and neighbors in thrall to his every juvenile wish."], [1783747575, 1783749197, "The Twilight Zone", "Deaths-Head Revisited", "S3 E9", "Former German SS Captain Gunther Lutze returns to Dachau concentration camp and begins reminiscing about the power he enjoyed there during \"the good old days\", until he finds himself on trial by the ghosts of those who died at his hands."], [1783749197, 1783750820, "The Twilight Zone", "The Midnight Sun", "S3 E10", "The Earth's orbit has been changed, drawing ever closer to the sun and promising imminent destruction."], [1783750820, 1783752444, "The Twilight Zone", "Still Valley", "S3 E11", "Confederacy scout Sgt. Joseph Paradine finds a town full of Union soldiers, and an old man who claims he used witchcraft to paralyze them."], [1783752444, 1783754066, "The Twilight Zone", "The Jungle", "S3 E12", "Engineer Alan Richards who has recently come home to New York City from his company's controversial hydroelectric project in Africa is plagued by both superstitions and the dire warnings of a native witch doctor."], [1783754066, 1783755689, "The Twilight Zone", "Once Upon a Time", "S3 E13", "In 1890, janitor Woodrow Mulligan uses his employers' invention to transport himself to the future. He imagines an Eden but finds a polluted, busy world that he doesn't find at all attractive. He meets Rollo who is also disgusted with the world he lives imagining life in the 1890s as idyllic. When Woodrow goes back to his own time Rollo goes with him but he is soon bored without any of the conveni"], [1783755689, 1783757314, "The Twilight Zone", "Five Characters in Search of an Exit", "S3 E14", "An American army major awakens in a small circular unfurnished room with no idea of his name or how he got there. Four other people are there with him and they all begin to question how they got there and, more importantly, how to escape."], [1783757314, 1783758939, "The Twilight Zone", "A Quality of Mercy", "S3 E15", "A gung ho young soldier gets a new viewpoint on war when he inexplicably changes places with a Japanese officer trying to stop his superior from leading a charge against American forces."], [1783758939, 1783760562, "The Twilight Zone", "Nothing in the Dark", "S3 E16", "Elderly urban dweller Wanda Dunn has fought with Death a thousand times and always won. Now she is afraid to let wounded policeman Harold Beldon in her tenement's door for fear that he is Death incarnate. Is he?"], [1783760562, 1783762187, "The Twilight Zone", "One More Pallbearer", "S3 E17", "Paul Radin has invited three people to join him in his bomb shelter."], [1783762187, 1783763820, "The Twilight Zone", "Dead Man's Shoes", "S3 E18", "Homeless Nathan Edward Bledsoe steals expensive shoes off of dead gangster Dane's abandoned body, steps into Dane's life, and plans third-party revenge on Dane's killer, his traitorous former business partner Daggett."], [1783763820, 1783765444, "The Twilight Zone", "The Hunt", "S3 E19", "On a hunting trip, Hyder Simpson and his dog Rip dive into a lake after a raccoon. When he gets home he finds that no one can see or hear him."], [1783765444, 1783766997, "The Twilight Zone", "Showdown with Rance McGrew", "S3 E20", "Overbearing Western TV series star Rance McGrew is transported back in time to the real Wild West and comes face-to-face with Jesse James who's not happy about how he and his fellow outlaws are being portrayed on Rance's show."]]}, {"id": "3", "name": "MachoVision", "a": "machovision", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/machovision-v4.png", "progs": [[1783671514, 1783672773, "Macho Man the Randy Savage Story", "vs Shawn Michaels — WWE Title (Munich, Apr 14 1992)", "S1 E10", "MachoVision"], [1783672773, 1783675322, "Macho Man the Randy Savage Story", "vs Ultimate Warrior — WWE Title (SummerSlam, Aug 31 1992)", "S1 E11", "MachoVision"], [1783675322, 1783676509, "Macho Man the Randy Savage Story", "vs Ric
