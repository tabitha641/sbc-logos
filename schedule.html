at the Pinciotti house, but Donna's less than enthused about the prospect.  As for Eric, he qui"], [1783352854, 1783354201, "That '70s Show", "The Keg", "S1 E6", "Eric skips school with Donna, Hyde, and Kelso for the first time in his life.  Unbelievably, the gang finds a keg in the middle of the road and sees it as a sign that they should throw a party.  Problems arise, however, when they all realize that there's no beer tap after the party is in full swing.  Meanwhile, Red and Bob have their suspicions about what the kids are up to and launch a full scale"], [1783354201, 1783358199, "Saturday Night Live", "Robert Klein with ABBA and Loudon Wainwright III", "S1 E5", "Live from New York, It's... Robert Klein\n\nSketches include: Pong, Minute Mystery, Bee Centennial Minute, Greg Allman How's Your Love Life?, Tough Director, Jamitol, Exterminators, Fireman, Jim Henson's Muppets, K-Put Price-Is-Rite Stamp Gun, Looks At Books, I Can't Stop My Leg"], [1783358199, 1783362087, "Saturday Night Live", "Lily Tomlin", "S1 E6", "Live from New York, it's... Lily Tomlin\n\nSketches Include: Beethoven Part 1, Jaws III, Bell-Hop, Edith Ann Skates, Beethoven Part 2, Spud Beer, Patty, Jim Henson's Muppets, Beethoven Part 3, Hard Hats, Speed, Margo's Dance Palace"], [1783362087, 1783363435, "That '70s Show", "That Disco Episode", "S1 E7", "The kids decide to go to a disco but Steven doesn't know how to dance so Mrs. Forman teaches him to dance. Mr. Pinciotti walks in on them in a compromising position and believes they're having an affair. Kelso gets jealous of Fez because he thinks he's putting the moves on Jackie."], [1783363435, 1783364784, "That '70s Show", "Drive-In", "S1 E8", "Eric and Donna go to the drive-in. Eric doesn't want Kelso and Jackie to go because they'd be competition but Donna invites them anyway. Fez's house parents think he's listening to the devil's music (a copy of Kiss' Destroyer album). Red and Kitty spend the evening out and almost get arrested."], [1783364784, 1783368764, "Saturday Night Live", "Richard Pryor with Gil Scott-Heron", "S1 E7", "Live From New York, it's... Richard Pryor!\n\nSketches Include: Samurai Hotel, Looks At Books, Line-Up #1, Word Association, Pong, They're Taking Over, Line-Up #2, L-Pill, Jim Henson's Muppets, Line-Up #3, Exorcist II, Assassination"], [1783368764, 1783372768, "Saturday Night Live", "Candice Bergen with Martha Reeves and The Stylistics", "S1 E8", "Live from New York, It's... Candice Bergen!\n\nSketches include-- Fireside Chat with Gerald Ford, \"Mel's Char Palace\", \"What Gilda Ate\", Billy is guilty of murder, Teddy the Elf, \"The Fritzie Kringle Show\", \"Minute Mystery\", Candice and the cast perform 'Winter Wonderland', The Bees Christmas Party, Homeward Bound."], [1783372768, 1783374115, "That '70s Show", "Thanksgiving", "S1 E9", "Laurie comes home for Thanksgiving with her friend Kate.  Eric is annoyed that he'll have to give up his room for their guest, until he sees how hot Kate is.  Jackie alerts Donna to the trouble she could be facing now that a college girl is sleeping in Eric's bed.  Kitty tries vainly to avoid her mother-in-law's phone calls as she prepares for Thanksgiving dinner."], [1783374115, 1783375463, "That '70s Show", "Sunday, Bloody Sunday", "S1 E10", "Red's mother spends a Sunday with them and drives everyone crazy, except Fez. She seems to have a certain fondness for him."], [1783375463, 1783379537, "Saturday Night Live", "Elliott Gould with Anne Murray", "S1 E9", "Live from New York, it's... Elliott Gould!\n\nSketches include \"The Dead String Quartet,\" \"Interior Demolitionists,\" \"Vito Corleone in Therapy,\" \"The Killer Bees,\" \"Birthright\", \"Gilda and Elliot,\" \"New Shimmer,\" The Muppets, \"Play Misty for Me\" (film), \"Jamitol,\" \"Try-Hard 1-11,\" and \"Powwow With the Press\" (stand-up).\n\nAnne Murray performed \"Long Distance Call\" and \"Boogie With You.\""], [1783379537, 1783383507, "Saturday Night Live", "Buck Henry with Bill Withers and Toni Basil", "S1 E10", "Live from New York, It's...Chevy Chase\n\nSketches include--Suicide Prevention, \"Samurai Deli\", Operation Stumblebum, \"Citizen Kane II\", King Bee(the Blues Brothers), Auto mechanic tells bedtime story, \"Presidential Foreplay\", Chevy misuses a joint, The Constipated Man, The Muppets and the Japanese sex Device."], [1783383507, 1783384853, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783384853, 1783386200, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783386200, 1783390206, "Saturday Night Live", "Peter Cook & Dudley Moore with Neil Sedaka", "S1 E11", "Live from New York, It's...Chevy Chase\n\nSketches include-- Bomb Squad, Prisoner Auditions, \"Don Pardo's Holiday on A Elevator\", \"Table Talk\", \"Backstage Banter\", Sonny and Cher, The Baby Jesus, Chevy talks to Angola's roommate, The Muppets."], [1783390206, 1783394245, "Saturday Night Live", "Dick Cavett with Jimmy Cliff", "S1 E12", "Live from New York, It's...Chevy Chase\n\nSketches include--Voodoo on Chevy Chase, Alcohol and Firearms, Lowell Brock of H&R Brock, \"Looks at Books\", Dick Cavett's School of Hydroplane Operation, Dance To The Nation, \"The Apple Follies\", Our Town."], [1783394245, 1783395591, "That '70s Show", "Ski Trip", "S1 E13", "Jackie dumps Kelso after he makes out with Pam Macy and invites everyone but him to her parent's ski cabin for the weekend.  Eric, excited about what this could mean for him and Donna, pays no attention to Kelso's whining about being left behind or Red's tips about driving in the snow.  He doesn't realize that Hyde keeps hitting on Donna and Kelso plans on following them to the lodge.  Also, Kitty"], [1783395591, 1783396938, "That '70s Show", "Stolen Car", "S1 E14", "When Eric scratches the car, Red suspends his driving privileges, so the gang has to walk everywhere. That is, until Kelso's cousin lends him a car. They get arrested though because the car was reported stolen. With one phone call, Kelso calls Jackie and she tells him that she'll have sex with him once he gets out of prison. The whole incident was a mix-up and the gang is released."], [1783396938, 1783400715, "Saturday Night Live", "Peter Boyle with Al Jarreau", "S1 E13", "Live from New York, It's...Chevy Chase\n\nSketches include \"The Valentine's Day Massacre,\" \"Samurai Divorce Court,\" \"Jason and Sunshine,\" \"The Corrida.\" \"All Pro Wrestling,\" \"Remembering of Things Past\", \"Dueling Brandos,\" \"A Home Movie\" (film), and \"The Orgy.\"  Al Jarreau performs \"We'll Get By.\""], [1783400715, 1783404713, "Saturday Night Live", "Desi Arnaz with Desi Arnaz Jr.", "S1 E14", "Live from New York, It's...Chevy Chase\n\nSketches include-- Gerald Ford gives a word association, Literary Recital, Very White(Chevy Chase)sings unsoulful songs, \"The Failed Pilots of I Love Lucy\", Cuban accupunture, Lucille Ball talks about Desi's book, Bisexual Minute."], [1783404713, 1783406060, "That '70s Show", "That Wrestling Show", "S1 E15", "Kitty thinks that it would be a good idea if Red and Eric become friends.  She forces Eric to invite Red to go with the gang to a wrestling event in Kenosha.  Bob tags along and seeks help from Fez and Hyde over Midge's decision to start therapy.  And Jackie is super nice to Kelso now that they've done the deed."], [1783406060, 1783407407, "That '70s Show", "First Date", "S1 E16", "Valentine's Day is coming up, so Eric decides to ask Donna out on their official first date and give her his class ring.  She breaks her study date with Hyde in order to go, leading Hyde to realize he only has one last chance with her.  Red and Kitty discover they don't have that much in common with Bob and Midge anymore.  And Jackie explains to Kelso how things are going to work now that they've "], [1783407407, 1783411394, "Saturday Night Live", "Jill Clayburgh with Leon Redbone", "S1 E15", "Live from New York, It's...Chevy Chase\n\nSketches include-- No More Falls, \"Great Moments in Herstory\", White Guilt Relief Fund, Inquisitive Girlfriend, Grable and Lombard, Car Yummies, Paying the Milkman, Jill Carson Guidance Counselor!, Andy Kaufman sings \"Old Macdonald\", \"The Mr. Bill Show\"."], [1783411394, 1783415452, "Saturday Night Live", "Anthony Perkins with Betty Carter", "S1 E16", "Live from New York, It's...Chevy Chase\n\nSketches include--'SNL is not ad-libbed' says Chevy Chase, A President's View on Marijuana, Dominatrix Cleaning Tips, \"Norman Bates School of Hotel Management\", Low-budget Movie Trailers, Sherry protest her B(ee), Policemen Dance Party, \"Hello Dolly\"."], [1783415452, 1783416799, "That '70s Show", "The Pill", "S1 E17", "Since no one else is around, Jackie confides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783416799, 1783418146, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783418146, 1783422149, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."], [1783422149, 1783426214, "Saturday Night Live", "Raquel Welch with Phoebe Snow and John Sebastian", "S1 E18", "Live from New York, It's...Chevy Chase\n\nSketches include-- \"Get to the fall Chevy!\", Purina Rat Chow, Joseph Franklin's 10-letter Metric Alphabet, \"The Claudine Longet Ski Invitational\", \"One Flew Over The Hornest Nest\", Chevy tries to convince Raquel to take off her shirt, Baba Wawa, Bisexual Moment, The Muppets are finished on SNL."], [1783426214, 1783427562, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to the prom.  As for the adults, they struggle with how to respond to Midge's idea for her future career."], [1783427562, 1783428908, "That '70s Show", "A New Hope", "S1 E20", "The guys go see Star Wars and are all completely blown away by it.  Red asks Eric to hang out with his boss's son now that he's started working at the plant full-time again.  David was an awkward kid the last time Eric saw him, but now he's a hunk who likes reading Donna's short stories.  Also, Laurie starts hitting on Kelso out of boredom."], [1783428908, 1783432870, "Saturday Night Live", "Madeline Kahn with Carly Simon", "S1 E19", "Live from New York, it's Chevy Chase!   Sketches are \"Ronald Reagan's Jam Session,\" Not for Ladies Only, Wilderness Comedian, \"Slumber Party,\" Bride of Frankenstein, \"Fondue Pots for Namibia,\" \"The Muppets Can Reunite the Beatles,\" New York's My Home (film), \"Super Absordent Dry Hose,\" and \"The Final Days.\" Carly Simon performs You're So Vain."], [1783432870, 1783436861, "Saturday Night Live", "Dyan Cannon with Leon & Mary Russell", "S1 E20", "Live from New York, It's...Chevy Chase\n\nSketches include--Chevy has to do the fall again, \"Hearing Test,\" \"The Adulterer,\" \"Vacationland Adventure\", \"Minister with Hiccups,\" \"Dyan Cannon's Dream,\" \"Orange Juice,\" \"The Bathwater of The Stars\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."], [1783436861, 1783438207, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783438207, 1783439553, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783439553, 1783443567, "Saturday Night Live", "Buck Henry with Gordon Lightfoot", "S1 E21", "Live from New York, It's...Chevy Chase\n\nSketches include--Emmy winner Chevy tries to get ght a rampaging dragon. George Jetson's murder takes center stage in \"Unsolved Case Files: I, Rosie.\""], [1783426183, 1783426900, "Robot Chicken", "Nightmare Generator", "S1 E16", "Jaws gets a special edition DVD. A drug operation at the North Pole is revealed in \"Unsolved Case Files: Claus & Effect.\" The A-Team solves its problems with maximum firepower and minimal intelligence."], [1783426900, 1783430903, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."], [1783430903, 1783434968, "Saturday Night Live", "Raquel Welch with Phoebe Snow and John Sebastian", "S1 E18", "Live from New York, It's...Chevy Chase\n\nSketches include-- \"Get to the fall Chevy!\", Purina Rat Chow, Joseph Franklin's 10-letter Metric Alphabet, \"The Claudine Longet Ski Invitational\", \"One Flew Over The Hornest Nest\", Chevy tries to convince Raquel to take off her shirt, Baba Wawa, Bisexual Moment, The Muppets are finished on SNL."], [1783434968, 1783436360, "In Living Color", "Hour of Power", "S2 E4", "Sketches include:\n\nTag Team Evangelists / Bonita Butrell: Uninvited Guest / 1-900-YT GUILT / Al MacAfee: Hall Monitor / Monie Love performs \"Monie in the Middle\""], [1783436360, 1783437753, "In Living Color", "Miss Black Person USA", "S2 E5", "Sketches include:\n\n\"\"Black Like You\"\"   \"\"Go On Girl: Sensitive Men\"\"   \"\"I Won't Drift Away\"\"   \"\"Miss Black Person U.S.A.\"\""], [1783437753, 1783438433, "Robot Chicken", "Operation Rich in Spirit", "S1 E17", "A new video game is taking video games by storm, \"Codename: The Abortionator.\" A video dating experience a la The Ring scares a potential suitor. A man runs away from an Oriental masseuse looking for a \"happy ending\". Keanu Reeves, Christopher Walken, and William Shatner want you to buy his special brand of sausage. The Scooby-Doo gang encounters Jason Voorhees at Camp Crystal Lake."], [1783438433, 1783439069, "Robot Chicken", "The Sack", "S1 E18", "It's Alien vs. Predator on the battleground of love in a special episode of \"First Date\". Frogger creates a huge car wreck in this episode. See what the future holds in the Carousel of Tomorrow. Popeye experiences a world without his hamburger-leeching friend in \"It's a Wimpy-Filled Life.\" The modern video game Halo invades the old-school classic Donkey Kong. The cereal spokesbunny Stix Rabbit fin"], [1783439069, 1783443032, "Saturday Night Live", "Madeline Kahn with Carly Simon", "S1 E19", "Live from New York, it's Chevy Chase!   Sketches are \"Ronald Reagan's Jam Session,\" Not for Ladies Only, Wilderness Comedian, \"Slumber Party,\" Bride of Frankenstein, \"Fondue Pots for Namibia,\" \"The Muppets Can Reunite the Beatles,\" New York's My Home (film), \"Super Absordent Dry Hose,\" and \"The Final Days.\" Carly Simon performs You're So Vain."], [1783443032, 1783447022, "Saturday Night Live", "Dyan Cannon with Leon & Mary Russell", "S1 E20", "Live from New York, It's...Chevy Chase\n\nSketches include--Chevy has to do the fall again, \"Hearing Test,\" \"The Adulterer,\" \"Vacationland Adventure\", \"Minister with Hiccups,\" \"Dyan Cannon's Dream,\" \"Orange Juice,\" \"The Bathwater of The Stars\", \"Johnny Angel\", \"Cresk Toothpaste,\"\" and \"The Hubcap Thief\" (film).  Leon Russell and Joe Cocker (Belushi) perform \"Daylight\"."]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783348090, 1783349511, "The Wonder Years", "Angel", "S1 E4", "Kevin's older sister Karen doesn't communicate with her parents anymore, and it's all because of her new boyfriend, Louis. And things are only made worse when Louis comes to dinner. Kevin finds out that Louis is cheating on Karen, but suspects that Karen already knows and is fine with it. Only, she doesn't know, and when finds out, she's not fine with it."], [1783349511, 1783350847, "Jem and the Holograms", "Fire!", "S1 E3", "Jem and the Holograms are in Paris to film their first music video when Kimber grows jealous of the attention Jem receives there and questions her place in the band.\n\nFeatured songs: \"Twilight in Paris\", \"Gettin' Down to Business\", \"I Got My Eye on You\" – all by Jem and The Holograms"], [1783350847, 1783352214, "Jem and the Holograms", "Nowhere To Go", "S1 E4", "Ashley's odd behavior is finally brought to Jerrica's attention. She doesn't have time to deal with her though since she's just signed a contract for Jem and the Holograms to headline a show at a Las Vegas casino. The Misfits are not happy when they learn that they're opening for their arch rivals. But Pizzazz comes up with a plan to steal the spotlight - a plan which puts Ashley on the spot."], [1783352214, 1783353584, "Teenage Mutant Ninja Turtles", "A Thing about Rats", "S1 E3", "A scientist named Baxter Stockman has created a robot meant for hunting rats, called Mouser. Shredder mass produces the robot and programs them to hunt the biggest rat in New York - Splinter. Shredder wants Baxter dead because he knows too much. Michaelangelo finds out about Krang."], [1783353584, 1783354953, "Teenage Mutant Ninja Turtles", "Hot Rodding Teenagers from Dimension X", "S1 E4", "Shredder experiments with the Inter-Dimensional Portal, hoping to contact Krangs' Rock Soldiers and prepare an invasion of Earth, but a group of fun-loving aliens called the Neutrionos, renegades in Krang's dimension, take advantage of the Portal's opening and use it to arrive on Earth."], [1783354953, 1783356414, "Pee-wee's Playhouse", "Rainy Day", "S1 E3", "It's a rainy day outside, and Pee-wee does many things for the rest of the day: fly paper airplanes, get a call from Miss Yvonne (who won't make it due to the weather), build an indoor campfire, and tell a ghost story. Later, he gets bored and has Playhouse fever! Randy tries to cheer him up by letting him call strangers - such as a housewife who grows angry when Randy plays a prank phone call on "], [1783356414, 1783357944, "Pee-wee's Playhouse", "Now You See Me, Now You Don't", "S1 E4", "Today's secret word is really \"little,\" but the gangs' eyes get really big when Pee-wee puts on a magic show and disappears! Captain Carl, Cowboy Curtis, Miss Yvonne, and the gang are amazed as Pee-wee makes use of his new talent at their expense, but when their hidden host can't make himself reappear, it'll take Jambi's magic to set things right!"], [1783357944, 1783359242, "The Goldbergs (2013)", "The Ring", "S1 E5", "Adam, Erica and Barry learn about Murray's romantic past while cleaning out the garage; Adam falls for his neighbor."], [1783359242, 1783360535, "The Goldbergs (2013)", "Who Are You Going to Telephone?", "S1 E6", "Beverly is disappointed when the kids don't want to celebrate Halloween with her; Beverly tries to get Barry's crush to go out with him."], [1783360535, 1783361966, "The Wonder Years", "The Phone Call", "S1 E5", "Kevin tries to get up the courage to call Lisa Berlini. Paul tries to find out if Lisa likes Kevin, by consulting the Junior High grapevine."], [1783361966, 1783363393, "The Wonder Years", "Dance With Me", "S1 E6", "Kevin asks Lisa Berlini to a dance but she dumps him. Dejected by Lisa's rejection, Kevin finds himself asking Winnie to the dance, but he finds out she is going with her new boyfriend. In retaliation, Kevin tries to make Winnie jealous."], [1783363393, 1783364759, "Jem and the Holograms", "The Mansion", "S1 E5", "I Heart 80s"], [1783364759, 1783366125, "Jem and the Holograms", "Starbright (1): Falling Star", "S2 E1", "Jem stars in Howard Sands' new movie, part of the prize she and the Holograms won in the Battle of the Bands. But Pizzazz convinces her father to buy the movie studio making the film and give ownership to Eric who quickly seizes control of the film and adds the Misfits to the cast. Eric places the focus of the film on the Misfits and Jem and the Holograms are relegated to supporting roles. Finally"], [1783366125, 1783367494, "Teenage Mutant Ninja Turtles", "Shredder & Splintered", "S1 E5", "As Shredder lures Splinter into he Technodrome, this time with the promise that a weapon in his possession can restore the sensei to human form, the Turtles confront a giant-sized Krang, now in a new body, in the heart of New York City."], [1783367494, 1783368911, "Teenage Mutant Ninja Turtles", "Episode 6", "S1 E6", "I Heart 80s"], [1783368911, 1783370373, "Pee-wee's Playhouse", "Just Another Day", "S1 E5", "Cowboy Curtis decides to have a cowboy-style snack (slow-cooked steak) and shows Pee-wee how to square dance. Pee-wee shows Curtis how to pogo, and Dixie gets her name on the \"back\" of her new jacket."], [1783370373, 1783371837, "Pee-wee's Playhouse", "Beauty Makeover", "S1 E6", "Miss Yvonne is willing to give a beauty makeover to the next person who steps into the playhouse, and it ends up being Mrs. Steve! Then, the Cowntess has a tea party. You'll have the \"time\" of your life!"], [1783371837, 1783373135, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783373135, 1783374424, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783374424, 1783375649, "The Wonder Years", "Episode 7", "S1 E7", "I Heart 80s"], [1783375649, 1783377125, "The Wonder Years", "Episode 8", "S1 E8", "I Heart 80s"], [1783377125, 1783378490, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783378490, 1783379855, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783379855, 1783381272, "Teenage Mutant Ninja Turtles", "Episode 7", "S1 E7", "I Heart 80s"], [1783381272, 1783382682, "Teenage Mutant Ninja Turtles", "Episode 8", "S1 E8", "I Heart 80s"], [1783382682, 1783384143, "Pee-wee's Playhouse", "Restaurant", "S1 E7", "Pee-wee is the maitre d', waiter and cashier while playing restaurant. Customer Captain Carl orders everything on the menu only to learn that all they have are peanut-butter-and-jelly sandwiches! Also, Dixie is having a particularly bad \"day.\""], [1783384143, 1783385607, "Pee-wee's Playhouse", "Ants In Your Pants", "S1 E8", "The ants are loose, the ants are loose! While Pee Wee is playing house with Miss Yvonne and the Playhouse Gang, the ants sneak out of their farm, go marching into the Dinosaur Family's home, steal a cake and get all over everybody and everything. \"\"What\"\" will Pee Wee do? The 'Ants In Your Pants Dance!"], [1783385607, 1783386906, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783386906, 1783388202, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783388202, 1783389968, "The Wonder Years", "Episode 9", "S1 E9", "I Heart 80s"], [1783389968, 1783391263, "The Wonder Years", "Episode 10", "S1 E10", "I Heart 80s"], [1783391263, 1783392627, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783392627, 1783393993, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783393993, 1783395410, "Teenage Mutant Ninja Turtles", "Episode 9", "S1 E9", "I Heart 80s"], [1783395410, 1783396745, "Teenage Mutant Ninja Turtles", "Return of the Shredder", "S2 E1", "Just when the Turtles believe themselves rid of Shredder, tin-grin is able to persuade Krang to return him to Earth."], [1783396745, 1783398208, "Pee-wee's Playhouse", "Monster In the Playhouse", "S1 E9", "\"Look\" out because Mrs. Steve reports that there is a giant, one-eyed monster in town! He appears in the Playhouse, on the loose, and scares everyone! After Pee-wee makes the monster a snack, and Jambi grants Pee-wee's wish to understand the monster, the whole gang has a new friend! They even play a game of golf."], [1783398208, 1783399672, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783399672, 1783400965, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783400965, 1783402260, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783402260, 1783403691, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783403691, 1783405117, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783405117, 1783406482, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783406482, 1783407848, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783407848, 1783409186, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783409186, 1783410524, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783410524, 1783411987, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783411987, 1783413451, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783413451, 1783414748, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783414748, 1783416046, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783416046, 1783417271, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783417271, 1783418747, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783418747, 1783420100, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783420100, 1783421452, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783421452, 1783422788, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783422788, 1783424120, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783424120, 1783425584, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783425584, 1783427046, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "I Heart 80s"], [1783427046, 1783428344, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783428344, 1783429638, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783429638, 1783430933, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783430933, 1783432301, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783432301, 1783433669, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783433669, 1783435004, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783435004, 1783436341, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783436341, 1783437679, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783437679, 1783439142, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783439142, 1783440605, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783440605, 1783441898, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783441898, 1783443193, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783346899, 1783349647, "Beverly Hills, 90210", "Perfect Mom", "S1 E7", "Brenda is mesmerized by Kelly's hip and glamorous mother Jackie, a former model. Kelly insists that her mother is not all that she appears to be. Jackie is a recovering addict, and begins hitting the bottle again after her boyfriend dumps her. Cindy is hurt when Brenda initially fails to ask her to be in a mother-daughter fashion show. They eventually agree to appear, and are joined by Andrea, who"], [1783349647, 1783352463, "Beverly Hills, 90210", "The 17-Year Itch", "S1 E8", "The Walshes celebrate their seventeenth anniversary, but Cindy feels dissatisfied because Jim is neglecting her for his work. She has a chance meeting with old flame Glen, a talented artist. The two spend a lot of time together, and share a kiss after Glen's opening. Brandon and Brenda take part in a college study on twins, but are distracted by their parents' marital problems. David becomes the n"], [1783352463, 1783355278, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783355278, 1783358092, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783358092, 1783360908, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783360908, 1783363693, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783363693, 1783366495, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783366495, 1783369312, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783369312, 1783372126, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783372126, 1783374940, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783374940, 1783377756, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783377756, 1783380570, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783380570, 1783383385, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783383385, 1783386082, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783386082, 1783388866, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783388866, 1783391651, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783391651, 1783394393, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783394393, 1783397175, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783397175, 1783399963, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783399963, 1783402719, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783402719, 1783405474, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783405474, 1783408225, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783408225, 1783410980, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783410980, 1783413662, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783413662, 1783416390, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783416390, 1783419126, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783419126, 1783421875, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783421875, 1783424629, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783424629, 1783427383, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783427383, 1783430139, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783430139, 1783432886, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783432886, 1783435642, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783435642, 1783438403, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783438403, 1783441188, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783441188, 1783445307, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783347059, 1783349823, "Beverly Hills, 90210", "Every Dream Has Its Price (Tag)", "S1 E3", "Brenda goes on several shopping trips with Kelly and Tiffany, Kelly's best friend from junior high school. Brenda cannot afford the merchandise, and considers stealing because she is envious of her classmates' wardrobes."], [1783349823, 1783352636, "Beverly Hills, 90210", "The First Time", "S1 E4", "Brandon finds mixed blessings when Sheryl, his former girlfriend from Minnesota, comes for a visit, and who falls victim to the fast nightlife of the city. Meanwhile, Brenda develops a crush on her math teacher which affects her even more when she's asked to baby-sit for his two wild children for the evening in which Brenda asks Kelly and Donna to tag along with her."], [1783352636, 1783353948, "The Fresh Prince of Bel-Air", "Clubba Hubba", "S1 E3", "Will wants to go out with a beautiful girl he meets at the country club, but first he must figure out how to impress her extremely snobbish and very protective father so he seeks tips from cousin Carlton on becoming preppie."], [1783353948, 1783355382, "The Fresh Prince of Bel-Air", "Not with My Pig, You Don't", "S1 E4", "Philip's parents come to visit for the weekend when he wins a prestigious award. After finding the rehearsed lines of the Bankses to be boring and deciding to kill the story, Will talks to the interviewer telling her embarrassing stories about Philip's past \"barnyard life\" he heard from Philip's parents."], [1783355382, 1783356720, "Saved by the Bell", "The Gift", "S1 E3", "After Screech gets struck by lightning, he gains the ability to see into the future, and Zack uses him to cheat on a mid term exam."], [1783356720, 1783358058, "Saved by the Bell", "Fatal Distraction", "S1 E4", "Zack, with Screech's help, bugs a slumber party to listen in and find out if Kelly loves him or Slater so she will take one of them to a dance at the Max. When Kelly discovers the microphone, she tricks Zack into thinking that she's a homicidal maniac out to get him, while Zack fends off continuing come-ons from a rather large 12th grade student named Rhonda."], [1783358058, 1783359438, "In Living Color", "Lean On Me Beautiful", "S1 E3", "A beauty-school principal lays down the law; an inner-city Lassie saves Timmy and Mom from disaster; talk-show conversation turns intense."], [1783359438, 1783360830, "In Living Color", "Transitions", "S1 E4", "\"Men on Art\"; Anton \"entertains\" a subway audience; parodies of Oprah and Billy Dee Williams."], [1783360830, 1783362270, "Sex and the City", "Bay of Married Pigs", "S1 E3", "Carrie is invited to stay with a married friend and her husband, Peter, at their beach house. Her trip is unexpectedly cut short when she walks in on Peter who is naked in the kitchen. Back in Manhattan, she contemplates whether there is a secret war going on between the singles and the married."], [1783362270, 1783363684, "Sex and the City", "Valley of the Twenty-Something Guys", "S1 E4", "Mr. Big and Carrie continue to bump into each other during social events, which leads them to try to organize their first \"drink thing\". On a night out, Carrie meets twenty-something Sam for a fling, which turns out not to be so glamorous in the light of day."], [1783363684, 1783366456, "Beverly Hills, 90210", "One on One", "S1 E5", "Jim encourages Brandon to try out for the basketball team. Steve, unaware that he is terrible, is bitter about being cut from the team. He tells Brandon that several of the players are ringers brought in from out of district to help the team win a championship."], [1783366456, 1783369269, "Beverly Hills, 90210", "Higher Education", "S1 E6", "Close to failing history, Brandon (at Steve's persuasion) resorts to cheating from a copied term paper, which leads him to debate honesty vs. an unfair teacher, as well as his friendship with Andrea when she catches him cheating. Meanwhile, Brenda and Kelly both have the hots for Dylan, so Brenda tries dying her hair after he states his preference for blonds. But she comes out with ugly orange str"], [1783369269, 1783370664, "The Fresh Prince of Bel-Air", "Homeboy, Sweet Homeboy", "S1 E rlotte meets Neville Morgan, a renowned artist, who paints pictures of her vagina for his latest exhibition."], [1783379013, 1783380442, "Sex and the City", "Secret Sex", "S1 E6", "Carrie and Mr. Big have their first official \"date\", but Carrie suspects Mr. Big is keeping her secret from his social circle. Miranda dates a man from her gym class, but she discovers a spanking video in Ted's apartment."], [1783380442, 1783383190, "Beverly Hills, 90210", "Perfect Mom", "S1 E7", "Brenda is mesmerized by Kelly's hip and glamorous mother Jackie, a former model. Kelly insists that her mother is not all that she appears to be. Jackie is a recovering addict, and begins hitting the bottle again after her boyfriend dumps her. Cindy is hurt when Brenda initially fails to ask her to be in a mother-daughter fashion show. They eventually agree to appear, and are joined by Andrea, who"], [1783383190, 1783386006, "Beverly Hills, 90210", "The 17-Year Itch", "S1 E8", "The Walshes celebrate their seventeenth anniversary, but Cindy feels dissatisfied because Jim is neglecting her for his work. She has a chance meeting with old flame Glen, a talented artist. The two spend a lot of time together, and share a kiss after Glen's opening. Brandon and Brenda take part in a college study on twins, but are distracted by their parents' marital problems. David becomes the n"], [1783386006, 1783387437, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783387437, 1783390141, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783390141, 1783391542, "Saved by the Bell", "The Substitute", "S1 E7", "After the school's drama teacher falls ill, a handsome substitute arrives, and quickly captivates the girls, much to the chagrin of the boys."], [1783391542, 1783392887, "Saved by the Bell", "Cream for a Day", "S1 E8", "Kelly is nominated for Homecoming Queen, but she's devastated when she gets a pimple on her nose. Zack then sells Kelly a substance Screech accidentally concocts which cleans zits up in minutes. But the one side effect is that it turns people's faces maroon."], [1783392887, 1783394278, "In Living Color", "Don King - The Early Years", "S1 E7", "\"Men on Books\"; a black leader's early years; the Jamaican sitcom \"Hey Mon\"; rappers Salt-n-Pepa hosting a cooking show; a wise men's-room attendant; a \"colorized\" classic from Ted Turner."], [1783394278, 1783395671, "In Living Color", "Endangered Species", "S1 E8", "Anton gives home-remodeling tips; \"President Jesse Jackson\" holds a press conference; a domestic dispute at a salon takes its toll on a client; \"Joan Embery\" shows an endangered species to \"Alan Thicke.\""], [1783395671, 1783397164, "Sex and the City", "The Monogamists", "S1 E7", "When she discovers that Big is dating other women, Carrie realizes that she desires a monogamous relationship with him. In the meantime, Samantha is having trouble being monogamous with her realtors. Charlotte dislikes the sexual desires of her new boyfriend."], [1783397164, 1783398638, "Sex and the City", "Three's a Crowd", "S1 E8", "Charlotte is dating Jack, who wants a threesome, but she is unsure. Carrie discovers that Mr. Big has an ex-wife, and feels threatened. Samantha is seeing a married man; when his wife finds out, she proposes a threesome to keep their marriage together. Miranda feels unattractive and looks for affirmation that she isn't."], [1783398638, 1783401452, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783401452, 1783404267, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783404267, 1783405701, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783405701, 1783407125, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783407125, 1783408507, "Saved by the Bell", "Pinned to the Mat", "S1 E9", "During Career Week at school, Slater worries that continuing to focus on wrestling will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783408507, 1783409881, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783409881, 1783411272, "In Living Color", "Introducing...Homey D. Clown", "S1 E9", "Whizzer and Ice offer a seminar on making money; \"Andrea Dice Clay\" does her routine. Also: \"America's Funniest Security Camera Videos.\""], [1783411272, 1783412664, "In Living Color", "Vera DeMilo", "S1 E10", "An ad for a new celebrity toy; a forgetful Don Cornelius hosting \"Old Train\"; a female bodybuilding contest."], [1783412664, 1783414077, "Sex and the City", "The Turtle and the Hare", "S1 E9", "Mr. Big tells Carrie he's never going to marry again, which unsettles her. Miranda introduces the friends to the Rabbit, a mechanical aid, and Charlotte becomes addicted. Stanford Blatch proposes to Carrie as a cover, so he can inherit his part of the family fortune."], [1783414077, 1783415484, "Sex and the City", "The Baby Shower", "S1 E10", "The four women attend a baby shower for their one-time wild-child friend Laney in her new buttoned-down Connecticut-suburb environs. Carrie is forced to think about motherhood by her late period. Miranda regards the other guests as part of the cult of The Motherhood. Still-single Charlotte fears her dreams of being a wife and mother are slipping away. Samantha throws a \"no-baby shower\" in response"], [1783415484, 1783418300, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783418300, 1783421085, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783421085, 1783422519, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783422519, 1783423954, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783423954, 1783425358, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783425358, 1783426730, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783426730, 1783428120, "In Living Color", "Anton In The People's Court", "S1 E11", "Sketches include the homeless Anton defending himself in a people's court; a parody of rapper MC Hammer; Ted Turner's \"colorized classic\" version of \"The Kid.\""], [1783428120, 1783429511, "In Living Color", "Conspiracy", "S1 E12", "A cable repairman benefits when LaQuita tries ox containing videos of Hope's mother arrives from prison, Jimmy must decide whether or not to let Hope see them. Virginia explains that children need to be protected from the truth, leading Jimmy to question what exactly his parents have been keeping from him."], [1783376205, 1783377543, "Saved by the Bell", "Screech's Woman", "S1 E5", "In an attempt to cheer Screech up enough to complete their science project, Zack pretends to know a girl who is interested in Screech, but things soon become complicated."], [1783377543, 1783378879, "Saved by the Bell", "Aloha Slater", "S1 E6", "Slater's army father leaves it up to him as to whether they will move to Hawaii, and Zack wants to ensue Slater when he agrees to go so Kelly will be available. So, Zack circulates rumors that Slater is dying and is going to Hawaii for treatment. But when Slater finds out, he decides to turn the tables on Zack, and it all leads to Max throwing a farewell party for Slater at the Max where Slater re"], [1783378879, 1783380228, "That '70s Show", "That Disco Episode", "S1 E7", "The kids decide to go to a disco but Steven doesn't know how to dance so Mrs. Forman teaches him to dance. Mr. Pinciotti walks in on them in a compromising position and believes they're having an affair. Kelso gets jealous of Fez because he thinks he's putting the moves on Jackie."], [1783380228, 1783381576, "That '70s Show", "Drive-In", "S1 E8", "Eric and Donna go to the drive-in. Eric doesn't want Kelso and Jackie to go because they'd be competition but Donna invites them anyway. Fez's house parents think he's listening to the devil's music (a copy of Kiss' Destroyer album). Red and Kitty spend the evening out and almost get arrested."], [1783381576, 1783383006, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet
