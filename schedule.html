 "Groovy TV", "a": "groovy-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/groovy-v2.png", "progs": [[1783588940, 1783590245, "That '70s Show", "Bring It on Home", "S5 E19", "The Formans discover that Jackie has been sleeping in Hyde's room since neither of her parents are home.  The best solution that everyone can come up with is for Jackie to move in with Bob and Donna, but unforunately Jackie doesn't appreciate everyone's pity.  Meanwhile, Red gives Eric a hard time when he finds out that his son sleeps nude.  And Fez has dinner at Nina's house, where he learns that"], [1783590245, 1783591561, "That '70s Show", "No Quarter", "S5 E20", "The Pinciottis learn very quickly that living with Jackie is going to be difficult.  Kelso swipes Jackie's panties to taunt Hyde, who has his revenge when Kelso gets a job at the hotel kitchen where Hyde works.  Eric receives notice that he must return Donna's engagement ring if he can't make a payment by Friday.  His visits to the jewelry store reveal that there's bad blood between Fez and Fenton"], [1783591561, 1783592872, "That '70s Show", "Trampled Under Foot", "S5 E21", "Nina breaks up with Fez, although he doesn't realize it until the gang sets him straight. It turns out that Nina thinks Fez is too needy. As for the others, they decide to rejuvenate their dull lives by finding another friend to hang out with. Kitty has one candidate in mind, but she has an ulterior motive."], [1783592872, 1783594187, "That '70s Show", "You Shook Me", "S5 E22", "Hyde turns down a hot nurse out of faithfulness to Jackie, then demands that Jackie not hang out alone with Kelso any more. The recent nurse convention at the hotel inspires Fez to have an erotic dream about a nurse…who turns out to be Kelso! Naturally, Kelso freaks out, and he turns to his ex for comfort. Meanwhile, Eric accepts a job at the dog food factory where Joanne works in order to earn en"], [1783594187, 1783595502, "That '70s Show", "Nobody's Fault But Mine", "S5 E23", "Hyde cheats on Jackie because he thinks she still loves Kelso. After realizing his mistake, he apologizes to her but she breaks up with him. Red and Kitty dare Eric and Donna to get married by graduation in order to pressure them into calling off their engagement. Their plan works, but a little better than they expected. Fez refuses to give Mitch Miller his driver's license, so Mitch digs up dirt "], [1783595502, 1783596817, "That '70s Show", "Immigrant Song", "S5 E24", "Kitty flips out when Red has a change of heart and tells Eric and Donna that they can leave with his blessing. A fall from the water tower leads to a brief truce between Kelso and Hyde. And Fez gets busted as he vandalizes the water tower for a senior prank."], [1783596817, 1783598132, "That '70s Show", "Celebration Day", "S5 E25", "The gang will be split in half when high school graduation is over: Eric and Donna are all set to move into their Madison apartment, while poor Fez is about to be deported.  The love triangle amongst the others grows more heated as Hyde and Kelso compete over an indecisive Jackie.   But this tense situation is put aside so that the six friends can go camping together the night before graduation.  "], [1783598132, 1783599424, "That '70s Show", "The Kids Are Alright", "S6 E1", "When Jackie finds out Kelso has a new girlfriend she chooses Hyde over him, but--surprise!--he has someone new too. Eric is living with his parents to help out his dad, but all he wants is to be with Donna in Madison. Meanwhile, Kitty still tries to convince Eric he should stay with them and not go to Madison. Eric finally realizes that he can't go away to school, but is surprised to find Donna st"], [1783599424, 1783600742, "That '70s Show", "Join Together", "S6 E2", "Kelso decides to help Jackie and Hyde get back together with hilarious results. And Eric realises that the sadder Donna becomes, the more she wants sex.  Kitty decides to help Red with his new doctor-imposed diet."], [1783600742, 1783602058, "That '70s Show", "Magic Bus", "S6 E3", "It's Eric's 18th birthday and nothing is going the way he wants it.  He expects a birthday breakfast and suprise party from his mom, but Kitty is too preoccupied with resuming her sex life with Red.  Plus, it's Donna's last day before moving to Madison for college and Eric is struggling with letting her go.  In the end, Donna manages to salvage the day with the gift she gives him at the bus statio"], [1783602058, 1783603358, "That '70s Show", "The Acid Queen", "S6 E4", "No one in the gang believes Kelso's claim that he hooked up with Brooke, a beautiful and conservative older girl, at a Molly Hatchet concert.  Much to Kelso's shock, Brooke denies knowing him and rejects all of his advances.  Brooke's presence also disrupts Jackie and Hyde's relationship when Jackie asks for his opinion about Brooke's looks.  Also, Fez decides to pursue college-bound virgins while"], [1783603358, 1783604640, "That '70s Show", "I'm Free", "S6 E5", "A representative from INS is coming to find out if Fez's marriage to Laurie is for real.  To avoid deportation, Fez must stay with the Formans and get on Red's good side.  Donna encourages Kelso to take responsibility for his actions by talking to Brooke about the baby.  But for some reason Brooke decides to let him off the hook."], [1783604640, 1783605954, "That '70s Show", "We're Not Gonna Take It", "S6 E6", "After Eric loses his job, he finds himself up for the same waiting job as Kelso at the Holiday Hotel; Donna and Jackie send newly single Bob a box of fudge to cheer him up; Red tries to help Fez and Laurie get divorced."], [1783605954, 1783607257, "That '70s Show", "Christmas", "S6 E7", "The cheerleaders kick Jackie off the squad, so she invites the gang to the dance to give her popularity a boost.  Kelso visits Brooke at the library in an effort to start a friendship with her.  Christmas Eve is going to be \"Hot Donna's\" first shot at being a DJ at the station she works at.  And Kitty signs Red up to be the mall's Santa Claus, sparking a rivalry between him and Bob."], [1783607257, 1783608559, "That '70s Show", "I'm a Boy", "S6 E8", "Eric sleeps in after a late night playing poker with the guys after work. However, he tells Donna and Kitty that he was working the entire time so that he can get their sympathy. Fez volunteers to drive Red to the doctor's office but receives no gratitude in return. Brooke and Kelso go on an awkward double date Hyde and Jackie. Later, Brooke is introduced to Roy, who's instantly smitten."], [1783608559, 1783609876, "That '70s Show", "Young Man Blues", "S6 E9", "It's Kelso's first day as a police cadet and he gets to drive around in a police cruiser with a real cop.  His first stop is the Forman house to break up a domestic disturbance (Fez and Laurie are fighting over her sex life).  The encounter leaves Fez burning mad, but he gets a chance for revenge when Kelso leaves the cruiser unattended.  Meanwhile, Eric attempts to fix the water pipes and lawn mo"], [1783609876, 1783611195, "That '70s Show", "A Legal Matter", "S6 E10", "Kelso freaks out when Roy suggests that he may be this year's police academy stooge.  The only way to know for sure is to check his file, so Kelso decides to break into the police academy with Hyde and Eric.  Meanwhile, Fez is expecting to take a final exam at the INS before finally becoming a U.S. citizen.  Donna, Kitty, Jackie, and Red all tutor Fez on their versions of American history."], [1783611195, 1783612494, "That '70s Show", "I Can See for Miles", "S6 E11", "Kelso is ecstatic when Brooke asks him to be involved in her doctor's meeting for their upcoming baby, but he runs into a problem when he can't find his van. Hyde is exactly the opposite of ecstatic when Jackie redecorates his room with bright colors and lights that looks like a girl's room. Eric and Donna also set out to discover (in Kelso's van) what Mount Hump is like. Red is also upset that Bo"], [1783612494, 1783613811, "That '70s Show", "Sally Simpson", "S6 E12", "Kelso introduces a fellow police cadet to the gang, a tomboy named Suzy Simpson. Comedy ensues when Kelso tries to set up a date between Suzy and Fez. Kitty becomes defensive when a stress management specialist visits Red."], [1783613811, 1783615114, "That '70s Show", "Won't Get Fooled Again", "S6 E13", "Before a romantic evening with Eric, Donna realizes that she's missed taking one of her birth control pills.  Both of them completely freak out and seek out Kitty's advice.  Fez is still extremely angry about losing Suzy to Kelso, so he \"dumps\" Kelso and returns everything his former friend ever gave him.  Everyone in the gang tries to console the unhappy couple while Suzy plots to reunite them."], [1783615114, 1783616429, "That '70s Show", "Baby Don't You Do It", "S6 E14", "After the recent pregnancy scare, Bob and the Formans insist that Eric and Donna go for counseling at the church.  During their first session, Eric and Donna lie to the minister about having pre-marital sex.  Kelso has also been lying lately, telling Brooke that he's doing better at the Police Academy than he actually is.  But lying becomes more difficult after there's a fire at the Academy."], [1783616429, 1783617715, "That '70s Show", "Who Are You", "S6 E15", "Jackie's mother, Pam Burkhart (Brooke Shields) unexpectedly returns from Mexico.  Everyone tries to convince Jackie to forgive her mother and welcome her back into her life.  However, when Pam starts dating Bob, Donna and Jackie realize that Pam is still a gold-digger.  Donna and Jackie agree to do whatever it takes to break their parents up.  Kelso is scared to leave for police academy, but the g"], [1783617715, 1783619030, "That '70s Show", "Man with Money", "S6 E16", "When none of the guys will help Donna and Jackie in convincing their parents not to date, they come up with their own plan to try to lure Pam away and prove she doesn't really love Bob.  Meanwhile Red's heart monitor keeps going off around Pam prompting Kitty to think Red is \"extremely happy\" around her."], [1783619030, 1783620335, "That '70s Show", "Happy Jack", "S6 E17", "Donna catches Eric 'taking care of business' in her bathroom and is completely horrified. Afterwards, Eric's friends and family tease him mercilessly and Donna can't even look him in the eye. Amazingly, Eric actually manages to make this embarrassing situation worse when Donna finds out what brought on his need.  Meanwhile, Kelso, now calling himself \"Mike\" and sporting a moustache, goes on a majo"], [1783620335, 1783621653, "That '70s Show", "Do You Think It's Alright?", "S6 E18", "Donna wants to take Eric to a department to register for wedding gifts but he doesn't want to go. Red tells him about the easiest way to get out of shopping: choose the ugliest thing so they think you are bad at shopping, and Eric tries it. Donna falls for it, but figures it out and sends him shopping with a wedding crazed Jackie, which he actually enjoys! Donna gets mad when she finds out and get"], [1783621653, 1783622968, "That '70s Show", "Substitute", "S6 E19", "When the gang sees Mitch at a putt putt course, they laugh it up at his pathetic job until they accidentally hit him in the head with a golf ball. Feeling sorry for him, Eric invites him to join the gang in the basement. But it snowballs from there when Mitch obsesses over Donna.  Meanwhile, Pam doesn't see what the big deal is about rejecting Bob's offer to move in together, since she is dating a"], [1783622968, 1783624284, "That '70s Show", "Squeeze Box", "S6 E20", "When Hyde and Red accidentally walk in on Pam and see her topless, they are shocked by her reaction. They try to keep it a secret, but Bob, of all people, spills the beans. Meanwhile, Donna finds out about a girl Eric dated while she was with Casey."], [1783624284, 1783625601, "That '70s Show", "5:15", "S6 E21", "Much to Eric's chagrin, Donna agrees to be Mitch's date to his brother's wedding. While there, Fez meets a beautiful girl and pretends to be rich to impress her, but the big news is the shockwave Mitch makes at the wedding.....  Meanwhile, Kelso takes Brooke to a baby class."], [1783625601, 1783626885, "That '70s Show", "Sparks", "S6 E22", "When Eric accidentally sees Donna's wedding dress, he unintentionally rips it. But he only makes things worse in an attempt to rectify the mistake. Kelso, Hyde and Fez get a canoe and Red is forced to find a sentimental wedding gift for Eric for his wedding."], [1783626885, 1783628198, "That '70s Show", "My Wife", "S6 E23", "When Donna gets a full time job as \"Hot Donna\" on the radio, she decides that staying in Point Place is the best thing to do. She also buys a very small trailer for her and Eric. While visiting the trailer, the gang is surprised to see Casey Kelso, who is now back in town.  The guys continue their plans and have a bachelor party for Eric, who can think of nothing but why Donna wants to stay. The g"], [1783628198, 1783629515, "That '70s Show", "Going Mobile", "S6 E24", "The day of the rehearsal dinner, Eric comes to the realization that he could be holding Donna back if he marries her.  He attempts to tell her this when the Formans come visit the mobile home Donna picked out.  Although he denies having second thoughts, he drops enough hints to make Donna begin to worry about the wedding herself.  Meanwhile, Michael makes a very poor first impression on Brooke's m"], [1783629515, 1783630832, "That '70s Show", "The Seeker", "S6 E25", "Everyone does their best to cheer Donna up after Eric disappeared before the wedding.  Midge even shows up to console her daughter, but her arrival causes an awkward scene with Bob and Pam.  Also, Hyde lands in the hospital after he takes Donna to the water tower for a talk.  While Kitty looks after Hyde, she goes through his medical records and stumbles upon a life-altering piece of news."], [1783630832, 1783632152, "That '70s Show", "Time Is on My Side", "S7 E1", "A week after Eric and Donna's engagement was called off, they are both on good terms, but have to make big decisions regarding their futures. Donna gets a new look, and Eric decides to take a year off, but to do that he needs to sell Donna's engagement ring to get some money. There's only one problem with his plan: Donna threw it off the water tower. Also, Bob is torn between Pam and Midge, and Re"], [1783632152, 1783633472, "That '70s Show", "Let's Spend the Night Together", "S7 E2", "The Formans invite Hyde's biological father over so that Hyde can finally meet him, and everyone is shocked to discover that he's black. Kelso waits for news from Brooke about her advancing labor, while Fez tries to deal with losing Kelso to a baby. Eric and Donna go to a feminist rally in the park."], [1783633472, 1783634790, "That '70s Show", "(I Can't Get No) Satisfaction", "S7 E3", "Red's job hunt is going nowhere and he begins to wonder when he will find a job. With a year off to do whatever he wants, Eric makes a list of things to do, one of which includes graffiting a closed muffler shop as part of his new bad boy image. But unbeknownst to Eric, Red has found his new job... in the building Eric just graffitied! Kelso has issues with women; now that he's a father to a baby "], [1783634790, 1783636089, "That '70s Show", "Beast of Burden", "S7 E4", "Red's new muffler shop is about to open and he asks Hyde to work for him.  This really offends Eric since the shop is called \"Forman & Son\" and Red didn't even think to ask him.  But Hyde has his own dilemma when his dad offers him a job at his record company.  Fez is also on a job hunt after quitting the DMV, so Donna helps him apply for work as a shampoo boy."], [1783636089, 1783637409, "That '70s Show", "It's Only Rock and Roll", "S7 E5", "Hyde starts working at his dad's record company only to learn his job is not as cool as he thought it would be.  Kitty, feeling \"unneeded, unnecessary and unloved,\" takes up Tai Chi with Donna and Midge.  Seeing an ad in the paper for aspiring artists, Eric tries out for the Cartoon Academy of Fort Lauderdale.  And Kelso decides to donate his entire Playboy collection to Fez."], [1783637409, 1783638729, "That '70s Show", "Rip This Joint", "S7 E6", "Kitty throws a party in honor of herself to boost her self esteem, but Bob feels that Midge is spending too much time with Wiliam Barnett and they have a fight, causing Midge to lock herself in the bathroom.  Eric decides to \"moon and trench\" Old Man Shinsky's beautiful yard.  Kelso, because Eric didn't make him First Lieutenant, takes his revenge on Eric, but that backfires on them both.  And Hyd"], [1783638729, 1783640025, "That '70s Show", "Mother's Little Helper", "S7 E7", "When a hot girl tells Fez she wants to date him, he is delighted.  He later finds out the girl was supposed to date Kelso, but blew him off. After Kelso begs, Fez agrees to help him regain his lost mojo. Donna and Jackie learn that play-fighting is an art.  And Kitty tries to get Red to be more adventurous in their sex life."], [1783640025, 1783641344, "That '70s Show", "Angie", "S7 E8", "Things are going well for Hyde at work, until he meets his new sister, Angie, and finds that she's not as nice as she seems.  She attempts to get Hyde fired, causing him to use his biggest weapon against her; Jackie.  Eric tells the gang that he's studying Spanish, but Kitty lets it slip to Fez what Eric really does on Wednesday nights, and Fez just can't keep the secret to himself."], [1783641344, 1783642662, "That '70s Show", "You Can't Always Get What You Want", "S7 E9", "It's Thanksgiving, and while Kitty prepares for the feast, Eric is making plans of his own, and they don't include dinner at home.  He wants to go to a Styx concert; the rest of the gang is busy helping Hyde and Angie get ready for the opening of the record store."], [1783642662, 1783643980, "That '70s Show", "Surprise, Surprise", "S7 E10", "Hyde joins the disgruntled group of guys that can say \"Kelso Slept With My Sister\", much to his displeasure. Donna plugs a calender on the air for Red's muffler shop until she discovers it is full of scantily clad babes on hotrods.  Kitty once again tries to teach Jackie how to bake, with disastrous results."], [1783643980, 1783645299, "That '70s Show", "Winter", "S7 E11", "Kelso gives the toys from the Toy Drive to the gang, leaving Kitty with no toys for the kids at the Ladies of Point Place Christmas Party.  Jackie is upset that Hyde won't go to the party with her, making her think that he's not as mature as she thought he was.  The guys have to come up with a way to get the toys to the party without the kids seeing them being brought in, and Red distracts everyon"], [1783645299, 1783646616, "That '70s Show", "Don't Lie to Me", "S7 E12", "Jackie's doubts of a future with Hyde come to the breaking point, and she decides to go along with a misunderstanding and pretend to be Donna, engaged to Fez, whom she calls Prince Edwardo. She drags Fez to parties, enjoying the pre-marriage life, until she is caught in the act. Meanwhile, Hyde is bothered by Angie's relationship with Kelso, so Eric steps in to help split them up."], [1783646616, 1783647934, "That '70s Show", "Can't You Hear Me Knocking", "S7 E13", "Red reluctantly agrees to take Kitty ice fishing, which doesn't turn out to be as bad as he expected. Kelso accidentally makes a threat on the President, prompting the guys to be paranoid about everyone they meet in an attempt to hide from the government. Donna takes Jackie to a karate lesson that yields unexpected results."], [1783647934, 1783649253, "That '70s Show", "Street Fighting Man", "S7 E14", "When Donna gets 6 tickets to the Packers game, Eric convinces the gang to give one of them to his dad.  Hyde offers to do a ticket stub switch with Kelso and Fez, but neither Kelso nor Fez really gets the concept.  At the game, Jackie attempts to made Hyde miserable and an ecstatic Red is actually nice to Eric - until Eric buys a Chicago Bears jersey.  Kitty and Bob watch the game together back ho"], [1783649253, 1783650541, "That '70s Show", "It's All Over Now", "S7 E15", "There's a sexy new intern, \"Sizzlin\" Sarah, at the radio station that has the guys going crazy. Sarah manipulates the station manager into firing Donna by using Donna's feminism against her. Poor Kitty has the flu and is going to miss meeting Tom Jones at Hyde and Angie's record store, so she makes Red go in her place to get his autograph. And Jackie seeks advice from Fez on talking to Hyde about "], [1783650541, 1783651860, "That '70s Show", "On with the Show", "S7 E16", "Jackie, who's still smarting from her breakup with Hyde, is going to host her own public television show. Hyde suspects that Fez knows what Jackie was trying to tell him at the record store. Eric meets a 36-year-old guy whose pathetic life forces him to reevaluate his own directionless existence. Angie has a hard time understanding how to \"burn\" someone."], [1783651860, 1783653178, "That '70s Show", "Down the Road Apiece", "S7 E17", "Eric decides to leave town to make a documentary about his life on the road. His car breaks down and he finds Leo. The two go to a truck stop to get something to eat. Kitty, Red, Kelso and Donna set out to find him when Eric doesn't call home. Meanwhile, Fez talks to Jackie and Hyde about their relationship."], [1783653178, 1783654497, "That '70s Show", "Oh Baby (We Got a Good Thing Goin')", "S7 E18", "When Brooke leaves Betsy in Kelso's care, he's ecstatic. His happiness soon ends when he notices that Betsy cries every time he holds her. Leo's offers to help Kelso with the baby only causes him more grief. Meanwhile, Kitty shows signs of jealousy when Hyde stays with Jackie throughout a car show while Red goes off and forgets about her."], [1783654497, 1783655814, "That '70s Show", "Who's Been Sleeping Here?", "S7 E19", "Donna and Eric are in disbelief when Kelso chooses Jackie and Hyde over them to be Betsy's godparents. On the other hand, Hyde and Angie believe there's someone breaking into the store, so Angie places a camera to see who it is. After viewing the tape, they discover it's Fez crashing there at night because his host parents kicked him out since he already graduated. Kitty gives Fez and Kelso the id"], [1783655814, 1783657130, "That '70s Show", "Gimme Shelter", "S7 E20", "When Eric realizes he is the only loser with no future in the group, he goes looking for a job, only to find he isn't very good at many things. Kelso and Fez look for an apartment for the two to live together in, and Jackie arranges a dinner party to celebrate her high school graduation."], [1783657130, 1783658449, "That '70s Show", "2120 So. Michigan Ave.", "S7 E21", "In preparation for pursuing a teaching career, Eric receives his high school transcripts and discovers that he received an incomplete in gym class. He enrolls in a summer gym course and learns that his new P.E. teacher is none other than Casey Kelso! Kelso and Fez move into their new apartment and compete over who gets the master bedroom. While they do this, Red exacts his revenge for the messes t"], [1783658449, 1783659765, "That '70s Show", "2000 Light Years from Home", "S7 E22", "Kelso considers what to do about his relationship with Angie, and comes to the conclusion that it's time to break up, but he's not sure how to do that. He seeks some advice from Jackie on the matter, but ultimately, the decision is taken out of his hands. Eric is shocked to discover that his college tuition fund is gone, and has to find another way to raise the money. His solution is one that Kitt"], [1783659765, 1783661083, "That '70s Show", "Take It or Leave It", "S7 E23", "Jackie is offered her dream job, but unfortunately, it's in Chicago. She wants to know what her future is with Hyde, but he's unwilling to answer. Kitty and Donna are both still reeling over Eric's new job, and both try, in their own ways, to get him to change his mind. The son of one of Red's buddies from the Marines arrives in Point Place, and the guys take a liking to him when they find out wha"], [1783661083, 1783662384, "That '70s Show", "Short and Curlies", "S7 E24", "As Eric prepares to go to Africa, Kitty is still having problems dealing with his departure. Donna is also having problems; she can't come up with an appropriate going away gift, but some advice from Kitty puts her on the right track. Charlie accidentally sees Kitty naked, and his attempts at apologizing only make things worse. Jackie is still in Point Place after telling everyone she was leaving "], [1783662384, 1783663703, "That '70s Show", "'Til the Next Goodbye", "S7 E25", "Red and Kitty explode when they discover the guys smoking pot in the basement. Eric finally leaves for Africa, but not before he can get a hug (and a penknife) from Red, declare his love once again for Donna and survive a leaving party organised by Kitty. Later, Hyde turns up in Chicago to get back together with Jackie - only to discover she's just had sex with Kelso."], [1783663703, 1783665005, "That '70s Show", "Bohemian Rhapsody", "S8 E1", "Hyde returns from a Las Vegas sojourn, confronts Jackie about Kelso and finds Leo has mismanaged the record store; Kitty makes an audio tape for Eric and admits experimenting with the boys' stash."], [1783665005, 1783666298, "That '70s Show", "Somebody to Love", "S8 E2", "Hyde sets to fire Leo for mismanaging the record store, but ends up with a new employee; Jackie has a night out to move on from Hyde."], [1783666298, 1783667601, "That '70s Show", "You're My Best Friend", "S8 E3", "A surprise bachelor party for Hyde falls apart when the guest of honor lands in jail, while his wife gets to know his ex-girlfriend a little better."], [1783667601, 1783668919, "That '70s Show", "Misfire", "S8 E4", "Red and Kitty are celebrating their 25th Wedding Anniversary, and this makes Kelso think that it's time for him to get married.  He decides to propose, but before he can do this, he meets Vic, a businessman with a proposal of his own; one that Kelso can't say no to.  And Donna is upset that Eric hasn't contacted her from Africa yet."], [1783668919, 1783670222, "That '70s Show", "Stone Cold Crazy", "S8 E5", "Kitty and Donna receive advice from new girl in Point Place Samantha. Donna ends up taking very adult pictures to send to Eric who's in Africa. Unfortunately these get left in a kitchen drawer and fall into many wrong hands! Meanwhile ever the daydreamer Fez imagine's how perfect it will be having Jackie for a roommate. He cooks up a male-female cross between Laverne & Shirley and Three's Company."], [1783670222, 1783671524, "That '70s Show", "Long Away", "S8 E6", "Red hires Leo to take pictures at his veterans reunion; Jackie and Fez suspect Donna is cheating on Eric."], [1783671524, 1783672826, "That '70s Show", "Fun It", "S8 E7", "The gang steals the ceramic clown mascot of a burger joint, and the whole town is angry except for Red, who never could stand the thing."], [1783672826, 1783674128, "That '70s Show", "Good Company", "S8 E8", "Fez has a fling with an older woman who's one of Kitty's friends."], [1783674128, 1783675432, "That '70s Show", "Who Needs You", "S8 E9", "Fez almost loses his apartment when Jackie floods it. He's ready to say \"Good day!\" to their co-habitation, but Jackie manages to salvage things by bonding with Fenton, the landlord, over shopping, and convincing him to let them stay. Red and Kitty are concerned over the number of arguments that Hyde and Samantha are having. But when they learn the reason for all the fights, it causes some sparks "], [1783675432, 1783676734, "That '70s Show", "Sweet Lady", "S8 E10", "Jackie meets the local star while at the salon with Fez: talk show host Christine St. George.  Her new goal in life is to be Christine's co-anchor on \"What's Up Wisconsin?\", but breaking in to show business is harder than she thought it would be.  She finally gets a job working with Christine, but it's not quite the job she wanted.  Randy wants to take Donna away to a cabin, which makes her suspec"], [1783676734, 1783678037, "That '70s Show", "Good Old Fashioned Lover Boy", "S8 E11", "Jackie's new job at the station keeps her on edge as she assists psycho boss Christine St. George. Frustrated with Christine's attitude, Jackie tries to win her over with some of Kitty's homemade brownies. Luckily, Jackie's plan works and Christine lightens up, but when Jackie claims the recipe as her own on live television, Kitty is the one who freaks out. Meanwhile, Leo has a crush on Donna."], [1783678037, 1783679339, "That '70s Show", "Killer Queen", "S8 E12", "Red lets Hyde in on a Valentine's Day secret; Christine opens up to Jackie about her love life; and Randy has big plans for a date."], [1783679339, 1783680642, "That '70s Show", "Spread Your Wings", "S8 E13", "With memories of Eric still fresh, Donna worries how the gang will react now that she's dating Randy. Meanwhile, Fez tries to impress a coworker at the salon."], [1783680642, 1783681945, "That '70s Show", "Son and Daughter", "S8 E14", "Hyde house-sits for his father while he attends an Eric Clapton concert; Kitty is beside herself now that Donna's dating Randy."], [1783681945, 1783683248, "That '70s Show", "Keep Yourself Alive", "S8 E15", "Fez loses Kitty's engagement ring on the ride home from the county fair, so the gang goes over the river and through the woods to look for it while Red searches for the right time to tell his wife the truth about her jewelry."], [1783683248, 1783684550, "That '70s Show", "My Fairy King", "S8 E16", "Red refuses to go quietly when a national muffler chain threatens his business; Hyde learns the naked truth about his marriage to Sam; and Jackie surprises herself with her list of an ideal man's qualities."]]}, {"id": "75", "name": "Late Nite", "a": "late-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/late-nite-v2.png", "progs": [[1783587593, 1783591550, "Saturday Night Live", "Paul Simon with Randy Newman and Phoebe Snow", "S1 E2", "Live from New York, It's... Paul Simon!\n\nSketches Include:  The Berkeley Collection, Bees, Jim Henson's Muppets, Try-Hard 1-11"], [1783591550, 1783592932, "In Living Color", "Pilot", "S1 E1", "Skit #1 \"Love Connection: Jewish Woman Dates a Black Man\" Skit #2 \"Great Moments in Black History: First Black Man on the Moon\" Skit #3 \"Homeboy Shopping Network\" Skit #4 \"Redd Foxx for Hire\" Skit #5 \"Equity Express\" Skit #6 \"Men on Film\""], [1783592932, 1783594312, "In Living Color", "The Wrath of Farrakhan", "S1 E2", "Arsenio Hall welcomes Marion Barry to his show. Also: Keenen and Damon Wayans introduce the \"Do-It-Yourself Milli Vanilli Kit.\""], [1783594312, 1783595010, "Robot Chicken", "Junk in the Trunk", "S1 E1", "Rachael Leigh Cook smashes more than eggs in her latest This Is Your Brain on Drugs public service announcement. Optimus Prime, leader of the Autobots, falls prey to prostate cancer. The outcome is never in doubt during \"World's Most One-Sided Fistfights Caught on Film.\" Outtakes from The Dukes of Hazzard, The X-Files, Battlestar Galactica and more come to light in \"Bloopers.\""], [1783595010, 1783595710, "Robot Chicken", "Nutcracker Sweet", "S1 E2", "Voltron engages in an old-school dance-off in \"You Got Robo-Served.\" The secret lives of nature's most fascinating beasts are exposed in \"Secrets of the Animal Kingdom.\" Testicles are terrorized in \"Ode to the Nut Shot.\" Walt Disney's severed head with its giant robotic spider-body attacks Cuba. See how much the kids are horrified in \"Scary Barney\""], [1783595710, 1783599656, "Saturday Night Live", "Rob Reiner", "S1 E3", "Live from New York, it's... Rob Reiner!\n\nSketches Include: National Pancreas Association, Fashion Don'ts, Golden Needles, Dangerous But Inept, Felina Cat Food, Middle American Van Li orth Pole is revealed in \"Unsolved Case Files: Claus & Effect.\" The A-Team solves its problems with maximum firepower and minimal intelligence."], [1783680350, 1783684353, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783589803, 1783591098, "The Goldbergs (2013)", "The Lost Boy", "S2 E16", "Adam attends a Phillies game with his dad and ends up lost in the stadium after Murray allows him to leave his seat on his own. Elsewhere, Beverly's guilt trip backfires when Erica and Barry drive off without her during an argument on their way home from the mall."], [1783591098, 1783592389, "The Goldbergs (2013)", "The Adam Bomb", "S2 E17", "Adam and Barry get in a prank war, while Erica tries to become a pop star."], [1783592389, 1783593749, "The Wonder Years", "Rock 'n Roll", "S3 E10", "When Kevin watches The Beatles on TV he notices a new kid at his school named Larry. Larry asks Kevin does he want to join his band. After turning him down Larry asks again but Kevin's dad tells him \"No.\" So he buys his own guitar. While in the band Larry tells Kevin and the other band members that he got them a gig which Kevin feels they are not ready for."], [1783593749, 1783595120, "The Wonder Years", "Don't You Know Anything About Women?", "S3 E11", "Kevin wants to take Susan Fisher to the dance, but she has a boyfriend, Donald Wallach. However, he hears rumors that they have broken up, so he's about to ask her until Donald interferes. Linda Sloan, his lab partner, suggests that they go as friends so they do.\n\nThey have a good time in the beginning, but it turns sour when while Linda is dancing with Steve Padway, Kevin dances with Susan and th"], [1783595120, 1783596486, "Jem and the Holograms", "Roxy Rumbles", "S3 E13", "Roxy wins the lottery and goes home to Philadelphia  to show off her new lavish lifestyle to her old friends. Meanwhile, Jem and the Holograms are in Philadelphia on a tour to promote literacy. What no one knows is Roxy is illiterate. Roxy decides to throw a bigger party than the Holograms and ends up without any money left because she didn't read the fine print on her contracts. In the end, she d"], [1783596486, 1783597853, "Jem and the Holograms", "Alone Again", "S3 E14", "Laura Holloway, a new Starlight Girl with a talent for music, falls victim to Bobby Braddock, a drug dealer at her school. Ashley plays an important role again, this time helping to confront Laura and eventually help the police catch Bobby."], [1783597853, 1783599185, "Teenage Mutant Ninja Turtles", "The Grybyx", "S3 E41", "Kala's pet Grybyx, which has a really bad temper whenever it gets hungry, escapes from Dimension X through a portal to Earth, causing trouble for the Turtles."], [1783599185, 1783600515, "Teenage Mutant Ninja Turtles", "Mister Ogg Goes to Town", "S3 E42", "While searching for a device to transform crude oil into liquid hydrogen, Krang accidentally brings Mr. Ogg from Dimension Z to earth."], [1783600515, 1783601906, "Pee-wee's Playhouse", "Episode 14", "S2 E14", "I Heart 80s"], [1783601906, 1783603296, "Pee-wee's Playhouse", "Episode 15", "S2 E15", "I Heart 80s"], [1783603296, 1783604585, "The Goldbergs (2013)", "I Drank the Mold", "S2 E18", "Adam's birthday sleepover goes awry while Barry and Erica compose a song to get Murray to appreciate music."], [1783604585, 1783605877, "The Goldbergs (2013)", "La Biblioteca Es Libros", "S2 E19", "Beverly arranges for Adam's teacher to tutor him in Spanish, a class she can't believe he's failing; at the same time, Barry gets a job delivering pizzas to impress Murray, but meanwhile, Erica is upset that her father hasn't acknowledged the fact that she has been working throughout her teen years."], [1783605877, 1783607273, "The Wonder Years", "The Powers That Be", "S3 E12", "Trouble begins in the Arnold household when Grandpa Arnold arrives and gives Kevin a dog - a responsibility Jack doesn't think Kevin can handle."], [1783607273, 1783608647, "The Wonder Years", "She, My Friend and I", "S3 E13", "Paul and his girlfriend Carla have a falling out. Wanting to make his friend feel better, Kevin offers to set Paul up with Winnie. At first Kevin is happy about the idea, but after awhile, he begins to wonder if he's made a mistake."], [1783608647, 1783610013, "Jem and the Holograms", "KJEM", "S3 E15", "A group of college students (including a high school friend of Kimber's) ask Jem to help a struggling radio station that they intern at, that a larger rival station wants to buy out and get rid of."], [1783610013, 1783611342, "Teenage Mutant Ninja Turtles", "Shredderville", "S3 E43", "The Turtles are frustrated that they let Shredder slip away from them again. They feel like giving up, and wish they had never been born."], [1783611342, 1783612675, "Teenage Mutant Ninja Turtles", "Bye Bye Fly", "S3 E44", "An interdimensional alien spacecraft leads Baxter Stockman to his latest vengeful plot to destroy the Turtles and Shredder."], [1783612675, 1783614074, "Pee-wee's Playhouse", "Episode 16", "S2 E16", "I Heart 80s"], [1783614074, 1783615467, "Pee-wee's Playhouse", "Episode 17", "S2 E17", "I Heart 80s"], [1783615467, 1783616761, "The Goldbergs (2013)", "Just Say No", "S2 E20", "Erica tries to educate Beverly about voting. After losing a wrestling match, Barry wants to prove his athletic prowess. Adam makes a TV audition tape for Barry."], [1783616761, 1783618056, "The Goldbergs (2013)", "As You Wish", "S2 E21", "Murray's joy over Adam wanting to play a sport is short-lived once he discovers that it's fencing, and worse yet, he was inspired by a scene from \"The Princess Bride.\" Meanwhile, things don't go exactly as planned when Beverly tries to make a love connection between Barry's wrestling coach and Erica's voice teacher."], [1783618056, 1783619442, "The Wonder Years", "The St. Valentine's Day Massacre", "S3 E14", "To make up for being rude and insenstive to Winnie, Kevin makes her a Valentine's card, but it is accidently placed in Becky Slater's locker. When Becky finds the card, she thinks Kevin wants her back - setting the two up for a showdown."], [1783619442, 1783620828, "The Wonder Years", "The Tree House", "S3 E15", "When Kevin and his dad build a treehouse in the backyard, they discover they get a good view of an attractive neighbor planting her tomatoes. Meanwhile, Doug is in shock after having heard \"the talk\" from his dad."], [1783620828, 1783622164, "Teenage Mutant Ninja Turtles", "The Big Rip Off", "S3 E45", "After several failed attempts to get the Technodrome re-energized, Shredder and Krang run one last-ditch distraction for the Turtles at Fort Charles while Bebop and Rocksteady steal energy fuel cells from the neighboring space research center."], [1783622164, 1783623497, "Teenage Mutant Ninja Turtles", "The Big Break In", "S3 E46", "The Technodrome is up and running again, and it is up to the Turtles to hinder Shredder and Krang from getting to the surface."], [1783623497, 1783624890, "Pee-wee's Playhouse", "Episode 18", "S2 E18", "I Heart 80s"], [1783624890, 1783626281, "Pee-wee's Playhouse", "Episode 19", "S2 E19", "I Heart 80s"], [1783626281, 1783627576, "The Goldbergs (2013)", "Dance Party USA", "S2 E22", "Adam, thinking Pop's good luck might rub off on him, takes a gamble and ends up losing his beloved toys. Meanwhile, Erica's dream of appearing on a popular TV dance show turns into a nightmare when Barry gives her pink eye."], [1783627576, 1783628870, "The Goldbergs (2013)", "Bill/Murray", "S2 E23", "Erica makes a music video to get into college, while Murray and Bill's friendship grows."], [1783628870, 1783630236, "The Wonder Years", "The Glee Club", "S3 E16", "A new student teacher tries to make something of the 8th-grade boys' Glee Club, but without much success."], [1783630236, 1783631630, "The Wonder Years", "Night Out", "S3 E17", "Pressure is brought to bear on Kevin and Winnie's relationship when they are invited to a notorious make-out party."], [1783631630, 1783632962, "Teenage Mutant Ninja Turtles", "The Big Blow Out", "S3 E47", "After several setbacks, Shredder and Krang steal all of New York's electricity and charge it into a giant transdimensional gateway, designed to send Earth into Dimension X. The Turtles must defeat their enemies once and for all before Earth is destroyed by Krang's Rock Soldier army."], [1783632962, 1783634294, "Teenage Mutant Ninja Turtles", "Episode 48", "S3 E48", "I Heart 80s"], [1783634294, 1783635687, "Pee-wee's Playhouse", "Episode 20", "S2 E20", "I Heart 80s"], [1783635687, 1783637076, "Pee-wee's Playhouse", "Episode 21", "S2 E21", "I Heart 80s"], [1783637076, 1783638371, "The Goldbergs (2013)", "Goldbergs Feel Hard", "S2 E24", "Beverly and Murray react as Erica readies to head out of town for the summer, while Barry becomes the school mascot."], [1783638371, 1783639668, "The Goldbergs (2013)", "A Kick-Ass Risky Business Party", "S3 E1", "Lainey, Erica and Barry plan a big party while Lainey's father is out of town. Murray is annoyed by the amount of time Adam spends on the phone talking to Dana."], [1783639668, 1783641060, "The Wonder Years", "Faith", "S3 E18", "Kevin is forced to ponder life and death after he's asked to write his obituary for a school assignment. Jack is facing tax season and Norma usually does most of the work, but she loses all the receipts for the year."], [1783641060, 1783642421, "The Wonder Years", "The Unnatural", "S3 E19", "Kevin is persuaded the the baseball coach to try out for the team. Even though he's not playing as well as some of the others he keeps making it to the next cut because his father saved the coach's life when they were in the war together."], [1783642421, 1783643759, "Teenage Mutant Ninja Turtles", "Episode 49", "S3 E49", "I Heart 80s"], [1783643759, 1783645098, "Teenage Mutant Ninja Turtles", "Episode 50", "S3 E50", "I Heart 80s"], [1783645098, 1783646338, "Pee-wee's Playhouse", "Episode 22", "S2 E22", "I Heart 80s"], [1783646338, 1783647732, "Pee-wee's Playhouse", "Episode 23", "S2 E23", "I Heart 80s"], [1783647732, 1783649029, "The Goldbergs (2013)", "A Chorus Lie", "S3 E2", "Beverly asks Miss Cinoman to let Adam -- who is going through puberty -- lip sync in the school musical. Murray inspires Erica to go to the homecoming dance with Geoff Schwartz."], [1783649029, 1783650326, "The Goldbergs (2013)", "Jimmy 5 Is Alive", "S3 E3", "Murray's attempt at bonding with Adam goes awry when the two end up fighting over the robot they are building. Barry makes a huge mistake when he accidentally tapes over Beverly's beloved video of his 5th birthday party."], [1783650326, 1783651738, "The Wonder Years", "Goodbye", "S3 E20", "When Kevin thinks the best he can do in math is a B, his teacher Mr. Collins sets him the task of getting an A and even offers him private lessons. When Mr. Collins suddenly pulls out of the lessons shortly before the exams, Kevin feels betrayed and fills his exam with nonsensical answers."], [1783651738, 1783653128, "The Wonder Years", "Cocoa and Sympathy", "S3 E21", "When Paul is voted \"Brainiest\" on this years Lisa Berlini Poll, he goes through some self esteem problems. That is until Kevin's mom tries to help Paul's confidence and in return Paul develops a crush on Kevin's mom."], [1783653128, 1783654466, "Teenage Mutant Ninja Turtles", "Episode 51", "S3 E51", "I Heart 80s"], [1783654466, 1783655804, "Teenage Mutant Ninja Turtles", "Episode 52", "S3 E52", "I Heart 80s"], [1783655804, 1783657102, "The Goldbergs (2013)", "I Caddyshacked the Pool", "S3 E4", "Adam is embarrassed when his body begins to change, and he tries to get out of swim class, but Coach Mellor threatens to fail him for not participating; Erica has trouble discovering her identity, and forms her own club, but Barry winds up joining."], [1783657102, 1783658403, "The Goldbergs (2013)", "Boy Barry", "S3 E5", "Upset by Barry's insecurity in their relationship, Lainey sets out to teach him a lesson with Erica's help. However, the situation turns into something totally different and Barry goes to school dressed like Boy George hoping it will change. Meanwhile, Beverly doesn't approve Murray's new mustache so she shaves it off but it backfires."], [1783658403, 1783659799, "The Wonder Years", "Daddy's Little Girl", "S3 E22", "Karen's 18th birthday is coming up and everybody in the Arnold household is preparing for it but her. But is it because she doesn't want such a pointless traditional or because she's not ready for it?"], [1783659799, 1783661181, "The Wonder Years", "Moving", "S3 E23", "When Jack begins to complain about dry rot in the house, Kevin begins to think that his father might consider moving. When it is revealed that the Arnolds are staying put and it is the Coopers who are moving out, Kevin buys Winnie a ring as \"insurance.\" Kevin decides to attend Karen's graduation from high school rather than watch Winnie leave."], [1783661181, 1783662520, "Teenage Mutant Ninja Turtles", "Episode 53", "S3 E53", "I Heart 80s"], [1783662520, 1783663859, "Teenage Mutant Ninja Turtles", "Episode 54", "S3 E54", "I Heart 80s"], [1783663859, 1783665159, "The Goldbergs (2013)", "Couples Costume", "S3 E6", "Adam chooses to spend Halloween night with Dana rather than Beverly, who decides to teach her son a lesson about the dangers of the holiday. Adam regrets taking Barry and Erica's advice to visit a haunted house when he's expected to go back inside to find Dana's lost promise ring."], [1783665159, 1783666459, "The Goldbergs (2013)", "Lucky", "S3 E7", "Barry's dream of having a dog comes true, but he's disappointed when the pup takes an immediate liking to Murray. Beverly is upset not to be included when Erica and Lainey plan a girls-only sleepover."], [1783666459, 1783668054, "The Wonder Years", "Episode 24", "S3 E24", "I Heart 80s"], [1783668054, 1783669467, "The Wonder Years", "Episode 25", "S3 E25", "I Heart 80s"], [1783669467, 1783670805, "Teenage Mutant Ninja Turtles", "Episode 55", "S3 E55", "I Heart 80s"], [1783670805, 1783672145, "Teenage Mutant Ninja Turtles", "Episode 56", "S3 E56", "I Heart 80s"], [1783672145, 1783673444, "The Goldbergs (2013)", "In Conclusion, Thanksgiving", "S3 E8", "Beverly insists the entire family gather for the holiday, but tension builds when brother-in-law Marvin tricks Pop-Pop into thinking Thanksgiving was at his house.Meanwhile, Pops passes the torch to Barry and Erica to give the holiday toast, resulting in them trying to one-up each other."], [1783673444, 1783674743, "The Goldbergs (2013)", "Wingmom", "S3 E9", "Inspired by “Top Gun,” Barry decides to join ROTC. Convinced it will help discipline him, Murray orders the Captain to prevent Barry from quitting when the going gets tough, prompting Beverly to join Barry, too! Meanwhile, Adam helps Pops get his swag back with a special librarian."], [1783674743, 1783675998, "The Wonder Years", "Episode 26", "S3 E26", "I Heart 80s"], [1783675998, 1783677389, "The Wonder Years", "Growing Up", "S4 E1", "The family attends Jack's company picnic. Kevin is not looking forward to seeing Mimi Detweiler, who used to have a crush on him. Wayne's new girlfriend Angela annoys everyone but Wayne. Kevin beans Jack with a baseball at the father-son baseball game. Karen leaves for college."], [1783677389, 1783678729, "Teenage Mutant Ninja Turtles", "Episode 57", "S3 E57", "I Heart 80s"], [1783678729, 1783680068, "Teenage Mutant Ninja Turtles", "Episode 58", "S3 E58", "I Heart 80s"], [1783680068, 1783681368, "The Goldbergs (2013)", "A Christmas Story", "S3 E10", "Disappointed with her unenthusiastic family during the holidays, Beverly creates “Super Hanukkah” to get them into the spirit but it’s too similar to Christmas. Meanwhile, Adam is annoyed that Barry is more interested in hanging with Lainey than him, so he triple-dog dares his brother with results neither one see coming."], [1783681368, 1783682667, "The Goldbergs (2013)", "The Tasty Boys", "S3 E11", "As Adam and Barry team up in a rap supergroup a la the Beastie Boys, Beverly presses Murray to let her remodel their kitchen."], [1783682667, 1783684062, "The Wonder Years", "Ninth Grade Man", "S4 E2", "Winnie is nervous about starting a new school, so she gets Kevin to promise to think about her every hour on the hour. Kevin finds this promise harder to keep than he thought when he loses his locker to Tony Barbella, is enrolled in shop class and meets a new girl in French class, Madeline."]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783587563, 1783590304, "Beverly Hills, 90210", "Emily (a.k.a. The Pink Pearl)", "S4 E13", "Emily has been accepted to the prestigious Cousteau Institute in France, but does not want to attend because she and Brandon are in love. Brandon observes her passion for marine biology and encourages her to pursue her dream. Brenda balks when she is asked to appear nude in an experimental campus play. The frat and sorority pledges must endure a series of humiliating experiences during \"\"Hell Week"], [1783590304, 1783593037, "Beverly Hills, 90210", "Windstruck", "S4 E14", "Donna and David celebrate their second anniversary as a couple. She finally agrees to sleep with him, but their romantic evening is interrupted by a surprise visit from her parents. Donna dodges suspicion by admitting that David lives in the apartment. Felice is angry at the deception, but Dr. Martin encourages her to let Donna live her own life. Donna puts David on hold because she does not want "], [1783593037, 1783595631, "Beverly Hills, 90210", "Somewhere in the World It's Christmas", "S4 E15", "The Walshes plan to spend the holidays in Hawaii, but their plane experiences mechanical problems. They are forced to fly back to Los Angeles and make an emergency landing. Dylan receives a surprise visit from Suzanne Steele, his father's former lover, and her 12-year-old daughter. The duo recently lost its home in Iowa to a flood, and decided to take a road trip as a distraction. Suzanne reveals "], [1783595631, 1783598363, "Beverly Hills, 90210", "Crunch Time", "S4 E16", "The fraternity ostracizes Steve because many people believe that he escaped punishment for the break-in by squealing on others. John refuses to allow Steve any playing time on the intramural volleyball team. Steve becomes fed up and accuses John of tipping off the cops. The KEG house holds a ceremony to decide which of the two should be forced from the house. John arrogantly confesses to his frien"], [1783598363, 1783601106, "Beverly Hills, 90210", "Thicker Than Water", "S4 E17", "David is unable to eat or sleep because of his drug addiction. He steals codeine from his father's office in the hopes of calming his nerves. He falls asleep in the park while babysitting Erin, and she disappears. She is found hiding in a nearby house, and a guilt-ridden David confesses his drug problem to Kelly. Dylan takes care of Erica while Suzanne is out of town. He turns to Cindy for help wh"], [1783601106, 1783603847, "Beverly Hills, 90210", "Heartbreaker", "S4 E18", "David begins seeing a psychiatrist and tries to make amends with Donna. He tries to take time off from his radio show, but Steve proves to be completely incompetent as a fill-in. David steals drugs from Howard's desk and returns to the airwaves high. Andrea confesses her pregnancy to Brandon and Kelly; but has difficulty telling Jesse, who has just been offered a clerkship in San Francisco. The un"], [1783603847, 1783606589, "Beverly Hills, 90210", "The Labors of Love", "S4 E19", "Kelly finds drugs in David's bedroom. She moves in with Dylan and takes Donna with her. Howard fires David from the radio show and orders him to find a new supplier. Donna goes against Kelly's wishes by covering the rent for David, who cashes the check and uses it for drugs. Jesse breaks up with Andrea after she shares her plans to have an abortion. He later reconsiders, and Andrea reveals that sh"], [1783606589, 1783609330, "Beverly Hills, 90210", "Scared Very Straight", "S4 E20", "Despite an appeal from Rose, Andrea's parents refuse to support her decision to marry. Jesse makes one final plea, and the Zuckermans arrive at the civil ceremony at the last moment. David claims that he has cleaned up his act, but brings a junkie friend along on a Valentine's date with Donna. Dylan reminds David that he saved him from hitting the bottle after his father's funeral, and offers to h"], [1783609330, 1783612010, "Beverly Hills, 90210", "Addicted to Love", "S4 E21", "Josh Richland tries to dig up dirt on Brandon for a newspaper article. Lucinda suggests that Brandon bring a date to task force functions to throw Josh off their trail. Brandon asks Kelly to accompany him to a party, with Dylan's permission. Kelly learns that Lucinda is struggling to obtain financing for her film, and introduces her to Dylan. Brenda joins Stuart for a weekend in Palm Springs, wher"], [1783612010, 1783614690, "Beverly Hills, 90210", "Change Partners", "S4 E22", "Brandon and Kelly attend a weekend retreat. The chancellor's teenage daughter Clare develops a crush on Brandon. Brandon confesses his affair with Lucinda to Kelly. Brandon and Kelly realize they must discontinue the charade after they share a passionate kiss. Lucinda invites Dylan to her house to view her film, and makes a pass at him. Donna and Brenda befriend a stray dog, which they name Rocky."], [1783614690, 1783617370, "Beverly Hills, 90210", "A Pig Is a Boy Is a Dog", "S4 E23", "Brenda and Donna attend an animal rights rally, and are crestfallen when the university refuses to suspend animal testing. After Rocky dies of cancer, Brenda becomes involved with a small group of radicals. She serves as lookout when the group breaks into the university research building, and tries in vain to save Andrea's lab (which does not harm animals in its testing). Brenda is arrested. Kelly"], [1783617370, 1783620112, "Beverly Hills, 90210", "Cuffs and Links", "S4 E24", "Brenda calls Dylan from jail in the hopes of keeping her arrest a secret, but he is forced to tell her parents. Brenda's friends avoid her out of fear of being accessories after the fact, and Kelly acts especially bitchy because she is tired of Dylan coming to Brenda's rescue. Brenda faces felony charges, as her crime was a federal offense. An FBI agent who had gone undercover with the activists o"], [1783620112, 1783622740, "Beverly Hills, 90210", "The Time Has Come Today", "S4 E25", "When the rest of the gang takes off on a ski weekend, Brenda stays behind and discovers an old diary that belonged to a young woman who once lived in the Walsh house with her parents and brother in the late 1960s, in which Brenda imagines herself and the gang as the girl Wendy and the gang as her hippie friends."], [1783622740, 1783625502, "Beverly Hills, 90210", "Blind Spot", "S4 E26", "While working with Kelly to recruit guys for the \"Men of CU\" beefcake calendar that they're working on, Donna goes on a spontaneous date with D'Shawn just to make David jealous when she finds him flirting with his blind piano teacher Holly. Meanwhile, Steve sees no reason to keep the secret that their frat president, Mike Ryan, is gay despite being sworn to secrecy."], [1783625502, 1783628220, "Beverly Hills, 90210", "Divas", "S4 E27", "Acclaimed director Roy Randolph comes to C.U. to work on the campus production of Cat on a Hot Tin Roof. Brenda plans to try out for the lead role, and Kelly helps her rehearse. Brenda encourages Kelly to audition for a small part, but Roy asks her to read for the lead. Steve coaches Laura for her audition in the hopes that she can finally catch a break. Clare aggressively pursues Brandon. She sho"], [1783628220, 1783630932, "Beverly Hills, 90210", "Acting Out", "S4 E28", "Brenda accuses Kelly of betraying her and refuses to speak to her. Kelly's relationship with Dylan is strained by the situation with Brenda and Kelly's disdain for Suzanne and Erica. Kelly drops out of the auditions because she does not want to be an actress. She and Brenda make up and admit their mutual jealousy. After witnessing Laura's brilliant performance, a nervous Brenda tanks her audition."], [1783630932, 1783633643, "Beverly Hills, 90210", "Truth and Consequences", "S4 E29", "Brenda wins the lead, much to the amazement of those who saw her audition. Steve starts a rumor that Brenda slept with Roy. Dylan is the only person who completely believes Brenda's denial. Laura causes Brenda to miss a rehearsal in an attempt to get her fired. When this fails, she asks Steve to injure Brenda. Roy kicks Laura out of the play. Steve and Brenda race to stop Laura from killing hersel"], [1783633643, 1783636338, "Beverly Hills, 90210", "Vital Signs", "S4 E30", "Brenda receives rave reviews for her performance in Cat on a Hot Tin Roof. Dylan gives her a special present on opening night, and the two seem to have lingering feelings. Steve is reluctant to attend the play because of his rift with Brenda. Andrea learns that her baby may be born prematurely, and is forced to check into the hospital. She goes into labor. Donna tries to book singer Babyface for t"], [1783636338, 1783639033, "Beverly Hills, 90210", "Mr. Walsh Goes to Washington", "S4 E31", "Brandon travels to Washington, D.C. to make a presentation for the task force. He considers giving in to the persistent Clare. Lucinda, in town for a meeting, shows up at the hotel; both women grope Brandon under the table during an important dinner. Kelly confesses her feelings for Brandon to Andrea and decides to surprise him. Roy offers Brenda the opportunity to spend the summer studying theate"], [1783639033, 1783641633, "Beverly Hills, 90210", "Episode 32", "S4 E32", "The Peach Pit"], [1783641633, 1783644332, "Beverly Hills, 90210", "What I Did on My Summer Vacation and Other Stories", "S5 E1", "Brenda decides to stay in London for the entire year. Valerie Malone, the daughter of the Walshes' good friends, comes to live with them. Her father has just committed suicide. Steve reveals that Celeste dumped him during their Hawaiian vacation when she ran into her high school boyfriend. He settles on Kelly as his true love, and is shocked to learn that she is with Brandon. Steve gets over his b"], [1783644332, 1783647032, "Beverly Hills, 90210", "Under the Influence", "S5 E2", "Donna plans to take a semester off to become a debutante in Houston. Kelly realizes that Donna is hiding behind her mother to shield herself from David. Brandon tries to tell the drunken Dylan about Kelly and him, but chickens out. Nat inadvertently reveals the truth to Dylan. He shows up at an affair organized by Felice and gets into a scuffle with Brandon. Kelly goes to Dylan's house to talk wit"], [1783647032, 1783649732, "Beverly Hills, 90210", "A Clean Slate", "S5 E3", "Brandon must make a speech at the campus debates when Josh fails to show because of car trouble. He is such a success that the duo's campaign takes off. Alex Diaz, a student senator and manager of another campaign, tries to force them out of the race by threatening to expose an unpublished article in which Josh accused Brandon of taking tests for D'Shawn. Andrea fears that Brandon no longer values"], [1783649732, 1783652431, "Beverly Hills, 90210", "Life After Death", "S5 E4", "Brandon has difficulty coming to grips with Josh's death. Kelly tries to support him, but fears that they are drifting apart. Alex tells Brandon that he is contesting his presidency. Brandon doesn't even want the job, but decides to fight for it after Josh's sister shows him a letter in which Josh spoke highly of Brandon and his ideals. Brandon gets Steve out of a jam when the cops break up a part"], [1783652431, 1783655072, "Beverly Hills, 90210", "Rave On", "S5 E5", "Kelly smells marijuana in Valerie's room, but Brandon asks her to give Val the benefit of the doubt. Steve convinces Nat and Dylan to let him organize a two-night rave at the Peach Pit. Valerie catches Dylan pocketing some of the evening's proceeds. Kelly finds Valerie making out with Dylan in a back room. When she tries to tell Steve, Valerie claims that Dylan came on to her. Dylan confesses to V"], [1783655072, 1783657742, "Beverly Hills, 90210", "Homecoming", "S5 E6", "Ferdinand Quintero, the president of Selanesia and a close friend of Clare's family, visits the campus to receive treatment for cancer. A student human rights group objects to his presence, and tells Brandon that Quintero has ordered the murders of thousands of citizens. After meeting a gardener who was tortured by the regime, Brandon agrees to serve Quintero with a subpeona. Steve, Kelly, Donna, "], [1783657742, 1783660442, "Beverly Hills, 90210", "Who's Zoomin' Who?", "S5 E7", "The fire marshal shuts down the Peach Pit After Dark for violating capacity. Steve tries to talk Dylan and Nat into buying out the carpet store next door and converting it into a club. Valerie tells the Walshes about Dylan's financial problems, but he angrily refuses Jim's assistance. Steve and David go to Dylan's house in the morning to discuss business, and find a half-naked Valerie. Steve punch"], [1783660442, 1783663086, "Beverly Hills, 90210", "Things That Go Bang in the Night", "S5 E8", "Val wants to move back to Buffalo, but her mother has checked into a mental facility and cannot care for her.  Brandon explains Valerie's situation to Steve and asks him to give her another chance.  A pool hall acquaintance supplies Dylan with drugs.  Brandon behaves coldly toward Valerie after she skips a party to go to Dylan's house.  She reveals the gravity of Dylan's situation and pleads with "], [1783663086, 1783665772, "Beverly Hills, 90210", "Intervention", "S5 E9", "Cindy convinces Dylan to come over to the Walsh house, where he is confronted by an intervention.  Valerie and Clare run into each other during a shopping excursion and discuss their exclusion from the event.  Dylan reluctantly checks into a rehab clinic.  He checks out during his first day and forces Valerie to drive him home.  She walks out after he gets blitzed and contacts his dealer.  Dylan b"], [1783665772, 1783668453, "Beverly Hills, 90210", "The Dreams of Dylan McKay", "S5 E10", "Dylan experiences a number of bizarre dreams as he fights for his life.  He has recurring nightmares about trying to save Erica from a speeding train as Suzanne, Kevin and his dealer attempt to kill him.  A medical student takes a special interest in Dylan's condition; she describes the nightmares as a battle for his soul.  Dylan takes a turn for the worse, but recovers following an inspiring conv"], [1783668453, 1783671148, "Beverly Hills, 90210", "Hate Is Just a Four-Letter Word", "S5 E11", "Controversy erupts when the university's Black Student Union arranges a speaking engagement for Roland Turner, a respected leader who has made anti-Semitic remarks.  Jewish student leaders do not want to allow him to speak, as they believe this will encourage hatred and intolerance.  Student senator Janice Williams insists that Turner's message actually centers on unity.  Brandon endures criticism"], [1783671148, 1783673707, "Beverly Hills, 90210", "Rock of Ages (a.k.a. The Voodoo That You Do So Well)", "S5 E12", "Jim gets Brandon tickets to the Rolling Stones' Rose Bowl concert, but a hearing to determine the legality of his presidency is moved to the night of the concert. Jesse argues that Brandon is already the legitimate president, as he has been calling senate meetings to order; the challenge to the presidency is denied. Brandon takes Andrea to the concert. Kelly gets backstage access through the magaz"], [1783673707, 1783676339, "Beverly Hills, 90210", "Up in Flames", "S5 E13", "Emily flies back from Paris to attend a seminar at La Jolla. She asks Brandon to meet her at the airport, claiming to have just a four-hour layover. She actually has a week until the beginning of her seminar, but Brandon breaks her heart by revealing that he is dating Kelly. When he sees her back to her hotel room, they share a passionate kiss. Steve and Griffin organize a holiday rave at an aband"], [1783676339, 1783679040, "Beverly Hills, 90210", "Injustice for All", "S5 E14", "Kelly suffers burns on her wrist, ear, and the side of her neck. Allison's injuries are much more severe, but she maintains a positive attitude. Brandon is wracked with guilt because of his feelings for Emily. Kelly does not react well when she learns that Emily is still in town. She calls Dylan to discuss her insecurities, and Brandon visits him in search of advice. Kelly believes that Brandon is"], [1783679040, 1783681629, "Beverly Hills, 90210", "Christmas Comes This Time Each Year", "S5 E15", "Jim and Cindy fly to London to spend Christmas with Brenda. Brandon stays in town with Kelly, who is reluctant to reveal her scars to him. Felice offers Ray $10,000 to stay away from Donna forever. Donna is mortified when Felice reveals that he accepted the check, but he had only taken it as evidence of her mother's actions. Ray and Donna use the money to send LuAnn on a cruise, as this has always"], [1783681629, 1783684192, "Beverly Hills, 90210", "Sentenced to Life", "S5 E16", "Steve succeeds in eluding his community service assignment at a retirement home; but reconsiders after encountering Saul Howard, a famous actor who worked on Samantha's sitcom. Saul is a vibrant and funny man who suffers from Alzheimer's Disease. Steve's friendship with Saul causes him to appreciate what he has and stop whining about his legal difficulties. Saul also encourages Steve to let go of "]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783589185, 1783591921, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783591921, 1783593314, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783593314, 1783594708, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783594708, 1783596046, "Saved by the Bell", "1-900-CRUSHED", "S2 E11", "In an attempt to make money, Zack sets up a 900 number hotline, with Lisa offering advice to the students of Bayside. However, things go awry when Zack decides to keep the line running by dishing out bad advice."], [1783596046, 1783597445, "Saved by the Bell", "Close Encounters Of The Nerd Kind", "S2 E12", "After Zack breaks the school's video camera, he and the gang pretend Screech is an alien in order to win a photo competition. However, their picture soon arouses government suspicion."], [1783597445, 1783598822, "In Living Color", "Lil Magic's School Play", "S2 E18", "Sketches include:\n\nThe Brothers Brothers: Tom and Tom at the Country Club / Oprah P.S.A. / End Zone Choreographer / Lil Magic: The Government Cheese / Fire Marshal Bill: Classroom Safety / Another Bad Creation perform \"Iesha\""], [1783598822, 1783600200, "In Living Color", "Hour of Power: Tag Team Evangalists", "S2 E19", "Sketches include:\n\n\"\"Velma II\"\"   \"\"Cephus & Reesie: Last Request\"\"   \"\"Do You Feel Lucky Promo\"\"   \"\"The 595 Club\"\"   \"\"Vera DeMilo: Pretty Buffed Woman\"\" KRS-One performs"], [1783600200, 1783601980, "Sex and the City", "Where There's Smoke...", "S3 E1", "Carrie meets a politician at a FDNY calendar benefit in Staten Island. Miranda gets help from Steve after she undergoes LASIK eye surgery. Tired of waiting for a fairytale romance, Charlotte begins aggressively searching for a \"Prince Charming\" to marry. Samantha dates the pinup-boy fireman she met at the benefit."], [1783601980, 1783603715, "Sex and the City", "Politically Erect", "S3 E2", "Carrie continues dating her politician beau, but finds his sexual fetish to be anything but 'golden'. Miranda doesn't know how to respond when Steve asks her to \"go steady\". Charlotte throws a \"used date\" party to find a new man. Samantha dates a short man who shops at the Boy's Department in Bloomingdale's."], [1783603715, 1783606464, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783606464, 1783609218, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783609218, 1783610612, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783610612, 1783611986, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783611986, 1783613396, "Saved by the Bell", "Running Zack", "S2 E13", "Zack is the key man at a track meet, but he can't run unless he finishes a project on his family's heritage. So on Mrs. Wentworth's advice, Zack visits an elderly Native American beatnik who tells him about his distant Indian heritage. But when tragedy strikes and Chief Henry dies from natural causes, Zack doesn't know if he can run for the school."], [1783613396, 1783614736, "Saved by the Bell", "The Last Dance", "S3 E1", "When Kelly gets a job at the Max, the attraction of Kelly to her boss Jeff Hunter causes her and Zack to break up for good at the annual costume ball. Meanwhile, Jessie and Slater plot to be elected prom king and queen, while the gang forms a new band called 'Zack Attack' to perform at the dance."], [1783614736, 1783616113, "In Living Color", "Super Fly", "S2 E20", "Sketches include:\n\n\"\"B.S. Brothers and Sisters\"\"   \"\"Douche Commercial\"\"   \"\"Lil Miss Trouble Runs Away\"\"   \"\"The Superfly\"\"   \"\"Snackin' Shack: The New Waitress\"\""], [1783616113, 1783617477, "In Living Color", "Anton at the Recruiter", "S2 E21", "Best of episode of \"\"In Living Color.\"\" Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Fashion Tampons\"\"   \"\"Spike's Joint\"\"   \"\"I Won't Drift Away\"\"   \"\"Ejector Bed\"\"   \"\"The Head Detective\"\"   \"\"Men on Films II\"\""], [1783617477, 1783619074, "Sex and the City", "Attack of the 5'10\" Woman", "S3 E3", "Carrie must confront her past with Big when she runs into Natasha, Big's wife. Miranda hires Magda, an Eastern European maid with very traditional values. Charlotte deals with some of her body issues at a spa. Samantha gets banned from Helena Rubinstein when she gets physical with a masseur."], [1783619074, 1783620808, "Sex and the City", "Boy, Girl, Boy, Girl...", "S3 E4", "Carrie dates a twenty-something man who's openly bisexual. Miranda deals with personal issues when Steve proposes moving in with her. Charlotte poses as a drag king for an artist at her gallery. Samantha butts heads with her new twenty-something male assistant."], [1783620808, 1783623563, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783623563, 1783626319, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783626319, 1783627713, "The Fresh Prince of Bel-Air", "The Butler Did It", "S2 E11", "Philip and Vivian take a weekend vacation and leave the kids home alone, Hilary and Carlton set up a video shoot with Bell Biv De Voe in their house, and then everyone must rush to clean up after Philip and Vivian decide to come home early."], [1783627713, 1783629101, "The Fresh Prince of Bel-Air", "Something for Nothing", "S2 E12", "Will gets lucky at a fundraiser and wins some money. When Will doesn't follow the club's tradition, it starts rumors about the Banks family. Ashley is too young to go to the fundraiser, so she and Geoffrey set up their own poker night."], [1783629101, 1783630439, "Saved by the Bell", "Zack's Birthday Party", "S3 E2", "Due to Lisa's parents pulling some strings, the gang land summer jobs at Malibu Sands beach club, but Zack soon clashes with the owner Leon Carosi, and his initially abrasive daughter, Stacey."], [1783630439, 1783631777, "Saved by the Bell", "The Aftermath", "S3 E3", "Zack attempts to get back at Kelly by making her jealous when he brings another girl to The Max to dance to his and Kelly's favorite song. But the plan misfires greatly, with Zack taking the worst of it. Meanwhile, the rest of the gang prepares for Lisa's Sweet Sixteen birthday party, first when they get angry at Kelly for dumping Zack, then when they get even more angry at Zack for the way he tri"], [1783631777, 1783633142, "In Living Color", "Arsenio Hall of Justice", "S2 E22", "Sketches include:\n\n\"\"Detective Head Goes Bowling\"\"   \"\"Handi Man's Evil Twin\"\"   \"\"The Arsenio Hall of Justice\"\" Public Enemy & Ice Cube perform"], [1783633142, 1783634517, "In Living Color", "Compilations", "S2 E23", "Best of episode of \"\"In Living Color.\"\" Sketches include:\n\n\"\"Three Champs and a Little Lady\"\"   \"\"Black Like You\"\"   \"\"New Ambassador\"\"   \"\"The Making of a Tracy Chapman Song\"\"   \"\"Mo' Money with Whiz and Ice\"\"   \"\"Vanilla Ice: White, White Baby\"\"  The Afros perform"], [1783634517, 1783636414, "Sex and the City", "No Ifs, Ands, or Butts", "S3 E5", "Carrie's smoking becomes a problem when she goes on her first date with Aidan Shaw. Miranda makes more time for Steve in her life. Charlotte dates the worst kisser she's ever met. Samantha dates a black man whose sister is racist."], [1783636414, 1783637851, "Sex and the City", "Are We Sluts?", "S3 E6", "Carrie wants to sleep with Aidan, but he's reluctant to rush into a physical relationship. Miranda discovers she has chlamydia and has to inform her past sexual partners. Charlotte's new boyfriend calls her names during sex. Samantha's neighbors disapprove of her sex life after a late-night visitor lets in a burglar."], [1783637851, 1783640599, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783640599, 1783643354, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783643354, 1783644748, "The Fresh Prince of Bel-Air", "Christmas Show", "S2 E13", "On a family ski trip, the Banks find that they must come up with Christmas gifts from the heart after their belongings are stolen."], [1783644748, 1783646144, "The Fresh Prince of Bel-Air", "Hilary Gets a Life", "S2 E14", "Hilary must work for a caterer after her credit cards are cancelled."], [1783646144, 1783647481, "Saved by the Bell", "The Game", "S3 E4", "After discovering that the vintage Mustang he wants to buy belongs to Mr. Carosi, Zack convinces him to lower the price by claiming that the gang can win the annual beach volleyball match, though their chances of victory seem slim at best."], [1783647481, 1783648892, "Saved by the Bell", "Operation Zack", "S3 E5", "Zack sprains his knee before the big basketball game, and while in hospital learns that Lisa is a part-time candy-striper. However, he also learns that he will need surgery to repair his knee and worries that it may go wrong."], [1783648892, 1783650267, "In Living Color", "Homey the Sellout: Part 1", "S2 E24", "Sketches include:\n\n\"\"Lil Magic: The Audition\"\"   \"\"Oprah's Restaurant\"\"   \"\"Homey the Clown: Homey the Sellout\"\"   \"\"Men On Television\"\""], [1783650267, 1783651642, "In Living Color", "Dickie Peterson: Cherub of Justice", "S2 E25", "Sketches include:\n\n\"\"Dickie Peterson: Secret Service\"\"   \"\"A New 911 Message Service\"\"   \"\"Frenchie at the Opera\"\"   \"\"Clear Conscience Fur Farm and Outlet Store\"\"   \"\"Velma Sings\"\"   \"\"Visiting Day for Oswald\"\""], [1783651642, 1783653257, "Sex and the City", "Drama Queens", "S3 E7", "Carrie obsesses about her perfect relationship when Aidan suggests she meet his parents. Miranda enjoys her intimate life with Steve. Charlotte gets upset when a married friend won't set her up with his bachelor buddy. Samantha tries Viagra while sleeping with a doctor."], [1783653257, 1783655056, "Sex and the City", "The Big Time", "S3 E8", "Carrie runs into Big who confesses that he misses her and can't stop thinking about her. Miranda gets annoyed with Steve's childish habits when he suggests they have a baby together. Charlotte falls in love with Trey after only a few weeks of dating and is convinced he's \"The One\". Samantha believes she's hit menopause when her period is a week late."], [1783655056, 1783657817, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orde
