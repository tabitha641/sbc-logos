alone in the small Oakwood town and without recollection about his name, where he is or who he is. Mike wanders through the town trying to find a living soul."], [1783600787, 1783602341, "The Twilight Zone", "One for the Angels", "S1 E2", "A street salesman cleverly eludes Death. But if he lives, a little girl must die in his place."], [1783602341, 1783603880, "The Twilight Zone", "Mr. Denton on Doomsday", "S1 E3", "A has-been, drunk gunslinger finds his fast-draw abilities magically restored."], [1783603880, 1783605433, "The Twilight Zone", "The Sixteen-Millimeter Shrine", "S1 E4", "Barbara Jean Trenton is a faded film star who lives in the past by constantly re-watching her old movies instead of moving on with her life, so her associates try to lure her out of her self-imposed isolation."], [1783605433, 1783606954, "The Twilight Zone", "Walking Distance", "S1 E5", "A stressed advertising executive, driving through the country, leaves his car and starts to walk toward his hometown, Homewood. He finds things exactly as they were when he was a child."], [1783606954, 1783608511, "The Twilight Zone", "Escape Clause", "S1 E6", "A hypochondriac exchanges his soul for immortality and indestructibility."], [1783608511, 1783610066, "The Twilight Zone", "The Lonely", "S1 E7", "In 2046, imprisoned for murder on a distant asteroid, Corry receives an unexpected present that brings a semblance of companionship during his isolation."], [1783610066, 1783611621, "The Twilight Zone", "Time Enough at Last", "S1 E8", "A bank teller, obsessed with reading, faces conflicts at work and home because of his passion for literature."], [1783611621, 1783613176, "The Twilight Zone", "Perchance to Dream", "S1 E9", "A man with a heart condition explains to his psychiatrist that he feels extremely tired, because he is terrified of falling asleep for fear he might die."], [1783613176, 1783614730, "The Twilight Zone", "Judgment Night", "S1 E10", "During World War II, a confused Carl Lancer finds himself as one of only a few passengers on a freighter, the S.S. Queen of Glasgow, traveling from London to New York. As he sits with other passengers, he begins to realize that he is the captain of a U-Boat that is at that very moment tracking the freighter with a view to sinking it. He also knows that in just over an hour the freighter will be at"], [1783614730, 1783616283, "The Twilight Zone", "And When the Sky Was Opened", "S1 E11", "Recovering in the hospital after a space mission, Major William Gart is visited by his co-pilot Lieutenant Colonel Clegg Forbes, who insists on the existence of a third astronaut."], [1783616283, 1783617837, "The Twilight Zone", "What You Need", "S1 E12", "A two-bit thug thinks he's found the key to a better life in an old sidewalk salesman who has the uncanny ability to tell people what they need the most."], [1783617837, 1783619393, "The Twilight Zone", "The Four of Us are Dying", "S1 E13", "In this noirish tale, a man with the ability to change his face to resemble others gets into hot water with gangsters."], [1783619393, 1783620948, "The Twilight Zone", "Third from the Sun", "S1 E14", "With all-out nuclear war about to ignite, a scientist and his pilot friend plot to escape on an experimental spaceship."], [1783620948, 1783622500, "The Twilight Zone", "I Shot an Arrow into the Air", "S1 E15", "Three astronauts crash-land on an unknown planet and must confront survival challenges, unraveling their unity in the face of desperation."], [1783622500, 1783624058, "The Twilight Zone", "The Hitch-Hiker", "S1 E16", "A young woman driving across the country from East to West becomes frantic when she keeps passing the same man on the side of the road. No matter how fast she drives, the man is always up ahead trying to hitch a ride."], [1783624058, 1783625612, "The Twilight Zone", "The Fever", "S1 E17", "Tight fisted Franklin Gibbs is not pleased when his wife wins a trip for two to Las Vegas.  But things change when he falls under the spell of a slot machine that calls his name."], [1783625612, 1783627167, "The Twilight Zone", "The Last Flight", "S1 E18", "A World War I flying ace flies through a mysterious cloud - and lands at a modern U.S. air base in the year 1959!"], [1783627167, 1783628720, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783628720, 1783630271, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783630271, 1783631825, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783631825, 1783633381, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783633381, 1783634937, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783634937, 1783636489, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783636489, 1783638043, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783638043, 1783639596, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783639596, 1783641151, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783641151, 1783642704, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783642704, 1783644256, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783644256, 1783645810, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783645810, 1783647362, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783647362, 1783648929, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783648929, 1783650484, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783650484, 1783652038, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783652038, 1783653590, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783653590, 1783655109, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783655109, 1783656663, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783656663, 1783658216, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783658216, 1783659768, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783659768, 1783661320, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783661320, 1783662874, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783662874, 1783664429, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783664429, 1783665948, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783665948, 1783667517, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783667517, 1783669071, "The Twilight Zone", "The Trouble with Templeton", "S2 E9", "Booth Templeton is an aging actor who longs for the old days when his wife was alive.  Miraculously, he is given a sobering glimpse of the past he holds so dear."], [1783669071, 1783670625, "The Twilight Zone", "A Most Unusual Camera", "S2 E10", "Married couple Chester and Paula have broken into and robbed a curio shop, hoping to sell the loot for a handsome sum of money. Unfortunately, all of it turns out to be junk or fakes. All, that is, save for a mysterious camera. When they try taking a picture, it turns out to be from five minutes into the future. Soon Paula's brother Woodward joins them and the three decide to use the camera at a h"], [1783670625, 1783672141, "The Twilight Zone", "The Night of the Meek", "S2 E11", "A down-on-his-luck department store Santa Claus discovers a bottomless sack of toys."], [1783672141, 1783673696, "The Twilight Zone", "Dust", "S2 E12", "On a hot day, sympathetic Sheriff Koch and callous con man Peter Sykes are among the many who gather in a desert town to see young Luis Gallegos hanged for accidentally killing a child while drunk. Can some magic dust save Luis?"], [1783673696, 1783675250, "The Twilight Zone", "Back There", "S2 E13", "It's April 14, 1961. Peter Corrigan and friends are discussing time travel at their men's club. Corrigan suddenly becomes dizzy. When his head clears, he has moved back to April 14, 1865 - the date of Lincoln's assassination."], [1783675250, 1783676801, "The Twilight Zone", "The Whole Truth", "S2 E14", "A peculiar Model A automobile compels a used car dealer to tell only the truth."], [1783676801, 1783678355, "The Twilight Zone", "The Invaders", "S2 E15", "An old woman who lives alone in a ramshackle farm house comes face to face with alien invaders. She hears something on her roof and then finds a flying saucer, perhaps six or seven feet across from which emerges two small robots. She fights them as best she can and eventually succeeds in destroying their ship. The nature of the invaders however is not immediately obvious however."], [1783678355, 1783679908, "The Twilight Zone", "A Penny for Your Thoughts", "S2 E16", "The lucky flip of a coin seems to give a mild-mannered bank clerk the power to read minds. But he soon learns that you can't believe everything you read."], [1783679908, 1783681460, "The Twilight Zone", "Twenty Two", "S2 E17", "Miss Powell has a recurring nightmare about room 22 – a morgue."], [1783681460, 1783683012, "The Twilight Zone", "The Odyssey of Flight 33", "S2 E18", "Global Flight 33 is en route from London to New York in what appears to be a routine flight in a modern jetliner. Suddenly however, the jet's speed increases to an incredible 3000 knots and they arrive in New York rather quickly. Neither the captain or his well-trained crew can explain what happened - a strange tail-wind perhaps - but they are certainly not prepared for what they find as they surv"], [1783683012, 1783684555, "The Twilight Zone", "Mr. Dingle, the Strong", "S2 E19", "Luther Dingle is a meek and mild-mannered vacuum cleaner salesman. He spends some time in a bar but always seems to be in the middle of others arguments and always seems to get the worst of it. Courtesy of visiting - but invisible - aliens, he is given great strength, some 300 times greater than that of a normal human being. Dingle becomes something of a local celebrity but just how long will his "]]}, {"id": "3", "name": "MachoVision", "a": "machovision", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/machovision-v4.png", "progs": [[1783589569, 1783590747, "Macho Man the Randy Savage Story", "vs Arn Anderson — WCW TV Title (WCW Saturday Night, Jan 28 1995)", "S1 E13", "MachoVision"], [1783590747, 1783592557, "Macho Man the Randy Savage Story", "vs Ric Flair — Steel Cage, WCW Title (SuperBrawl VI, Feb 11 1996)", "S1 E14", "MachoVision"], [1783592557, 1783594017, "Macho Man the Randy Savage Story", "vs Diamond Dallas Page — Las Vegas Sudden Death (Halloween Havoc, Oct 26 1997)", "S1 E15", "MachoVision"], [1783594017, 1783594835, "Macho Man the Randy Savage Story", "vs Ricky Steamboat — IC Title (Sup
