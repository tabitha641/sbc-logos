const D = {"t0": 1783271998, "t1": 1783370721, "gen": 1783288664, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783273304, 1783274810, "The Twilight Zone", "The Last Rites of Jeff Myrtlebank", "S3 E23", "Young Southerner Jefferson Myrtlebank wakes up during his own funeral and wants to know what is going on. The townsfolk are glad to see him back, but they begin to wonder if he's a man - or something else."], [1783274810, 1783276351, "The Twilight Zone", "To Serve Man", "S3 E24", "An alien race comes to Earth, promising peace and sharing technology. Linguists Michael Chambers, Patricia Brody, and their team set out to translate the aliens' language, using a book whose title they deduce to be \"To Serve Man.\""], [1783276351, 1783277887, "The Twilight Zone", "The Fugitive", "S3 E25", "Young lame Jenny and the other neighborhood kids don't realize that their kind playmate Old Ben is really an intergalactic fugitive hiding out - until two serious men come looking for him and asking questions that test their friendship."], [1783277887, 1783279434, "The Twilight Zone", "Little Girl Lost", "S3 E26", "Awakened by the cries of their daughter Bettina, Chris and Ruth Miller enter her room to find that she has vanished, even though they still hear her crying for help. Chris' physicist friend Bill thinks she moved into another dimension."], [1783279434, 1783280974, "The Twilight Zone", "Person or Persons Unknown", "S3 E27", "David Gurney wakes up to find that no one - his wife, his co-workers, his best friend, not even his own mother knows him."], [1783280974, 1783282535, "The Twilight Zone", "The Little People", "S3 E28", "After crash landing on a seemingly desolate planet, astronauts Bill Fletcher and Peter Craig find a society of very small beings. While Fletcher repairs the spaceship, Craig becomes a megalomaniac and decides to rule their society."], [1783282535, 1783284076, "The Twilight Zone", "Four O'Clock", "S3 E29", "Obsessed Oliver Crangle wants to expose vice in the world, investigating people that he sees as evil, and then attempting to ruin their lives. His plan is to punish them all by an unspecified means at 4:00 this afternoon."], [1783284076, 1783285631, "The Twilight Zone", "Hocus-Pocus and Frisby", "S3 E30", "Rural gas station/general store proprietor Somerset Frisby, who's given to telling tall tales about himself, is abducted by visiting aliens who mistakenly believe him to be one of Earth's leading intellectuals."], [1783285631, 1783287172, "The Twilight Zone", "The Trade-Ins", "S3 E31", "Elderly long-married John and Marie Holt visit the New Life Corporation to shop for a pair of younger replacement bodies. But then John resorts to desperate measures in order to cover the immense cost of this purchase."], [1783287172, 1783288726, "The Twilight Zone", "The Gift", "S3 E32", "An alien who crash-lands into a remote mountain village stirs up the villagers' fears and animosity, but he befriends a little boy and gives him a mysterious present."], [1783288726, 1783290269, "The Twilight Zone", "The Dummy", "S3 E33", "Ventriloquist Jerry Etherson is convinced that his dummy, Willie, is alive and evil. He locks Willie in a trunk and makes plans for a new act with a new dummy. Too bad he didn't clear those plans with Willie first."], [1783290269, 1783291811, "The Twilight Zone", "Young Man's Fancy", "S3 E34", "When a newlywed couple briefly return to the groom's childhood home, the ties of the past prove too strong to resist."], [1783291811, 1783293352, "The Twilight Zone", "I Sing the Body Electric", "S3 E35", "Recent widower George Rogers, needing loving care for his three young children, orders a cybernetic \"grandmother\". While two of his children accept her, one of his daughters fiercely rejects her, with near tragic consequences."], [1783293352, 1783294860, "The Twilight Zone", "Cavender is Coming", "S3 E36", "Inept apprentice guardian angel Harmon Cavender is chastised by his superior and given a final chance to earn his wings by helping an unconventional big city woman, the young, socially awkward Agnes Grep."], [1783294860, 1783296365, "The Twilight Zone", "The Changing of the Guard", "S3 E37", "An elderly private school teacher wonders if his life has meant anything as he contemplates suicide on Christmas Eve and is reminded by former students that he has, indeed, made an effect on the lives of his students over the years."], [1783296365, 1783299495, "The Twilight Zone", "In His Image", "S4 E1", "A scientist tries to correct his imperfections by building a mechanical likeness of himself, which includes of all the finer qualities he is lacking."], [1783299495, 1783302625, "The Twilight Zone", "The Thirty-Fathom Grave", "S4 E2", "As a U.S. Navy destroyer cruises near Guadalcanal in the South Pacific, its sonar detects muted but constant hammering on metal undersea. The eerie sounds emanate from a submarine on the ocean floor, apparently there since World War II. The ship's chief boatswain's mate becomes very nervous, having served aboard that sub - and he was its sole survivor."], [1783302625, 1783305756, "The Twilight Zone", "Valley of the Shadow", "S4 E3", "A reporter finds himself trapped in a small town where people can reverse time and do many other amazing things."], [1783305756, 1783308889, "The Twilight Zone", "He's Alive", "S4 E4", "A tiny neo-Nazi organization struggles pathetically to succeed in a big city. A mysterious figure begins to ruthlessly guide a young, insecure U.S. Nazi leader, and the group begins to draw more attention."], [1783308889, 1783312021, "The Twilight Zone", "Mute", "S4 E5", "A 12-year-old girl who lost her parents in a fire doesn't speak because she has grown up in a secret telepathic community. The couple who take her in, and her teacher, are determined to help her adapt to their society, no matter the cost."], [1783312021, 1783315143, "The Twilight Zone", "Death Ship", "S4 E6", "A three-man spacecraft lands on a planet only to discover the wreckage of a spacecraft identical to their own. Two of the crew are convinced that they are dead, but the captain refuses to see the truth."], [1783315143, 1783318273, "The Twilight Zone", "Jess-Belle", "S4 E7", "Appalachian beauty Jess-Belle Stone can't bear to lose Billy Turner, the object of her desire, to local rich girl Ellie Glover, so she turns to local witch Granny Hart for assistance. The results bring unexpected and tragic consequences."], [1783318273, 1783321402, "The Twilight Zone", "Miniature", "S4 E8", "A lonely man falls in love with a mini museum doll, which he believes is alive."], [1783321402, 1783324532, "The Twilight Zone", "Printer's Devil", "S4 E9", "A wily old man, hired by a bankrupt newspaper editor, has the knack of predicting headline stories and claims to be the Devil."], [1783324532, 1783327665, "The Twilight Zone", "No Time Like the Past", "S4 E10", "A man travels back in time to try to prevent some of history's catastrophes."], [1783327665, 1783330795, "The Twilight Zone", "The Parallel", "S4 E11", "An astronaut blacks out while orbiting the earth and ends up in a parallel universe."], [1783330795, 1783333865, "The Twilight Zone", "I Dream of Genie", "S4 E12", "A wiseacre genie appears from a lamp to a meek man, George P. Hanley. Hanley is so used to bad luck, he imagines how each of three possible wishes could go very wrong - but the genie will grant him only one wish!"], [1783333865, 1783336999, "The Twilight Zone", "The New Exhibit", "S4 E13", "When Mr. Ferguson decides to close his wax museum, his employee Martin Lombard Senescue fights to preserve figures of famous murderers and store them in his home basement, a decision that does not sit well with his wife Emma."], [1783336999, 1783340128, "The Twilight Zone", "Of Late I Think of Cliffordville", "S4 E14", "A bored, wealthy businessman gets a chance to go back in time and start over, armed with all the knowledge he's acquired...an arsenal that's not as powerful as he thinks."], [1783340128, 1783343197, "The Twilight Zone", "The Incredible World of Horace Ford", "S4 E15", "Toymaker Horace Ford is increasingly preoccupied with memories of his childhood, endangering his job and marriage - but a visit to his old neighborhood brings a haunting encounter, suggesting the time was not as idyllic as he remembers."], [1783343197, 1783346330, "The Twilight Zone", "On Thursday We Leave for Home", "S4 E16", "The Pilgrim I, the first-ever human space colony, is about to be rescued from Planet V9-Gamma where they've lived for three decades. Their leader William Benteen has trouble accepting that big changes are coming in their lives."], [1783346330, 1783349399, "The Twilight Zone", "Passage on the Lady Anne", "S4 E17", "A young American couple, the Ransomes, who are trying to salvage their troubled marriage, insist on booking passage on an old trans-Atlantic cruise liner. But other passengers try to persuade them to disembark immediately."], [1783349399, 1783352467, "The Twilight Zone", "The Bard", "S4 E18", "Julius Moomer, a talentless, but relentless, self-promoting hack who dreams of becoming a successful television writer, uses a book of magic to summon William Shakespeare to write dramatic teleplays that Moomer will pass off as his own. Shakespeare becomes irritated by Moomer's lack of appreciation and is even more appalled when he discovers the changes wrought on his plays by cynical television e"], [1783352467, 1783354004, "The Twilight Zone", "In Praise of Pip", "S5 E1", "Wearied bookie Max Phillips, learning of his grown soldier son Pip getting wounded during combat in South Vietnam, gets to spend one last delightful hour with a ten-year-old version of Pip at an amusement park after dark."], [1783354004, 1783355514, "The Twilight Zone", "Steel", "S5 E2", "In 1974, boxing has been outlawed and is performed by robots. With his possibly last fight approaching and his outmoded robot Maxo in need of major repair, manager Steel Kelly resorts to a desperate gamble in Maynard, Kansas."], [1783355514, 1783357050, "The Twilight Zone", "Nightmare at 20,000 Feet", "S5 E3", "A man, newly recovered from a nervous breakdown, becomes convinced that a monster only he sees is damaging the plane he's flying in."], [1783357050, 1783358584, "The Twilight Zone", "A Kind of a Stopwatch", "S5 E4", "Long-winded bachelor Patrick Thomas McNulty loses his job in Mr. Cooper's garment factory, visits his favorite local tavern, converses with a stranger, and is inexplicably given a stopwatch that halts time."], [1783358584, 1783360119, "The Twilight Zone", "The Last Night of a Jockey", "S5 E5", "Barred from the track for life, crooked jockey Grady boozily expresses the wish to escape his sordid surroundings and become a truly \"big man.\" His wish is granted by his lookalike alter ego, but there's a heavy price to be paid at fadeout time."], [1783360119, 1783361655, "The Twilight Zone", "Living Doll", "S5 E6", "Erich is displeased when his wife buys an expensive doll for his step-daughter.  He becomes even more displeased when the doll tells him it doesn't like him!"], [1783361655, 1783363190, "The Twilight Zone", "The Old Man in the Cave", "S5 E7", "In a post-apocalyptic settlement in 1974, the inhabitants' survival depends on the advice of an unseen man living in a nearby cave. This dependence is tested when soldiers descends on their town, led by the violent Major French."], [1783363190, 1783364725, "The Twilight Zone", "Uncle Simon", "S5 E8", "Barbara Polk takes care of her elderly and mean-spirited uncle Simon. He is a scientist who spends much of his time in his basement laboratory but when he's not there, he seems to take great pleasure in demeaning his niece. She can't wait for him to die and doesn't hesitate to tell him so. When he does die, things are... not quite what she expected."], [1783364725, 1783366256, "The Twilight Zone", "Probe 7, Over and Out", "S5 E9", "The lone survivors of two annihilated worlds are stranded on a distant planet."], [1783366256, 1783367793, "The Twilight Zone", "The 7th Is Made Up of Phantoms", "S5 E10", "A modern day National Guard unit find themselves in the middle of Custer's Last Stand at the Battle of Little Big Horn."], [1783367793, 1783369327, "The Twilight Zone", "A Short Drink from a Certain Fountain", "S5 E11", "Aging Harmon Gordon convinces his brother Dr. Raymond Gordon to inject him with an experimental youth serum so that Harmon will have sufficient energy to keep up with his much younger gold-digging wife Flora."]]}, {"id": "3", "name": "MachoVision", "a": "machovision", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/machovision-v4.png", "progs": [[1783274106, 1783275010, "Macho Man the Randy Savage Story", "vs Ted DiBiase — WWE Title (Boston Garden, Jul 9 1988)", "S1 E6", "MachoVision"], [1783275010, 1783275713, "Macho Man the Randy Savage Story", "vs Bad News Brown — Harlem Street Fight, WWE Title (Hamilton ON, Jan 16 1989)", "S1 E7", "MachoVision"], [1783275713, 1783276711, "Macho Man the Randy Savage Story", "Hulk Hogan vs Savage — WWE Title (MSG, Apr 24 1989)", "S1 E8", "MachoVision"], [1783276711, 1783277559, "Macho Man the Randy Savage Story", "vs Roddy Piper (Miami, Jan 22 1990)", "S1 E9", "MachoVision"], [1783277559, 1783278743, "Macho Man the Randy Savage Story", "vs Shawn Michaels — WWE Title (Munich, Apr 14 1992)", "S1 E10", "MachoVision"], [1783278743, 1783281217, "Macho Man the Randy Savage Story", "vs Ultimate Warrior — WWE Title (SummerSlam, Aug 31 1992)", "S1 E11", "MachoVision"], [1783281217, 1783282329, "Macho Man the Randy Savage Story", "vs Ric Flair — WWE Title (Prime Time Wrestling, Sept 14 1992)", "S1 E12", "MachoVision"], [1783282329, 1783283508, "Macho Man the Randy Savage Story", "vs Arn Anderson — WCW TV Tit  "progs": [[1783274080, 1783276966, "Quantum Leap", "All-Americans", "S2 E14", "November 6, 1962: Keeping his best friend from throwing the high school championship football game, costing both of them their scholarship offers, Sam must also get their families to consolidate."], [1783276966, 1783278521, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783278521, 1783280073, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783280073, 1783282950, "Quantum Leap", "Her Charm", "S2 E15", "September 26, 1973: Protecting a female member of the witness protection program from a mafia hitman proves difficult for Sam, since the FBI appears to have an informant confounding his attempts to hide her."], [1783282950, 1783285772, "Quantum Leap", "Freedom", "S2 E16", "November 22, 1970: Rather than saving his grandfather's life, Sam has to escape from jail and elude the police long enough to get them both to the reservation, where the old man can die in peace, at home."], [1783285772, 1783287326, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783287326, 1783288879, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783288879, 1783291766, "Quantum Leap", "Good Night, Dear Heart", "S2 E17", "November 9, 1957: Rather than saving the damsel of the episode, who supposedly committed suicide, Sam is the coroner trying to prove that she was murdered, and find out by whom."], [1783291766, 1783294644, "Quantum Leap", "Pool Hall Blues", "S2 E18", "September 4, 1954: In order to help his granddaughter save a small bar from the slimy loan shark holding a note on the place, Sam has to play pool like a pro...with a little help from Al and Ziggy."], [1783294644, 1783296200, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783296200, 1783297753, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783297753, 1783300643, "Quantum Leap", "Leaping in Without a Net", "S2 E19", "November 18, 1958: Sam remembers he's afraid of heights when he leaps into a trapeze artist, whose sister wants him to catch her as she does a triple without a net. Dad is less than pleased, since his wife died a few years earlier while attempting the same stunt."], [1783300643, 1783303523, "Quantum Leap", "Maybe Baby", "S2 E20", "Sam leaps into the body of Buster who is in the process of kidnapping a baby along with a stripper whose stage name is Bunny O'Hare and whose story is constantly changing. Initially, he thinks they might be the parents but Bunny tells him she is trying to get the baby, Christie, back to its real mother. Turns out she had good reason to take the baby away from her father"], [1783303523, 1783305075, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783305075, 1783306630, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783306630, 1783309480, "Quantum Leap", "Sea Bride", "S2 E21", "June 3, 1954: Aboard an ocean liner, Sam must stop the marriage of a young man's ex-wife to a mobster. In the process, he finds himself in one heck of a mess in the ship's garbage compartment."], [1783309480, 1783312369, "Quantum Leap", "M.I.A.", "S2 E22", "April 1, 1969: When Sam leaps into the life of an undercover cop, Al explains that his mission is to convince a navy nurse that her MIA husband is still alive, and to prevent her from marrying a lawyer she meets on the day Sam leaps in. But a series of coincidences causes Sam to wonder about the true nature of his mission."], [1783312369, 1783313921, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783313921, 1783315488, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783315488, 1783318316, "Quantum Leap", "The Leap Home (1)", "S3 E1", "Sam leaps into himself as a 16-year-old boy to help his high school basketball team win the championship. He also tries to help the other members of his family including his father who died from smoking, his brother who was killed in Vietnam and his sister who married an abusive alcoholic."], [1783318316, 1783321122, "Quantum Leap", "The Leap Home (2): Vietnam", "S3 E2", "April 7, 1970: As a Navy SEAL in his own brother's squad, Sam must determine whether he is there to save Tom's life or ensure the success of the mission on which his brother was killed. Also Al from 1970 was a P.O.W."], [1783321122, 1783322678, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783322678, 1783324232, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783324232, 1783326951, "Quantum Leap", "Leap of Faith", "S3 E3", "August 19, 1963: Sam finds himself in one holy mess as a priest in Philadelphia, trying to help an alcoholic priest deal with a killer and the death of a young parishioner."], [1783326951, 1783329814, "Quantum Leap", "One Strobe Over the Line", "S3 E4", "June 15, 1965: Sam is a photographer who must protect a fashion model from a growing dependency on amphetamines and a predatory manager's ambitions."], [1783329814, 1783331366, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783331366, 1783332885, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783332885, 1783335703, "Quantum Leap", "The Boogieman", "S3 E5", "October 31, 1964: Things do more than go bump in the night when Sam leaps into Joshua Raye, a horror novelist on Halloween. Although Ziggy claims he's there to prevent the death of a church deacon, things get even stranger when two more people die without warning."], [1783335703, 1783338491, "Quantum Leap", "Miss Deep South", "S3 E6", "June 7, 1958: As Darlene Monte, a contestant in the \"Miss Deep South\" beauty pageant, Sam must come to the aid of an innocent contender who faces disgrace when she poses for naughty pictures taken by a sleazy pageant photographer. As if things weren't bad enough, Sam must ensure that Darlene finishes third, so that she'll go on to become a doctor."], [1783338491, 1783340044, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783340044, 1783341597, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783341597, 1783344387, "Quantum Leap", "Black on White on Fire", "S3 E7", "August 11, 1965: Sam leaps into a black med. student engaged to a white woman in order to ensure that he and his fiancée survive the Watts Riot together."], [1783344387, 1783347232, "Quantum Leap", "The Great Spontini", "S3 E8", "May 9, 1974: Leaping into magician Harry Spontini, Sam has to prevent his estranged wife from taking their daughter away from him as she files for divorce, so she can marry her sleazy divorce attorney."], [1783347232, 1783348785, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783348785, 1783350336, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783350336, 1783353121, "Quantum Leap", "Rebel without a Clue", "S3 E9", "September 1, 1958: As \"Bones,\" a member of a motorcycle gang, Sam is an uneasy rider who has to prevent a Jack Kerouac-inspired young woman from meeting her death on the road."], [1783353121, 1783355967, "Quantum Leap", "A Little Miracle", "S3 E10", "December 24, 1962: On Christmas Eve, Sam leap into Reginald Pierson, valet to a wealthy contractor, who is in danger of losing his soul in an attempt to demolish a Salvation Army mission, so he can build his \"Blake's Plaza.\" Seeing a similarity to the Dickens's character, Sam and Al decide to \"Scrooge\" the greed out of the man."], [1783355967, 1783357521, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783357521, 1783359077, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783359077, 1783361865, "Quantum Leap", "Runaway", "S3 E11", "July 4, 1964: On a cross-country car trip, Sam, as 13-year-old Butchie, must contend with a sadistic older sister and a mother on the verge of running away from an unfulfilling marriage, in search of the feminine mystique."], [1783361865, 1783364748, "Quantum Leap", "8½ Months", "S3 E12", "November 15, 1955: Billie Jean Crockett is a pregnant teenager who will make the second biggest mistake of her life - giving her baby up for adoption - unless Sam, as Billie Jean, can convince someone to help her raise her child... before he goes into labor himself"], [1783364748, 1783366267, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783366267, 1783367835, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783367835, 1783370721, "Quantum Leap", "Future Boy", "S3 E13", "October 6, 1957: Sam leaps Kenny Sharp, better known as \"Future Boy,\" sidekick to Moe Stein, host of the kid's show, \"Time Patrol,\" who also happens to be building a time machine in his basement. Unless Sam can prevent Moe's daughter from attempting to have her father committed, Moe is destined to be killed as he tries to hop a freight train."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783273590, 1783274924, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783274924, 1783276132, "Power Rangers", "Green with Evil Part 1: Out of Control", "S1 E17", "Rita creates her own evil Green Ranger to beat the Power Rangers at their own game."], [1783276132, 1783277351, "Power Rangers", "Green with Evil Part 2: Jason's Battle", "S1 E18", "The Power Rangers work to restore Zordon and Alpha unaware that the new kid in school is actually Rita's evil Green Ranger."], [1783277351, 1783278686, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783278686, 1783280023, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783280023, 1783281486, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "Saturday Morning"], [1783281486, 1783282951, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "Saturday Morning"], [1783282951, 1783284288, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783284288, 1783285624, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783285624, 1783286772, "Power Rangers", "Green with Evil Part 3: The Rescue", "S1 E19", "Femme fatale Scorpina joins Rita as the Green Ranger continues to battle the Power Rangers."], [1783286772, 1783287989, "Power Rangers", "Green with Evil Part 4: Eclipsing Megazord", "S1 E20", "An eclipse of the sun saps the Megazord's power as Rita's forces launch a full scale assault on Angel Grove."], [1783287989, 1783289219, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783289219, 1783290558, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783290558, 1783292023, "Pee-wee's Playhouse", "Episode 19", "S1 E19", "Saturday Morning"], [1783292023, 1783293488, "Pee-wee's Playhouse", "Episode 20", "S1 E20", "Saturday Morning"], [1783293488, 1783294825, "Teenage Mutant Ninja Turtles", "The Cat Woman of Channel Six", "S2 E12", "While experimenting with a matter transporter in his secret hideout, Shredder sends Rocksteady and Bebop to a nearby garbage dump. Through a series of mishaps, Rocksteady and Bebop find themselves in the Turtles' Lair."], [1783294825, 1783296163, "Teenage Mutant Ninja Turtles", "Return of the Technodrome", "S2 E13", "Krang, sick of Shredder's constant failings, resolves to return the Technodrome to Earth."], [1783296163, 1783297310, "Power Rangers", "Green with Evil Part 5: Breaking the Spell", "S1 E21", "The mighty Dragonzord awakes after thousands of years as the Rangers try to break the spell over the Green Ranger once and for all."], [1783297310, 1783298477, "Power Rangers", "The Trouble with Shellshock", "S1 E22", "Squatt and Baboo create their own Shellshock monster to impress Rita."], [1783298477, 1783299814, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783299814, 1783301152, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783301152, 1783302615, "Pee-wee's Playhouse", "Episode 21", "S1 E21", "Saturday Morning"], [1783302615, 1783304080, "Pee-wee's Playhouse", "Episode 22", "S1 E22", "Saturday Morning"], [1783304080, 1783305417, "Teenage Mutant Ninja Turtles", "Beneath these Streets", "S3 E1", "The Turtles learn the cost of slacking off when Splinter is badly hurt during a confrontation with Shredder."], [1783305417, 1783306755, "Teenage Mutant Ninja Turtles", "Turtles On Trial", "S3 E2", "The intentions of the Ninja Turtles are put to the test when a controversial TV-figure portrays our heroes as menaces to society. The Turtles forego publicly clearing their name to defeat Krang and his new robotic weapon."], [1783306755, 1783307972, "Power Rangers", "The Spit Flower", "S1 E23", "Rita and her evil Spit Flower monster set out to ruin Kimberly's design for a float in the world peace parade."], [1783307972, 1783309168, "Power Rangers", "Itsy Bitsy Spider", "S1 E24", "Zack must overcome his fear of spiders to face Rita's newest monster."], [1783309168, 1783310501, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783310501, 1783311833, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783311833, 1783312955, "Pee-wee's Playhouse", "Episode 23", "S1 E23", "Saturday Morning"], [1783312955, 1783314418, "Pee-wee's Playhouse", "Episode 24", "S1 E24", "Saturday Morning"], [1783314418, 1783315758, "Teenage Mutant Ninja Turtles", "Attack of the 50-Foot Irma", "S3 E3", "Irma accidentally becomes gigantic and her naturally clumsy nature makes her a danger to the city."], [1783315758, 1783317096, "Teenage Mutant Ninja Turtles", "The Maltese Hamster", "S3 E4", "Gangsters are swiping all the antiques in town. And when they swipe most of our heroes, it's up to Donatello and April to find out why. Could Shredder be behind this?"], [1783317096, 1783318313, "Power Rangers", "Life's a Masquerade", "S1 E25", "Rita's Frankenstein monster crashes the Power Rangers' Halloween costume party."], [1783318313, 1783319514, "Power Rangers", "Gung Ho!", "S1 E26", "Jason and Tommy must learn to work together to stop Rita's Super Putties."], [1783319514, 1783320850, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783320850, 1783322218, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783322218, 1783324008, "Pee-wee's Playhouse", "Episode 25", "S1 E25", "Saturday Morning"], [1783324008, 1783325407, "Pee-wee's Playhouse", "Open House", "S2 E1", "Today in the \"Playhouse,\" Pee-wee tricks his friends into doing all of his chores by pretending that work is fun. The gang meets some new friends while renovating the \"house.\" Reba arrives in time to deliver Clocky while the Playhouse gang uncovers Floory and meets Mrs. Rene for the first time."], [1783325407, 1783326744, "Teenage Mutant Ninja Turtles", "Sky Turtles", "S3 E5", "The Turtles go flying when the Shredder invents a gravity-altering device."], [1783326744, 1783328079, "Teenage Mutant Ninja Turtles", "The Old Switcheroo", "S3 E6", "The personalities of Shredder and Splinter are switched when a device is accidentally activated during a battle between the Turtles and their enemies. As Shredder plans the Turtles' demise and Splinter plans on how to get back to his body, everyone else is clueless."], [1783328079, 1783329251, "Power Rangers", "Wheel of Misfortune", "S1 E27", "Rita turns Kimberly's grandmother's spinning wheel into her dangerous new weapon."], [1783329251, 1783330470, "Power Rangers", "Island of Illusion (1)", "S1 E28", "Rita traps the Power Rangers on the Island of Illusion, where their greatest fears can destroy them."], [1783330470, 1783331772, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "], [1783331772, 1783333138, "Jem and the Holograms", "The Talent Search (2)", "S3 E2", "The Misfits discover that the other semi-finalist Craig is Stormer's brother. Eric then decides to use Craig to find out Jem's real identity. When he decides to stand up to Eric, Jetta swipes money from Eric's wallet which she uses to hire a gang to destroy Raya's fathers nursery so that Raya will go to Eric to get the money where she will reveal Jem's identity. The plan backfires when Raya spots "], [1783333138, 1783334536, "Pee-wee's Playhouse", "Puppy In the Playhouse", "S2 E2", "Cowntess, just back from a world cruise, is showing some of her home movies from the trip. Globey teaches Pee-wee how to say \"hello, my name is Pee-wee\" in French and Chinese! When a lost puppy appears at the Playhouse door, no one can figure out who the owner is. Pee-wee develops a strong case of puppy love and decides to keep him and name him Aloysius. However, Reba comes \"over,\" and it's obviou"], [1783334536, 1783335928, "Pee-wee's Playhouse", "Store", "S2 E3", "Pee-wee and Cowboy Curtis take a leap into Magic Screen where they enjoy some mighty fine handcart ridin' until a train chases them back into the waiting arms of Chairry! Then, Cowboy Curtis sings a song with \"more\" of the secret word in it than you could scream at. Finally, Cowboy Curtis and Miss Yvonne go shopping at Pee-wee's \"department store\" where they decide to buy Chairry!"], [1783335928, 1783337266, "Teenage Mutant Ninja Turtles", "Burne's Blues", "S3 E7", "In the middle of a summer heat wave, someone is destroying all the air conditioners and taking all the city's freon. In the meantime, Vernon and Burne go looking for the Turtles, but find something else."], [1783337266, 1783338606, "Teenage Mutant Ninja Turtles", "The Fifth Turtle", "S3 E8", "A 14-year-old boy tries his best to help out the Turtles, but with some not so optimal results."], [1783338606, 1783339793, "Power Rangers", "Island of Illusion (2)", "S1 E29", "The Rangers must overcome their own fears to escape Rita's Island of Illusion."], [1783339793, 1783340973, "Power Rangers", "The Rockstar", "S1 E30", "Jason and his cousin Jeremy find a map that leads to a powerful ancient mirror."], [1783340973, 1783342339, "Jem and the Holograms", "Scandal", "S3 E3", "The Holograms, the Misfits, and Shawn Harrison (the British teen idol Kimber met in The World Hunger Shindig, and has asked her to write a song for him to perform) are all in Venice Beach. The Holograms are supposed to go on Harriet Horne's show, which is a famous celebrity gossip show. While the Holograms think they are not much to gossip about, Jetta steals Kimber's diary and publishes it. Tablo"], [1783342339, 1783343706, "Jem and the Holograms", "One Jem Too Many", "S3 E4", "Jerrica, stressed-out from dealing with tax forms and problems with the Starlight record company and home for girls, gets into trouble with a nasty tempered Jem impersonator, who turns out to be Clash disguised in one of The Misfits' plots to ruin Jem."], [1783343706, 1783345095, "Pee-wee's Playhouse", "Pee-wee Catches a Cold", "S2 E4", "Today the secret word is \"out,\" but Pee-wee is stuck in when he overdoes it and comes down with a cold! It's lovely Nurse Yvonne and ultra-health conscious Ricardo to the rescue with some good advice and chicken soup for their sick and cranky friend. In no time, Pee-wee's back to his old self again to join in the Playhouse fun."], [1783345095, 1783346480, "Pee-wee's Playhouse", "Why Wasn't I Invited?", "S2 E5", "Nothing bugs Pee-wee's flowers more than having a caterpillar in their flower box until Magic Screen shows how a caterpillar can turn itself into a beautiful butterfly. The caterpillar's not the only uninvited creature around when Cowntess has a birthday party and invites practically \"all\" of Puppetland except Pee-wee! Is she mad at him or just being moody?"], [1783346480, 1783347819, "Teenage Mutant Ninja Turtles", "Enter: The Rat King", "S3 E9", "Thompson assigns April to research the growing rat infestation. She is pursued by an army of rats and escapes on a passing city bus."], [1783347819, 1783349157, "Teenage Mutant Ninja Turtles", "Turtles at the Earth's Core", "S3 E10", "After witnessing a living dinosaur wander in the city and disappear abruptly, the Turtles follow its tracks into a large hole, where they discover a shocking revelation: A land frozen in a stage where dinosaurs roam the land."], [1783349157, 1783350373, "Power Rangers", "Calamity Kimberly", "S1 E31", "Poor Kimberly is having possibly the worst day of her life as she encounters misfortune after misfortune. Tommy tries to make her feel better and things are looking up, until Rita makes Kimberly's day go from bad to worse and Tommy is injured while trying to save her. The four remaining rangers race against time to rescue Kimberly before she is gone for good."], [1783350373, 1783351510, "Power Rangers", "A Star is Born", "S1 E32", "Tommy eagerly auditions for a karate commercial especially when he sees that he's up against a clueless Bulk. Meanwhile, the rest of the rangers are enjoying a day at the beach.....until Scorpina crashes the party and traps them in a cocoon from which they can't seem to escape. To make matters worse, no one can contact Tommy since he took off his communicator!"], [1783351510, 1783352875, "Jem and the Holograms", "The Bands Break Up", "S3 E5", "Upset with the way their bands treat them, Kimber and Stormer quit and join forces. They are extremely popular and try to release an album, but they soon realize Eric Raymond is using them to get back his half of Starlight Music."], [1783352875, 1783354241, "Jem and the Holograms", "The Fan", "S3 E6", "Jem is kidnapped by a rich fan with help of The Misfits and taken to a copy of Starlight Mansion with actors playing her friends in an attempt to find out her real identity."], [1783354241, 1783355630, "Pee-wee's Playhouse", "Tons of Fun", "S2 E6", "Today, Pee-wee gives everybody \"That Certain Feeling\" by lip-synching to one of his old records. Later, while Pee-wee is out with the Playhouse Gang, Cowboy Curtis comes over and sings to the flowers, and Miss Yvonne does a wild clog dance. Tensions mount when the gang ends up with two \"cool\" ice cream desserts, and they have to choose which to eat. Of course, they could just eat them both!"], [1783355630, 1783357018, "Pee-wee's Playhouse", "School", "S2 E7", "Learning is \"easy\" when your teacher makes it fun. No one can make it more fun than Pee-wee, especially when he turns the Playhouse into a schoolhouse! The Playhouse Gang are his students, Magic Screen is his blackboard, and Globey is, well, his globe. Pee-wee makes history exciting when he teaches about Christopher Columbus and the Declaration of Independence. Sit back, laugh, and learn!"], [1783357018, 1783358357, "Teenage Mutant Ninja Turtles", "April Fool", "S3 E11", "Emperor Aleister of Malicuria comes to New York City, bringing along a shard of Lydium 90 to the USA."], [1783358357, 1783359697, "Teenage Mutant Ninja Turtles", "Attack of the Big MACC", "S3 E12", "A robot warrior, known as the Mobile Armored Computerized Combatant (M.A.C.C.), arrives from 400 years in the future in 20th-Century New York. He befriends the Turtles, but Shredder and Krang are looking to bring him to their side, at any means necessary."], [1783359697, 1783360914, "Power Rangers", "The Yolk's on You!", "S1 E33", "With the Angel Grove High talent show around the corner, the Rangers have a lot to deal with when Tommy is kidnapped and imprisoned by putties, and Finster creates the Fang monster in celebration of Rita's birthday."], [1783360914, 1783362074, "Power Rangers", "The Green Candle (1)", "S1 E34", "Tommy's nervous about asking Kimberly to the dance but goes for it anyway. Before he can, the Putties transport him to another dimension where a green candle that's linked to his powers is lit. He discovers that when the candle burns out, his powers will go back to Rita! Tommy manages to escape but without the candle, which is still burning."], [1783362074, 1783363439, "Jem and the Holograms", "Fathers' Day", "S3 E7", "It's Fathers' Day! Kimber has a bad time, trying to remembering her late father, but learns to cope after having a talk with Pizzazz's father as he has his own problems with his daughter. Also, The Holograms and Misfits visit Clash and Video's hometown for a Father's day banquet."], [1783363439, 1783364805, "Jem and the Holograms", "Treasure Hunt", "S3 E8", "The Starlight Girls compete with Misfits-in-Training in a treasure hunt for literacy. In the end, they learn that knowledge is the greatest prize of all."], [1783364805, 1783366194, "Pee-wee's Playhouse", "Spring", "S2 E8", "As the Spring season comes to \"begin,\" Pee-wee plants a seed, and it grows quickly (courtesy of Clockey). Also, the King of Cartoons presents his wife, \"The Queen of Cartoons,\" and his son, \"The Prince of Cartoons.\" Also, when Pee-wee doesn't make the baseball team, Ricardo shows him that there are other sports he can try."], [1783366194, 1783367582, "Pee-wee's Playhouse", "Playhouse In Outer Space", "S2 E9", "Aaaaugh! The secret word is \"zyzzybalubah,\" and that can only mean one thing! The entire Playhouse, including Reba, is sucked into space, transported to a strange planet, and taken over by an odd, lonely alien! Yvona, an alien from the planet, is trying to escape the unfriendly Zyzzybalubah, but Pee-wee teaches him how to be polite and make friends. Reba teaches Pee-wee how to whistle, and she sin"], [1783367582, 1783368913, "Teenage Mutant Ninja Turtles", "The Turtle Terminator", "S3 E37", "Irma is kidnapped by Bebop and Rocksteady and is replaced by a robot that looks just like her that is programmed to eliminate the turtles."]]}, {"id": "7", "name": "Taba TV", "a": "taba-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/taba-tv-v1.png", "progs": [[1783273447, 1783274672, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783274672, 1783276148, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783276148, 1783277553, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783277553, 1783278979, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783278979, 1783281794, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783281794, 1783284607, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783284607, 1783285975, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783285975, 1783287310, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783287310, 1783288605, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783288605, 1783289973, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783289973, 1783291388, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783291388, 1783292818, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783292818, 1783295635, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783295635, 1783298449, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783298449, 1783299784, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783299784, 1783301120, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783301120, 1783302521, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783302521, 1783303923, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783303923, 1783305352, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783305352, 1783306787, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783306787, 1783309602, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783309602, 1783312299, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783312299, 1783313529, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783313529, 1783314868, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"], [1783314868, 1783316255, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783316255, 1783317650, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783317650, 1783319065, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783319065, 1783320500, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783320500, 1783323285, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783323285, 1783326069, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783326069, 1783327407, "Jem and the Holograms", "Old Meets New", "S2 E16", "When Jem & The Holograms perform a song called 'Rock and Roll is Forever,' they infuriate an old singer named Bobby Bailey. However, Bobby turns out to be a man with a big heart but also a big problem. His flat is scheduled for demolition and Eric Raymond is behind it. Will Jem & The Holograms manage to help Bobby or will the wrecking ball win the day?"], [1783327407, 1783328744, "Jem and the Holograms", "Intrigue at the Indy 500", "S2 E17", "Starlight Music sponsors Indy 500 driver Martino Granzetti. When a crash lands Martino (and Rio) in the hospital, Jem & the Holograms manage to rebuild the car and Jem decides to race the car for the tournament. However, things turn nasty when Pizzazz enters the race and causes chaos on the track."], [1783328744, 1783330145, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783330145, 1783331515, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783331515, 1783332951, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783332951, 1783334389, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783334389, 1783337131, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783337131, 1783339914, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783339914, 1783341246, "Jem and the Holograms", "The Jem Jam (1)", "S2 E18", "The Misfits plot to ruin The Jem Jam, a benefit concert Jem is planning, by tricking Luna Dark (a Cyndi Lauper-esque singer) into coming with them, while Krissy must deal with Lena Lerner's (a Tina Turner-like pop star) spoiled brat son, Dominic (who resembles a young Michael Jackson), and Ba Nee is sure that Randy James, a red-haired drummer for a Springsteen-like rock  star, is her father."], [1783341246, 1783342578, "Jem and the Holograms", "The Jem Jam (2)", "S2 E19", "Jem saves Luna Dark from Pizzazz's guard dogs, and the Misfits plot to ruin the Jem Jam, with help from Techrat. Meanwhile, Ba Nee goes to great lengths to prove that Randy is her father. Also, Krissy finds out that there's more to Dominic than she thought."], [1783342578, 1783343970, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783343970, 1783345318, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783345318, 1783346712, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783346712, 1783348118, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783348118, 1783350906, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783350906, 1783353661, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783353661, 1783354997, "Jem and the Holograms", "Culture Clash", "S2 E20", "An eccentric artist, Fitzgerald Beck, is the art director for Jem and the Holograms' new video. Beck's art dealer is using his sculptures to smuggle stolen diamonds. The Misfits find this out and set up the sculptures to explode onstage while Jem and the Holograms are filming the video, leading the police to believe it was Jem and the Holograms and Beck who put the diamonds there. Jem and the Holo"], [1783354997, 1783356366, "Jem and the Holograms", "Glitter and Gold", "S2 E21", "Jem hasn't been heard from in some time and Jerrica doesn't seem to care. The Misfits waste no time capitalizing on her absence, especially when Owen Beech, the owner of Diskovery Records promotes a contest, awarding a Gold Album award and a new car, the Glitter and Gold Roadster to the winner. After an argument with Rio, the Holograms try to persuade Jerrica to make a new album to compete with th"], [1783356366, 1783357698, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783357698, 1783359086, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783359086, 1783360481, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783360481, 1783361808, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783361808, 1783364563, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783364563, 1783367314, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783367314, 1783368615, "Jem and the Holograms", "The Talent Search (1)", "S3 E1", "Problems affect Jem & The Holograms when Shana leaves to pursue a fashion career. The Holograms decide to host a Talent Search to find a new drummer. News of this spreads like fire which also catches the attention of The Misfits. The Misfits decide to upstage the Talent Search by adding a new Misfit: a hot-tempered saxophone player from England named Jetta. After so many disastrous auditions, the "]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783274166, 1783275464, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783275464, 1783276770, "Schitt's Creek", "Town for Sale", "S1 E13", "Johnny finds a potential buyer for the town, while David and Alexis discover they may have become more attached to Schitt’s Creek than they ever thought possible."], [1783276770, 1783278080, "Schitt's Creek", "Finding David", "S2 E1", "The Roses search for their missing son, David, while Alexis takes her relationship with Mutt to the next level despite technically being engaged to Ted."], [1783278080, 1783280785, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783280785, 1783283475, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783283475, 1783284779, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783284779, 1783286082, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783286082, 1783287380, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783287380, 1783288674, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783288674, 1783289984, "Schitt's Creek", "Family Dinner", "S2 E2", "Moira decides to cook dinner with the help of David. Johnny scopes out an office for his consulting business. And Alexis finally comes clean with Ted about their engagement."], [1783289984, 1783291294, "Schitt's Creek", "Jazzagals", "S2 E3", "Moira attempts to join the town’s a cappella group. Alexis enjoys the heady first days of her latest relationship. And Johnny helps out at Bob’s Garage despite himself."], [1783291294, 1783293933, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783293933, 1783296926, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783296926, 1783298231, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783298231, 1783299535, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783299535, 1783300829, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783300829, 1783302124, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783302124, 1783303434, "Schitt's Creek", "Estate Sale", "S2 E4", "Johnny and Moira go to an estate sale. Mutt surprises Alexis with a bike, while Roland asks David to help him shop for a special item."], [1783303434, 1783304744, "Schitt's Creek", "Bob's Bagels", "S2 E5", "Johnny talks himself into an unlikely business partnership with Bob. David gets an interview at a woman's clothing store, while Moira reluctantly cares for an ailing Alexis."], [1783304744, 1783307384, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783307384, 1783310024, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783310024, 1783311326, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783311326, 1783312624, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783312624, 1783313920, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783313920, 1783315217, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783315217, 1783316527, "Schitt's Creek", "Moira vs. Town Council", "S2 E6", "Moira tries to beautify the town. David misuses the company credit card. A grooming misstep forces Alexis and Mutt to question their relationship."], [1783316527, 1783317837, "Schitt's Creek", "The Candidate", "S2 E7", "Johnny considers running for town council. David and Stevie look for love. Alexis copes with being single."], [1783317837, 1783320477, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783320477, 1783322589, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783322589, 1783323886, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783323886, 1783325190, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783325190, 1783326487, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783326487, 1783327784, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783327784, 1783329094, "Schitt's Creek", "Milk Money", "S2 E8", "Johnny gets thrown into the raw milk business. Moira tries to connect with the townspeople. David gives style advice."], [1783329094, 1783330404, "Schitt's Creek", "Moira's Nudes", "S2 E9", "Moira is worried that racy photos from her past will jeopardize the campaign; Johnny asks for financial help; Alexis gets a job."], [1783330404, 1783331776, "Raising Hope", "Episode 23", "S1 E23", "Y2K"], [1783331776, 1783332948, "Raising Hope", "Episode 24", "S1 E24", "Y2K"], [1783332948, 1783334242, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783334242, 1783335539, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783335539, 1783336849, "Schitt's Creek", "Ronnie's Party", "S2 E10",
