, "In Living Color", "Homey D. Clown Returns", "S1 E13", "Damon Wayans plays Homey the Clown; comedienne Samantha Kinison speaks on men and marriage."], [1783294978, 1783296371, "In Living Color", "Bigger Brothers", "S2 E1", "Sketches include:\n\nHey Mon/Hedley Hospital /  Sidekick /  Bigger Brothers /  Mudhead's Funeral / Men On Films II / Flava Flave makes an appearance / Queen Latifah performs"], [1783296371, 1783297894, "Sex and the City", "Take Me Out to the Ballgame", "S2 E1", "Carrie meets \"the new Yankee,\" Joe, at a baseball game, all the while preparing for her first post-breakup encounter with Big. Miranda gets fed up with the girls always talking about men. Samantha gets frustrated with James' \"deficiencies\". Charlotte dates a guy named Paul Ericson who has a tendency to adjust his package... a lot."], [1783297894, 1783299411, "Sex and the City", "The Awful Truth", "S2 E2", "Carrie accidentally suggests that her friend Susan Sharon leave her domineering, violent husband. Miranda builds up the courage to talk dirty in bed. Charlotte tries to replace the perfect man with the perfect dog. Samantha gets dragged to couples' therapy with James and tries to avoid talking about her real problem with their sex life."], [1783299411, 1783302226, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783302226, 1783305039, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783305039, 1783306454, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783306454, 1783307884, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783307884, 1783309229, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783309229, 1783310568, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783310568, 1783311951, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783311951, 1783313256, "In Living Color", "Spike's Joint", "S2 E3", "Sketches (not including intro) include:\n\n\"\"Flatuscents\"\"   \"\"Good Morning/Good Night (Magenta Thompson Show)\"\"   \"\"Cephus & Reesie's Broadway Tour\"\"   \"\"The Buttmans: Guess Who's Coming to Dinner\"\"   \"\"Spike's Joint\"\""], [1783313256, 1783314817, "Sex and the City", "The Freak Show", "S2 E3", "Carrie turns freakish herself after dating a string of freaky guys and freaks out the very normal Ben when trying to discover his secret freakiness. Miranda dates \"Manhattan Guy,\" a guy who hasn't left Manhattan in ten years. Charlotte dates the renowned \"Mr. Pussy\" and tries to make a real relationship out of it. Samantha decides to get plastic surgery and freaks out during the consult."], [1783314817, 1783316390, "Sex and the City", "They Shoot Single People, Don't They?", "S2 E4", "Single and fabulous Carrie gets a horrible photo taken for the cover story of New York Magazine: Single and Fabulous...?. Miranda fakes orgasms with her current boyfriend. Charlotte starts dating her handyman. Samantha dates a club owner, who calls them a \"we\" right away."], [1783316390, 1783319207, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783319207, 1783322021, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783322021, 1783323450, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783323450, 1783324885, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783324885, 1783326223, "Saved by the Bell", "Episode 17", "S1 E17", "Prime Time"], [1783326223, 1783327561, "Saved by the Bell", "Episode 18", "S1 E18", "Prime Time"], [1783327561, 1783328953, "In Living Color", "Hour of Power", "S2 E4", "Sketches include:\n\nTag Team Evangelists / Bonita Butrell: Uninvited Guest / 1-900-YT GUILT / Al MacAfee: Hall Monitor / Monie Love performs \"Monie in the Middle\""], [1783328953, 1783330346, "In Living Color", "Miss Black Person USA", "S2 E5", "Sketches include:\n\n\"\"Black Like You\"\"   \"\"Go On Girl: Sensitive Men\"\"   \"\"I Won't Drift Away\"\"   \"\"Miss Black Person U.S.A.\"\""], [1783330346, 1783332006, "Sex and the City", "Four Women and a Funeral", "S2 E5", "Carrie starts seeing Mr. Big again. Miranda buys her own apartment on the Upper West Side. Charlotte meets a recent widower at a cemetery. Samantha's actions with a married man gets her in trouble with the New York high-society \"ladies who lunch\" and only a titanic star can help her out."], [1783332006, 1783333511, "Sex and the City", "The Cheating Curve", "S2 E6", "Carrie starts to \"officially\" date Mr. Big again. Miranda dates a guy who insists on watching porn while they have sex. Fed up with cheating men, Charlotte spends time with her new friends, the \"Power Lesbians.\" Samantha starts dating her gym instructor who \"brands\" her with a lightning bolt."], [1783333511, 1783336326, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783336326, 1783339023, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783339023, 1783340438, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783340438, 1783341874, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783341874, 1783343213, "Saved by the Bell", "Episode 19", "S1 E19", "Prime Time"], [1783343213, 1783344624, "Saved by the Bell", "Episode 20", "S1 E20", "Prime Time"], [1783344624, 1783346018, "In Living Color", "The Black Man's Guide to Understanding the Black Woman", "S2 E6", "Sketches include:\n\n\"\"Hey Mon/Hedley Court\"\"   \"\"Shahrazad Ali's Video (The Black Man's Guide to Understanding the Black Woman)\"\"   \"\"Snackin' Shack\"\"   \"\"Frenchie\"\""], [1783346018, 1783347411, "In Living Color", "Funky Finger Productions", "S2 E7", "Sketches include:\n\n\"\"B.S. Brothers: Penitentiary IV\"\"   \"\"Iraqi Fashion Show\"\"   \"\"Lil Miss Trouble: The School Play\"\"   \"\"Vera DeMilo: Buffed, Beautiful, and Bitchin'\"\"   \"\"Homeboy Shopping Network: Hollywood Homeboys\"\""], [1783347411, 1783348922, "Sex and the City", "The Chicken Dance", "S2 E7", "Carrie gets fed up with Big's inability to pay attention to her. Miranda inadvertently sets her interior designer up with a long-distance would-be boyfriend, and they marry after only four weeks. Charlotte has a \"warp speed\" relationship with a guy she meets at the wedding. Samantha is upset when she experiences \"déjà-screw\": sleeping with a guy she previously did fifteen years ago."], [1783348922, 1783350427, "Sex and the City", "The Man, the Myth, the Viagra", "S2 E8", "A frustrated Carrie tries to get Big to make time to meet the girls. Miranda meets Steve Brady, a cute bartender who wants to be more than a one-night stand. Samantha dates an incredibly wealthy man in his seventies with a sumptuous lifestyle and a pocket full of Viagra."], [1783350427, 1783353211, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783353211, 1783355996, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783355996, 1783357432, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783357432, 1783358871, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783358871, 1783360274, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783360274, 1783361677, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783361677, 1783363070, "In Living Color", "Laquita Meets Billy Dee", "S2 E8", "Sketches include:\n\n\"\"Magenta's Acting School\"\"   \"\"Foundation for Golf Heritage\"\"   \"\"Evelyn Smith\"\"   \"\"Laquita Sings the Blues\"\""], [1783363070, 1783364236, "In Living Color", "Men on Vacation", "S2 E9", "Sketches include:\n\nA Lassie '90 Sequel / Amazing Grace - Rocky VI / Cousin Milly / PMS Defense System / Men on Vacation / 3rd Bass perform \"Product of the Environment\""], [1783364236, 1783365854, "Sex and the City", "Old Dogs, New Dicks", "S2 E9", "Carrie tries to get Big to stop checking out other women when they're together. Miranda and Steve's opposite schedules become a problem. Samantha runs into an old hockey-player boyfriend who is now a blonde drag queen named Samantha. Charlotte is turned-off when she dates a man who has not been circumcised; Carrie points out to Charlotte that 85% of men are not circumcised while Samantha claims to"], [1783365854, 1783367517, "Sex and the City", "The Caste System", "S2 E10", "Carrie gets fed up with high society while at an Upper East Side party with Big. Miranda and Steve have an argument over money and social status. Charlotte meets Wiley Ford, the movie star and joins his entourage. Samantha dates a wealthy real-estate developer with a Southeast Asian live-in servant who has her master wrapped around her little finger."], [1783367517, 1783370259, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783273668, 1783275104, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783275104, 1783276400, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783276400, 1783277697, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783277697, 1783279084, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783279084, 1783280479, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783280479, 1783281781, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783281781, 1783283079, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783283079, 1783284418, "Saved by the Bell", "Episode 19", "S1 E19", "Savage at Nite"], [1783284418, 1783285829, "Saved by the Bell", "Episode 20", "S1 E20", "Savage at Nite"], [1783285829, 1783287175, "That '70s Show", "Water Tower", "S1 E21", "The guys paint a pot leaf on the water tower and Kelso falls off trying to fix it because everyone thinks it looks like the finger. Instead of going to the hospital they go to Eric's cause his mom's a nurse. When Eric goes to get her he walks in on his parents having sex. Having trouble sleeping and not being able to look his parents in the eyes leads his parents to believe he's on drugs."], [1783287175, 1783288522, "That '70s Show", "Punk Chick", "S1 E22", "Hyde meets a girl who's the female version of him. She tries to convince him to go to New York with her but he decides that it would be best if he stayed behind. Kelso and Red make smaller paddles for Pong. Fez feels left out of everything. Jackie tries to bake a pie for home economics project, but she ruins it every time."], [1783288522, 1783289958, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783289958, 1783291396, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783291396, 1783292693, "The Goldbergs (2013)", "The Age of Darkness", "S1 E21", "When Erica cannot be consoled after her boyfriend dumps her, Murray steps in to help; Barry becomes obsessed with a new arcade game."], [1783292693, 1783293990, "The Goldbergs (2013)", "A Wrestler Named Goldberg", "S1 E22", "When Beverly learns that Barry lied about joining the wrestling team, she takes matters into her own hands; Erica flakes on a promise to take Adam to the premiere of \"Return of the Jedi."], [1783293990, 1783295390, "The Wonder Years", "Nemesis", "S2 E11", "Now that Kevin is back together with Winnie Cooper, Kevin thinks his problems are behind them. But then he is remembered how he ridiculed his friends, including Winnie, behind their backs - because Becky tells everyone."], [1783295390, 1783296760, "The Wonder Years", "Fate", "S2 E12", "With Winnie still upset at him, Kevin tries to get back on good terms with her by confronting Eddie Pinetti, the school bully, for going into her locker. This plan backfires when he realizes that Winnie is now seeing Eddie."], [1783296760, 1783298058, "Raising Hope", "Baby Monitor", "S1 E21", "Barney tells the team he loses each year's annual commercial competition for the store, so now he wants to recruit his employees to compete for this year's submission; unfortunately, flattery and considerations like fair-play, and team spirit, get in the way."], [1783298058, 1783299362, "Raising Hope", "Don't Vote for this Episode", "S1 E22", "The Chances reminisce about the year Jimmy turned 18 - when Maw Maw kicked them out of the house, when a goth Jimmy took up residence in the grocery store and when Burt and Virginia finally figured out how to be adults."], [1783299362, 1783300765, "Saved by the Bell", "The Prom", "S2 E1", "Zack asks Kelly to be his date for the prom and she agrees, but when her father loses his job, she decides family is more important and gives up her chance to go, but cannot bring herself to tell Zack."], [1783300765, 1783302168, "Saved by the Bell", "Zack's War", "S2 E2", "Mr. Belding tries to reform Zack by making him join the Army Cadet Corps. Zack gets the whole gang to join him, and they end up competing with each other in an obstacle course. Meanwhile, Lisa is swayed by the Cadet Corps drill instructor, Chet Adams."], [1783302168, 1783303517, "That '70s Show", "Grandma's Dead", "S1 E23", "Red's mother Bernice has once again managed to make everyone miserable during one of her visits.  While driving his grandmother home, Eric lashes out and tells her that it wouldn't kill her to be nice once in a while.  Bernice promptly drops dead, leaving Eric to think he killed her.  The entire Forman family (including Laurie and Red's brother Marty) comes together for her funeral while Eric gets"], [1783303517, 1783304863, "That '70s Show", "Hyde Moves In", "S1 E24", "The gang goes skinny-dipping and Jackie gets sick. Hyde moves in with the Formans when his mom runs away with a trucker. Bob takes a liking to one of Midge's feminist friends."], [1783304863, 1783306258, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783306258, 1783307664, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783307664, 1783308958, "The Goldbergs (2013)", "Livin' on a Prayer", "S1 E23", "When Murray's high school free throw record is broken, he attends a banquet as the guest of honor; Barry decides to throw a party."], [1783308958, 1783310255, "The Goldbergs (2013)", "Love Is a Mix Tape", "S2 E1", "Beverly intercepts the mix tape Adam made for Dana, thinking he made it for her. Barry shows off his new fake I.D., which is quickly confiscated."], [1783310255, 1783311647, "The Wonder Years", "Birthday Boy", "S2 E13", "Paul Pfeiffer and Kevin Arnold's birthdays are just days apart, and the two friends have usually always celebrated together. But this year, upon turning 13 Paul(as per Jewish Tradition), will become a man. The only problem is that Paul's Bar Mitzvah happens to take place on the same day as Kevin's Birthday!"], [1783311647, 1783312995, "The Wonder Years", "Brightwing", "S2 E14", "Kevin becomes his sister's confidant when he discovers she is skipping school to go to \"\"the hill.\"\""], [1783312995, 1783314367, "Raising Hope", "Episode 23", "S1 E23", "Savage at Nite"], [1783314367, 1783315539, "Raising Hope", "Episode 24", "S1 E24", "Savage at Nite"], [1783315539, 1783316942, "Saved by the Bell", "Save the Max", "S2 E3", "The gang unearths Bayside's old school radio station and begins broadcasting again, before learning that The Max is to be closed if Max does not manage to pay $10,000 in back rent."], [1783316942, 1783318345, "Saved by the Bell", "Driver's Education", "S2 E4", "In order to get their driver's licenses, the gang go through a driver's education course. Zack and Kelly advance in their relationship, with Zack buying Kelly a ring. Slater buys a car, and is at the head of the driver's ed class. When Zack becomes jealous of Kelly's attention toward Slater over the driving issue, he tries to set Slater up to fail, but gets the boot himself instead."], [1783318345, 1783319691, "That '70s Show", "The Good Son", "S1 E25", "Eric loves having Hyde as a \"brother\" because he does all of Eric's chores but when his parents start to prefer Hyde he starts to hate him. Hyde changes from the conspiracy minded trouble-making guy Eric loves to a total bore. Midge and Bob are having relationship problems. Red's old war buddy comes back and Red finds out that he's a swinger."], [1783319691, 1783320775, "That '70s Show", "Episode 26", "S1 E26", "Savage at Nite"], [1783320775, 1783322170, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783322170, 1783323496, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783323496, 1783324791, "The Goldbergs (2013)", "Mama Drama", "S2 E2", "When Adam isn't cast as the lead in the school musical, Beverly helps him star in a competing show. Murray stubbornly tries to avoid traffic, opening a rift between him and Barry."], [1783324791, 1783326087, "The Goldbergs (2013)", "The Facts of Bleeping Life", "S2 E3", "Prince Charles and Lady Di's impending nuptials inspire Beverly to plan a vow renewal. Barry hopes his band will win him Lainey's attention."], [1783326087, 1783327419, "The Wonder Years", "Square Dance", "S2 E15", "The gym class is engaging in square-dancing, and Kevin is paired up with Margaret Farquhar, the strangest girl in 7th grade. While Margaret enjoys spending time with Kevin, her presence makes Kevin wary of his junior-high image."], [1783327419, 1783328808, "The Wonder Years", "Whose Woods Are These?", "S2 E16", "Kevin, Winnie and Paul try to stop the destruction of Harper's Woods. This is the place where Winnie and Kevin kissed for the first time and a place they all played together when they were younger."], [1783328808, 1783329980, "Raising Hope", "Episode 25", "S1 E25", "Savage at Nite"], [1783329980, 1783331283, "Raising Hope", "Prodigy", "S2 E1", "When Jimmy watches a home video of himself as a thirteen-year-old, he discovers that he was a musical prodigy with a promising career as a singer and pianist until a horrible accident involving a golf putter rendered him talentless. Jimmy recruits Burt, Virginia and Maw Maw to help him rediscover his lost abilities."], [1783331283, 1783332621, "Saved by the Bell", "House Party", "S2 E5", "Zack stays over at Screech's place for the weekend where the two of them along with Slater throw a party which is interrupted by the girls before breaking off a valuable item from Mrs. Powers."], [1783332621, 1783334025, "Saved by the Bell", "Blind Dates", "S2 E6", "Mr. Belding blackmails Zack with suspension if he won't take his bratty niece, Penny, out on a date. So, Zack asks Screech to impersonate him while he takes out Kelly for her birthday party at the Max. But Slater overhears this and decides to break up Zack's plans to he can have another chance with Kelly. Meanwhile, Lisa sets Jessie up on a blind date, but there's a problem: the guy is much shorte"], [1783334025, 1783335351, "That '70s Show", "Garage Sale", "S2 E1", "The Formans have a garage sale to earn some extra cash. Hyde doesn't have anything to sell, so he bakes \"special brownies\" to sell; Kitty, Red, Bob and Midge eat some of the brownies unsuspectingly. Fez kisses Jackie who tells Donna it's the best kiss she's ever had. (#26)"], [1783335351, 1783336678, "That '70s Show", "Red's Last Day", "S2 E2", "It's Red's last day of work, and he decides to drown his unemployment sorrows at a bar.  Kitty sends Eric to pick Red up; he, Hyde and Fez end up drinking with Red instead, leaving none of them in any condition to drive.  Kelso gets a van, and christens it the \"shaggin' wagon.\""], [1783336678, 1783338067, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783338067, 1783339461, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783339461, 1783340759, "The Goldbergs (2013)", "Shall We Play a Game?", "S2 E4", "Adam accidentally gets Barry kicked out of a group of cool kids at school; Beverly is upset when she finds out that Erica hangs out with a friend's mother."], [1783340759, 1783342055, "The Goldbergs (2013)", "Family Takes Care of Beverly", "S2 E5", "Pops is evicted after accidentally starting a fire in his apartment during a Halloween party."], [1783342055, 1783343451, "The Wonder Years", "How I'm Spending My Summer Vacation", "S2 E17", "As the end of school approaches, Kevins looks forward to spending the summer with Paul and Winnie. However, his summer is spoiled when Paul tells hims that he'll be leaving for summer and Winnie seems to be avoiding him."], [1783343451, 1783345177, "The Wonder Years", "Episode 18", "S2 E18", "Savage at Nite"], [1783345177, 1783346480, "Raising Hope", "Sabrina Has Money", "S2 E2", "When Burt discovers that Sabrina is the daughter of his wealthy new client, he lets the family in on her secret. Embarrassed by her family’s wealth she reluctantly introduces the Chance family to her father, Cap. Meanwhile Jimmy decides Hope should have rich friends and begs Sabrina to take him to her sister’s party where Sabrina’s insecurities become apparent."], [1783346480, 1783347783, "Raising Hope", "Kidnapped", "S2 E3", "When a ponytailed hippie named Jack who kidnapped Burt twenty years ago unexpectedly pays the Chance family a visit, they discover that Burt's disappearance wasn't all it appeared. Meanwhile Jimmy's jealousy creeps out when Sabrina anxiously awaits a text from her boyfriend Wyatt."], [1783347783, 1783349186, "Saved by the Bell", "Rent-a-Pop", "S2 E7", "Zack hires an actor named James, who works as a waiter at the Max, to impersonate his father, Derek, to Mr. Belding, and later, asks James to impersonate Mr. Belding to his real father to avoid the consequences of some bad grades. Meanwhile, the rest of the gang plans a carnival to raise money for a new school field trip."], [1783349186, 1783350594, "Saved by the Bell", "Miss Bayside", "S2 E8", "Bayside's winner of the Miss Bayside beauty pageant will go on to compete in the state-wide pageant of Miss High School California. The pageant stirs up controversy about sexism, in which both A.C. Slater and Screech enter as contestants to win a bet over who could win. Who will be the next Miss Bayside?"], [1783350594, 1783351921, "That '70s Show", "The Velvet Rope", "S2 E3", "Now that he's unemployed, the job hunt is on for Red.  The gang decides to go to a dance club, and Jackie manages to convince Kelso that dressing like David Bowie is a good idea.  Once at the club, Donna, Fez and Hyde have no problem getting in, but Eric can't make it past the overly large bouncer."], [1783351921, 1783353248, "That '70s Show", "Laurie and the Professor", "S2 E4", "Bob and Midge's marital troubles spill over into a fight over Donna's affection.  One of Laurie's college professors comes to Point Place to see if he can convince Laurie to return to classes, and he takes a 'hands-on' approach to the task, much to Eric's shock.  Fez looks for a woman, and Hyde looks for a room to sleep in."], [1783353248, 1783354642, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783354642, 1783356036, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783356036, 1783357332, "The Goldbergs (2013)", "Big Baby Ball", "S2 E6", "Beverly gets Mr. Meller fired for singling out Adam during dodgeball, but after some persuading from Adam and Murray she ends up fighting for him to be rehired. Meanwhile, Barry is unable to deal with the fact that Erica is better than him at a new board game called Trivial Pursuit."], [1783357332, 1783358629, "The Goldbergs (2013)", "A Goldberg Thanksgiving", "S2 E7", "As Erica resists helping Bev prepare their traditional Thanksgiving dinner, Murray worries that he's losing Adam to his ne'er-do-well brother, Marvin."], [1783358629, 1783359873, "The Wonder Years", "Episode 19", "S2 E19", "Savage at Nite"], [1783359873, 1783361275, "The Wonder Years", "Summer Song", "S3 E1", "The Arnold family and Paul Pfeiffer travel to Ocean City for a little fun in the sun. However, once there, no one really seems to be having any. Paul's allergies flare up, and Wayne and Karen's attitudes are making it nothing like the family trips from long ago. Kevin is still stinging from the news the Winnie Cooper has a new boyfriend, until he meets a cute (but older) girl named Teri."], [1783361275, 1783362578, "Raising Hope", "Henderson, Nevada-Adjacent Baby! Henderson, Nevada-Adjacent!", "S2 E4", "Virginia, Burt, Jimmy and Sabrina go to Las Vegas when Delilah plans a big wedding, but Virginia is jealous of her cousin's fancy ceremony because she never had one. Meanwhile, Jimmy hopes his luck with Sabrina will improve in Sin City."], [1783362578, 1783363836, "Raising Hope", "Killer Hope", "S2 E5", "After discovering that Hope hit a boy at daycare, the family becomes worried that Hope is following in her mother's footsteps. Meanwhile, the Chances run into some problems when they camp out in tents due to their home being fumigated for termites."], [1783363836, 1783365238, "Saved by the Bell", "Jessie's Song", "S2 E9", "Jessie turns to caffeine pills to keep up with her studies and her new singing group, Hot Sundae."], [1783365238, 1783366576, "Saved by the Bell", "Model Students", "S2 E10", "After a heated debate about the school calenders, a photographer decides to use Jessie, Lisa and Kelly in a photo shoot where Kelly is chosen as the winner of a contest that'll make her famous in France."], [1783366576, 1783367902, "That '70s Show", "Halloween", "S2 E5", "The gang, looking for something fun to do on Halloween, revisits their old grammar school, where they find their permanent records. Looking through them, they find out some interesting things about each other. Fez discovers trick or treating."], [1783367902, 1783369228, "That '70s Show", "Vanstock", "S2 E6", "Eric, Donna, Kelso, Hyde and Fez are all going to Vanstock, Wisconsin's own Woodstock. Jackie says she doesn't want to go, so Kelso invites Laurie. In the end, both girls go leaving Kelso stuck in the middle. Donna gets mad at Eric for not telling her about Kelso and Laurie. Fez spends the night girl chatting to Jackie and Laurie, much to Kelso's chagrin while Hyde attempts drop him in it. Red bec"]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783273381, 1783274776, "The Fresh Prince of Bel-Air", "The Way We Were", "S3 E23", "Philip and Vivian are celebrating their 25th wedding anniversary and the others put together a scrapbook. This is a flashback show with clips from the previous seasons as the scrapbook is put together."], [1783274776, 1783276171, "The Fresh Prince of Bel-Air", "Six Degrees of Graduation", "S3 E24", "Vy anticipates Will's graduation with enthusiasm, but there may be discord when she learns Will is failing music. To pass his music class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783276171, 1783277437, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783277437, 1783278803, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783278803, 1783280170, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783280170, 1783281531, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783281531, 1783282862, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783282862, 1783284182, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783284182, 1783285548, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783285548, 1783286842, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783286842, 1783288178, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."], [1783288178, 1783289544, "The Fresh Prince of er."], [1783331497, 1783332844, "The Fresh Prince of Bel-Air", "Cold Feet, Hot Body", "S5 E23", "Dinner date. The Banks host a gorgeous girl from Philly who tries to lure Will away from Lisa."], [1783332844, 1783334202, "The Fresh Prince of Bel-Air", "Love in an Elevator", "S5 E24", "Stuck and out of luck, Will spends his bachelor party trapped in an elevator with a feuding Carlton and Jazz."], [1783334202, 1783335526, "The Fresh Prince of Bel-Air", "For Whom the Wedding Bells Toll", "S5 E25", "Husband-to-be Will has the bride, the ring, the date...and second thoughts about the whole idea."], [1783335526, 1783336881, "The Fresh Prince of Bel-Air", "Burnin' Down the House", "S6 E1", "While Carlton is away at a Young Republican camp, Will cooks up a flambe of a disaster on a night when an influential judge is coming to dinner, and Will can only make it through the night with the help of Geoffrey, and other plan is not to make Phil find out."], [1783336881, 1783338218, "The Fresh Prince of Bel-Air", "Get a Job", "S6 E2", "Will and Carlton compete for a job at Hilary's talk show. Will wins the job and has to take out a comedian's sister as part of his duties. Will is looking forward to it until he sees what the sister looks like."], [1783338218, 1783339557, "The Fresh Prince of Bel-Air", "Stress Related", "S6 E3", "After learning a little something about initiative, Will jumps to Hilary's aid prior to a key business meeting at the station, meanwhile an unemployed Carlton subs for Philip on career day at Ashley's school."], [1783339557, 1783340902, "The Fresh Prince of Bel-Air", "Bourgie Sings the Blues", "S6 E4", "Carlton is worried about the interview at Princeton and is afraid of another disappointment. Will does his best to check him up, but nothing seems to work. Carlton does not want to go to the interview, so Will goes for him."], [1783340902, 1783342256, "The Fresh Prince of Bel-Air", "The Script Formerly Known As...", "S6 E5", "Will decides to book a juror dismi he courtroom on the day of the showbiz madam's sentencing."], [1783352989, 1783354267, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (1)", "S6 E14", "Ka-boooom! That explosion you hear is Philip and Vivian's marriage after Philip decides to go into politics."], [1783354267, 1783355604, "The Fresh Prince of Bel-Air", "Breaking Up is Hard To Do (2)", "S6 E15", "Breaking up may not be so hard to do for an angry Vivian, but when Philip finds he's lost without her, Will and Carlton conspire to reunite them."], [1783355604, 1783356934, "The Fresh Prince of Bel-Air", "I, Bowl Buster", "S6 E16", "After being accepted at Princeton, a worried Carlton changes his life plans and retreats to a place where everybody knows his name - the bowling alley."], [1783356934, 1783358279, "The Fresh Prince of Bel-Air", "The Butler's Son Did It", "S6 E17", "Geoffrey's life changes overnight when a man claiming to be his long-lost son shows up and charms everyone - except Will, who discovers the guy's not what he seems. Meanwhile, Hilary starts writing her autobiography, and an early childhood photo reveals a shocking secret."], [1783358279, 1783359634, "The Fresh Prince of Bel-Air", "Hare Today...", "S6 E18", "The minister at church thinks Vivian's devotion to the church is her way to be near him, so he makes a pass at her. Carlton and Ashley argue about who will get to sing at the Easter service. Nicky's pet rabbit dies when Philip sits on it."], [1783359634, 1783360988, "The Fresh Prince of Bel-Air", "I, Whoops, There It Is", "S6 E19", "Dick Clark has a cameo on this backstage outing that has Will Smith visiting with series stars and screening series bloopers."], [1783360988, 1783362344, "The Fresh Prince of Bel-Air", "I, Stank Horse", "S6 E20", "Ashley is anxious to get into the School of Performing Art, and a friend of Will's says he will help her with her acting. Her first commercial requires she wear a bikini. Will and Carlton buy a horse that is being retired from racing. const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
