const D = {"t0": 1783346206, "t1": 1783447022, "gen": 1783350086, "chans": [{"id": "1", "name": "The Silver Screen", "a": "the-silver-screen", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/silver-screen-v2.png", "progs": [[1783348807, 1783350362, "The Twilight Zone", "The Four of Us are Dying", "S1 E13", "In this noirish tale, a man with the ability to change his face to resemble others gets into hot water with gangsters."], [1783350362, 1783351917, "The Twilight Zone", "Third from the Sun", "S1 E14", "With all-out nuclear war about to ignite, a scientist and his pilot friend plot to escape on an experimental spaceship."], [1783351917, 1783353470, "The Twilight Zone", "I Shot an Arrow into the Air", "S1 E15", "Three astronauts crash-land on an unknown planet and must confront survival challenges, unraveling their unity in the face of desperation."], [1783353470, 1783355027, "The Twilight Zone", "The Hitch-Hiker", "S1 E16", "A young woman driving across the country from East to West becomes frantic when she keeps passing the same man on the side of the road. No matter how fast she drives, the man is always up ahead trying to hitch a ride."], [1783355027, 1783356582, "The Twilight Zone", "The Fever", "S1 E17", "Tight fisted Franklin Gibbs is not pleased when his wife wins a trip for two to Las Vegas.  But things change when he falls under the spell of a slot machine that calls his name."], [1783356582, 1783358137, "The Twilight Zone", "The Last Flight", "S1 E18", "A World War I flying ace flies through a mysterious cloud - and lands at a modern U.S. air base in the year 1959!"], [1783358137, 1783359690, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783359690, 1783361241, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783361241, 1783362794, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783362794, 1783364351, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783364351, 1783365906, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783365906, 1783367458, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783367458, 1783369012, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783369012, 1783370565, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783370565, 1783372121, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783372121, 1783373674, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783373674, 1783375226, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783375226, 1783376780, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783376780, 1783378332, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."], [1783378332, 1783379899, "The Twilight Zone", "A Passage for Trumpet", "S1 E32", "Musician Joey Crown is down on his luck. An alcoholic, he can't find work because no one trusts him. Broke, he hocks his trumpet but then steps in front of truck which knocks him onto the sidewalk. He awakens in a strange world where no one can see him and he presumes that he has died. He eventually bumps into someone who can in fact see him, a fellow horn player who tells him that it's still with"], [1783379899, 1783381454, "The Twilight Zone", "Mr. Bevis", "S1 E33", "After losing his job, his car and his apartment on the same day, an eccentric loser gets a new lease on life from his guardian angel, but there is a price for keeping it."], [1783381454, 1783383008, "The Twilight Zone", "The After Hours", "S1 E34", "Puzzled and unsettled by the odd behavior of the salespeople, a woman discovers that the floor of a department store, on which she bought a gold thimble, doesn't exist."], [1783383008, 1783384560, "The Twilight Zone", "The Mighty Casey", "S1 E35", "A baseball manager takes his team to the championships thanks to a robot pitcher."], [1783384560, 1783386079, "The Twilight Zone", "A World of His Own", "S1 E36", "Coming home, Victoria catches her husband Gregory flirting with a beautiful woman in his study. His explanation that characters come to life before his eyes when he speaks into his dictation machine, leads Victoria to question his sanity."], [1783386079, 1783387633, "The Twilight Zone", "King Nine Will Not Return", "S2 E1", "The pilot of a downed B-25, Capt. James Embry, awakens in the desert, with no memory of how he got there. More worrisome, his crew is nowhere to be found. He begins to wonder if he's hallucinating, especially after he sees one of his men sitting in the cockpit. When he awakens in hospital, he thinks it might have all been a dream, but wonders: did any of this really happen?"], [1783387633, 1783389186, "The Twilight Zone", "The Man in the Bottle", "S2 E2", "A luckless couple stumbles upon fortune when a genie materializes from a bottle in their antique shop. The genie grants them four wishes but warns them, prophetically, to be careful what you wish for."], [1783389186, 1783390738, "The Twilight Zone", "Nervous Man in a Four Dollar Room", "S2 E3", "Ordered to commit a murder he doesn't want to perform, a smalltime hood nervously looks in the mirror and sees the man he could have been--confident, strong...and determined to get out."], [1783390738, 1783392289, "The Twilight Zone", "A Thing About Machines", "S2 E4", "Bartlett Finchley is an odd man, a writer who contributes to food magazines and the like. He lives alone and is always it seems in need of a repairman for one piece of household equipment or another. As time has gone by, he seems to be in a constant battle with machines - his typewriter, his television - which all have the same message for him: get out of the house. He has no intention of doing so"], [1783392289, 1783393843, "The Twilight Zone", "The Howling Man", "S2 E5", "Seeking refuge from a storm, a traveler comes upon a bizarre abbey of monks, who have imprisoned a man who begs for his help. When he confronts the head monk, he is told that the man is the Devil, and he must decide whom to believe."], [1783393843, 1783395399, "The Twilight Zone", "Eye of the Beholder", "S2 E6", "A young woman lying in a hospital bed awaits the outcome of an experimental treatment in an attempt to make her look normal."], [1783395399, 1783396918, "The Twilight Zone", "Nick of Time", "S2 E7", "A superstitious newlywed becomes obsessed by a penny fortune-telling machine when he and his new wife are stranded with car trouble."], [1783396918, 1783398486, "The Twilight Zone", "The Lateness of the Hour", "S2 E8", "Jana Loren is an attractive young woman who lives at home with her parents. She feels suffocated living there however, surrounded by their many servants - that are in fact human-looking robots created by her inventor father. Her parents are quite happy with the life they lead but realize that they're going to have to do something about the rebellious Jana, including revealing at least one secret t"], [1783398486, 1783400040, "The Twilight Zone", "The Trouble with Templeton", "S2 E9", "Booth Templeton is an aging actor who longs for the old days when his wife was alive.  Miraculously, he is given a sobering glimpse of the past he holds so dear."], [1783400040, 1783401594, "The Twilight Zone", "A Most Unusual Camera", "S2 E10", "Married couple Chester and Paula have broken into and robbed a curio shop, hoping to sell the loot for a handsome sum of money. Unfortunately, all of it turns out to be junk or fakes. All, that is, save for a mysterious camera. When they try taking a picture, it turns out to be from five minutes into the future. Soon Paula's brother Woodward joins them and the three decide to use the camera at a h"], [1783401594, 1783403110, "The Twilight Zone", "The Night of the Meek", "S2 E11", "A down-on-his-luck department store Santa Claus discovers a bottomless sack of toys."], [1783403110, 1783404666, "The Twilight Zone", "Dust", "S2 E12", "On a hot day, sympathetic Sheriff Koch and callous con man Peter Sykes are among the many who gather in a desert town to see young Luis Gallegos hanged for accidentally killing a child while drunk. Can some magic dust save Luis?"], [1783404666, 1783406220, "The Twilight Zone", "Back There", "S2 E13", "It's April 14, 1961. Peter Corrigan and friends are discussing time travel at their men's club. Corrigan suddenly becomes dizzy. When his head clears, he has moved back to April 14, 1865 - the date of Lincoln's assassination."], [1783406220, 1783407771, "The Twilight Zone", "The Whole Truth", "S2 E14", "A peculiar Model A automobile compels a used car dealer to tell only the truth."], [1783407771, 1783409325, "The Twilight Zone", "The Invaders", "S2 E15", "An old woman who lives alone in a ramshackle farm house comes face to face with alien invaders. She hears something on her roof and then finds a flying saucer, perhaps six or seven feet across from which emerges two small robots. She fights them as best she can and eventually succeeds in destroying their ship. The nature of the invaders however is not immediately obvious however."], [1783409325, 1783410878, "The Twilight Zone", "A Penny for Your Thoughts", "S2 E16", "The lucky flip of a coin seems to give a mild-mannered bank clerk the power to read minds. But he soon learns that you can't believe everything you read."], [1783410878, 1783412430, "The Twilight Zone", "Twenty Two", "S2 E17", "Miss Powell has a recurring nightmare about room 22 – a morgue."], [1783412430, 1783413982, "The Twilight Zone", "The Odyssey of Flight 33", "S2 E18", "Global Flight 33 is en route from London to New York in what appears to be a routine flight in a modern jetliner. Suddenly however, the jet's speed increases to an incredible 3000 knots and they arrive in New York rather quickly. Neither the captain or his well-trained crew can explain what happened - a strange tail-wind perhaps - but they are certainly not prepared for what they find as they surv"], [1783413982, 1783415525, "The Twilight Zone", "Mr. Dingle, the Strong", "S2 E19", "Luther Dingle is a meek and mild-mannered vacuum cleaner salesman. He spends some time in a bar but always seems to be in the middle of others arguments and always seems to get the worst of it. Courtesy of visiting - but invisible - aliens, he is given great strength, some 300 times greater than that of a normal human being. Dingle becomes something of a local celebrity but just how long will his "], [1783415525, 1783417056, "The Twilight Zone", "Static", "S2 E20", "Ed Lindsay hates television, so he gets his old radio out of the basement of the boardinghouse where he lives. He soon finds he can receive programs from the past when he's alone."], [1783417056, 1783418612, "The Twilight Zone", "The Prime Mover", "S2 E21", "Ace Larsen discovers his business partner has the ability to control objects with his mind. The pair head to Vegas to win big."], [1783418612, 1783420167, "The Twilight Zone", "Long Distance Call", "S2 E22", "A toy telephone given as a birthday gift becomes the link between young Billy Bayles and his newly deceased beloved grandmother, but this link becomes dangerous when she apparently wants him to join her on the other side."], [1783420167, 1783421688, "The Twilight Zone", "A Hundred Yards Over the Rim", "S2 E23", "In 1847 a western settler sets out to find medicine for his dying son - and stumbles into modern-day New Mexico."], [1783421688, 1783423252, "The Twilight Zone", "The Rip Van Winkle Caper", "S2 E24", "Thieves put themselves into suspended animation for 100 years after hiding a million dollars worth of gold bars."], [1783423252, 1783424806, "The Twilight Zone", "The Silence", "S2 E25", "Annoyed by fellow country club member Jamie Tennyson's constant chatter, Colonel Archie Taylor bets half a million dollars that Jamie cannot be completely silent for one year while living in a glass enclosure in the club's basement."], [1783424806, 1783426371, "The Twilight Zone", "Shadow Play", "S2 E26", "Convicted killer Adam Grant is trapped in a recurring nightmare in which he is sentenced to death by electrocution. He tries to convince those around him that they are imaginary and will cease to exist if he is executed."], [1783426371, 1783427924, "The Twilight Zone", "The Mind and the Matter", "S2 E27", "A book on the power of thought enables an irritable worker to re-create the world exactly as he wants it. But what he wants and what he gets are two different things!"], [1783427924, 1783429476, "The Twilight Zone", "Will the Real Martian Please Stand Up?", "S2 E28", "Following a frantic phone call about a crashed spaceship on a winter night, state troopers Bill Padgett and Dan Perry try to determine who among the bus passengers at a snowed-in roadside diner is a visitor from another world."], [1783429476, 1783431043, "The Twilight Zone", "The Obsolete Man", "S2 E29", "In a future state where religion and books have been banned, a librarian is judged obsolete and sentenced to death."], [1783431043, 1783432589, "The Twilight Zone", "Two", "S3 E1", "In a futuristic world a man and a woman, from opposing sides in a devastating war, meet in a deserted city. They don't share a common language and she is quite wary of her opponent, though he doesn't appear aggressive in any way. When she attempts to kill him, he goes off on his own. It's obvious that society and civilization has been destroyed and she begins to reconsider."], [1783432589, 1783434130, "The Twilight Zone", "The Arrival", "S3 E2", "A plane lands safely, but all its passengers, pilot and crew are missing."], [1783434130, 1783435674, "The Twilight Zone", "The Shelter", "S3 E3", "A dinner party for Bill Stockton's birthday is interrupted by a bulletin warning of an impending nuclear attack. As the neighbors scramble to prepare, they turn against the Stockton's, the only family that installed a bomb shelter."], [1783435674, 1783437216, "The Twilight Zone", "The Passersby", "S3 E4", "On the road home from the Civil War, a Confederate soldier stops at a burned-out house and gets to know the owner, a recent widow."], [1783437216, 1783438756, "The Twilight Zone", "A Game of Pool", "S3 E5", "Frustrated pool champion Jesse Cardiff has beaten everyone except for the deceased James Howard \"Fats\" Brown. Jesse can only curse his name. But guess who just walked into the pool room on Randolph Street?"], [1783438756, 1783440298, "The Twilight Zone", "The Mirror", "S3 E6", "After a poor but ambitious Central American farm worker overthrows his country's tyrannical leader, he believes he sees assassins everywhere. A look in the mirror reveals his most dangerous enemy."], [1783440298, 1783441839, "The Twilight Zone", "The Grave", "S3 E7", "Conny Miller rides into the hometown of Pinto Sykes, the man he's been tracking. He finds that Sykes has been gunned down by townsmen but no one knows who fired the fatal bullet. He is challenged by three of the townsmen to a grisly wager."], [1783441839, 1783443378, "The Twilight Zone", "It's a Good Life", "S3 E8", "On an isolated family farm in Peakesville, Ohio, young Anthony Fremont, who has vast mental powers but lacks emotional development, holds his terrified family and neighbors in thrall to his every juvenile wish."]]}, {"id": "3", "name": "MachoVision", "a": "machovision", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/machovision-v4.png", "progs": [[1783349109, 1783349864, "Macho Man the Randy Savage Story", "vs Harley Race (Philadelphia, Sept 18 1987)", "S1 E4", "MachoVision"], [1783349864, 1783350510, "Macho Man the Randy Savage Story", "Savage & Strike Force vs Honky Tonk Man & Hart Foundation — 6-Man Steel Cage (Boston Garden, Mar 5 1988)", "S1 E5", "MachoVision"], [1783350510, 178335
