3674937, "Beverly Hills, 90210", "Perfect Mom", "S1 E7", "Brenda is mesmerized by Kelly's hip and glamorous mother Jackie, a former model. Kelly insists that her mother is not all that she appears to be. Jackie is a recovering addict, and begins hitting the bottle again after her boyfriend dumps her. Cindy is hurt when Brenda initially fails to ask her to be in a mother-daughter fashion show. They eventually agree to appear, and are joined by Andrea, who"], [1783674937, 1783677837, "Beverly Hills, 90210", "The 17-Year Itch", "S1 E8", "The Walshes celebrate their seventeenth anniversary, but Cindy feels dissatisfied because Jim is neglecting her for his work. She has a chance meeting with old flame Glen, a talented artist. The two spend a lot of time together, and share a kiss after Glen's opening. Brandon and Brenda take part in a college study on twins, but are distracted by their parents' marital problems. David becomes the n"], [1783677837, 1783679285, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783679285, 1783680733, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783680733, 1783682041, "The Wonder Years", "Episode 7", "S1 E7", "Taba TV"], [1783682041, 1783683600, "The Wonder Years", "Episode 8", "S1 E8", "Taba TV"], [1783683600, 1783685113, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783685113, 1783687900, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783687900, 1783690797, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783690797, 1783693695, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783693695, 1783695141, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783695141, 1783696590, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783696590, 1783698439, "The Wonder Years", "Episode 9", "S1 E9", "Taba TV"], [1783698439, 1783699817, "The Wonder Years", "Episode 10", "S1 E10", "Taba TV"], [1783699817, 1783701334, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783701334, 1783702842, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783702842, 1783705741, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783705741, 1783708609, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783708609, 1783710057, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783710057, 1783711506, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783711506, 1783713020, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783713020, 1783714529, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783714529, 1783716047, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783716047, 1783717565, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783717565, 1783720450, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783720450, 1783723349, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783723349, 1783724785, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783724785, 1783726220, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783726220, 1783727528, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783727528, 1783729087, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783729087, 1783730575, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783730575, 1783732084, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783732084, 1783734982, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783734982, 1783737878, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783737878, 1783739329, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783739329, 1783740747, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783740747, 1783742125, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783742125, 1783743576, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783743576, 1783745074, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783745074, 1783746587, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783746587, 1783749487, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783749487, 1783752384, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783752384, 1783753802, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783753802, 1783755221, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783755221, 1783756705, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783756705, 1783758190, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783758190, 1783759702, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783759702, 1783761220, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783761220, 1783764118, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783764118, 1783766815, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783671199, 1783674161, "Quantum Leap", "Disco Inferno", "S2 E2", "April 1, 1976: As a stuntman, Sam is to save the life of his younger brother, while trying to convince the pair's obsessive father to let the younger son go his own way, even if it means going into country-western music, rather than following the family tradition of stunt work."], [1783674161, 1783675797, "The Twilight Zone", "And When the Sky Was Opened", "S1 E11", "Recovering in the hospital after a space mission, Major William Gart is visited by his co-pilot Lieutenant Colonel Clegg Forbes, who insists on the existence of a third astronaut."], [1783675797, 1783677434, "The Twilight Zone", "What You Need", "S1 E12", "A two-bit thug thinks he's found the key to a better life in an old sidewalk salesman who has the uncanny ability to tell people what they need the most."], [1783677434, 1783680329, "Quantum Leap", "The Americanization of Machiko", "S2 E3", "August 4, 1953: As a sailor returning from Japan, Sam brings a foreign wife to a small town. He then has to fight against the prejudice of both a scheming ex-girlfriend, as well as his mother, in order to gain acceptance of his new bride."], [1783680329, 1783683304, "Quantum Leap", "What Price Gloria?", "S2 E4", "October 16, 1961: Sam is shocked when he learns he's leaped into a woman, Samantha Stormer. As a gorgeous secretary for an automobile company, Sam has to cope with sexual harassment by the boss, a suicide attempt by a roommate, and the effect his looks have on Al's lecherous tendencies."], [1783683304, 1783684942, "The Twilight Zone", "The Four of Us are Dying", "S1 E13", "In this noirish tale, a man with the ability to change his face to resemble others gets into hot water with gangsters."], [1783684942, 1783686580, "The Twilight Zone", "Third from the Sun", "S1 E14", "With all-out nuclear war about to ignite, a scientist and his pilot friend plot to escape on an experimental spaceship."], [1783686580, 1783689489, "Quantum Leap", "Blind Faith", "S2 E5", "February 6, 1964: Although the concert pianist he leaps into is blind, a fact, which bothers his girlfriend's disapproving mother, Sam can still see. At least until an exploding flashbulb blinds him at the crucial moment: when he must rescue his girlfriend from a serial killer."], [1783689489, 1783692459, "Quantum Leap", "Good Morning, Peoria", "S2 E6", "September 9, 1959: Rock 'n' roll is about to become big, but not in Peoria. That is, unless Sam, as DJ Howlin' Chick Howell, can manage to keep the radio station where he's employed from being shut down by overly conservative town elders."], [1783692459, 1783694095, "The Twilight Zone", "I Shot an Arrow into the Air", "S1 E15", "Three astronauts crash-land on an unknown planet and must confront survival challenges, unraveling their unity in the face of desperation."], [1783694095, 1783695735, "The Twilight Zone", "The Hitch-Hiker", "S1 E16", "A young woman driving across the country from East to West becomes frantic when she keeps passing the same man on the side of the road. No matter how fast she drives, the man is always up ahead trying to hitch a ride."], [1783695735, 1783698677, "Quantum Leap", "Thou Shalt Not...", "S2 E7", "February 2, 1974: Sam's task as a rabbi is to keep his sister-in-law from falling for a sleazy author and ruining her life. In the process he also helps the family recover from the year-old death of their son."], [1783698677, 1783701631, "Quantum Leap", "Jimmy", "S2 E8", "October 14, 1964: Since mainstreaming the mentally disabled is not yet a popular concept, Sam must help Jimmy LaMotta, the \"slow\" young man he's leaped into, get a job and gain his co-workers' acceptance, to prevent his brother from returning Jimmy to the institution."], [1783701631, 1783703268, "The Twilight Zone", "The Fever", "S1 E17", "Tight fisted Franklin Gibbs is not pleased when his wife wins a trip for two to Las Vegas.  But things change when he falls under the spell of a slot machine that calls his name."], [1783703268, 1783704906, "The Twilight Zone", "The Last Flight", "S1 E18", "A World War I flying ace flies through a mysterious cloud - and lands at a modern U.S. air base in the year 1959!"], [1783704906, 1783707856, "Quantum Leap", "So Help Me God", "S2 E9", "July 29, 1957: Though he can't remember much more than habeas corpus, Sam finds himself the defense attorney for a young black woman accused of murdering the son of the most powerful man in a small Louisiana town."], [1783707856, 1783710820, "Quantum Leap", "Catch A Falling Star", "S2 E10", "May 21, 1979: Sam leaps into Ray Hutton, the understudy for the role of Cervantes just seconds before curtain time. His mission: prevent the drunken star from falling and seriously injuring himself during a benefit performance of \"Man of La Mancha.\" Sam isn't helped by the presence of his former piano teacher, on whom he once had a crush, and who now appears to have caught the star's eye as well."], [1783710820, 1783712456, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783712456, 1783714090, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783714090, 1783716984, "Quantum Leap", "A Portrait for Troian", "S2 E11", "February 7, 1971: Sam leaps into a renowned parapsychologist where he must prevent a young widow from joining her husband at the bottom of a lake, while proving that she's not crazy, despite her claims of hearing her dead husband calling to her."], [1783716984, 1783719881, "Quantum Leap", "Animal Frat", "S2 E12", "October 19, 1967: Trapped in the body of Knut Wileton, better known as \"Wild Thing,\" the typical frat jock, Sam must win the confidence of an attractive campus radical before she bombs the college's chemistry building as a protest against the war in Vietnam."], [1783719881, 1783721517, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783721517, 1783723157, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783723157, 1783726107, "Quantum Leap", "Another Mother", "S2 E13", "September 30, 1981: As a divorced mother of three, Sam's job of preventing his teenage son from running away, never to be seen again, is made more interesting by the fact that his youngest daughter can see both him and Al."], [1783726107, 1783729076, "Quantum Leap", "All-Americans", "S2 E14", "November 6, 1962: Keeping his best friend from throwing the high school championship football game, costing both of them their scholarship offers, Sam must also get their families to consolidate."], [1783729076, 1783730714, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783730714, 1783732349, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783732349, 1783735309, "Quantum Leap", "Her Charm", "S2 E15", "September 26, 1973: Protecting a female member of the witness protection program from a mafia hitman proves difficult for Sam, since the FBI appears to have an informant confounding his attempts to hide her."], [1783735309, 1783738214, "Quantum Leap", "Freedom", "S2 E16", "November 22, 1970: Rather than saving his grandfather's life, Sam has to escape from jail and elude the police long enough to get them both to the reservation, where the old man can die in peace, at home."], [1783738214, 1783739851, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783739851, 1783741487, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783741487, 1783744457, "Quantum Leap", "Good Night, Dear Heart", "S2 E17", "November 9, 1957: Rather than saving the damsel of the episode, who supposedly committed suicide, Sam is the coroner trying to prove that she was murdered, and find out by whom."], [1783744457, 1783747418, "Quantum Leap", "Pool Hall Blues", "S2 E18", "September 4, 1954: In order to help his granddaughter save a small bar from the slimy loan shark holding a note on the place, Sam has to play pool like a pro...with a little help from Al and Ziggy."], [1783747418, 1783749057, "The Twilight Zone", "The Big Tall Wish", "S1 E27", "An aging boxer finds himself the winner of a match he thought he had lost, the result a six-year-old's frantic wish. But can a world-weary, embittered man still believe in miracles, or will he turn his back on them?"], [1783749057, 1783750693, "The Twilight Zone", "A Nice Place to Visit", "S1 E28", "After being shot to death, the criminal Rocky Valentine encounters the amiable white-haired Mr. Pip in the afterlife, who gives him everything he wishes for."], [1783750693, 1783753666, "Quantum Leap", "Leaping in Without a Net", "S2 E19", "November 18, 1958: Sam remembers he's afraid of heights when he leaps into a trapeze artist, whose sister wants him to catch her as she does a triple without a net. Dad is less than pleased, since his wife died a few years earlier while attempting the same stunt."], [1783753666, 1783756629, "Quantum Leap", "Maybe Baby", "S2 E20", "Sam leaps into the body of Buster who is in the process of kidnapping a baby along with a stripper whose stage name is Bunny O'Hare and whose story is constantly changing. Initially, he thinks they might be the parents but Bunny tells him she is trying to get the baby, Christie, back to its real mother. Turns out she had good reason to take the baby away from her father"], [1783756629, 1783758264, "The Twilight Zone", "Nightmare as a Child", "S1 E29", "Schoolteacher Helen Foley finds a strange and very serious little girl on the stairs outside her apartment, who tries to jog Helen's memory about a man she saw earlier that day."], [1783758264, 1783759902, "The Twilight Zone", "A Stop at Willoughby", "S1 E30", "Tired of his miserable job and wife, a businessman starts dreaming on the train each night, about an old, idyllic town called Willoughby. Soon he has to know whether the town is real and fancies the thought of seeking refuge there."], [1783759902, 1783762835, "Quantum Leap", "Sea Bride", "S2 E21", "June 3, 1954: Aboard an ocean liner, Sam must stop the marriage of a young man's ex-wife to a mobster. In the process, he finds himself in one heck of a mess in the ship's garbage compartment."], [1783762835, 1783765807, "Quantum Leap", "M.I.A.", "S2 E22", "April 1, 1969: When Sam leaps into the life of an undercover cop, Al explains that his mission is to convince a navy nurse that her MIA husband is still alive, and to prevent her from marrying a lawyer she meets on the day Sam leaps in. But a series of coincidences causes Sam to wonder about the true nature of his mission."], [1783765807, 1783767359, "The Twilight Zone", "The Chaser", "S1 E31", "A man, desperate to win the affection of a beautiful woman, seeks the help of an old professor, who provides him with a love potion."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783671104, 1783672604, "Teenage Mutant Ninja Turtles", "Episode 7", "S1 E7", "Saturday Morning"], [1783672604, 1783674096, "Teenage Mutant Ninja Turtles", "Episode 8", "S1 E8", "Saturday Morning"], [1783674096, 1783675476, "He-Man and the Masters of the Universe", "Creatures from the Tar Swamp", "S1 E7", "Prince Adam's spoiled cousin, Lady Edwina, comes for a visit and Orko immediately falls for her. To buy love, Orko decides to find a gold medallion that he lost in the Tar Swamp. But Skeletor is beginning to wake the monsters of the swamp."], [1783675476, 1783676853, "He-Man and the Masters of the Universe", "Song of Celice", "S1 E8", "Adam, Teela, Orko, Cringer and Lizard Man are on a visit to Pangus, the King of the city of Tarinth, when the city comes under a fierce trembling. Adam is about to come to the rescue as He-Man when a young woman called Celice appears and soothes the tremors with her singing. Pangus explains that a terrible creature lives beneath the city, and only Celice's soothing singing can calm it.\nSkeletor ov"], [1783676853, 1783678072, "Power Rangers", "I, Eye Guy", "S1 E7", "The ranger's young friend, Willie, has created his best invention yet and enters it into a science fair. Bulk and Skull happen upon the science fair and cause Willie to be disqualified. Disheartened, Willie flees to reflect on things when he's kidnapped by Eye Guy so that the monster can steal his vast intelligence."], [1783678072, 1783679311, "Power Rangers", "For Whom the Bell Trolls", "S1 E8", "Trini's favorite doll is brought to life by Rita Repulsa and commanded to capture the Rangers inside bottles."], [1783679311, 1783680759, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783680759, 1783682207, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783682207, 1783683752, "Pee-wee's Playhouse", "Restaurant", "S1 E7", "Pee-wee is the maitre d', waiter and cashier while playing restaurant. Customer Captain Carl orders everything on the menu only to learn that all they have are peanut-butter-and-jelly sandwiches! Also, Dixie is having a particularly bad \"day.\""], [1783683752, 1783685299, "Pee-wee's Playhouse", "Ants In Your Pants", "S1 E8", "The ants are loose, the ants are loose! While Pee Wee is playing house with Miss Yvonne and the Playhouse Gang, the ants sneak out of their farm, go marching into the Dinosaur Family's home, steal a cake and get all over everybody and everything. \"\"What\"\" will Pee Wee do? The 'Ants In Your Pants Dance!"], [1783685299, 1783686799, "Teenage Mutant Ninja Turtles", "Episode 9", "S1 E9", "Saturday Morning"], [1783686799, 1783688217, "Teenage Mutant Ninja Turtles", "Return of the Shredder", "S2 E1", "Just when the Turtles believe themselves rid of Shredder, tin-grin is able to persuade Krang to return him to Earth."], [1783688217, 1783689594, "He-Man and the Masters of the Universe", "She-Demon of Phantos", "S1 E9", "Queen Elmora of the planet Phantos, has fallen under the power of Skeletor. He-Man, along with his friends, must rescue her. Unfortunately, Queen Elmora has access to photanium, the strongest metal in the universe."], [1783689594, 1783690972, "He-Man and the Masters of the Universe", "Reign of the Monster", "S1 E10", "Skeletor and his latest allies, the tribal-like Torgs, are trying to awaken Mulkram, a giant, diabolical monster who was frozen by the Elders centuries ago to stop his reign of terror. He-Man, Teela, Man-At-Arms, Orko and Ram Man are in the city of Avion for the annual ceremony where Stratos presents the magical Staff of Avion to his people, but just as the ceremony is about to begin, the Torgs at"], [1783690972, 1783692271, "Power Rangers", "Happy Birthday, Zack", "S1 E9", "Zack worries that his friends have forgotten today is his birthday while Rita sends him an unwelcome present."], [1783692271, 1783693570, "Power Rangers", "No Clowning Around", "S1 E10", "The gang fights Rita's minions at a carnival in order to save Trini's cousin Sylvia."], [1783693570, 1783695017, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783695017, 1783696466, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783696466, 1783698011, "Pee-wee's Playhouse", "Monster In the Playhouse", "S1 E9", "\"Look\" out because Mrs. Steve reports that there is a giant, one-eyed monster in town! He appears in the Playhouse, on the loose, and scares everyone! After Pee-wee makes the monster a snack, and Jambi grants Pee-wee's wish to understand the monster, the whole gang has a new friend! They even play a game of golf."], [1783698011, 1783699558, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783699558, 1783700979, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783700979, 1783702400, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783702400, 1783703776, "He-Man and the Masters of the Universe", "Like Father, Like Daughter", "S1 E11", "The Sorceress warns He-Man that Skeletor is amassing an unstoppable army. It's up to He-Man and company to discover this army, and put a stop to it. But with Trapjaw and Beastman doing Skeletor's dirty work, it won't be easy!"], [1783703776, 1783705150, "He-Man and the Masters of the Universe", "Disappearing Act", "S1 E12", "After He-Man puts an end to their latest plot, Skeletor and Beast Man plan to get rid of him once and for all; with use of invisible helmets they sneak into the Royal Palace and kidnap Prince Adam, to use as bait to lure He-Man out into a trap. Unfortunately, one of Orko's magic spells has gone wrong, teleporting the Sword Of Power away into Eternia's distant past, leaving Adam unable to transform"], [1783705150, 1783706450, "Power Rangers", "Power Ranger Punks", "S1 E11", "Baboo sneaks a magic potion into Kimberly and Billy's drinks that turns them into angry punks."], [1783706450, 1783707749, "Power Rangers", "Peace, Love and Woe", "S1 E12", "Billy draws on the powers of his friends to rescue the girl of his dreams."], [1783707749, 1783709197, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783709197, 1783710646, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783710646, 1783712193, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783712193, 1783713740, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783713740, 1783715158, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783715158, 1783716574, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783716574, 1783717950, "He-Man and the Masters of the Universe", "Evil-Lyn's Plot", "S1 E13", "Skeletor wants to steal the Widgets' Coridite- a powerful mineral substance, out of which He-Man's harness is made.  Evil-Lyn devises a cunning scheme to help him; she disguises herself as a young girl lost in the forest, and persuades the Widgets to let her enter their fortress.  She then tricks the Widget guard Squinch into letting her enter the private chamber where the Coridite is kept, then s"], [1783717950, 1783719326, "He-Man and the Masters of the Universe", "Dawn of Dragoon", "S1 E14", "Orko's magic pyramid inadvertently saves Dree Elle, a female Trollan (Orko's species), who was hiding from Dragoon, an evil fire-breathing half man, half dragon who is terrorising Orko's home word of Trolla. On hearing the threat to his world, where he is a great magician, Orko promptly returns with Dree Elle in the pyramid. Knowing that their friend will need some help, He-Man and Battle Cat get "], [1783719326, 1783720615, "Power Rangers", "Foul Play in the Sky", "S1 E13", "Kimberly is in trouble when her uncle Steve succumbs to a sleeping potion in the middle of flying an airplane with her on board."], [1783720615, 1783721914, "Power Rangers", "Dark Warrior", "S1 E14", "Billy is inspired by Trini's uncle Howard - a brilliant scientist and expert in martial arts."], [1783721914, 1783723350, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783723350, 1783724786, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783724786, 1783726332, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783726332, 1783727877, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "Saturday Morning"], [1783727877, 1783729297, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783729297, 1783730718, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783730718, 1783732096, "He-Man and the Masters of the Universe", "Prince Adam No More", "S1 E15", "Angered by his continual defeats, Skeletor blames Beast Man, banishing him from Snake Mountain and his evil forces. Meanwhile, King Randor is preparing for a Royal tour of Eternia, accompanied by Man-At-Arms and a guard of his choice. The King chooses He-Man, but Adam, upset that he always has to play down his qualities to hide his alter-ego, convinces the King to choose him instead. Beast Man spo"], [1783732096, 1783733472, "He-Man and the Masters of the Universe", "A Friend in Need", "S1 E16", "An inventor called Zicran visits the Royal Palace to deliver a Transmutator machine to Man-At-Arms, accompanied by his daughter Ileena, a friend of Teela's.  Ileena is vulnerable and lacking in self-confidence, feeling inferior compared to Teela's agility.\n\nMeanwhile, an evil sorcerer called Jarvan, who was previously defeated by He-Man and Man-At-Arms, has escaped from the prison mines and has se"], [1783733472, 1783734712, "Power Rangers", "Big Sisters", "S1 E15", "Kim & Trini get the task of being \"big sisters\" to a mischievous little girl named Maria. Rita kidnaps the bratty child, with intent of using her to open a magic trunk filled with Power Eggs. The Rangers end up facing the Chunky Chicken monster to save the annoying girl. All of this, plus, Billy unveils his specially modified VW Beetle, known as the RADBUG."], [1783734712, 1783736011, "Power Rangers", "Switching Places", "S1 E16", "Billy shows Kimberly a new machine he made that is supposed to transport people from one spot to another. Curious to see how well it works, they both get inside and end up switching bodies instead! Bulk and Skull show up and get inside later that day, unbeknown st to Billy or Kimberly and they switch bodies too and accidentally break the machine! Now Billy(in Kimberly's body) must fix the machine "], [1783736011, 1783737462, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783737462, 1783738880, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783738880, 1783740427, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "Saturday Morning"], [1783740427, 1783741972, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "Saturday Morning"], [1783741972, 1783743390, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783743390, 1783744808, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783744808, 1783746185, "He-Man and the Masters of the Universe", "Daimar the Demon", "S1 E17", "While bored, Orko casts a spell to bring a small, cute creature called Daimar, from a book about the dimension of darkness, to Eternia.  But Daimar doesn't stay cute for long- he soon turns into a giant demon and is threatening to overcome Grayskull with his power, which Skeletor is also determined to acquire for himself!"], [1783746185, 1783747563, "He-Man and the Masters of the Universe", "The Dragon's Gift", "S1 E18", "An ambassador from another kingdom visits the Royal Palace to present King Randor with a gift.  But Man-At-Arms recognises the man as Skeletor in disguise, and in an attempt to stop him, is turned into a crystal statue.  He-Man and Teela must journey to the Isles of Darksmoke, where the great and ancient dragon Granamyr knows the only spell to reverse the effect on Man-At-Arms.\n\nBut their task pro"], [1783747563, 1783748853, "Power Rangers", "Green with Evil Part 1: Out of Control", "S1 E17", "Rita creates her own evil Green Ranger to beat the Power Rangers at their own game."], [1783748853, 1783750156, "Power Rangers", "Green with Evil Part 2: Jason's Battle", "S1 E18", "The Power Rangers work to restore Zordon and Alpha unaware that the new kid in school is actually Rita's evil Green Ranger."], [1783750156, 1783751574, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783751574, 1783752993, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783752993, 1783754539, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "Saturday Morning"], [1783754539, 1783756087, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "Saturday Morning"], [1783756087, 1783757508, "Teenage Mutant Ninja Turtles", "New York's Shiniest", "S2 E10", "Shredder learns that the police have created a robotic cop and plans to steal then clone it. April gets a tip about the new experimental cop Rex-1 and breaks into the lab with her news camera for an exclusive story."], [1783757508, 1783758926, "Teenage Mutant Ninja Turtles", "Teenagers from Dimension X", "S2 E11", "The Neutrinos return to Earth after hearing of Krang and Shredder's plan to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimensional portals and tries to get his hands on it. Meanwhile, the turtles try to get the Starmobile's main energy source running again."], [1783758926, 1783760304, "He-Man and the Masters of the Universe", "The Shaping Staff", "S1 E19", "While entertaining the Royal Family with his magic, Orko finds his act interrupted by a strange sorceress called Majestra.  Majestra performs a trick in which she appears to make the King vanish then reappear- but in fact, Majestra is really Evil-Lyn in disguise, and has teleported the King to the dungeon and replaced him with a disguised Beast Man!\n\nEvil-Lyn has found a magical Shaping Staff whic"], [1783760304, 1783761681, "He-Man and the Masters of the Universe", "The Cosmic Comet", "S1 E20", "Skeletor has gained control of the Cosmic Comet above Eternia, and intends to use it to blow open the jaw bridge of Grayskull.  He-Man, Teela, Man-At-Arms, The Sorceress and Orko set out to stop Skeletor's scheme, with the help of Zagraz, a wizard with power over comets."], [1783761681, 1783762912, "Power Rangers", "Green with Evil Part 3: The Rescue", "S1 E19", "Femme fatale Scorpina joins Rita as the Green Ranger continues to battle the Power Rangers."], [1783762912, 1783764212, "Power Rangers", "Green with Evil Part 4: Eclipsing Megazord", "S1 E20", "An eclipse of the sun saps the Megazord's power as Rita's forces launch a full scale assault on Angel Grove."], [1783764212, 1783765525, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"], [1783765525, 1783766864, "Jem and the Holograms", "Island of Deception", "S2 E15", "Jem and The Holograms are invited to perform at a concert in St. Thomas and travel aboard a luxury ocean liner to get there. Eric and the Misfits, who are convinced there's a publicity stunt going on, tag along to cash in on it. Later that evening, after giving a performance for the passengers and crew of the ship, Jem and the Holograms are tricked by the Misfits into hiding aboard a lifeboat unde"]]}, {"id": "7", "name": "Weather on the 7s", "a": "weather-on-the-7s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/weather-on-the-7s-v2.png", "progs": [[1783672243, 1783693843, "Weather on the 7s", "", "", "Weather on the 7s"], [1783693843, 1783715443, "Weather on the 7s", "", "", "Weather on the 7s"], [1783715443, 1783737043, "Weather on the 7s", "", "", "Weather on the 7s"], [1783737043, 1783758643, "Weather on the 7s", "", "", "Weather on the 7s"], [1783758643, 1783765923, "Weather on the 7s", "", "", "Weather on the 7s"]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783669784, 1783672476, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783672476, 1783675149, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783675149, 1783676535, "Raising Hope", "The Sniffles", "S1 E7", "When Hope catches a cold, Jimmy panics because the family does not have health insurance. Jimmy figures out a way to get a second job at Sabrina's grocery store so he can afford to take Hope to the pediatrician."], [1783676535, 1783677911, "Raising Hope", "Blue Dots", "S1 E8", "Jimmy decides to put Hope in an expensive daycare center, but meets an obstacle in the form of an old record from Burt's past, so the family decides to take matters in their own hands and deal with the law."], [1783677911, 1783679292, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783679292, 1783680665, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783680665, 1783682053, "Schitt's Creek", "Turkey Shoot", "S1 E7", "Following an incident where David is unable to kill an insect in his room, Stevie, as a joke, invites David along on Roland's annual turkey shoot."], [1783682053, 1783683442, "Schitt's Creek", "Allez Vous", "S1 E8", "Moira and David try to earn money by selling cosmetics to the locals, while Johnny heads to Elmdale in hopes of collecting unemployment insurance."], [1783683442, 1783686168, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783686168, 1783688840, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783688840, 1783690264, "Raising Hope", "Meet the Grandparents", "S1 E9", "Instead of sleeping in and ordering pizza, per his normal Thanksgiving custom, Jimmy invites Hope's other grandparents, Dale and Margine, to join the Chances for a more traditional holiday dinner. The Chances soon realize that the apple doesn't fall far from the tree when Dale and Margine kidnap Hope, and it's up to them to get her back."], [1783690264, 1783691650, "Raising Hope", "Burt Rocks", "S1 E10", "A washed-up rock star who is hired as the lead act at 'Grocery-Palooza', a rock concert at the supermarket where Sabrina works. Smokey was once Burt's musical idol, and Burt hopes to relive his rock-star years by playing backup for him at the concert."], [1783691650, 1783693032, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783693032, 1783694411, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783694411, 1783695799, "Schitt's Creek", "Carl's Funeral", "S1 E9", "Johnny reluctantly agrees to speak at the funeral of a local man he doesn’t really know. Alexis struggles with her new boyfriend’s love of animals."], [1783695799, 1783697188, "Schitt's Creek", "Honeymoon", "S1 E10", "Johnny and Moira attend Roland’s annual Hawaiian bash. Alexis and Ted throw a couple’s dinner party, while David and Stevie’s relationship heats up."], [1783697188, 1783699904, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783699904, 1783702542, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783702542, 1783703928, "Raising Hope", "Toy Story", "S1 E11", "Jimmy finds out about his father's annual Christmas scheme where he sells the most wanted toy for a lot of money, which always left Jimmy disappointed when he was a child. Virginia wants the family to be a part of the living nativity scene at their church to gain the respect of the members."], [1783703928, 1783705317, "Raising Hope", "Romeo and Romeo", "S1 E12", "Jimmy hasn't had any time to socialize or make friends since Hope was born, so when he meets another single dad at the grocery store, he immediately sets up a play date. But when Jimmy finds out that Virginia is his new friend's housekeeper, Virginia insists that Jimmy cancel the outing. In an effort to keep the peace, Jimmy and his friend arrange a dinner at the Chance house."], [1783705317, 1783706694, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783706694, 1783708071, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783708071, 1783709460, "Schitt's Creek", "Little Sister", "S1 E11", "Moira's estranged sister, Deedee, pays an unexpected visit, while David agrees to talk with one of Jocelyn's students about being \"different\"."], [1783709460, 1783710847, "Schitt's Creek", "Surprise Party", "S1 E12", "Johnny tries to arrange a surprise birthday party for Moira. Things backfire when Moira, unwittingly, takes over the planning of her own party."], [1783710847, 1783713570, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783713570, 1783716408, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783716408, 1783717794, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783717794, 1783719181, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783719181, 1783720561, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783720561, 1783721942, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783721942, 1783723331, "Schitt's Creek", "Town for Sale", "S1 E13", "Johnny finds a potential buyer for the town, while David and Alexis discover they may have become more attached to Schitt’s Creek than they ever thought possible."], [1783723331, 1783724724, "Schitt's Creek", "Finding David", "S2 E1", "The Roses search for their missing son, David, while Alexis takes her relationship with Mutt to the next level despite technically being engaged to Ted."], [1783724724, 1783727512, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783727512, 1783730285, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783730285, 1783731672, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783731672, 1783733058, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783733058, 1783734439, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783734439, 1783735816, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783735816, 1783737209, "Schitt's Creek", "Family Dinner", "S2 E2", "Moira decides to cook dinner with the help of David. Johnny scopes out an office for his consulting business. And Alexis finally comes clean with Ted about their engagement."], [1783737209, 1783738602, "Schitt's Creek", "Jazzagals", "S2 E3", "Moira attempts to join the town’s a cappella group. Alexis enjoys the heady first days of her latest relationship. And Johnny helps out at Bob’s Garage despite himself."], [1783738602, 1783741324, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783741324, 1783744400, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783744400, 1783745788, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783745788, 1783747175, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."], [1783747175, 1783748552, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783748552, 1783749930, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783749930, 1783751323, "Schitt's Creek", "Estate Sale", "S2 E4", "Johnny and Moira go to an estate sale. Mutt surprises Alexis with a bike, while Roland asks David to help him shop for a special item."], [1783751323, 1783752716, "Schitt's Creek", "Bob's Bagels", "S2 E5", "Johnny talks himself into an unlikely business partnership with Bob. David gets an interview at a woman's clothing store, while Moira reluctantly cares for an ailing Alexis."], [1783752716, 1783755439, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783755439, 1783758162, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783758162, 1783759547, "Raising Hope", "Sleep Training", "S1 E19", "When Burt is introduced to a book on sleep-training, he and Virginia decide to try it on baby Hope. Meanwhile, Jimmy's wild new girlfriend introduces him to a special beverage that takes him on a scary trip."], [1783759547, 1783760928, "Raising Hope", "Everybody Flirts... Sometimes", "S1 E20", "When Burt's flirtatious ways are exposed, the entire family begins to experiment with flirting. Jimmy and Sabrina compete to be Barney's favorite employee, Maw Maw gives away her treasures and Virginia is stalked by a coffee shop employee."], [1783760928, 1783762307, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783762307, 1783763687, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783763687, 1783765080, "Schitt's Creek", "Moira vs. Town Council", "S2 E6", "Moira tries to beautify the town. David misuses the company credit card. A grooming misstep forces Alexis and Mutt to question their relationship."], [1783765080, 1783766390, "Schitt's Creek", "The Candidate", "S2 E7", "Johnny considers running for town council. David and Stevie look for love. Alexis copes with being single."]]}, {"id": "25", "name": "Yule Log TV", "a": "yule-log-tv", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/yule-log-tv.png", "progs": [[1783672200, 1783693800, "Yule Log TV", "", "", "Yule Log TV"], [1783693800, 1783715400, "Yule Log TV", "", "", "Yule Log TV"], [1783715400, 1783737000, "Yule Log TV", "", "", "Yule Log TV"], [1783737000, 1783758600, "Yule Log TV", "", "", "Yule Log TV"], [1783758600, 1783765874, "Yule Log TV", "", "", "Yule Log TV"]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783672034, 1783674756, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783674756, 1783677832, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783677832, 1783680555, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783680555, 1783683278, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783683278, 1783686001, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783686001, 1783688189, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783688189, 1783691159, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783691159, 1783693901, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783693901, 1783696578, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783696578, 1783699255, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783699255, 1783701952, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783701952, 1783704641, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783704641, 1783707334, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783707334, 1783710006, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783710006, 1783712732, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783712732, 1783715404, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783715404, 1783718120, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783718120, 1783720757, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783720757, 1783723480, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783723480, 1783726319, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783726319, 1783729106, "Glee", "The Power of Madonna", "S1 E
