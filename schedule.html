783396341, "Saved by the Bell", "Cream for a Day", "S1 E8", "Kelly is nominated for Homecoming Queen, but she's devastated when she gets a pimple on her nose. Zack then sells Kelly a substance Screech accidentally concocts which cleans zits up in minutes. But the one side effect is that it turns people's faces maroon."], [1783396341, 1783397688, "That '70s Show", "Thanksgiving", "S1 E9", "Laurie comes home for Thanksgiving with her friend Kate.  Eric is annoyed that he'll have to give up his room for their guest, until he sees how hot Kate is.  Jackie alerts Donna to the trouble she could be facing now that a college girl is sleeping in Eric's bed.  Kitty tries vainly to avoid her mother-in-law's phone calls as she prepares for Thanksgiving dinner."], [1783397688, 1783399036, "That '70s Show", "Sunday, Bloody Sunday", "S1 E10", "Red's mother spends a Sunday with them and drives everyone crazy, except Fez. She seems to have a certain fondness for him."], [1783399036, 1783400470, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783400470, 1783401895, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783401895, 1783403194, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783403194, 1783404490, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783404490, 1783406256, "The Wonder Years", "Episode 9", "S1 E9", "Savage at Nite"], [1783406256, 1783407551, "The Wonder Years", "Episode 10", "S1 E10", "Savage at Nite"], [1783407551, 1783408892, "Raising Hope", "Meet the Grandparents", "S1 E9", "Instead of sleeping in and ordering pizza, per his normal Thanksgiving custom, Jimmy invites Hope's other grandparents, Dale and Margine, to join the Chances for a more traditional holiday dinner. The Chances soon realize that the apple doesn't fall far from the tree when Dale and Margine kidnap Hope, and it's up to them to get her back."], [1783408892, 1783410195, "Raising Hope", "Burt Rocks", "S1 E10", "A washed-up rock star who is hired as the lead act at 'Grocery-Palooza', a rock concert at the supermarket where Sabrina works. Smokey was once Burt's musical idol, and Burt hopes to relive his rock-star years by playing backup for him at the concert."], [1783410195, 1783411577, "Saved by the Bell", "Pinned to the Mat", "S1 E9", "During Career Week at school, Slater worries that continuing to focus on wrestling will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783411577, 1783412950, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783412950, 1783414296, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783414296, 1783415642, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783415642, 1783417076, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783417076, 1783418511, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783418511, 1783419805, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783419805, 1783421100, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783421100, 1783422531, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783422531, 1783423957, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783423957, 1783425261, "Raising Hope", "Toy Story", "S1 E11", "Jimmy finds out about his father's annual Christmas scheme where he sells the most wanted toy for a lot of money, which always left Jimmy disappointed when he was a child. Virginia wants the family to be a part of the living nativity scene at their church to gain the respect of the members."], [1783425261, 1783426567, "Raising Hope", "Romeo and Romeo", "S1 E12", "Jimmy hasn't had any time to socialize or make friends since Hope was born, so when he meets another single dad at the grocery store, he immediately sets up a play date. But when Jimmy finds out that Virginia is his new friend's housekeeper, Virginia insists that Jimmy cancel the outing. In an effort to keep the peace, Jimmy and his friend arrange a dinner at the Chance house."], [1783426567, 1783427971, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783427971, 1783429342, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783429342, 1783430689, "That '70s Show", "Ski Trip", "S1 E13", "Jackie dumps Kelso after he makes out with Pam Macy and invites everyone but him to her parent's ski cabin for the weekend.  Eric, excited about what this could mean for him and Donna, pays no attention to Kelso's whining about being left behind or Red's tips about driving in the snow.  He doesn't realize that Hyde keeps hitting on Donna and Kelso plans on following them to the lodge.  Also, Kitty"], [1783430689, 1783432036, "That '70s Show", "Stolen Car", "S1 E14", "When Eric scratches the car, Red suspends his driving privileges, so the gang has to walk everywhere. That is, until Kelso's cousin lends him a car. They get arrested though because the car was reported stolen. With one phone call, Kelso calls Jackie and she tells him that she'll have sex with him once he gets out of prison. The whole incident was a mix-up and the gang is released."], [1783432036, 1783433441, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783433441, 1783434866, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783434866, 1783436163, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783436163, 1783437461, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783437461, 1783438686, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783438686, 1783440162, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783440162, 1783441465, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783441465, 1783442769, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783442769, 1783444173, "Saved by the Bell", "The Election", "S1 E13", "When Zack finds out that the elected student council president gets to leave school for a trip to Washington D.C., he runs against Jessie."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783348375, 1783349780, "The Fresh Prince of Bel-Air", "Knowledge is Power", "S1 E13", "Hilary rats Will out for several things including getting in at 3 in the morning the previous day in order to get the family car instead of Will. Will plans revenge, while going to find out where Hilary is shopping he learns that she dropped out of college three months ago. Will uses this in order to get Hilary to slave for him while he is punished. Hilary tries to get Carlton to go against Will, "], [1783349780, 1783351206, "The Fresh Prince of Bel-Air", "Day Damn One", "S1 E14", "Ashley is having a sleepover, and the girls ask Will to tells them a scary story. He recounts the horrifying tale of the first day he started going to Bel-Air Academy - a place that is revealed to be an all boys school (meaning no fly honeys). More terrors ensue when he is introduced to the glee club, square teachers. His classmates seem to like him but he causes a problem when he carves his name "], [1783351206, 1783352620, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783352620, 1783354051, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783354051, 1783355480, "The Fresh Prince of Bel-Air", "The Ethnic Tip", "S1 E17", "When Will is having trouble with history he tries to pass the blame on the school for not including black history in their curriculum. Viv offers to teach and Will is hoping for an easy ride but instead Viv works him to the bone. And when she's about to leave, the entire class except Will asks her to stay on."], [1783355480, 1783356915, "The Fresh Prince of Bel-Air", "The Young and the Restless", "S1 E18", "Granny comes for a visit and the family insists that she not do anything except Will who thinks she's cool. Yet, her country ways don't jive to just sitting around so she runs herself ragged cleaning up the house. Uncle Phil tells Will to leave her alone, but Granny insists that she and Will attend the Heavy D concert so they engineer a plan to sneak out. When the ruse is uncovered, she and Philli"], [1783356915, 1783358330, "The Fresh Prince of Bel-Air", "It Had to Be You", "S1 E19", "Jazz asks Will the favor of taking his sister out on a date after she moves into town, Will turns it down until Jazz introduces the two. Will takes her on a date and learns that she has her whole life planned out for the two already."], [1783358330, 1783359766, "The Fresh Prince of Bel-Air", "Nice Lady", "S1 E20", "Geoffrey's old employer Lord Fowler and his daughter come to the Banks' house for the weekend. Will wants to use the car to go to a Ziggy Marley concert in Nevada, Philip and Viv won't let him so he makes a proposition to be on his best behavior for the week. Lady Penelope winds up not being what Will thought she was."], [1783359766, 1783361202, "The Fresh Prince of Bel-Air", "Love at First Fight", "S1 E21", "One of Vivian's students, Kayla Samuels comes over for dinner and Will tries to impress her but fails. It upsets Will that he fails so the next day they have an argument but wind up liking each other. Will starts taking time away from her studies and Aunt Viv tells him to cut back on seeing her so she can have a good future ahead of her. Vivian winds up lecturing Kayla and revealing things about h"], [1783361202, 1783362640, "The Fresh Prince of Bel-Air", "Banks Shot", "S1 E22", "Vivian goes away to Berkeley for the weekend, leaving Hilary in charge of the house while Philip is at the office. Will steals the car keys to go to the pool hall he winds up losing his money and the car to a hustler. Philip goes down to the pool hall to claim the money back, playing the hustler."], [1783362640, 1783364035, "The Fresh Prince of Bel-Air", "72 Hours", "S1 E23", "Will makes a bet that Carlton wouldn't last a weekend in Jazz' neighborhood, Compton. Carlton starts to fulfill the bet, by not only fitting in, but getting along with the guys in \"The Hood\". Will has to find a way to stop him from going to MacArthur Park at night, to \"Hang with the crew\"."], [1783364035, 1783365441, "The Fresh Prince of Bel-Air", "Just Infatuation", "S1 E24", "Ashley's birthday is nearing and when the family asks her what she would like for her birthday shows a picture of a boy, Little T. Hilary knows T's agent so she has him come to Ashley's birthday party to perform a song for her. They hit it off and set up a date for the next day. Will and Carlton disagree with the date, so they decide to follow them on their date."], [1783365441, 1783366836, "The Fresh Prince of Bel-Air", "Did the Earth Move for You?", "S2 E1", "Will's all-consuming romance with a new girlfriend shakes up the Banks' household, as does Mother Nature, trapping them together during an earthquake."], [1783366836, 1783368162, "The Fresh Prince of Bel-Air", "The Mother of All Battles", "S2 E2", "Will and Carlton arrive as reinforcements when a bully challenges Ashley to a rumble, but there's real trouble when Philip and Vivian intervene."], [1783368162, 1783369551, "The Fresh Prince of Bel-Air", "Will Gets a Job", "S2 E3", "Will tries to juggle school and a new job in order to earn money for the homecoming party, at the same time Ashley's classmate Tina becomes interested in Carlton. Will starts becoming paranoid when he constantly is getting confused with Carlton."], [1783369551, 1783370945, "The Fresh Prince of Bel-Air", "PSAT Pstory", "S2 E4", "Will is a picture of confidence, while Carlton is a frazzled bundle of nerves preparing for college aptitude tests."], [1783370945, 1783372339, "The Fresh Prince of Bel-Air", "Granny Gets Busy", "S2 E5", "Mortified over spying his mother kiss the handyman, Philip can't bear to think of her having a new man in her life."], [1783372339, 1783373733, "The Fresh Prince of Bel-Air", "Guess Who's Coming to Marry?", "S2 E6", "Tensions spill over just before the wedding of Will's Aunt Janice when Will's mom meets Janice's intended - and forbids Will to attend the interracial wedding."], [1783373733, 1783375126, "The Fresh Prince of Bel-Air", "The Big Four-Oh", "S2 E7", "Vivian's 40th birthday marks a crisis and a career change in which she plans to perfect her dance skills."], [1783375126, 1783376521, "The Fresh Prince of Bel-Air", "She Ain't Heavy", "S2 E8", "Will hits it off with the full-figured Dee Dee, but her size keeps him from asking her to the dance."], [1783376521, 1783377914, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783377914, 1783379288, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783379288, 1783380683, "The Fresh Prince of Bel-Air", "The Butler Did It", "S2 E11", "Philip and Vivian take a weekend vacation and leave the kids home alone, Hilary and Carlton set up a video shoot with Bell Biv De Voe in their house, and then everyone must rush to clean up after Philip and Vivian decide to come home early."], [1783380683, 1783382071, "The Fresh Prince of Bel-Air", "Something for Nothing", "S2 E12", "Will gets lucky at a fundraiser and wins some money. When Will doesn't follow the club's tradition, it starts rumors about the Banks family. Ashley is too young to go to the fundraiser, so she and Geoffrey set up their own poker night."], [1783382071, 1783383465, "The Fresh Prince of Bel-Air", "Christmas Show", "S2 E13", "On a family ski trip, the Banks find that they must come up with Christmas gifts from the heart after their belongings are stolen."], [1783383465, 1783384861, "The Fresh Prince of Bel-Air", "Hilary Gets a Life", "S2 E14", "Hilary must work for a caterer after her credit cards are cancelled."], [1783384861, 1783386255, "The Fresh Prince of Bel-Air", "My Brother's Keeper", "S2 E15", "Will has a game coming up with Malibu Prep in which a scout will be in the crowd. He meets a player from the other team. After learning that Marcus has a child Will must choose between being greedy or realizing what the scholarship would mean to Marcus."], [1783386255, 1783387650, "The Fresh Prince of Bel-Air", "Geoffrey Cleans Up", "S2 E16", "Geoffrey falls for the woman next door while thinking she is a butler. When he finds out she is just visiting and is worth 25 million dollars he must decide whether he wants to continue seeing her, or not."], [1783387650, 1783389044, "The Fresh Prince of Bel-Air", "Community Action", "S2 E17", "When Hillary is ordered to do community service at a free clinic, the doctor in charge becomes the antidote for her marriage-mindedness."], [1783389044, 1783390438, "The Fresh Prince of Bel-Air", "Ill Will", "S2 E18", "The family fears a steamy exposé when Geoffrey begins his memoirs, while Will fears the scalpel when he enters the hospital, kicking and screaming, for a tonsillectomy."], [1783390438, 1783391832, "The Fresh Prince of Bel-Air", "Eyes on the Prize", "S2 E19", "Needing a game show partner, Will must choose between bickering friends."], [1783391832, 1783393219, "The Fresh Prince of Bel-Air", "Those Were the Days", "S2 E20", "Philip and Vivian welcome a '60s radical, who arouses the FBI's interest and influences Will and Carlton to take action over the firing of a nonconformist teacher."], [1783393219, 1783394613, "The Fresh Prince of Bel-Air", "Vying for Attention", "S2 E21", "Will dislikes his mother's new boyfriend."], [1783394613, 1783396006, "The Fresh Prince of Bel-Air", "The Aunt Who Came to Dinner", "S2 E22", "Aunt Helen arrives unexpectedly, and upsets Will and Carlton's plans for a rendezvous with two French women."], [1783396006, 1783397400, "The Fresh Prince of Bel-Air", "Be My Baby Tonight", "S2 E23", "Ashley cringes when the family oohs and aahs over her relationship with Kevin , but Will chokes when she asks him about sex - and her curiosity about reproduction sends Will to a pregnancy counseling center."], [1783397400, 1783398775, "The Fresh ll and Carlton on a camping trip that turns out to be a disaster when snow traps the unhappy campers."], [1783409933, 1783411328, "The Fresh Prince of Bel-Air", "A Night at the Oprah", "S3 E9", "The Bankses appear on Oprah's show and fail to invite Will on-stage, which may cause Philip to lose the election."], [1783411328, 1783412724, "The Fresh Prince of Bel-Air", "Asses to Ashes", "S3 E10", "Election results are in and Philip fights to remain cool amid lies by Judge Robertson, which prompt Will to confront the outspoken incumbent. Will Will go to far? Will he say what everyone is feeling? Will Judge Robertson be able to take it?"], [1783412724, 1783414079, "The Fresh Prince of Bel-Air", "A Funny Thing Happened on the Way to the Forum", "S3 E11", "When Philip backs out of taking Vivian to Lamaze class, Will reluctantly offers to be her coach. Will meets a single pregnant woman who is a sportswriter. She invites Will to attend a game with her, where she goes into labor."], [1783414079, 1783415473, "The Fresh Prince of Bel-Air", "The Cold War", "S3 E12", "Carlton is upset when Paula breaks up with him. She then pursues Will and they begin to date. After getting the picture of an ultrasound from the doctor, Philip & Vivian ask Geoffrey to hide it so they do not find the sex of the baby."], [1783415473, 1783416869, "The Fresh Prince of Bel-Air", "Mommy Nearest", "S3 E13", "Will's mother is in town after a broken engagement with Robert. She tells Will that after he graduates from high school, he can move back to Philadelphia. Will wants to stay in California for college."], [1783416869, 1783418264, "The Fresh Prince of Bel-Air", "Winner Takes Off", "S3 E14", "In an attempt to get back at Geoffrey, Will and Carlton give him a fake lottery ticket and trick him into thinking he won $26,000,000. As a response, Geoffrey quits and the boys must convince him to come back."], [1783418264, 1783419659, "The Fresh Prince of Bel-Air", "Robbing the Banks", "S3 E15", "Philip is quick to judge an ex-con Will urged him to hire as a handyman and temporary assistant after the house is robbed."], [1783419659, 1783420903, "The Fresh Prince of Bel-Air", "Bundle of Joy", "S3 E16", "As Vivian's delivery date approaches, the family fantasizes about what the baby will mean to each of them: Ashley feels all but invisible, Geoffrey feels overwhelmed by the family's demands, and Vivian feels like she's having triplets."], [1783420903, 1783422298, "The Fresh Prince of Bel-Air", "The Best Laid Plans", "S3 E17", "Will wants to take the next step in his relationship with his current girl Monique, but she has old fashioned ideas about sex before marriage. Will and Jazz set up a fake wedding. Monique, thinking they are married, is willing to consummate their marriage, saying that Will is a good and honest man. Will Will follow through on the devious plan, or will he come clean and tell the truth?"], [1783422298, 1783423692, "The Fresh Prince of Bel-Air", "The Alma Matter", "S3 E18", "Depressed and suicidal over having ruined his chances of attending Princeton University, Carlton is visited by his Guardian Angel, who shows him how awful the Banks family would be if he weren't alive."], [1783423692, 1783425086, "The Fresh Prince of Bel-Air", "Just Say Yo", "S3 E19", "Will is run down with work, school, and his girlfriend, and has trouble staying awake. He decides to take amphetamines to help him. Carlton asks will for vitamins and Will accidentally gives him the uppers. Carlton ends up in the hospital."], [1783425086, 1783426461, "The Fresh Prince of Bel-Air", "The Baby Comes Out", "S3 E20", "Vivian's baby is a week late, but family members and her visiting sisters are nowhere to be found when it's time to rush to the hospital."], [1783426461, 1783427856, "The Fresh Prince of Bel-Air", "You Bet Your Life", "S3 E21", "Heavyweight boxing champ Riddick Brown wreaks havoc with Carlton's mind and Will's face at a funky cafe-casino in Nevada, where the cousins have stopped on their way to check out a college for Will."], [1783427856, 1783429251, "The Fresh Prince of Bel-Air", "Ain't No Business Like Show Business", "S3 E22", "Will's friend Keith, a comedian from Philadelphia, visits Will and the Banks family. His sense of humor tickles Will's funny bone, causing Will to think that a career in comedy might work for him, too. Meanwhile, Vivian is away and Phillip demands the attention of his children in her absence."], [1783429251, 1783430646, "The Fresh Prince of Bel-Air", "The Way We Were", "S3 E23", "Philip and Vivian are celebrating their 25th wedding anniversary and the others put together a scrapbook. This is a flashback show with clips from the previous seasons as the scrapbook is put together."], [1783430646, 1783432041, "The Fresh Prince of Bel-Air", "Six Degrees of Graduation", "S3 E24", "Vy anticipates Will's graduation with enthusiasm, but there may be discord when she learns Will is failing music. To pass his music class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783432041, 1783433307, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783433307, 1783434673, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783434673, 1783436040, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783436040, 1783437401, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783437401, 1783438732, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783438732, 1783440052, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783440052, 1783441418, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783441418, 1783442712, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783442712, 1783444048, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."]]}, {"id": "411", "name": "SBC Bulletin", "a": "sbc-bulletin", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/sbc-bulletin.png", "progs": [[1783349489, 1783371089, "SBC Bulletin", "", "", "SBC Bulletin"], [1783371089, 1783392689, "SBC Bulletin", "", "", "SBC Bulletin"], [1783392689, 1783414289, "SBC Bulletin", "", "", "SBC Bulletin"], [1783414289, 1783435889, "SBC Bulletin", "", "", "SBC Bulletin"], [1783435889, 1783443185, "SBC Bulletin", "", "", "SBC Bulletin"]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
