356048, 1783357417, "Jem and the Holograms", "The Challenge", "S1 E2", "When Starlight House is burnt down, Jerrica and the Holograms go to Howard Sands, who offered the mansion in the battle of the bands contest. Jem and the Holograms put on a concert for him and explain what happened. He agrees to let the Starlight girls live in his mansion until the contest is over. This makes the Misfits angry so Eric sends Zipper to the mansion to plant a bomb to get Jem and the "], [1783357417, 1783358898, "The Wonder Years", "Pilot", "S1 E1", "Kevin and Paul are saying goodbye to their last summer as boys and preparing to attend Robert F Kennedy Junior High for the first time. Kevin and Winnie share their first kiss as Winnie mourns the loss of her brother who is killed in Vietnam."], [1783358898, 1783360303, "The Wonder Years", "Swingers", "S1 E2", "Even at Brian's funeral, all Kevin can think about is Winnie. The much anticipated \"sex education\" begins at school, but it doesn't give them enough information; the boys want to learn more so they steal a book."], [1783360303, 1783361633, "The Fresh Prince of Bel-Air", "The Fresh Prince Project", "S1 E1", "Will comes to live with his aunt and uncle in Bel-Air. Phillip isn't too impressed by Will's behavior, especially teaching Ashley to rap and ruining his image to his members of the law firm. Vivian tries to remain neutral in all this. Carlton and Hillary look at Will with disdain."], [1783361633, 1783363065, "The Fresh Prince of Bel-Air", "Bang the Drum, Ashley", "S1 E2", "Will persuades Ashley to pawn her violin for a drum set."], [1783363065, 1783365830, "Beverly Hills, 90210", "Every Dream Has Its Price (Tag)", "S1 E3", "Brenda goes on several shopping trips with Kelly and Tiffany, Kelly's best friend from junior high school. Brenda cannot afford the merchandise, and considers stealing because she is envious of her classmates' wardrobes."], [1783365830, 1783368643, "Beverly Hills, 90210", "The First Time", "S1 E4", "Brandon finds mixed blessings when Sheryl, his former girlfriend from Minnesota, comes for a visit, and who falls victim to the fast nightlife of the city. Meanwhile, Brenda develops a crush on her math teacher which affects her even more when she's asked to baby-sit for his two wild children for the evening in which Brenda asks Kelly and Donna to tag along with her."], [1783368643, 1783369979, "Jem and the Holograms", "Fire!", "S1 E3", "Jem and the Holograms are in Paris to film their first music video when Kimber grows jealous of the attention Jem receives there and questions her place in the band.\n\nFeatured songs: \"Twilight in Paris\", \"Gettin' Down to Business\", \"I Got My Eye on You\" – all by Jem and The Holograms"], [1783369979, 1783371346, "Jem and the Holograms", "Nowhere To Go", "S1 E4", "Ashley's odd behavior is finally brought to Jerrica's attention. She doesn't have time to deal with her though since she's just signed a contract for Jem and the Holograms to headline a show at a Las Vegas casino. The Misfits are not happy when they learn that they're opening for their arch rivals. But Pizzazz comes up with a plan to steal the spotlight - a plan which puts Ashley on the spot."], [1783371346, 1783372778, "The Wonder Years", "My Father's Office", "S1 E3", "After Kevin wants to know what his father does at work, Jack brings Kevin with him to NORCOM (Jack's employer), and Kevin learns more by spending the day in his father's office. After witnessing severe disciplinary action from Jack's boss over the incompetence of Jack's subordinates, Kevin realizes why his father returns home from work in a nasty mood most of the time.."], [1783372778, 1783374199, "The Wonder Years", "Angel", "S1 E4", "Kevin's older sister Karen doesn't communicate with her parents anymore, and it's all because of her new boyfriend, Louis. And things are only made worse when Louis comes to dinner. Kevin finds out that Louis is cheating on Karen, but suspects that Karen already knows and is fine with it. Only, she doesn't know, and when finds out, she's not fine with it."], [1783374199, 1783375511, "The Fresh Prince of Bel-Air", "Clubba Hubba", "S1 E3", "Will wants to go out with a beautiful girl he meets at the country club, but first he must figure out how to impress her extremely snobbish and very protective father so he seeks tips from cousin Carlton on becoming preppie."], [1783375511, 1783376945, "The Fresh Prince of Bel-Air", "Not with My Pig, You Don't", "S1 E4", "Philip's parents come to visit for the weekend when he wins a prestigious award. After finding the rehearsed lines of the Bankses to be boring and deciding to kill the story, Will talks to the interviewer telling her embarrassing stories about Philip's past \"barnyard life\" he heard from Philip's parents."], [1783376945, 1783379718, "Beverly Hills, 90210", "One on One", "S1 E5", "Jim encourages Brandon to try out for the basketball team. Steve, unaware that he is terrible, is bitter about being cut from the team. He tells Brandon that several of the players are ringers brought in from out of district to help the team win a championship."], [1783379718, 1783382531, "Beverly Hills, 90210", "Higher Education", "S1 E6", "Close to failing history, Brandon (at Steve's persuasion) resorts to cheating from a copied term paper, which leads him to debate honesty vs. an unfair teacher, as well as his friendship with Andrea when she catches him cheating. Meanwhile, Brenda and Kelly both have the hots for Dylan, so Brenda tries dying her hair after he states his preference for blonds. But she comes out with ugly orange str"], [1783382531, 1783383897, "Jem and the Holograms", "The Mansion", "S1 E5", "Taba TV"], [1783383897, 1783385264, "Jem and the Holograms", "Starbright (1): Falling Star", "S2 E1", "Jem stars in Howard Sands' new movie, part of the prize she and the Holograms won in the Battle of the Bands. But Pizzazz convinces her father to buy the movie studio making the film and give ownership to Eric who quickly seizes control of the film and adds the Misfits to the cast. Eric places the focus of the film on the Misfits and Jem and the Holograms are relegated to supporting roles. Finally"], [1783385264, 1783386695, "The Wonder Years", "The Phone Call", "S1 E5", "Kevin tries to get up the courage to call Lisa Berlini. Paul tries to find out if Lisa likes Kevin, by consulting the Junior High grapevine."], [1783386695, 1783388121, "The Wonder Years", "Dance With Me", "S1 E6", "Kevin asks Lisa Berlini to a dance but she dumps him. Dejected by Lisa's rejection, Kevin finds himself asking Winnie to the dance, but he finds out she is going with her new boyfriend. In retaliation, Kevin tries to make Winnie jealous."], [1783388121, 1783389516, "The Fresh Prince of Bel-Air", "Homeboy, Sweet Homeboy", "S1 E5", "Will gets a visit from an old pal named Ice Tray, who, to Vivian and Philip's dismay, warms up to Hilary."], [1783389516, 1783390920, "The Fresh Prince of Bel-Air", "Mistaken Identity", "S1 E6", "While Philip and Vivian go on a trip to Palm Springs in Mr. Furth's helicopter, Will and Carlton drive Furth's car there as well. They get pulled over for \"stealing\" the car. Hilary babysits Ashley as Geoffrey has the weekend off."], [1783390920, 1783393668, "Beverly Hills, 90210", "Perfect Mom", "S1 E7", "Brenda is mesmerized by Kelly's hip and glamorous mother Jackie, a former model. Kelly insists that her mother is not all that she appears to be. Jackie is a recovering addict, and begins hitting the bottle again after her boyfriend dumps her. Cindy is hurt when Brenda initially fails to ask her to be in a mother-daughter fashion show. They eventually agree to appear, and are joined by Andrea, who"], [1783393668, 1783396485, "Beverly Hills, 90210", "The 17-Year Itch", "S1 E8", "The Walshes celebrate their seventeenth anniversary, but Cindy feels dissatisfied because Jim is neglecting her for his work. She has a chance meeting with old flame Glen, a talented artist. The two spend a lot of time together, and share a kiss after Glen's opening. Brandon and Brenda take part in a college study on twins, but are distracted by their parents' marital problems. David becomes the n"], [1783396485, 1783397850, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783397850, 1783399215, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783399215, 1783400440, "The Wonder Years", "Episode 7", "S1 E7", "Taba TV"], [1783400440, 1783401916, "The Wonder Years", "Episode 8", "S1 E8", "Taba TV"], [1783401916, 1783403346, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783403346, 1783406050, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783406050, 1783408864, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783408864, 1783411679, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783411679, 1783413042, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783413042, 1783414408, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783414408, 1783416174, "The Wonder Years", "Episode 9", "S1 E9", "Taba TV"], [1783416174, 1783417469, "The Wonder Years", "Episode 10", "S1 E10", "Taba TV"], [1783417469, 1783418903, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783418903, 1783420328, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783420328, 1783423144, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783423144, 1783425929, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783425929, 1783427294, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783427294, 1783428660, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783428660, 1783430091, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783430091, 1783431517, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783431517, 1783432952, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783432952, 1783434387, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783434387, 1783437189, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783437189, 1783440005, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their maid's extremely intelligent \"niece,\" Karla, use their address to enroll at West Beverly. Brandon falls hard for her, but doesn't understand why everyone seems opposed to their relationship. Carla reveals that she witnessed a drive-by shooting that claimed the life of a four-year-old; she had moved in with Anna while waiting to testify, with protection from the D.A. "], [1783440005, 1783441358, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783441358, 1783442710, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783442710, 1783443935, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783349427, 1783350984, "The Twilight Zone", "Escape Clause", "S1 E6", "A hypochondriac exchanges his soul for immortality and indestructibility."], [1783350984, 1783353833, "Quantum Leap", "Double Identity", "S1 E5", "November 8, 1965: Sam becomes a hit man in 1965 whose romance with the godfather's girlfriend places him in danger."], [1783353833, 1783356695, "Quantum Leap", "The Color of Truth", "S1 E6", "August 8, 1955: Sam experiences racism firsthand when he leaps into the body of an elderly black man in the pre-civil rights South of 1955."], [1783356695, 1783358249, "The Twilight Zone", "The Lonely", "S1 E7", "In 2046, imprisoned for murder on a distant asteroid, Corry receives an unexpected present that brings a semblance of companionship during his isolation."], [1783358249, 1783359804, "The Twilight Zone", "Time Enough at Last", "S1 E8", "A bank teller, obsessed with reading, faces conflicts at work and home because of his passion for literature."], [1783359804, 1783362654, "Quantum Leap", "Camikazi Kid", "S1 E7", "Sam leaps into the body of a gawky teenager to keep the boy's older sister from marrying an abusive alcoholic. Taking advice from Al, Sam hopes to reveal the young man's true nature by challenging him to a drag race."], [1783362654, 1783365498, "Quantum Leap", "Play it Again, Seymour", "S1 E8", "April 14, 1953: With looks that could double for Humphrey Bogart, Sam is Nick Allen, a private investigator looking for the murderer of his partner and, if he doesn't find the answer in time, himself. The case is solved with a number of Casablanca references as Sam launches a new pulp novelist along the way."], [1783365498, 1783367053, "The Twilight Zone", "Perchance to Dream", "S1 E9", "A man with a heart condition explains to his psychiatrist that he feels extremely tired, because he is terrified of falling asleep for fear he might die."], [1783367053, 1783368608, "The Twilight Zone", "Judgment Night", "S1 E10", "During World War II, a confused Carl Lancer finds himself as one of only a few passengers on a freighter, the S.S. Queen of Glasgow, traveling from London to New York. As he sits with other passengers, he begins to realize that he is the captain of a U-Boat that is at that very moment tracking the freighter with a view to sinking it. He also knows that in just over an hour the freighter will be at"], [1783368608, 1783371484, "Quantum Leap", "Honeymoon Express", "S2 E1", "April 27, 1960: As Tom McBride, a New York City cop on his honeymoon, Sam must save himself from a jealous, and sociopath, ex-husband. To make matters worse, the Project's funding will be cut off, stranding Sam alone in the past, unless he can prevent the U2 flight from being shot down over Russia."], [1783371484, 1783374363, "Quantum Leap", "Disco Inferno", "S2 E2", "April 1, 1976: As a stuntman, Sam is to save the life of his younger brother, while trying to convince the pair's obsessive father to let the younger son go his own way, even if it means going into country-western music, rather than following the family tradition of stunt work."], [1783374363, 1783375916, "The Twilight Zone", "And When the Sky Was Opened", "S1 E11", "Recovering in the hospital after a space mission, Major William Gart is visited by his co-pilot Lieutenant Colonel Clegg Forbes, who insists on the existence of a third astronaut."], [1783375916, 1783377470, "The Twilight Zone", "What You Need", "S1 E12", "A two-bit thug thinks he's found the key to a better life in an old sidewalk salesman who has the uncanny ability to tell people what they need the most."], [1783377470, 1783380282, "Quantum Leap", "The Americanization of Machiko", "S2 E3", "August 4, 1953: As a sailor returning from Japan, Sam brings a foreign wife to a small town. He then has to fight against the prejudice of both a scheming ex-girlfriend, as well as his mother, in order to gain acceptance of his new bride."], [1783380282, 1783383174, "Quantum Leap", "What Price Gloria?", "S2 E4", "October 16, 1961: Sam is shocked when he learns he's leaped into a woman, Samantha Stormer. As a gorgeous secretary for an automobile company, Sam has to cope with sexual harassment by the boss, a suicide attempt by a roommate, and the effect his looks have on Al's lecherous tendencies."], [1783383174, 1783384729, "The Twilight Zone", "The Four of Us are Dying", "S1 E13", "In this noirish tale, a man with the ability to change his face to resemble others gets into hot water with gangsters."], [1783384729, 1783386284, "The Twilight Zone", "Third from the Sun", "S1 E14", "With all-out nuclear war about to ignite, a scientist and his pilot friend plot to escape on an experimental spaceship."], [1783386284, 1783389110, "Quantum Leap", "Blind Faith", "S2 E5", "February 6, 1964: Although the concert pianist he leaps into is blind, a fact, which bothers his girlfriend's disapproving mother, Sam can still see. At least until an exploding flashbulb blinds him at the crucial moment: when he must rescue his girlfriend from a serial killer."], [1783389110, 1783391997, "Quantum Leap", "Good Morning, Peoria", "S2 E6", "September 9, 1959: Rock 'n' roll is about to become big, but not in Peoria. That is, unless Sam, as DJ Howlin' Chick Howell, can manage to keep the radio station where he's employed from being shut down by overly conservative town elders."], [1783391997, 1783393550, "The Twilight Zone", "I Shot an Arrow into the Air", "S1 E15", "Three astronauts crash-land on an unknown planet and must confront survival challenges, unraveling their unity in the face of desperation."], [1783393550, 1783395107, "The Twilight Zone", "The Hitch-Hiker", "S1 E16", "A young woman driving across the country from East to West becomes frantic when she keeps passing the same man on the side of the road. No matter how fast she drives, the man is always up ahead trying to hitch a ride."], [1783395107, 1783397966, "Quantum Leap", "Thou Shalt Not...", "S2 E7", "February 2, 1974: Sam's task as a rabbi is to keep his sister-in-law from falling for a sleazy author and ruining her life. In the process he also helps the family recover from the year-old death of their son."], [1783397966, 1783400837, "Quantum Leap", "Jimmy", "S2 E8", "October 14, 1964: Since mainstreaming the mentally disabled is not yet a popular concept, Sam must help Jimmy LaMotta, the \"slow\" young man he's leaped into, get a job and gain his co-workers' acceptance, to prevent his brother from returning Jimmy to the institution."], [1783400837, 1783402391, "The Twilight Zone", "The Fever", "S1 E17", "Tight fisted Franklin Gibbs is not pleased when his wife wins a trip for two to Las Vegas.  But things change when he falls under the spell of a slot machine that calls his name."], [1783402391, 1783403946, "The Twilight Zone", "The Last Flight", "S1 E18", "A World War I flying ace flies through a mysterious cloud - and lands at a modern U.S. air base in the year 1959!"], [1783403946, 1783406813, "Quantum Leap", "So Help Me God", "S2 E9", "July 29, 1957: Though he can't remember much more than habeas corpus, Sam finds himself the defense attorney for a young black woman accused of murdering the son of the most powerful man in a small Louisiana town."], [1783406813, 1783409694, "Quantum Leap", "Catch A Falling Star", "S2 E10", "May 21, 1979: Sam leaps into Ray Hutton, the understudy for the role of Cervantes just seconds before curtain time. His mission: prevent the drunken star from falling and seriously injuring himself during a benefit performance of \"Man of La Mancha.\" Sam isn't helped by the presence of his former piano teacher, on whom he once had a crush, and who now appears to have caught the star's eye as well."], [1783409694, 1783411247, "The Twilight Zone", "The Purple Testament", "S1 E19", "Lieutenant Fitzgerald, serving in World War II, possesses the disquieting ability to foresee impending death by observing a strange glow on the faces of his men before battle."], [1783411247, 1783412798, "The Twilight Zone", "Elegy", "S1 E20", "Three astronauts touch down on an Earth-like asteroid where they discover a world of people who appear to be frozen in time. Confused, they try to theorize why everyone is motionless until a resident springs to life and explains."], [1783412798, 1783415609, "Quantum Leap", "A Portrait for Troian", "S2 E11", "February 7, 1971: Sam leaps into a renowned parapsychologist where he must prevent a young widow from joining her husband at the bottom of a lake, while proving that she's not crazy, despite her claims of hearing her dead husband calling to her."], [1783415609, 1783418423, "Quantum Leap", "Animal Frat", "S2 E12", "October 19, 1967: Trapped in the body of Knut Wileton, better known as \"Wild Thing,\" the typical frat jock, Sam must win the confidence of an attractive campus radical before she bombs the college's chemistry building as a protest against the war in Vietnam."], [1783418423, 1783419976, "The Twilight Zone", "Mirror Image", "S1 E21", "In a bus depot, Millicent Barnes experiences odd events, leading to concerns about her sanity."], [1783419976, 1783421533, "The Twilight Zone", "The Monsters are Due on Maple Street", "S1 E22", "Paranoia strikes the residents of Maple Street when they believe human-looking aliens have invaded the neighborhood."], [1783421533, 1783424400, "Quantum Leap", "Another Mother", "S2 E13", "September 30, 1981: As a divorced mother of three, Sam's job of preventing his teenage son from running away, never to be seen again, is made more interesting by the fact that his youngest daughter can see both him and Al."], [1783424400, 1783427286, "Quantum Leap", "All-Americans", "S2 E14", "November 6, 1962: Keeping his best friend from throwing the high school championship football game, costing both of them their scholarship offers, Sam must also get their families to consolidate."], [1783427286, 1783428841, "The Twilight Zone", "A World of Difference", "S1 E23", "Arthur Curtis, a successful businessman sitting in his office discovers that he is on a film set and everyone refers to him as Gerry Reagan, a movie star struggling with alcoholism and a declining career."], [1783428841, 1783430393, "The Twilight Zone", "Long Live Walter Jameson", "S1 E24", "Walter Jameson, a popular history professor, is suspected by his fiancée's father, another professor at the college, to be an immortal."], [1783430393, 1783433270, "Quantum Leap", "Her Charm", "S2 E15", "September 26, 1973: Protecting a female member of the witness protection program from a mafia hitman proves difficult for Sam, since the FBI appears to have an informant confounding his attempts to hide her."], [1783433270, 1783436092, "Quantum Leap", "Freedom", "S2 E16", "November 22, 1970: Rather than saving his grandfather's life, Sam has to escape from jail and elude the police long enough to get them both to the reservation, where the old man can die in peace, at home."], [1783436092, 1783437646, "The Twilight Zone", "People are Alike All Over", "S1 E25", "After a space exploration crash-lands on Mars, the lone surviving astronaut is surprised to find that Martians are human-looking and friendly."], [1783437646, 1783439199, "The Twilight Zone", "Execution", "S1 E26", "When a 20th-century scientist tests out his time machine he accidentally retrieves a murderer from 1880, saving him from the hangman's noose. Unaware of the man's history, the scientist attempts to acclimatize him to his new surroundings."], [1783439199, 1783442086, "Quantum Leap", "Good Night, Dear Heart", "S2 E17", "November 9, 1957: Rather than saving the damsel of the episode, who supposedly committed suicide, Sam is the coroner trying to prove that she was murdered, and find out by whom."], [1783442086, 1783444964, "Quantum Leap", "Pool Hall Blues", "S2 E18", "September 4, 1954: In order to help his granddaughter save a small bar from the slimy loan shark holding a note on the place, Sam has to play pool like a pro...with a little help from Al and Ziggy."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783348930, 1783350104, "Power Rangers", "High Five", "S1 E3", "Rita plans to trap the Rangers in a time trap like the one she trapped Zordon in and to do this she sends a fresh monster to the amusement park. Will the Power Rangers be able to defeat Bones, and will one of the Rangers overcome her fear of heights when a friend is in danger?"], [1783350104, 1783351320, "Power Rangers", "Teamwork", "S1 E4", "Trini and Kimberly set up a petition to clean up pollution and there are plenty of people willing to sign but no one to help speak up against it, not even the other rangers. Rita seizes the opportunity to divide and conquer the rangers. The rangers have their hands full with a monster, Putties, and Goldar especially since none of their weapons have any effect on the monster."], [1783351320, 1783352656, "Jem and the Holograms", "Fire!", "S1 E3", "Jem and the Holograms are in Paris to film their first music video when Kimber grows jealous of the attention Jem receives there and questions her place in the band.\n\nFeatured songs: \"Twilight in Paris\", \"Gettin' Down to Business\", \"I Got My Eye on You\" – all by Jem and The Holograms"], [1783352656, 1783354023, "Jem and the Holograms", "Nowhere To Go", "S1 E4", "Ashley's odd behavior is finally brought to Jerrica's attention. She doesn't have time to deal with her though since she's just signed a contract for Jem and the Holograms to headline a show at a Las Vegas casino. The Misfits are not happy when they learn that they're opening for their arch rivals. But Pizzazz comes up with a plan to steal the spotlight - a plan which puts Ashley on the spot."], [1783354023, 1783355484, "Pee-wee's Playhouse", "Rainy Day", "S1 E3", "It's a rainy day outside, and Pee-wee does many things for the rest of the day: fly paper airplanes, get a call from Miss Yvonne (who won't make it due to the weather), build an indoor campfire, and tell a ghost story. Later, he gets bored and has Playhouse fever! Randy tries to cheer him up by letting him call strangers - such as a housewife who grows angry when Randy plays a prank phone call on "], [1783355484, 1783357013, "Pee-wee's Playhouse", "Now You See Me, Now You Don't", "S1 E4", "Today's secret word is really \"little,\" but the gangs' eyes get really big when Pee-wee puts on a magic show and disappears! Captain Carl, Cowboy Curtis, Miss Yvonne, and the gang are amazed as Pee-wee makes use of his new talent at their expense, but when their hidden host can't make himself reappear, it'll take Jambi's magic to set things right!"], [1783357013, 1783358382, "Teenage Mutant Ninja Turtles", "Shredder & Splintered", "S1 E5", "As Shredder lures Splinter into he Technodrome, this time with the promise that a weapon in his possession can restore the sensei to human form, the Turtles confront a giant-sized Krang, now in a new body, in the heart of New York City."], [1783358382, 1783359799, "Teenage Mutant Ninja Turtles", "Episode 6", "S1 E6", "Saturday Morning"], [1783359799, 1783361096, "He-Man and the Masters of the Universe", "The Curse of the Spellstone", "S1 E5", "Skeletor steals the Spellstone from its resting place and uses it to control the weather. With He-Man and friends going after the Spellstone, Evil-Lyn attacks King Randor's palace with a being known as the Creeping Horac."], [1783361096, 1783362393, "He-Man and the Masters of the Universe", "The Time Corridor", "S1 E6", "The Sorceress sends He-Man, Man-At-Arms, Orko and Battle Cat back in time after Skeletor, who, with Tri-Klops and Fang Man, have gone back into Eternia's past to plant an effective time bomb on the spot where Castle Grayskull now stands, that will destroy it in the present unless He-Man manages to stop it \"in time\"...\n"], [1783362393, 1783363603, "Power Rangers", "A Pressing Engagement", "S1 E5", "Jason battles King Sphinx while trying to break a bench press record at the Angel Grove Gym & Juice Bar."], [1783363603, 1783364816, "Power Rangers", "Different Drum", "S1 E6", "Kimberly's deaf friend feels out of place in dance class because she has trouble following the movements since she can't hear the instructions or the music to follow along. Some of the girls in the dance class decide to hang out with her and are hypnotized by the haunting music that Rita's monster uses to lure them away. Kimberly's deaf friend is the only one unaffected and therefore is the only o"], [1783364816, 1783366182, "Jem and the Holograms", "The Mansion", "S1 E5", "Saturday Morning"], [1783366182, 1783367548, "Jem and the Holograms", "Starbright (1): Falling Star", "S2 E1", "Jem stars in Howard Sands' new movie, part of the prize she and the Holograms won in the Battle of the Bands. But Pizzazz convinces her father to buy the movie studio making the film and give ownership to Eric who quickly seizes control of the film and adds the Misfits to the cast. Eric places the focus of the film on the Misfits and Jem and the Holograms are relegated to supporting roles. Finally"], [1783367548, 1783369011, "Pee-wee's Playhouse", "Just Another Day", "S1 E5", "Cowboy Curtis decides to have a cowboy-style snack (slow-cooked steak) and shows Pee-wee how to square dance. Pee-wee shows Curtis how to pogo, and Dixie gets her name on the \"back\" of her new jacket."], [1783369011, 1783370475, "Pee-wee's Playhouse", "Beauty Makeover", "S1 E6", "Miss Yvonne is willing to give a beauty makeover to the next person who steps into the playhouse, and it ends up being Mrs. Steve! Then, the Cowntess has a tea party. You'll have the \"time\" of your life!"], [1783370475, 1783371892, "Teenage Mutant Ninja Turtles", "Episode 7", "S1 E7", "Saturday Morning"], [1783371892, 1783373301, "Teenage Mutant Ninja Turtles", "Episode 8", "S1 E8", "Saturday Morning"], [1783373301, 1783374598, "He-Man and the Masters of the Universe", "Creatures from the Tar Swamp", "S1 E7", "Prince Adam's spoiled cousin, Lady Edwina, comes for a visit and Orko immediately falls for her. To buy love, Orko decides to find a gold medallion that he lost in the Tar Swamp. But Skeletor is beginning to wake the monsters of the swamp."], [1783374598, 1783375892, "He-Man and the Masters of the Universe", "Song of Celice", "S1 E8", "Adam, Teela, Orko, Cringer and Lizard Man are on a visit to Pangus, the King of the city of Tarinth, when the city comes under a fierce trembling. Adam is about to come to the rescue as He-Man when a young woman called Celice appears and soothes the tremors with her singing. Pangus explains that a terrible creature lives beneath the city, and only Celice's soothing singing can calm it.\nSkeletor ov"], [1783375892, 1783377028, "Power Rangers", "I, Eye Guy", "S1 E7", "The ranger's young friend, Willie, has created his best invention yet and enters it into a science fair. Bulk and Skull happen upon the science fair and cause Willie to be disqualified. Disheartened, Willie flees to reflect on things when he's kidnapped by Eye Guy so that the monster can steal his vast intelligence."], [1783377028, 1783378184, "Power Rangers", "For Whom the Bell Trolls", "S1 E8", "Trini's favorite doll is brought to life by Rita Repulsa and commanded to capture the Rangers inside bottles."], [1783378184, 1783379549, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783379549, 1783380914, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783380914, 1783382376, "Pee-wee's Playhouse", "Restaurant", "S1 E7", "Pee-wee is the maitre d', waiter and cashier while playing restaurant. Customer Captain Carl orders everything on the menu only to learn that all they have are peanut-butter-and-jelly sandwiches! Also, Dixie is having a particularly bad \"day.\""], [1783382376, 1783383840, "Pee-wee's Playhouse", "Ants In Your Pants", "S1 E8", "The ants are loose, the ants are loose! While Pee Wee is playing house with Miss Yvonne and the Playhouse Gang, the ants sneak out of their farm, go marching into the Dinosaur Family's home, steal a cake and get all over everybody and everything. \"\"What\"\" will Pee Wee do? The 'Ants In Your Pants Dance!"], [1783383840, 1783385257, "Teenage Mutant Ninja Turtles", "Episode 9", "S1 E9", "Saturday Morning"], [1783385257, 1783386592, "Teenage Mutant Ninja Turtles", "Return of the Shredder", "S2 E1", "Just when the Turtles believe themselves rid of Shredder, tin-grin is able to persuade Krang to return him to Earth."], [1783386592, 1783387886, "He-Man and the Masters of the Universe", "She-Demon of Phantos", "S1 E9", "Queen Elmora of the planet Phantos, has fallen under the power of Skeletor. He-Man, along with his friends, must rescue her. Unfortunately, Queen Elmora has access to photanium, the strongest metal in the universe."], [1783387886, 1783389181, "He-Man and the Masters of the Universe", "Reign of the Monster", "S1 E10", "Skeletor and his latest allies, the tribal-like Torgs, are trying to awaken Mulkram, a giant, diabolical monster who was frozen by the Elders centuries ago to stop his reign of terror. He-Man, Teela, Man-At-Arms, Orko and Ram Man are in the city of Avion for the annual ceremony where Stratos presents the magical Staff of Avion to his people, but just as the ceremony is about to begin, the Torgs at"], [1783389181, 1783390397, "Power Rangers", "Happy Birthday, Zack", "S1 E9", "Zack worries that his friends have forgotten today is his birthday while Rita sends him an unwelcome present."], [1783390397, 1783391613, "Power Rangers", "No Clowning Around", "S1 E10", "The gang fights Rita's minions at a carnival in order to save Trini's cousin Sylvia."], [1783391613, 1783392977, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783392977, 1783394343, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783394343, 1783395805, "Pee-wee's Playhouse", "Monster In the Playhouse", "S1 E9", "\"Look\" out because Mrs. Steve reports that there is a giant, one-eyed monster in town! He appears in the Playhouse, on the loose, and scares everyone! After Pee-wee makes the monster a snack, and Jambi grants Pee-wee's wish to understand the monster, the whole gang has a new friend! They even play a game of golf."], [1783395805, 1783397269, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783397269, 1783398607, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783398607, 1783399945, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783399945, 1783401238, "He-Man and the Masters of the Universe", "Like Father, Like Daughter", "S1 E11", "The Sorceress warns He-Man that Skeletor is amassing an unstoppable army. It's up to He-Man and company to discover this army, and put a stop to it. But with Trapjaw and Beastman doing Skeletor's dirty work, it won't be easy!"], [1783401238, 1783402529, "He-Man and the Masters of the Universe", "Disappearing Act", "S1 E12", "After He-Man puts an end to their latest plot, Skeletor and Beast Man plan to get rid of him once and for all; with use of invisible helmets they sneak into the Royal Palace and kidnap Prince Adam, to use as bait to lure He-Man out into a trap. Unfortunately, one of Orko's magic spells has gone wrong, teleporting the Sword Of Power away into Eternia's distant past, leaving Adam unable to transform"], [1783402529, 1783403746, "Power Rangers", "Power Ranger Punks", "S1 E11", "Baboo sneaks a magic potion into Kimberly and Billy's drinks that turns them into angry punks."], [1783403746, 1783404962, "Power Rangers", "Peace, Love and Woe", "S1 E12", "Billy draws on the powers of his friends to rescue the girl of his dreams."], [1783404962, 1783406327, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783406327, 1783407693, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783407693, 1783409157, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783409157, 1783410621, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783410621, 1783411956, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783411956, 1783413289, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783413289, 1783414582, "He-Man and the Masters of the Universe", "Evil-Lyn's Plot", "S1 E13", "Skeletor wants to steal the Widgets' Coridite- a powerful mineral substance, out of which He-Man's harness is made.  Evil-Lyn devises a cunning scheme to help him; she disguises herself as a young girl lost in the forest, and persuades the Widgets to let her enter their fortress.  She then tricks the Widget guard Squinch into letting her enter the private chamber where the Coridite is kept, then s"], [1783414582, 1783415875, "He-Man and the Masters of the Universe", "Dawn of Dragoon", "S1 E14", "Orko's magic pyramid inadvertently saves Dree Elle, a female Trollan (Orko's species), who was hiding from Dragoon, an evil fire-breathing half man, half dragon who is terrorising Orko's home word of Trolla. On hearing the threat to his world, where he is a great magician, Orko promptly returns with Dree Elle in the pyramid. Knowing that their friend will need some help, He-Man and Battle Cat get "], [1783415875, 1783417081, "Power Rangers", "Foul Play in the Sky", "S1 E13", "Kimberly is in trouble when her uncle Steve succumbs to a sleeping potion in the middle of flying an airplane with her on board."], [1783417081, 1783418297, "Power Rangers", "Dark Warrior", "S1 E14", "Billy is inspired by Trini's uncle Howard - a brilliant scientist and expert in martial arts."], [1783418297, 1783419650, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783419650, 1783421003, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783421003, 1783422466, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783422466, 1783423928, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "Saturday Morning"], [1783423928, 1783425265, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783425265, 1783426603, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783426603, 1783427898, "He-Man and the Masters of the Universe", "Prince Adam No More", "S1 E15", "Angered by his continual defeats, Skeletor blames Beast Man, banishing him from Snake Mountain and his evil forces. Meanwhile, King Randor is preparing for a Royal tour of Eternia, accompanied by Man-At-Arms and a guard of his choice. The King chooses He-Man, but Adam, upset that he always has to play down his qualities to hide his alter-ego, convinces the King to choose him instead. Beast Man spo"], [1783427898, 1783429191, "He-Man and the Masters of the Universe", "A Friend in Need", "S1 E16", "An inventor called Zicran visits the Royal Palace to deliver a Transmutator machine to Man-At-Arms, accompanied by his daughter Ileena, a friend of Teela's.  Ileena is vulnerable and lacking in self-confidence, feeling inferior compared to Teela's agility.\n\nMeanwhile, an evil sorcerer called Jarvan, who was previously defeated by He-Man and Man-At-Arms, has escaped from the prison mines and has se"], [1783429191, 1783430348, "Power Rangers", "Big Sisters", "S1 E15", "Kim & Trini get the task of being \"big sisters\" to a mischievous little girl named Maria. Rita kidnaps the bratty child, with intent of using her to open a magic trunk filled with Power Eggs. The Rangers end up facing the Chunky Chicken monster to save the annoying girl. All of this, plus, Billy unveils his specially modified VW Beetle, known as the RADBUG."], [1783430348, 1783431564, "Power Rangers", "Switching Places", "S1 E16", "Billy shows Kimberly a new machine he made that is supposed to transport people from one spot to another. Curious to see how well it works, they both get inside and end up switching bodies instead! Bulk and Skull show up and get inside later that day, unbeknown st to Billy or Kimberly and they switch bodies too and accidentally break the machine! Now Billy(in Kimberly's body) must fix the machine "], [1783431564, 1783432932, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783432932, 1783434267, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783434267, 1783435731, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "Saturday Morning"], [1783435731, 1783437193, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "Saturday Morning"], [1783437193, 1783438528, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783438528, 1783439863, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783439863, 1783441157, "He-Man and the Masters of the Universe", "Daimar the Demon", "S1 E17", "While bored, Orko casts a spell to bring a small, cute creature called Daimar, from a book about the dimension of darkness, to Eternia.  But Daimar doesn't stay cute for long- he soon turns into a giant demon and is threatening to overcome Grayskull with his power, which Skeletor is also determined to acquire for himself!"], [1783441157, 1783442452, "He-Man and the Masters of the Universe", "The Dragon's Gift", "S1 E18", "An ambassador from another kingdom visits the Royal Palace to present King Randor with a gift.  But Man-At-Arms recognises the man as Skeletor in disguise, and in an attempt to stop him, is turned into a crystal statue.  He-Man and Teela must journey to the Isles of Darksmoke, where the great and ancient dragon Granamyr knows the only spell to reverse the effect on Man-At-Arms.\n\nBut their task pro"], [1783442452, 1783443659, "Power Rangers", "Green with Evil Part 1: Out of Control", "S1 E17", "Rita creates her own evil Green Ranger to beat the Power Rangers at their own game."]]}, {"id": "7", "name": "Weather on the 7s", "a": "weather-on-the-7s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/weather-on-the-7s.png", "progs": [[1783349452, 1783371052, "Weather on the 7s", "", "", "Weather on the 7s"], [1783371052, 1783392652, "Weather on the 7s", "", "", "Weather on the 7s"], [1783392652, 1783414252, "Weather on the 7s", "", "", "Weather on the 7s"], [1783414252, 1783435852, "Weather on the 7s", "", "", "Weather on the 7s"], [1783435852, 1783443112, "Weather on the 7s", "", "", "Weather on the 7s"]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783348856, 1783350162, "Raising Hope", "Dream Hoarders", "S1 E3", "When Jimmy \"teaches\" Hope to crawl, the family must baby-proof the house and find new places to store their belongings. It's soon revealed that Virginia is a hoarder and has been saving junk in the storage shed, which becomes Hope's favorite new hiding place."], [1783350162, 1783351466, "Raising Hope", "Say Cheese", "S1 E4", "Jimmy is delighted when Sabrina accepts to pay him a visit. None of his family wants to help make a good impression, but she seems charmed by all their dysfunctional family quirks. Mother insists on explaining all the stressed misery caused by the annual Chance family pictures."], [1783351466, 1783352763, "The Goldbergs (2013)", "Mini Murray", "S1 E3", "Barry wants money to buy an expensive pair of basketball shoes, so Murray hires him to work at his furniture store. When Beverly prohibits him from seeing a new horror movie, Adam goes behind her back."], [1783352763, 1783354046, "The Goldbergs (2013)", "Why're You Hitting Yourself?", "S1 E4", "Barry and Adam bond over the discovery of a TV channel; Beverly involves herself in her father's dating life."], [1783354046, 1783355352, "Schitt's Creek", "Don't Worry, It's His Sister", "S1 E3", "Johnny perceives the town's welcome sign to be obscene, but the townspeople don't agree. Meanwhile, Moira falls into a dark depression after googling herself, David seeks employment and Alexis fawns over Mutt."], [1783355352, 1783356658, "Schitt's Creek", "Bad Parents", "S1 E4", "Alexis does community service with Mutt; Stevie convinces David to sell his clothes; and Moira and Johnny contemplate whether or not they're bad parents after they realize they don't know their children's middle names."], [1783356658, 1783359271, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783359271, 1783361878, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783361878, 1783363150, "Raising Hope", "Happy Halloween", "S1 E5", "When Sabrina's boyfriend can't make it to the deli guy's Halloween party, Jimmy offers to put on his costume and go in his place. Virginia takes Maw Maw, who is dressed as a cat, trick-or-treating while Burt plots ways to play tricks on Jimmy."], [1783363150, 1783364451, "Raising Hope", "Family Secrets", "S1 E6", "When a box containing videos of Hope's mother arrives from prison, Jimmy must decide whether or not to let Hope see them. Virginia explains that children need to be protected from the truth, leading Jimmy to question what exactly his parents have been keeping from him."], [1783364451, 1783365749, "The Goldbergs (2013)", "The Ring", "S1 E5", "Adam, Erica and Barry learn about Murray's romantic past while cleaning out the garage; Adam falls for his neighbor."], [1783365749, 1783367042, "The Goldbergs (2013)", "Who Are You Going to Telephone?", "S1 E6", "Beverly is disappointed when the kids don't want to celebrate Halloween with her; Beverly tries to get Barry's crush to go out with him."], [1783367042, 1783368348, "Schitt's Creek", "The Cabin", "S1 E5", "Looking for privacy, Johnny and Moira take the Mayor up on his offer of using his cabin for a night, while Alexis and David use the opportunity to throw a party."], [1783368348, 1783369654, "Schitt's Creek", "Wine and Roses", "S1 E6", "Moira is hired to be a local winery's spokesperson;  David struggles with a health problem."], [1783369654, 1783372263, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to compete against each other, but the real showdown happens when she and Will get called into the principal's office. Meanwhile, the Glee kids rally to support Quinn after some shocking news is revealed."], [1783372263, 1783374853, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783374853, 1783376156, "Raising Hope", "The Sniffles", "S1 E7", "When Hope catches a cold, Jimmy panics because the family does not have health insurance. Jimmy figures out a way to get a second job at Sabrina's grocery store so he can afford to take Hope to the pediatrician."], [1783376156, 1783377449, "Raising Hope", "Blue Dots", "S1 E8", "Jimmy decides to put Hope in an expensive daycare center, but meets an obstacle in the form of an old record from Burt's past, so the family decides to take matters in their own hands and deal with the law."], [1783377449, 1783378747, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783378747, 1783380037, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783380037, 1783381342, "Schitt's Creek", "Turkey Shoot", "S1 E7", "Following an incident where David is unable to kill an insect in his room, Stevie, as a joke, invites David along on Roland's annual turkey shoot."], [1783381342, 1783382648, "Schitt's Creek", "Allez Vous", "S1 E8", "Moira and David try to earn money by selling cosmetics to the locals, while Johnny heads to Elmdale in hopes of collecting unemployment insurance."], [1783382648, 1783385291, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783385291, 1783387880, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783387880, 1783389221, "Raising Hope", "Meet the Grandparents", "S1 E9", "Instead of sleeping in and ordering pizza, per his normal Thanksgiving custom, Jimmy invites Hope's other grandparents, Dale and Margine, to join the Chances for a more traditional holiday dinner. The Chances soon realize that the apple doesn't fall far from the tree when Dale and Margine kidnap Hope, and it's up to them to get her back."], [1783389221, 1783390524, "Raising Hope", "Burt Rocks", "S1 E10", "A washed-up rock star who is hired as the lead act at 'Grocery-Palooza', a rock concert at the supermarket where Sabrina works. Smokey was once Burt's musical idol, and Burt hopes to relive his rock-star years by playing backup for him at the concert."], [1783390524, 1783391823, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783391823, 1783393119, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783393119, 1783394424, "Schitt's Creek", "Carl's Funeral", "S1 E9", "Johnny reluctantly agrees to speak at the funeral of a local man he doesn’t really know. Alexis struggles with her new boyfriend’s love of animals."], [1783394424, 1783395730, "Schitt's Creek", "Honeymoon", "S1 E10", "Johnny and Moira attend Roland’s annual Hawaiian bash. Alexis and Ted throw a couple’s dinner party, while David and Stevie’s relationship heats up."], [1783395730, 1783398363, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783398363, 1783400918, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783400918, 1783402221, "Raising Hope", "Toy Story", "S1 E11", "Jimmy finds out about his father's annual Christmas scheme where he sells the most wanted toy for a lot of money, which always left Jimmy disappointed when he was a child. Virginia wants the family to be a part of the living nativity scene at their church to gain the respect of the members."], [1783402221, 1783403527, "Raising Hope", "Romeo and Romeo", "S1 E12", "Jimmy hasn't had any time to socialize or make friends since Hope was born, so when he meets another single dad at the grocery store, he immediately sets up a play date. But when Jimmy finds out that Virginia is his new friend's housekeeper, Virginia insists that Jimmy cancel the outing. In an effort to keep the peace, Jimmy and his friend arrange a dinner at the Chance house."], [1783403527, 1783404821, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783404821, 1783406115, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783406115, 1783407421, "Schitt's Creek", "Little Sister", "S1 E11", "Moira's estranged sister, Deedee, pays an unexpected visit, while David agrees to talk with one of Jocelyn's students about being \"different\"."], [1783407421, 1783408725, "Schitt's Creek", "Surprise Party", "S1 E12", "Johnny tries to arrange a surprise birthday party for Moira. Things backfire when Moira, unwittingly, takes over the planning of her own party."], [1783408725, 1783411365, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783411365, 1783414120, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783414120, 1783415423, "Raising Hope", "A Germ of a Story", "S1 E13", "When Sabrina points out to Jimmy just how many germs are lurking around his house, the Chance family becomes obsessed with cleanliness. Finding it impossible to keep Maw Maw clean, they move her to the backyard greenhouse, but after watching some old family movies, they discover a surprising secret that has kept them healthy all these years."], [1783415423, 1783416727, "Raising Hope", "What Up, Cuz?", "S1 E14", "Virginia's cousin Delilah, who struggles to make ends meet, pays a visit to the Chance family unannounced, determined to claim her share of Maw Maw's - whom she thinks died years ago - estate. Further tension builds when Delilah admits she still has a crush on Burt. Meanwhile, Jimmy babysits Maw Maw and panics when she takes off on Sabrina's moped."], [1783416727, 1783418024, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783418024, 1783419322, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783419322, 1783420628, "Schitt's Creek", "Town for Sale", "S1 E13", "Johnny finds a potential buyer for the town, while David and Alexis discover they may have become more attached to Schitt’s Creek than they ever thought possible."], [1783420628, 1783421938, "Schitt's Creek", "Finding David", "S2 E1", "The Roses search for their missing son, David, while Alexis takes her relationship with Mutt to the next level despite technically being engaged to Ted."], [1783421938, 1783424643, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783424643, 1783427333, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783427333, 1783428637, "Raising Hope", "Snip Snip", "S1 E15", "Barely reconciled with having to help care for Jimmy's baby, Burt and Virginia realize their unsafe sex is no longer acceptable. Burt defends his manhood but is outvoted, so Jimmy drags him to Dr. Burwitz for a vasectomy and patiently humors him to get the surgery done."], [1783428637, 1783429940, "Raising Hope", "The Cultish Personality", "S1 E16", "The Chances prepare to host once more Burt's cousin Mike, a hopeless loser even by their standards. Yet they find him a changed man, as neat member of a loony sect, one of Tanya's four 'brother-husbands'. Jimmy is inadvertently attracted by their neat, apparently harmonious 'fraternity'."], [1783429940, 1783431238, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783431238, 1783432532, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783432532, 1783433842, "Schitt's Creek", "Family Dinner", "S2 E2", "Moira decides to cook dinner with the help of David. Johnny scopes out an office for his consulting business. And Alexis finally comes clean with Ted about their engagement."], [1783433842, 1783435152, "Schitt's Creek", "Jazzagals", "S2 E3", "Moira attempts to join the town’s a cappella group. Alexis enjoys the heady first days of her latest relationship. And Johnny helps out at Bob’s Garage despite himself."], [1783435152, 1783437791, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783437791, 1783440784, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783440784, 1783442089, "Raising Hope", "Mongooses", "S1 E17", "The Chance family goes to see a lawyer to get their wills done, and Burt is insulted when Jimmy chooses Sabrina over him. Meanwhile, Sabrina is overcome with emotion by the news, while Maw Maw thinks mongooses are infesting the household."], [1783442089, 1783443393, "Raising Hope", "Cheaters", "S1 E18", "Jimmy hopes gullible Sabrina's boyfriend Wyatt may be cheating on her in college, so he insists to go with her to Wyatt's frat's wild costume party, but conclusive evidence is perilously hard to find. In order to have contact with generation peers, Maw Maw goes to Dead Tooth's daycare."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783348770, 1783351359, "Glee", "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783351359, 1783354002, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783354002, 1783356591, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783356591, 1783359223, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783359223, 1783361778, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the d facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783391120, 1783393779, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783393779, 1783396373, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783396373, 1783398967, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783398967, 1783401581, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783401581, 1783404187, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783404187, 1783406797, "Glee", "Throwdown", "S1 E7", "To cause distension among the Glee Club members, Sue forces the students to co
