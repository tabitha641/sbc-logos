ey all keep disappearing one by one but who's behind it?"], [1783594296, 1783595687, "The Wonder Years", "Odd Man Out", "S3 E6", "When Kevin and Paul get on each other's nerves, they try to become best friends with two other boys."], [1783595687, 1783597083, "The Wonder Years", "The Family Car", "S3 E7", "When the Arnold family car breaks down and Jack can't fix it, Kevin hopes his father will buy something more fancy."], [1783597083, 1783598477, "The Fresh Prince of Bel-Air", "The Butler Did It", "S2 E11", "Philip and Vivian take a weekend vacation and leave the kids home alone, Hilary and Carlton set up a video shoot with Bell Biv De Voe in their house, and then everyone must rush to clean up after Philip and Vivian decide to come home early."], [1783598477, 1783599866, "The Fresh Prince of Bel-Air", "Something for Nothing", "S2 E12", "Will gets lucky at a fundraiser and wins some money. When Will doesn't follow the club's tradition, it starts rumors about the Banks family. Ashley is too young to go to the fundraiser, so she and Geoffrey set up their own poker night."], [1783599866, 1783602613, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783602613, 1783605368, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783605368, 1783606734, "Jem and the Holograms", "The Jazz Player", "S3 E11", "Jem tries to reunite the Tapps Tucket Quartet, an old jazz group. Meanwhile, Eric Raymond is trying to put out a compilation album of jazz songs. Eric and the Misfits do everything in their power to stop the Tapps Tucket Quartet from getting back together so Eric's jazz album can be released."], [1783606734, 1783608099, "Jem and the Holograms", "Danse Time", "S3 E12", "The Holograms want to submit a video with the theme of friendship for a competition. But in the process, Danse is injured. Will she heal in time for them to make the perfect video?"], [1783608099, 1783609476, "The Wonder Years", "The Pimple", "S3 E8", "Just when the Pruitts and their daughter Gina are coming to visit, Kevin gets a giant pimple. With only a few days until the Pruitts arrive, Kevin resorts to all kinds of methods to get rid of the unsightly blemish."], [1783609476, 1783610871, "The Wonder Years", "Math Class Squared", "S3 E9", "Kevin decides cheating is the only way to get ahead in math class."], [1783610871, 1783612265, "The Fresh Prince of Bel-Air", "Christmas Show", "S2 E13", "On a family ski trip, the Banks find that they must come up with Christmas gifts from the heart after their belongings are stolen."], [1783612265, 1783613661, "The Fresh Prince of Bel-Air", "Hilary Gets a Life", "S2 E14", "Hilary must work for a caterer after her credit cards are cancelled."], [1783613661, 1783616422, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783616422, 1783619208, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783619208, 1783620573, "Jem and the Holograms", "Roxy Rumbles", "S3 E13", "Roxy wins the lottery and goes home to Philadelphia  to show off her new lavish lifestyle to her old friends. Meanwhile, Jem and the Holograms are in Philadelphia on a tour to promote literacy. What no one knows is Roxy is illiterate. Roxy decides to throw a bigger party than the Holograms and ends up without any money left because she didn't read the fine print on her contracts. In the end, she d"], [1783620573, 1783621940, "Jem and the Holograms", "Alone Again", "S3 E14", "Laura Holloway, a new Starlight Girl with a talent for music, falls victim to Bobby Braddock, a drug dealer at her school. Ashley plays an important role again, this time helping to confront Laura and eventually help the police catch Bobby."], [1783621940, 1783623300, "The Wonder Years", "Rock 'n Roll", "S3 E10", "When Kevin watches The Beatles on TV he notices a new kid at his school named Larry. Larry asks Kevin does he want to join his band. After turning him down Larry asks again but Kevin's dad tells him \"No.\" So he buys his own guitar. While in the band Larry tells Kevin and the other band members that he got them a gig which Kevin feels they are not ready for."], [1783623300, 1783624671, "The Wonder Years", "Don't You Know Anything About Women?", "S3 E11", "Kevin wants to take Susan Fisher to the dance, but she has a boyfriend, Donald Wallach. However, he hears rumors that they have broken up, so he's about to ask her until Donald interferes. Linda Sloan, his lab partner, suggests that they go as friends so they do.\n\nThey have a good time in the beginning, but it turns sour when while Linda is dancing with Steve Padway, Kevin dances with Susan and th"], [1783624671, 1783626065, "The Fresh Prince of Bel-Air", "My Brother's Keeper", "S2 E15", "Will has a game coming up with Malibu Prep in which a scout will be in the crowd. He meets a player from the other team. After learning that Marcus has a child Will must choose between being greedy or realizing what the scholarship would mean to Marcus."], [1783626065, 1783627460, "The Fresh Prince of Bel-Air", "Geoffrey Cleans Up", "S2 E16", "Geoffrey falls for the woman next door while thinking she is a butler. When he finds out she is just visiting and is worth 25 million dollars he must decide whether he wants to continue seeing her, or not."], [1783627460, 1783631579, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783631579, 1783634364, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783634364, 1783635730, "Jem and the Holograms", "KJEM", "S3 E15", "A group of college students (including a high school friend of Kimber's) ask Jem to help a struggling radio station that they intern at, that a larger rival station wants to buy out and get rid of."], [1783635730, 1783637126, "The Wonder Years", "The Powers That Be", "S3 E12", "Trouble begins in the Arnold household when Grandpa Arnold arrives and gives Kevin a dog - a responsibility Jack doesn't think Kevin can handle."], [1783637126, 1783638500, "The Wonder Years", "She, My Friend and I", "S3 E13", "Paul and his girlfriend Carla have a falling out. Wanting to make his friend feel better, Kevin offers to set Paul up with Winnie. At first Kevin is happy about the idea, but after awhile, he begins to wonder if he's made a mistake."], [1783638500, 1783639894, "The Fresh Prince of Bel-Air", "Community Action", "S2 E17", "When Hillary is ordered to do community service at a free clinic, the doctor in charge becomes the antidote for her marriage-mindedness."], [1783639894, 1783641288, "The Fresh Prince of Bel-Air", "Ill Will", "S2 E18", "The family fears a steamy exposé when Geoffrey begins his memoirs, while Will fears the scalpel when he enters the hospital, kicking and screaming, for a tonsillectomy."], [1783641288, 1783644013, "Beverly Hills, 90210", "Everybody's Talkin' 'Bout It", "S2 E21", "Andrea is outraged when the school refuses to allow students to take part in a health survey that includes questions about sex. She goes before the school board and introduces a proposal to distribute condoms at West Beverly."], [1783644013, 1783646769, "Beverly Hills, 90210", "Baby Makes Five", "S2 E22", "Kelly confides in Brenda and Donna about her mother's pregnancy, but they can't keep a secret. David tells Donna that Mel is planning to propose, then learns about the pregnancy. He doesn't share the news with his father, who is clueless about Jackie's condition. Jackie assumes that Mel only wants to marry her to fulfill his obligation, so she dumps him.  Music: \"\"All 4 Love\"\" by Color Me Badd (#1"], [1783646769, 1783648155, "The Wonder Years", "The St. Valentine's Day Massacre", "S3 E14", "To make up for being rude and insenstive to Winnie, Kevin makes her a Valentine's card, but it is accidently placed in Becky Slater's locker. When Becky finds the card, she thinks Kevin wants her back - setting the two up for a showdown."], [1783648155, 1783649541, "The Wonder Years", "The Tree House", "S3 E15", "When Kevin and his dad build a treehouse in the backyard, they discover they get a good view of an attractive neighbor planting her tomatoes. Meanwhile, Doug is in shock after having heard \"the talk\" from his dad."], [1783649541, 1783650935, "The Fresh Prince of Bel-Air", "Eyes on the Prize", "S2 E19", "Needing a game show partner, Will must choose between bickering friends."], [1783650935, 1783652323, "The Fresh Prince of Bel-Air", "Those Were the Days", "S2 E20", "Philip and Vivian welcome a '60s radical, who arouses the FBI's interest and influences Will and Carlton to take action over the firing of a nonconformist teacher."], [1783652323, 1783655107, "Beverly Hills, 90210", "Cardio Funk", "S2 E23", "Dylan's friend Sarah comes to an AA meeting. He offers his support, and she begins to rely on him. She seeks his help in throwing her abusive boyfriend out of the apartment.  Music: \"\"We Want the Funk\"\" by Gerardo (#16, 1991); \"\"Do Wah Diddy Diddy\"\" (Manfred Mann - #1, 1964), performed by the cast; \"\"Your Cheatin' Heart\"\" (Hank Williams), performed by Patricia Michel; \"\"Be Bop-a-Lul"], [1783655107, 1783657861, "Beverly Hills, 90210", "The Pit and the Pendulum", "S2 E24", "Brandon participates in a teen review committee that provides input to one of Jim's clients, who is building a gigantic new mall. Marcie, the developer's college-age daughter, aggressively pursues Brandon. Brandon is incensed to learn that the project would require the demolition of the Peach Pit. He squares off with Jim, who promises to stand up for Nat's interests. Brandon takes Marcie to the Pe"], [1783657861, 1783659227, "The Wonder Years", "The Glee Club", "S3 E16", "A new student teacher tries to make something of the 8th-grade boys' Glee Club, but without much success."], [1783659227, 1783660621, "The Wonder Years", "Night Out", "S3 E17", "Pressure is brought to bear on Kevin and Winnie's relationship when they are invited to a notorious make-out party."], [1783660621, 1783662015, "The Fresh Prince of Bel-Air", "Vying for Attention", "S2 E21", "Will dislikes his mother's new boyfriend."], [1783662015, 1783663408, "The Fresh Prince of Bel-Air", "The Aunt Who Came to Dinner", "S2 E22", "Aunt Helen arrives unexpectedly, and upsets Will and Carlton's plans for a rendezvous with two French women."], [1783663408, 1783666193, "Beverly Hills, 90210", "Meeting Mr. Pony", "S2 E25", "Brenda is held up at gunpoint by an armed robber during an after-hours hold up at the Peach Pit. She starts having waking nightmares of the event and visits a psychiatrist who diagnoses Brenda with post traumatic stress disorder. Brenda identifies her attacker in a police line-up and is startled to learn that her attacker is only seventeen years old."], [1783666193, 1783668977, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"], [1783668977, 1783670369, "The Wonder Years", "Faith", "S3 E18", "Kevin is forced to ponder life and death after he's asked to write his obituary for a school assignment. Jack is facing tax season and Norma usually does most of the work, but she loses all the receipts for the year."], [1783670369, 1783671730, "The Wonder Years", "The Unnatural", "S3 E19", "Kevin is persuaded the the baseball coach to try out for the team. Even though he's not playing as well as some of the others he keeps making it to the next cut because his father saved the coach's life when they were in the war together."], [1783671730, 1783673124, "The Fresh Prince of Bel-Air", "Be My Baby Tonight", "S2 E23", "Ashley cringes when the family oohs and aahs over her relationship with Kevin , but Will chokes when she asks him about sex - and her curiosity about reproduction sends Will to a pregnancy counseling center."], [1783673124, 1783674498, "The Fresh Prince of Bel-Air", "Strip-Tease for Two", "S2 E24", "Will and Carlton lose their shirts investing on a tip - then take jobs as strippers to recoup their losses and get Vivian's bracelet out of hock."], [1783674498, 1783677199, "Beverly Hills, 90210", "Mexican Standoff", "S2 E27", "Brenda upsets her father by consistently violating her curfew. She promises to demonstrate more mature behavior. Jim and Cindy agree to let Brenda join Dylan for a weekend in Mexico. Brenda falls asleep while watching a movie at Dylan's, and doesn't come home until 4 AM. Her parents forbid her from taking the trip. Dylan encourages Brenda to stand up for herself, but she instead tells Jim and Cind"], [1783677199, 1783679918, "Beverly Hills, 90210", "Wedding Bell Blues", "S2 E28", "A furious Jim goes to the Mexican border to retrieve Brenda. Jim bans Dylan from the Walsh house. Jackie learns that Kelly covered for Brenda, and embarrasses her by yelling at her in front of Jake.\n\nMusic: \"\"Wedding Bell Blues\"\" by The Fifth Dimension (#1, 1969); \"\"Blue Moon\"\" (Glen Gray - #1, 1"], [1783679918, 1783681330, "The Wonder Years", "Goodbye", "S3 E20", "When Kevin thinks the best he can do in math is a B, his teacher Mr. Collins sets him the task of getting an A and even offers him private lessons. When Mr. Collins suddenly pulls out of the lessons shortly before the exams, Kevin feels betrayed and fills his exam with nonsensical answers."], [1783681330, 1783682719, "The Wonder Years", "Cocoa and Sympathy", "S3 E21", "When Paul is voted \"Brainiest\" on this years Lisa Berlini Poll, he goes through some self esteem problems. That is until Kevin's mom tries to help Paul's confidence and in return Paul develops a crush on Kevin's mom."], [1783682719, 1783684114, "The Fresh Prince of Bel-Air", "How I Spent My Summer Vacation", "S3 E1", "Will returns home from spending the summer in Philadelphia with a new look that doesn't sit well with Uncle Phil."]]}, {"id": "5", "name": "The Fifth Dimension", "a": "the-fifth-dimension", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/fifth-dimension-v2.png", "progs": [[1783588326, 1783591120, "Quantum Leap", "The Wrong Stuff", "S4 E7", "January 24, 1961: The fates make a monkey out of Sam when he leaps into Bobo, an astro-chimp who must avoid succumbing to the experiments of an Air Force neurologist."], [1783591120, 1783593913, "Quantum Leap", "Dreams", "S4 E8", "February 28, 1979: It's more like a nightmare when Sam leaps into a detective, investigating a gruesome murder. He may be next if he doesn't find out who eviscerated the victim and his only hope is the victim's catatonic son and her husband's psychiatrist. The horrific flashbacks he's experiencing don't help matters much either."], [1783593913, 1783595467, "The Twilight Zone", "The Silence", "S2 E25", "Annoyed by fellow country club member Jamie Tennyson's constant chatter, Colonel Archie Taylor bets half a million dollars that Jamie cannot be completely silent for one year while living in a glass enclosure in the club's basement."], [1783595467, 1783597032, "The Twilight Zone", "Shadow Play", "S2 E26", "Convicted killer Adam Grant is trapped in a recurring nightmare in which he is sentenced to death by electrocution. He tries to convince those around him that they are imaginary and will cease to exist if he is executed."], [1783597032, 1783599829, "Quantum Leap", "A Single Drop of Rain", "S4 E9", "September 7, 1953: A devastating drought will be the ruin of a small town unless Sam, as Billy Beaumont, \"purveyor of precipitation and maker of rain,\" can find a way to make it rain, while keeping his family together in the process."], [1783599829, 1783602587, "Quantum Leap", "Unchained", "S4 E10", "November 2, 1956: Sam and a fellow convict named Boone are the defiant ones when Sam has to rescue his companion from a fifteen-year sentence on a chain gang."], [1783602587, 1783604140, "The Twilight Zone", "The Mind and the Matter", "S2 E27", "A book on the power of thought enables an irritable worker to re-create the world exactly as he wants it. But what he wants and what he gets are two different things!"], [1783604140, 1783605692, "The Twilight Zone", "Will the Real Martian Please Stand Up?", "S2 E28", "Following a frantic phone call about a crashed spaceship on a winter night, state troopers Bill Padgett and Dan Perry try to determine who among the bus passengers at a snowed-in roadside diner is a visitor from another world."], [1783605692, 1783608514, "Quantum Leap", "The Play's the Thing", "S4 E11", "September 9, 1969: May meets December when Sam leaps into a young actor in love with an older woman, who is also an aspiring singer. If he can't boost her confidence and help her get her career on track, she will face a \"fate worse than death,\" returning with her son to Cleveland."], [1783608514, 1783611340, "Quantum Leap", "Running for Honor", "S4 E12", "June 11, 1964: As a track star in a Navy college, Sam must prevent the death of his ex- roommate, who was expelled because he was gay, and who is slated to die at the hands of a group of bigoted cadets."], [1783611340, 1783612906, "The Twilight Zone", "The Obsolete Man", "S2 E29", "In a future state where religion and books have been banned, a librarian is judged obsolete and sentenced to death."], [1783612906, 1783614452, "The Twilight Zone", "Two", "S3 E1", "In a futuristic world a man and a woman, from opposing sides in a devastating war, meet in a deserted city. They don't share a common language and she is quite wary of her opponent, though he doesn't appear aggressive in any way. When she attempts to kill him, he goes off on his own. It's obvious that society and civilization has been destroyed and she begins to reconsider."], [1783614452, 1783617278, "Quantum Leap", "Temptation Eyes", "S4 E13", "February 1, 1985: A serial killer stalks San Francisco while Sam as Dillion Powell, a TV reporter, protects a beautiful psychic who's working on the case, from becoming the next victim. The young lady is very clear of sight, as Sam and Al soon discover."], [1783617278, 1783620102, "Quantum Leap", "The Last Gunfighter", "S4 E14", "November 28, 1957: Sam finds himself in the life of Tyler Meanes, a teller of tall tales who faces death at the hand of an old friend in a shootout at high noon."], [1783620102, 1783621643, "The Twilight Zone", "The Arrival", "S3 E2", "A plane lands safely, but all its passengers, pilot and crew are missing."], [1783621643, 1783623187, "The Twilight Zone", "The Shelter", "S3 E3", "A dinner party for Bill Stockton's birthday is interrupted by a bulletin warning of an impending nuclear attack. As the neighbors scramble to prepare, they turn against the Stockton's, the only family that installed a bomb shelter."], [1783623187, 1783626010, "Quantum Leap", "A Song for the Soul", "S4 E15", "April 7, 1963: As a backup singer in a black, amateur girl group Sam finds between the fifteen year-old lead singer and her father as he attempts to rescue the girl from a sleazy night club owner's clutches."], [1783626010, 1783628834, "Quantum Leap", "Ghost Ship", "S4 E16", "August 13, 1956: Flying over the Bermuda Triangle, Sam, as the co-pilot, must prevent the flight from returning to Virginia, to get a seriously ill passenger to a doctor before she dies. Flying through the triangle is riskier than it seems, and Sam, deprived of Al's help when the hologram fades out, must get them through alive."], [1783628834, 1783630376, "The Twilight Zone", "The Passersby", "S3 E4", "On the road home from the Civil War, a Confederate soldier stops at a burned-out house and gets to know the owner, a recent widow."], [1783630376, 1783631916, "The Twilight Zone", "A Game of Pool", "S3 E5", "Frustrated pool champion Jesse Cardiff has beaten everyone except for the deceased James Howard \"Fats\" Brown. Jesse can only curse his name. But guess who just walked into the pool room on Randolph Street?"], [1783631916, 1783634696, "Quantum Leap", "Roberto!", "S4 E17", "January 27, 1982: Sam, as \"Roberto!\" is a tabloid talk show host a la Geraldo who, with an asthmatic rival and co-worker, tries to uncover a mystery at a local chemical plant, a mystery, which may prove to be deadly for his co-worker."], [1783634696, 1783637493, "Quantum Leap", "It's A Wonderful Leap", "S4 E18", "May 10, 1958: Sam finds himself behind the wheel of a New York taxicab, in the life of Max Greenman, a driver striving to win his own tag, a license to drive his own cab. His mission is aided with the help of a woman who claims to be a guardian angel."], [1783637493, 1783639035, "The Twilight Zone", "The Mirror", "S3 E6", "After a poor but ambitious Central American farm worker overthrows his country's tyrannical leader, he believes he sees assassins everywhere. A look in the mirror reveals his most dangerous enemy."], [1783639035, 1783640576, "The Twilight Zone", "The Grave", "S3 E7", "Conny Miller rides into the hometown of Pinto Sykes, the man he's been tracking. He finds that Sykes has been gunned down by townsmen but no one knows who fired the fatal bullet. He is challenged by three of the townsmen to a grisly wager."], [1783640576, 1783643422, "Quantum Leap", "Moments to Live", "S4 E19", "May 4, 1985: Sam is a soap opera heart surgeon and the obsession of a love-struck, if somewhat deranged fan. He must escape from the woman and her husband who kidnap him for reproductive purposes"], [1783643422, 1783646247, "Quantum Leap", "The Curse of Ptah-Hotep", "S4 E20", "March 2, 1957: It's almost as though Sam were on vacation when, as Egyptologist Dale Conway, he gets to read hieroglyphics, search lost tombs, and, of course, visit Egypt. But between an encroaching sandstorm, computer glitches back at the Project, the suspicious deaths of the guides, and a 3000-year-old curse to round things off, Sam has very little time to play in the sand."], [1783646247, 1783647786, "The Twilight Zone", "It's a Good Life", "S3 E8", "On an isolated family farm in Peakesville, Ohio, young Anthony Fremont, who has vast mental powers but lacks emotional development, holds his terrified family and neighbors in thrall to his every juvenile wish."], [1783647786, 1783649325, "The Twilight Zone", "Deaths-Head Revisited", "S3 E9", "Former German SS Captain Gunther Lutze returns to Dachau concentration camp and begins reminiscing about the power he enjoyed there during \"the good old days\", until he finds himself on trial by the ghosts of those who died at his hands."], [1783649325, 1783652149, "Quantum Leap", "Stand Up", "S4 E21", "April 30, 1959: Sam, as the singing half of a comedy team, soon finds that trying to convince two people that they're truly in love is no laughing matter, especially when one of them is the object of a sleazy casino owner's desire."], [1783652149, 1783654974, "Quantum Leap", "A Leap for Lisa", "S4 E22", "June 25, 1957: Sam leaps into Al Calavicci to prevent the death of his married lover. But when Sam accidentally alters history, and finds out too late about her untimely demise, it could mean the gas chamber for Al and disturbingly a whole new situation at Project Quantum Leap."], [1783654974, 1783656514, "The Twilight Zone", "The Midnight Sun", "S3 E10", "The Earth's orbit has been changed, drawing ever closer to the sun and promising imminent destruction."], [1783656514, 1783658055, "The Twilight Zone", "Still Valley", "S3 E11", "Confederacy scout Sgt. Joseph Paradine finds a town full of Union soldiers, and an old man who claims he used witchcraft to paralyze them."], [1783658055, 1783660883, "Quantum Leap", "Lee Harvey Oswald (1)", "S5 E1", "October 5, 1957 - November 22, 1963: As a result of leaping again before he had a chance to complete his original mission, Sam finds himself leaping back and forth through the life of Lee Harvey Oswald. Following the sole assassin theory, Sam and Al attempt to prevent Oswald's attack on John F. Kennedy. But, with each leap giving Oswald more control over Sam's body, history seems doomed to repeat "], [1783660883, 1783663689, "Quantum Leap", "Lee Harvey Oswald (2)", "S5 E2", "October 5, 1957 - November 22, 1963: As a result of leaping again before he had a chance to complete his original mission, Sam finds himself leaping back and forth through the life of Lee Harvey Oswald. Following the sole assassin theory, Sam and Al attempt to prevent Oswald's attack on John F. Kennedy. But, with each leap giving Oswald more control over Sam's body, history seems doomed to repeat "], [1783663689, 1783665228, "The Twilight Zone", "The Jungle", "S3 E12", "Engineer Alan Richards who has recently come home to New York City from his company's controversial hydroelectric project in Africa is plagued by both superstitions and the dire warnings of a native witch doctor."], [1783665228, 1783666768, "The Twilight Zone", "Once Upon a Time", "S3 E13", "In 1890, janitor Woodrow Mulligan uses his employers' invention to transport himself to the future. He imagines an Eden but finds a polluted, busy world that he doesn't find at all attractive. He meets Rollo who is also disgusted with the world he lives imagining life in the 1890s as idyllic. When Woodrow goes back to his own time Rollo goes with him but he is soon bored without any of the conveni"], [1783666768, 1783669576, "Quantum Leap", "Leaping of the Shrew", "S5 E3", "September 27, 1956: It's Robinson Crusoe with a twist when Sam leaps into a Greek sailor stranded on a deserted island with a beautiful young rich woman who appears to be less than fond of both him and their stranded situation."], [1783669576, 1783672387, "Quantum Leap", "Nowhere to Run", "S5 E4", "August 10, 1968: As a Marine captain whose legs were amputated after a mishap in Vietnam, Sam finds himself in a veteran's hospital, where he must prevent the suicide of a fellow patient who would rather be dead than face life paralyzed from the neck down. Making matters worse, his wife seems incapable of accepting the fact that she and Sam's host can still lead a normal life, in spite of his cond"], [1783672387, 1783673930, "The Twilight Zone", "Five Characters in Search of an Exit", "S3 E14", "An American army major awakens in a small circular unfurnished room with no idea of his name or how he got there. Four other people are there with him and they all begin to question how they got there and, more importantly, how to escape."], [1783673930, 1783675471, "The Twilight Zone", "A Quality of Mercy", "S3 E15", "A gung ho young soldier gets a new viewpoint on war when he inexplicably changes places with a Japanese officer trying to stop his superior from leading a charge against American forces."], [1783675471, 1783678222, "Quantum Leap", "Killin' Time", "S5 E5", "June 18, 1958: Sam leaps into a tricky situation as an escaped killer holed up in a house with a mother and daughter as hostages. Escape isn't going to be easy for either Sam or his hostages, when the real killer breaks out of the waiting room, stranding Sam in the past, destined to die at the hands of a vengeful sheriff."], [1783678222, 1783681032, "Quantum Leap", "Star Light, Star Bright", "S5 E6", "May 21, 1966: Sam leaps into a 79-year-old man whose son wants to have him committed when he claims to have seen UFO's. Sam is kept busy as he tries to keep the family together, prevent the future drug overdose of \"his\" grandson, and avoid the sinister plans of the military, all before the next anticipated UFO sighting."], [1783681032, 1783682572, "The Twilight Zone", "Nothing in the Dark", "S3 E16", "Elderly urban dweller Wanda Dunn has fought with Death a thousand times and always won. Now she is afraid to let wounded policeman Harold Beldon in her tenement's door for fear that he is Death incarnate. Is he?"], [1783682572, 1783684114, "The Twilight Zone", "One More Pallbearer", "S3 E17", "Paul Radin has invited three people to join him in his bomb shelter."]]}, {"id": "6", "name": "Saturday Morning", "a": "saturday-morning", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/saturday-morning-v1.png", "progs": [[1783589425, 1783590790, "Jem and the Holograms", "Roxy Rumbles", "S3 E13", "Roxy wins the lottery and goes home to Philadelphia  to show off her new lavish lifestyle to her old friends. Meanwhile, Jem and the Holograms are in Philadelphia on a tour to promote literacy. What no one knows is Roxy is illiterate. Roxy decides to throw a bigger party than the Holograms and ends up without any money left because she didn't read the fine print on her contracts. In the end, she d"], [1783590790, 1783592157, "Jem and the Holograms", "Alone Again", "S3 E14", "Laura Holloway, a new Starlight Girl with a talent for music, falls victim to Bobby Braddock, a drug dealer at her school. Ashley plays an important role again, this time helping to confront Laura and eventually help the police catch Bobby."], [1783592157, 1783593548, "Pee-wee's Playhouse", "Episode 14", "S2 E14", "Saturday Morning"], [1783593548, 1783594938, "Pee-wee's Playhouse", "Episode 15", "S2 E15", "Saturday Morning"], [1783594938, 1783596267, "Teenage Mutant Ninja Turtles", "Shredderville", "S3 E43", "The Turtles are frustrated that they let Shredder slip away from them again. They feel like giving up, and wish they had never been born."], [1783596267, 1783597599, "Teenage Mutant Ninja Turtles", "Bye Bye Fly", "S3 E44", "An interdimensional alien spacecraft leads Baxter Stockman to his latest vengeful plot to destroy the Turtles and Shredder."], [1783597599, 1783598893, "He-Man and the Masters of the Universe", "The Search", "S1 E41", "Zodac comes to Grayskull and tells The Sorceress that Eternia is in great danger as Skeletor is searching for the Starseed, the single most powerful object in the universe- a small chunk of cosmic matter left over from the big bang, which can turn its holder's thoughts into reality.  The Sorceress summons He-Man, and together with Battle Cat and Orko, he sets off on a race to reach the Starseed be"], [1783598893, 1783600187, "He-Man and the Masters of the Universe", "Eternal Darkness", "S1 E42", "Darkdream, an evil being who can control people's dreams, has been freed from the seal in which he was imprisoned, and is now using his powers to once again give the people of Eternia terrible nightmares. With his allies Evil-Lyn and evil magician Trebor, Darkdream plans to bring eternal darkness to Eternia so he can roam it freely and bring it his reign of terror once again...\n"], [1783600187, 1783601386, "Power Rangers", "Rita's Seed of Evil", "S1 E41", "While the Rangers plant trees in the park, Squatt plants an evil seed that grows into the Octoplant."], [1783601386, 1783602603, "Power Rangers", "A Pig Surprise", "S1 E42", "Rita casts a spell on a helpless pig turning him into the Pudgy Pig monster."], [1783602603, 1783603969, "Jem and the Holograms", "KJEM", "S3 E15", "A group of college students (including a high school friend of Kimber's) ask Jem to help a struggling radio station that they intern at, that a larger rival station wants to buy out and get rid of."], [1783603969, 1783605368, "Pee-wee's Playhouse", "Episode 16", "S2 E16", "Saturday Morning"], [1783605368, 1783606761, "Pee-wee's Playhouse", "Episode 17", "S2 E17", "Saturday Morning"], [1783606761, 1783608096, "Teenage Mutant Ninja Turtles", "The Big Rip Off", "S3 E45", "After several failed attempts to get the Technodrome re-energized, Shredder and Krang run one last-ditch distraction for the Turtles at Fort Charles while Bebop and Rocksteady steal energy fuel cells from the neighboring space research center."], [1783608096, 1783609430, "Teenage Mutant Ninja Turtles", "The Big Break In", "S3 E46", "The Technodrome is up and running again, and it is up to the Turtles to hinder Shredder and Krang from getting to the surface."], [1783609430, 1783610723, "He-Man and the Masters of the Universe", "The Royal Cousin", "S1 E43", "Prince Adam's cousin, the bratty and snobbish Prince Jeremy, visits the Royal Palace, and quickly starts to annoy everyone with his rudeness and spoilt behavior.  When Evil-Lyn and Tri-Clops arrive on the scene, they take advantage of Jeremy's spoiltness to lead him into unwittingly helping them in a scheme to break into Grayskull.....\n"], [1783610723, 1783612016, "He-Man and the Masters of the Universe", "Return of Evil", "S1 E44", "A fierce electrical storm brings electronoid Aramesh – a robot made of pure energy – to Eternia from Orko's dimension. He is hunting for Orko, who years ago was entrusted to guard a powerful magical sphere. Skeletor oversees Aramesh's arrival and decides that he could use him to his advantage...\n"], [1783612016, 1783613236, "Power Rangers", "Something Fishy", "S1 E43", "Billy must overcome his fear of fish to save his friends from Rita's fishy new monster."], [1783613236, 1783614417, "Power Rangers", "Lions & Blizzards", "S1 E44", "Zack finally gets a date with the girl of his dreams at the same time as Rita turns the Noble Lion Trophy into her latest monster."], [1783614417, 1783615810, "Pee-wee's Playhouse", "Episode 18", "S2 E18", "Saturday Morning"], [1783615810, 1783617200, "Pee-wee's Playhouse", "Episode 19", "S2 E19", "Saturday Morning"], [1783617200, 1783618533, "Teenage Mutant Ninja Turtles", "The Big Blow Out", "S3 E47", "After several setbacks, Shredder and Krang steal all of New York's electricity and charge it into a giant transdimensional gateway, designed to send Earth into Dimension X. The Turtles must defeat their enemies once and for all before Earth is destroyed by Krang's Rock Soldier army."], [1783618533, 1783619865, "Teenage Mutant Ninja Turtles", "Episode 48", "S3 E48", "Saturday Morning"], [1783619865, 1783621158, "He-Man and the Masters of the Universe", "Eye of the Beholder", "S1 E45", "A severe drought has suddenly consumed Planet Eternia, causing plants to die and machines to malfunction- even He-Man himself is weakening.  As the oxygen in the air becomes less and less, He-Man sets out to find the cause of the problem.  His investigations lead him to the Sea of Eternity, where he teams up with an insect man called Garth to solve the problem- which is being caused by none other "], [1783621158, 1783622451, "He-Man and the Masters of the Universe", "It's Not My Fault", "S1 E46", "Orko's friend Podi runs away after an accident at the Royal Palace and is captured by her father's longtime enemy, Rago. Rago has plans to use Podi for his evil schemes."], [1783622451, 1783623670, "Power Rangers", "Crystal of Nightmares", "S1 E45", "The teens go to the mountains for the weekend to study for a test while Goldar readies the Crystal of Nightmares to infiltrate the Rangers' dreams."], [1783623670, 1783624892, "Power Rangers", "To Flea or Not to Flee", "S1 E46", "Jason tries to find the owner of a stray dog while the Rangers try to save Ernie's Gym & Juice Bar from going out of business."], [1783624892, 1783626284, "Pee-wee's Playhouse", "Episode 20", "S2 E20", "Saturday Morning"], [1783626284, 1783627673, "Pee-wee's Playhouse", "Episode 21", "S2 E21", "Saturday Morning"], [1783627673, 1783629011, "Teenage Mutant Ninja Turtles", "Episode 49", "S3 E49", "Saturday Morning"], [1783629011, 1783630350, "Teenage Mutant Ninja Turtles", "Episode 50", "S3 E50", "Saturday Morning"], [1783630350, 1783631642, "He-Man and the Masters of the Universe", "Trouble in Arcadia", "S1 E47", "Adam and Teela stumble upon the hidden city of Arcadia, where the women live in luxury while the men work in the underground mines as slaves.  Adam is sent to the mines while Teela is accepted by the women- and it is up to her to prove the equality of the sexes and help the city's queen, Sumana, see the error of her ways.  Beneath ground Adam is hoping to do the same- but things become more diffic"], [1783631642, 1783632934, "He-Man and the Masters of the Universe", "Castle of Heroes", "S1 E48", "A strange little creature called Montiek, a former member of the Council of Evil with Skeletor, turns up at Snake Mountain with some warriors he found on ancient Earth. He is travelling the universe recruiting powerful warriors for his Castle of Heroes, so he can use them as slaves. He has come to Eternia in the hope of capturing He-Man for the Castle of Heroes, and sets up a series of tests which"], [1783632934, 1783634079, "Power Rangers", "Reign of the Jellyfish", "S1 E47", "Rita--determined to prevent future generations from remembering the Power Rangers--tries to stop them from burying a time capsule."], [1783634079, 1783635299, "Power Rangers", "Plague of the Mantis", "S1 E48", "Trini struggles to learn praying mantis style kung fu to defeat Rita's latest monster."], [1783635299, 1783636539, "Pee-wee's Playhouse", "Episode 22", "S2 E22", "Saturday Morning"], [1783636539, 1783637933, "Pee-wee's Playhouse", "Episode 23", "S2 E23", "Saturday Morning"], [1783637933, 1783639272, "Teenage Mutant Ninja Turtles", "Episode 51", "S3 E51", "Saturday Morning"], [1783639272, 1783640610, "Teenage Mutant Ninja Turtles", "Episode 52", "S3 E52", "Saturday Morning"], [1783640610, 1783641902, "He-Man and the Masters of the Universe", "Temple of the Sun", "S1 E49", "Whilst flying over the Sands of Time in the form of Zoar, The Sorceress is captured by a man called Nepthu, who has found his way into the Temple of the Sun and gained its power.  He-Man goes with Man-At-Arms and Cringer (who is insisting that he must not become Battle Cat this time) to the temple to rescue her."], [1783641902, 1783643194, "He-Man and the Masters of the Universe", "Wizard of Stone Mountain", "S1 E50", "Malik, a young wizard living inside Stone Mountain, is leading a lonely life, despairing endlessly over his hopeless love for Teela, who has never returned his interests. He is visited by a repulsive little creature called Locus, with whom he makes a pact in return for Teela. Locus sabotages the dam outside Malik's home, flooding the nearby fields, then he tricks Teela into thinking it was Malik w"], [1783643194, 1783644414, "Power Rangers", "Return of an Old Friend (1)", "S1 E49", "Rita demands the Power Rangers hand over their Power Coins if they ever want to see their parents again."], [1783644414, 1783645636, "Power Rangers", "Return of an Old Friend (2)", "S1 E50", "With their Power Coins in the hands of the enemy the Rangers have no choice but to turn to Tommy once more for help."], [1783645636, 1783646975, "Teenage Mutant Ninja Turtles", "Episode 53", "S3 E53", "Saturday Morning"], [1783646975, 1783648314, "Teenage Mutant Ninja Turtles", "Episode 54", "S3 E54", "Saturday Morning"], [1783648314, 1783649608, "He-Man and the Masters of the Universe", "Dree Elle's Return", "S1 E51", "Clawful and Trap Jaw have stolen ‘the Horn Of Evil' from Trolla and returned with it to Eternia, so Dree Elle, with her mischievous younger brother Yuckers, heads to Eternia to warn Orko and his friends of the imminent danger. The evil duo intend to use the horn's black magic on Castle Grayskull, but thats just half of the trouble in store, as Yucker's love of practical jokes not only causes irrit"], [1783649608, 1783650901, "He-Man and the Masters of the Universe", "The Sleepers Awaken", "S1 E52", "Adam and Teela visit an ancient castle where an evil Lord and Lady once lived, practising black magic by absorbing energy from the trees, until the trees died and they began a centuries-long sleep in their coffins.  As Adam and Teela ride some winged horses, Lady Valtera and Lord Tyran awake from their coffins.  Lord Tyran's appearance has been greatly disfigured by his evil ways- so severely that"], [1783650901, 1783652122, "Power Rangers", "Grumble Bee", "S1 E51", "Billy gets his first 'B' on a science test giving Rita the idea to send her Grumble Bee to Earth."], [1783652122, 1783653313, "Power Rangers", "Two Heads are Better Than One", "S1 E52", "Jason and Tommy teach a self-defense class to women while the Rangers fight a two-headed parrot monster."], [1783653313, 1783654652, "Teenage Mutant Ninja Turtles", "Episode 55", "S3 E55", "Saturday Morning"], [1783654652, 1783655991, "Teenage Mutant Ninja Turtles", "Episode 56", "S3 E56", "Saturday Morning"], [1783655991, 1783657285, "He-Man and the Masters of the Universe", "Return of the Gryphon", "S1 E53", "Trap Jaw and Beast Man steal the Jewel of the Gryphon and hide it in the Kingdom of Eternia where it is found by a young servant boy, named Thad. When the Gryphon finds out that the jewel is gone, Eternia could be in danger."], [1783657285, 1783658580, "He-Man and the Masters of the Universe", "The Return of Granamyr", "S1 E54", "Granamyr asks for He-Man's help. The youngest dragon, Torm, is in love with a human girl, but her father wishes for a test, which He-Man must take in Torm's place. Unfortunately, an evil wizard, Zem, also desires the girls heart."], [1783658580, 1783659782, "Power Rangers", "Fowl Play", "S1 E53", "Zack juggles watching over a group of children with battling the Peckster."], [1783659782, 1783661033, "Power Rangers", "Trick or Treat", "S1 E54", "Kimberly competes against Skull on a game show for a chance to win a brand new car while the Pumpkin Rapper seeks to ambush the Rangers."], [1783661033, 1783662373, "Teenage Mutant Ninja Turtles", "Episode 57", "S3 E57", "Saturday Morning"], [1783662373, 1783663712, "Teenage Mutant Ninja Turtles", "Episode 58", "S3 E58", "Saturday Morning"], [1783663712, 1783665005, "He-Man and the Masters of the Universe", "Pawns of the Game Master", "S1 E55", "A spacefaring gladiator called the Game Master lands on Eternia, intending to capture He-Man to make him fight for his amusement.  But when he sends his minions out to find He-Man, he is in the form of Adam and so He-Man is nowhere to be found.  So instead they capture Teela- but they also take Adam's Power Sword, meaning he is faced with the task of rescuing Teela as Adam!"], [1783665005, 1783666298, "He-Man and the Masters of the Universe", "The Huntsman", "S1 E56", "Baron Grod, an intrepid huntsman who kills animals in order to stuff them, is after the last living unicorn on Eternia.  Prince Adam and Teela must set out to save the unicorn and put an end to Grod's doings."], [1783666298, 1783667579, "Power Rangers", "Second Chance", "S1 E55", "Jason and Zach help Roger practice for the city soccer team and are finding it difficult to teach the discouraged boy. In an effort to \"help\" Roger, Rita sends the Soccadillo monster to attack them in the park. Meanwhile, Tommy's communicator is taken from him, making it impossible to reach him."], [1783667579, 1783668859, "Power Rangers", "On Fins and Needles", "S1 E56", "The Slippery Shark monster casts a spell over Jason and Tommy causing them to fight amongst each other."], [1783668859, 1783670199, "Teenage Mutant Ninja Turtles", "Episode 59", "S3 E59", "Saturday Morning"], [1783670199, 1783671539, "Teenage Mutant Ninja Turtles", "Episode 60", "S3 E60", "Saturday Morning"], [1783671539, 1783672833, "He-Man and the Masters of the Universe", "The Remedy", "S1 E57", "Man-At-Arms' mentor, Rohad, who taught him all his scientific skills, is dying and He-Man must set out to find the only cure, a rare plant.  Will he overcome the many obstacles in his way in time to save Rohad?"], [1783672833, 1783674127, "He-Man and the Masters of the Universe", "The Witch and the Warrior", "S1 E58", "An evil sorcerer, Kothos, tries to steal the Fountain of Life, as does Evil-Lyn. But one of Kothos' traps sends Evil-Lyn, along with Teela, into the middle of the desert where they have to work together to survive."], [1783674127, 1783675407, "Power Rangers", "Enter... The Lizzinator", "S1 E57", "Kimberly helps her younger cousin try out for the Angel Grove Junior High cheerleading team while Rita sends the mighty Lizzinator to Earth."], [1783675407, 1783676684, "Power Rangers", "Football Season", "S1 E58", "Tommy tries to learn how to play football in time to make the high school team and to stop Rita's Rhino Blaster."], [1783676684, 1783678024, "Teenage Mutant Ninja Turtles", "Episode 61", "S3 E61", "Saturday Morning"], [1783678024, 1783679365, "Teenage Mutant Ninja Turtles", "Episode 62", "S3 E62", "Saturday Morning"], [1783679365, 1783680658, "He-Man and the Masters of the Universe", "Evilseed", "S1 E59", "Strange living plants are gradually taking over Eternia. He-Man accuses Skeletor, and Skeletor accuses He-Man, but the real culprit is a curious plant-man called Evilseed, who intends to take over the whole planet with his plants. He-Man and Skeletor must reluctantly combine their powers in order to wither Evilseed's plot...\n"], [1783680658, 1783681952, "He-Man and the Masters of the Universe", "Search for the VHO", "S1 E60", "The Royal Historian, Hovar, and his son, Justin, come under attack by creatures while researching the historic ruins on an island. To help them, Man-At-Arms invents a VHO, which Teela and Adam must get to them before it's too late."], [1783681952, 1783683232, "Power Rangers", "Mighty Morphin' Mutants", "S1 E59", "Goldar trains select Putties to fight like the Rangers and gives them badges of darkness to look like and have the same powers as well. However, none are good enough to be the Red Ranger so Commander Crayfish becomes the leader. How can the rangers possibly defeat enemies against which they are perfectly matched?"], [1783683232, 1783684513, "Power Rangers", "An Oyster Stew", "S1 E60", "Zach is so madly infatuated with Angela that he wants to impress her with a pair of pearl earrings but can't find any that are affordable. Just when he gives up, an unexpected opportunity presents him with exactly what he was looking for. Little does he know that Rita has plans for his date with Angela, especially when the earrings cast a spell on all but Tommy and Zach. Both must face the Oysteri"]]}, {"id": "7", "name": "Weather on the 7s", "a": "weather-on-the-7s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/weather-on-the-7s-v2.png", "progs": [[1783589902, 1783611502, "Weather on the 7s", "", "", "Weather on the 7s"], [1783611502, 1783633102, "Weather on the 7s", "", "", "Weather on the 7s"], [1783633102, 1783654702, "Weather on the 7s", "", "", "Weather on the 7s"], [1783654702, 1783676302, "Weather on the 7s", "", "", "Weather on the 7s"], [1783676302, 1783683562, "Weather on the 7s", "", "", "Weather on the 7s"]]}, {"id": "20", "name": "Y2K", "a": "y2k", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/y2k-v2.png", "progs": [[1783588828, 1783590137, "Schitt's Creek", "Love Letters", "S5 E2", "A sleep-deprived Moira worries about a stack of old love letters addressed to Johnny from another woman, while David and Stevie are held up at David's store."], [1783590137, 1783591436, "The Goldbergs (2013)", "In Conclusion, Thanksgiving", "S3 E8", "Beverly insists the entire family gather for the holiday, but tension builds when brother-in-law Marvin tricks Pop-Pop into thinking Thanksgiving was at his house.Meanwhile, Pops passes the torch to Barry and Erica to give the holiday toast, resulting in them trying to one-up each other."], [1783591436, 1783592735, "The Goldbergs (2013)", "Wingmom", "S3 E9", "Inspired by “Top Gun,” Barry decides to join ROTC. Convinced it will help discipline him, Murray orders the Captain to prevent Barry from quitting when the going gets tough, prompting Beverly to join Barry, too! Meanwhile, Adam helps Pops get his swag back with a special librarian."], [1783592735, 1783594044, "Schitt's Creek", "The Plant", "S5 E3", "Alexis and Johnny hatch a plan to impress a motel reviewer, while David and Patrick search for a new apartment."], [1783594044, 1783595353, "Schitt's Creek", "The Dress", "S5 E4", "Johnny finds himself under financial pressure with the arrival of Moira’s high-priced red carpet gown for the Crows movie premiere. David is conned into taking a road trip with Stevie."], [1783595353, 1783596653, "The Goldbergs (2013)", "A Christmas Story", "S3 E10", "Disappointed with her unenthusiastic family during the holidays, Beverly creates “Super Hanukkah” to get them into the spirit but it’s too similar to Christmas. Meanwhile, Adam is annoyed that Barry is more interested in hanging with Lainey than him, so he triple-dog dares his brother with results neither one see coming."], [1783596653, 1783597952, "The Goldbergs (2013)", "The Tasty Boys", "S3 E11", "As Adam and Barry team up in a rap supergroup a la the Beastie Boys, Beverly presses Murray to let her remodel their kitchen."], [1783597952, 1783599261, "Schitt's Creek", "Housewarming", "S5 E5", "David and Patrick throw a housewarming party and Ted finally lets loose, while Johnny and Moira try their best to babysit Roland Jr. for the evening."], [1783599261, 1783600571, "Schitt's Creek", "Rock On!", "S5 E6", "Moira and the Jazzagals take Jocelyn out for a night at the casino, while Johnny tries to navigate an awkward conversation with Stevie about intimacy in the workplace."], [1783600571, 1783601871, "The Goldbergs (2013)", "Baio and Switch", "S3 E12", "Beverly volunteers for Hands Across America in hopes of getting closer to Barry and Erica. Adam gets himself into a sticky situation when he promises to take his best friend and his girlfriend, Dana, to the school dance."], [1783601871, 1783603171, "The Goldbergs (2013)", "Double Dare", "S3 E13", "Adam and Emmy's favorite TV game show holds auditions at their school. Murray and Barry are upset the Philadelphia Eagles have been losing until superstitious Barry becomes convinced Beverly is their good luck charm."], [1783603171, 1783604480, "Schitt's Creek", "A Whisper of Desire", "S5 E7", "Johnny suspects that Ted’s mom is attracted to him, while Moira can’t resist getting involved in a local musical production."], [1783604480, 1783605789, "Schitt's Creek", "The Hospies", "S5 E8", "Johnny and Stevie attend the regional hospitality awards, while Moira does everything in her power to stop Alexis from auditioning for Cabaret."], [1783605789, 1783607082, "The Goldbergs (2013)", "Lainey Loves Lionel", "S3 E14", "Beverly forbids Adam to see the movie \"Porky's,\" so Murray pushes him to break the rules. But the plan backfires when Beverly forbids Adam to use the phone for Valentine's Day. Meanwhile, Barry tries too hard to impress Lainey for the holiday using the music of Lionel Ritchie."], [1783607082, 1783608382, "The Goldbergs (2013)", "Weird Al", "S3 E15", "Dana comes to town, but has a hard time mustering up any enthusiasm for a \"Weird Al\" Yankovic concert Adam wants her to attend, which makes him think their relationship is coming to an end. Meanwhile, Erica and Barry take their new found knowledge as peer counselors and apply it to Murray, who they diagnose as depressed."], [1783608382, 1783609691, "Schitt's Creek", "The M.V.P.", "S5 E9", "David agrees to sub in for the annual baseball game, and Moira runs a rehearsal that pushes Stevie over the edge."], [1783609691, 1783611000, "Schitt's Creek", "Roadkill", "S5 E10", "Johnny and Moira’s afternoon plans are interrupted when they accidentally hit a cat. David runs into an old colleague at the flea market whose new business bears a striking resemblance to Rose Apothecary."], [1783611000, 1783612300, "The Goldbergs (2013)", "Edward 'Eddie the Eagle' Edwards", "S3 E16", "When Barry sees underdog Eddie the Eagle in the Olympics, he decides to popularize Ball Ball in order to gain respect at school. Meanwhile, Beverly catches wind that Murray's store sales are down and intervenes by selling the latest furniture craze…."], [1783612300, 1783613600, "The Goldbergs (2013)", "The 'Dirty Dancing' Dance", "S3 E17", "Beverly helps Erica plan a \"Dirty Dancing\" themed dance at school, only to turn on Erica when she realizes it may be inappropriate. Meanwhile, Murray tries to learn dancing with Adam with little luck."], [1783613600, 1783614909, "Schitt's Creek", "Meet the Parents", "S5 E11", "Patrick’s parents are in town for his surprise party, but the parents end up with an even bigger surprise, while Alexis drags Moira to a soap opera convention."], [1783614909, 1783616218, "Schitt's Creek", "The Roast", "S5 E12", "Johnny fills in for Moira at the annual Mayor’s Roast, as David distracts Moira from finding out that Stevie and Patrick have been taking private dance lessons."], [1783616218, 1783617518, "The Goldbergs (2013)", "12 Tapes for a Penny", "S3 E18", "Adam schemes to get as many cassette tapes as possible from a mail-order music club, but when Beverly gets wind of this scam she points the blame at Erica. Meanwhile, Barry is determined to get closer to Lainey's dad, Bill, even though it's an uphill battle."], [1783617518, 1783618819, "The Goldbergs (2013)", "Magic Is Real", "S3 E19", "Inspired by David Copperfield’s walk through The Great Wall of China, Adam becomes a magician in order to impress a girl at school. Meanwhile, Barry has no interest in taking the PSAT, but when he discovers his friends and girlfriend plan to do so, he’s hit with a harsh reality."], [1783618819, 1783620128, "Schitt's Creek", "The Hike", "S5 E13", "Patrick tries to take David on a romantic hike, while Johnny has a health scare that sends everyone into a panic."], [1783620128, 1783621437, "Schitt's Creek", "Life Is a Cabaret", "S5 E14", "It’s Opening Night for Cabaret,and Stevie is nowhere to be found. David tries to make a big announcement, but keeps getting overshadowed by the musical."], [1783621437, 1783622736, "The Goldbergs (2013)", "Dungeons and Dragons, Anyone?", "S3 E20", "The nerds battle the jocks in a popular board game."], [1783622736, 1783624036, "The Goldbergs (2013)", "Rush", "S3 E21", "Barry accuses Beverly of liking Adam best; and Murray immediately takes a disliking to Erica's new beau, while Erica develops a fondness of the band Rush."], [1783624036, 1783625345, "Schitt's Creek", "Smoke Signals", "S6 E1", "David scouts a potential wedding venue, while Johnny and Moira have a romantic picnic by the creek."], [1783625345, 1783626654, "Schitt's Creek", "The Incident", "S6 E2", "David is embarrassed by a childhood issue that resurfaces, and only spirals further when Patrick is so understanding. Johnny, Stevie and Roland attend a viewing for a nearby motel. Alexis helps Moira join social media."], [1783626654, 1783627954, "The Goldbergs (2013)", "Smother's Day", "S3 E22", "Barry and Erica forget to get a Mother's Day gift."], [1783627954, 1783629254, "The Goldbergs (2013)", "Big Orange", "S3 E23", "Adam and his soon-to-be freshman pals live in fear of the hazing they expect to get from the senior class, but then Adam body slams his way to earning their respect in the Season 3 finale. In other happenings, Erica and her friends decide what to put in a time capsule."], [1783629254, 1783630564, "Schitt's Creek", "The Job Interview", "S6 E3", "Johnny and Moira endeavor to secure an investor for a new motel while Alexis and Ted struggle with long-distance."], [1783630564, 1783631873, "Schitt's Creek", "Maid of Honour", "S6 E4", "Moira shares the newly released “Crows” movie trailer with the Jazzagals. Johnny and Roland find a suspicious bag of money at the new motel."], [1783631873, 1783633173, "The Goldbergs (2013)", "Have a Summer", "S3 E24", "Adam and his soon-to-be freshman pals live in fear of the hazing they expect to get from the senior class, but then Adam body slams his way to earning their respect in the Season 3 finale. In other happenings, Erica and her friends decide what to put in a time capsule."], [1783633173, 1783634482, "Schitt's Creek", "The Premiere", "S6 E5", "Alexis plans a local premiere for the \"Crows\" movie, and Moira makes a big splash on the red carpet. David tends to Patrick after his wisdom teeth removal."], [1783634482, 1783635791, "Schitt's Creek", "The Wingman", "S6 E6", "Alexis and Moira deal with the aftermath of a viral video, while Johnny helps Bob get back out in the dating world."], [1783635791, 1783637100, "Schitt's Creek", "Moira Rosé", "S6 E7", "Moira and David sample wine at Herb Ertlinger's vineyard, while Johnny attempts to have “the talk” with Patrick."], [1783637100, 1783638409, "Schitt's Creek", "The Presidential Suite", "S6 E8", "Johnny and Moira spend a night at the presidential suite in the new motel, while Alexis receives a surprise visitor."], [1783638409, 1783639718, "Schitt's Creek", "Rebound", "S6 E9", "Johnny becomes overly involved in Alexis' romantic life, while Moira offends the townspeople in an interview with People magazine."], [1783639718, 1783641027, "Schitt's Creek", "Sunrise, Sunset", "S6 E10", "Moira’s former \"Sunrise Bay\" producers show up with big news, while Alexis binge-watches old episodes of the soap and discovers some dirt."], [1783641027, 1783642336, "Schitt's Creek", "The Bachelor Party", "S6 E11", "The Roses attend the Escape Room portion of David and Patrick's Bachelor Party, but their participation wanes the more their personal dilemmas come to a head."], [1783642336, 1783643645, "Schitt's Creek", "The Pitch", "S6 E12", "Johnny, Stevie and Roland head to New York for their pitch meeting, while the family anxiously awaits their return."], [1783643645, 1783645136, "Schitt's Creek", "Start Spreading the News", "S6 E13", "Moira receives some unexpected news, and David makes a tough decision about where he wants to live."], [1783645136, 1783646612, "Schitt's Creek", "Happy Ending", "S6 E14", "David stresses out over the rain on his wedding day, the family scrambles to make it right."], [1783646612, 1783649500, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783649500, 1783652159, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces them to make some choices. Will must decide whether to continue with his passion or provide for his wife, which ultimately brings him closer to Emma. As some members of New Directions grow closer romantically, other's intentions aren't supportive of the group."], [1783652159, 1783653579, "Raising Hope", "Pilot", "S1 E1", "When well-meaning 23-year-old Jimmy Chance has a one-night stand with a wanted felon, he ends up being a dad to a bouncing baby girl. Inspired to do the right thing by his daughter, he has to convince his less-than-enthusiastic parents and great-grandmother to help him raise her."], [1783653579, 1783654880, "Raising Hope", "Dead Tooth", "S1 E2", "Jimmy finally masters getting Hope to sleep, with some parental support. Attractive supermarket teller clerk Sabrina has the hots for him, and recommends her ugly cousin Shelley's cheap children - pets and seniors day care center. Alas, her willingness to mind Hope for free ends."], [1783654880, 1783656177, "The Goldbergs (2013)", "Circle of Driving", "S1 E1", "Under the watchful eye of an eleven-year-old boy's video camera, the Goldbergs face the challenges of life in the 80s, including two new teenage drivers and a grandfather who shouldn't be allowed behind the wheel."], [1783656177, 1783657463, "The Goldbergs (2013)", "Daddy Daughter Day", "S1 E2", "Erica's moodiness puts the family roller-skating tradition at risk; Beverly takes Adam school clothes shopping."], [1783657463, 1783658769, "Schitt's Creek", "Our Cup Runneth Over", "S1 E1", "The once opulently rich Roses, following news that their now absent business manager has left them financially ruined, are left by the government with only a modest income and one asset, Schitt's Creek."], [1783658769, 1783660075, "Schitt's Creek", "The Drip", "S1 E2", "Johnny must get permission to sell the town from its Mayor, Roland Schitt. David and Alexis spend a night out with the locals."], [1783660075, 1783662669, "Glee", "Acafellas", "S1 E3", "Will forms the Acafellas, an all-male acapella vocal group, and spends more time building his own confidence than he does with the glee club. In Will's absence, the glee club decides to hire a well-known choreographer to help coach them to Nationals. Meanwhile, Mercedes is bitten by the love bug, but her feelings aren't reciprocated. When the Acafellas perform for the P.T.A., they get a surprise v"], [1783662669, 1783665263, "Glee", "Preggers", "S1 E4", "While Kurt tries out for the football team (taking a page from the glee playbook with him), Rachel storms out of glee practice when Will gives a plum part to Tina. Meanwhile, Sue comes up with a new plot to boost her program at glee's expense; and Quinn has news for Finn."], [1783665263, 1783666569, "Raising Hope", "Dream Hoarders", "S1 E3", "When Jimmy \"teaches\" Hope to crawl, the family must baby-proof the house and find new places to store their belongings. It's soon revealed that Virginia is a hoarder and has been saving junk in the storage shed, which becomes Hope's favorite new hiding place."], [1783666569, 1783667873, "Raising Hope", "Say Cheese", "S1 E4", "Jimmy is delighted when Sabrina accepts to pay him a visit. None of his family wants to help make a good impression, but she seems charmed by all their dysfunctional family quirks. Mother insists on explaining all the stressed misery caused by the annual Chance family pictures."], [1783667873, 1783669169, "The Goldbergs (2013)", "Mini Murray", "S1 E3", "Barry wants money to buy an expensive pair of basketball shoes, so Murray hires him to work at his furniture store. When Beverly prohibits him from seeing a new horror movie, Adam goes behind her back."], [1783669169, 1783670453, "The Goldbergs (2013)", "Why're You Hitting Yourself?", "S1 E4", "Barry and Adam bond over the discovery of a TV channel; Beverly involves herself in her father's dating life."], [1783670453, 1783671759, "Schitt's Creek", "Don't Worry, It's His Sister", "S1 E3", "Johnny perceives the town's welcome sign to be obscene, but the townspeople don't agree. Meanwhile, Moira falls into a dark depression after googling herself, David seeks employment and Alexis fawns over Mutt."], [1783671759, 1783673065, "Schitt's Creek", "Bad Parents", "S1 E4", "Alexis does community service with Mutt; Stevie convinces David to sell his clothes; and Moira and Johnny contemplate whether or not they're bad parents after they realize they don't know their children's middle names."], [1783673065, 1783675678, "Glee", "The Rhodes Not Taken", "S1 E5", "Will thinks the glee club desperately needs more of an edge, so he brings in his former classmate, April Rhodes, to spice things up. Will's plan seems to be going smoothly until he realizes he may be losing a key member of the club."], [1783675678, 1783678285, "Glee", "Vitamin D", "S1 E6", "Will challenges the kids to a healthy dose of competition with boys against girls in a mash-up showdown. Meanwhile, Terri takes a job as the school nurse, despite having no medical experience, to keep an eye on Will."], [1783678285, 1783679557, "Raising Hope", "Happy Halloween", "S1 E5", "When Sabrina's boyfriend can't make it to the deli guy's Halloween party, Jimmy offers to put on his costume and go in his place. Virginia takes Maw Maw, who is dressed as a cat, trick-or-treating while Burt plots ways to play tricks on Jimmy."], [1783679557, 1783680858, "Raising Hope", "Family Secrets", "S1 E6", "When a box containing videos of Hope's mother arrives from prison, Jimmy must decide whether or not to let Hope see them. Virginia explains that children need to be protected from the truth, leading Jimmy to question what exactly his parents have been keeping from him."], [1783680858, 1783682156, "The Goldbergs (2013)", "The Ring", "S1 E5", "Adam, Erica and Barry learn about Murray's romantic past while cleaning out the garage; Adam falls for his neighbor."], [1783682156, 1783683449, "The Goldbergs (2013)", "Who Are You Going to Telephone?", "S1 E6", "Beverly is disappointed when the kids don't want to celebrate Halloween with her; Beverly tries to get Barry's crush to go out with him."], [1783683449, 1783684755, "Schitt's Creek", "The Cabin", "S1 E5", "Looking for privacy, Johnny and Moira take the Mayor up on his offer of using his cabin for a night, while Alexis and David use the opportunity to throw a party."]]}, {"id": "45", "name": "The Jukebox", "a": "the-jukebox", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/jukebox-v1.png", "progs": [[1783588700, 1783591332, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783591332, 1783593887, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783593887, 1783596527, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming, Will makes a decision that could change his life forever."], [1783596527, 1783599282, "Glee", "Hell-O", "S1 E14", "Fresh off their monumental win at Sectionals, New Directions is on top of the world. With an extra spring in their step, they get to work on new numbers for regionals. But when Rachel and Finn's budding romance hits a bump in the road after she becomes involved with a competitor, Jesse St. James, it threatens to derail the entire club. Mr. Schuester pays a visit to Shelby Corcoran, coach of Vocal "], [1783599282, 1783601986, "Glee", "The Power of Madonna", "S1 E15", "Mr. Schuester is concerned that the girls in the glee club are being disrespected and bullied by the guys. Looking to Madonna and her musical message of equality as inspiration, he challenges the entire team to choose Madonna songs as their next assignment in the hopes that the girls embrace her strength, independence and confidence and that the guys will see the error of their misogynistic ways. "], [1783601986, 1783604677, "Glee", "Home", "S1 E16", "When Kurt sets his dad, Burt, up with an unexpected partner his plan for a nuclear family may backfire. Sue demands that the Cheerios! go on a crazy diet in preparation for a big interview with \"Splits\" magazine and April Rhodes returns to save Will and the glee club."], [1783604677, 1783607316, "Glee", "Bad Reputation", "S1 E17", "Mr. Schuester starts an investigation when a salacious list about members of the glee club circulates the halls of McKinley High. Meanwhile, Sue is mortified when a video of her performing the Olivia Newton-John classic \"Physical\" surfaces"], [1783607316, 1783610308, "Glee", "Laryngitis", "S1 E18", "When a sore throat affects Rachel's singing voice, she goes into panic mode. Meanwhile, Kurt tries to change his persona to impress his father, and Puck makes a strategic move to elevate his social status."], [1783610308, 1783612948, "Glee", "Dream On", "S1 E19", "In an episode directed by Emmy Award winner Joss Whedon, Mr. Schuester's former high school nemesis, Bryan Ryan, causes trouble for the glee club. Meanwhile, Rachel struggles with a life-long personal issue, and Artie's dreams take him on an adventure"], [1783612948, 1783615588, "Glee", "Theatricality", "S1 E20", "Mr. Schuester encourages the glee club to express themselves using the music of Lady Gaga. Meanwhile, Rachael has a life-changing encounter, and Tina embraces her inner Goth."], [1783615588, 1783618228, "Glee", "Funk", "S1 E21", "The Glee Club gets some news that's sure to rattle a few nerves. Meanwhile, Quinn connects with her \"funky\" side with a little help from Mercedes, and Will gets revenge on Sue. Musical performances include \"Another One Bites the Dust\", \"Tell Me Something Good\", \"Loser\", \"It's A Man's Man's World\", \"Good Vibrations\" and \"Give Up The Funk\"."], [1783618228, 1783620341, "Glee", "Journey to Regionals", "S1 E22", "The moment New Directions has been waiting for has finally arrived: it's time for Regionals! But when Sue pulls a fast one on Will and the glee clubbers, their chances at the title could be compromised. Meanwhile, Quinn's life changes forever."], [1783620341, 1783623229, "Glee", "Pilot", "S1 E1", "Optimistic high school teacher Will Schuester tries to refuel his own passion while reinventing the McKinley High School's glee club and challenging a group of outcasts to realize their star potential. Going up against McKinley's cruel high school caste system and facing harsh criticism from everyone around him, Will is determined to prove them all wrong."], [1783623229, 1783625888, "Glee", "Showmance", "S1 E2", "As McKinley High School's glee club begins new routines, a restriction forces th , "Mash-Up", "S1 E8", "Inspired the by the students, Will composes a mash-up for a very special occasion. Meanwhile, in a shocking reversal of roles, McKinley High's cool kids are dethroned in an \"icy\" fashion, and Sue shows off her softer side."], [1783641495, 1783644137, "Glee", "Wheels", "S1 E9", "When Artie's chances of traveling with the group to Regionals are in question, Will challenges the kids to step out of their comfort zones and experience life from a different point of view. Meanwhile, the Glee Club hosts its first \"diva-off\" between Kurt and Rachel, and Sue reveals a softer side."], [1783644137, 1783646727, "Glee", "Ballad", "S1 E10", "Mr. Schuester has the Glee Club split up into pairs to sing their favorite ballad, but when one kid gets sick, he's forced to step in and winds up in a sticky situation. Meanwhile, Finn and Quinn have to face the music when dinner with her parents goes awry."], [1783646727, 1783649359, "Glee", "Hairography", "S1 E11", "Concerned that Sue is up to no good, Will pays a visit to an instructor of a competing Glee Club to see what information Sue may be leaking, which leads to the club getting a look at their hair-rising competition. Meanwhile, Kurt gives Rachel a makeover to impress Finn, but he may have ulterior motives."], [1783649359, 1783651914, "Glee", "Mattress", "S1 E12", "When the Glee Club is left out of the yearbook because of budget cuts, everyone seems to be relieved that they won't have to suffer the ridicule of years past. Everyone except Rachel, that is, who wants her legacy cemented in print. Meanwhile, Quinn makes it her mission to be in the Cheerios yearbook photo, and Will and Terri's relationship is shaken to its core."], [1783651914, 1783654554, "Glee", "Sectionals", "S1 E13", "Sectionals is finally here for the Glee Club, but when Quinn's secret unravels, the club may not be able to recover in time to compete. Meanwhile, Sue's scheming hits an all-time high, and with Emma and Ken's marriage looming,
