urray", "S1 E9", "Live from New York, it's... Elliott Gould!\n\nSketches include \"The Dead String Quartet,\" \"Interior Demolitionists,\" \"Vito Corleone in Therapy,\" \"The Killer Bees,\" \"Birthright\", \"Gilda and Elliot,\" \"New Shimmer,\" The Muppets, \"Play Misty for Me\" (film), \"Jamitol,\" \"Try-Hard 1-11,\" and \"Powwow With the Press\" (stand-up).\n\nAnne Murray performed \"Long Distance Call\" and \"Boogie With You.\""], [1783679252, 1783683305, "Saturday Night Live", "Buck Henry with Bill Withers and Toni Basil", "S1 E10", "Live from New York, It's...Chevy Chase\n\nSketches include--Suicide Prevention, \"Samurai Deli\", Operation Stumblebum, \"Citizen Kane II\", King Bee(the Blues Brothers), Auto mechanic tells bedtime story, \"Presidential Foreplay\", Chevy misuses a joint, The Constipated Man, The Muppets and the Japanese sex Device."], [1783683305, 1783684734, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783684734, 1783686164, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783686164, 1783690253, "Saturday Night Live", "Peter Cook & Dudley Moore with Neil Sedaka", "S1 E11", "Live from New York, It's...Chevy Chase\n\nSketches include-- Bomb Squad, Prisoner Auditions, \"Don Pardo's Holiday on A Elevator\", \"Table Talk\", \"Backstage Banter\", Sonny and Cher, The Baby Jesus, Chevy talks to Angola's roommate, The Muppets."], [1783690253, 1783694375, "Saturday Night Live", "Dick Cavett with Jimmy Cliff", "S1 E12", "Live from New York, It's...Chevy Chase\n\nSketches include--Voodoo on Chevy Chase, Alcohol and Firearms, Lowell Brock of H&R Brock, \"Looks at Books\", Dick Cavett's School of Hydroplane Operation, Dance To The Nation, \"The Apple Follies\", Our Town."], [1783694375, 1783695804, "That '70s Show", "Ski Trip", "S1 E13", "Jackie dumps Kelso after he makes out with Pam Macy and invites everyone but him to her parent's ski cabin for the weekend.  Eric, excited about what this could mean for him and Donna, pays no attention to Kelso's whining about being left behind or Red's tips about driving in the snow.  He doesn't realize that Hyde keeps hitting on Donna and Kelso plans on following them to the lodge.  Also, Kitty"], [1783695804, 1783697234, "That '70s Show", "Stolen Car", "S1 E14", "When Eric scratches the car, Red suspends his driving privileges, so the gang has to walk everywhere. That is, until Kelso's cousin lends him a car. They get arrested though because the car was reported stolen. With one phone call, Kelso calls Jackie and she tells him that she'll have sex with him once he gets out of prison. The whole incident was a mix-up and the gang is released."], [1783697234, 1783701094, "Saturday Night Live", "Peter Boyle with Al Jarreau", "S1 E13", "Live from New York, It's...Chevy Chase\n\nSketches include \"The Valentine's Day Massacre,\" \"Samurai Divorce Court,\" \"Jason and Sunshine,\" \"The Corrida.\" \"All Pro Wrestling,\" \"Remembering of Things Past\", \"Dueling Brandos,\" \"A Home Movie\" (film), and \"The Orgy.\"  Al Jarreau performs \"We'll Get By.\""], [1783701094, 1783705175, "Saturday Night Live", "Desi Arnaz with Desi Arnaz Jr.", "S1 E14", "Live from New York, It's...Chevy Chase\n\nSketc fides in Eric that she thinks she might be pregnant.   Eric passes the news on to Donna, who tries to get Jackie to tell Kelso.  The incident inspires Donna to go on birth control pills.  Her decision inadvertantly causes Eric a lot of grief when Bob and the Formans find out."], [1783717676, 1783719106, "That '70s Show", "Career Day", "S1 E18", "It's career day and the gang must spend the day working with their parents.  Eric goes to the hospital with Kitty and is amazed at all she has to deal with every day.  Fez accompanies Hyde and interviews cafeteria lady \"Gross Edna\" while mother and son feud.  Poor Michael spends the entire day trying to figure out what his dad does, while Donna is mortified by Bob's crazy promotional antics.  And "], [1783719106, 1783723192, "Saturday Night Live", "Ron Nessen with the Patti Smith Group", "S1 E17", "Live from New York, It's...Gerald Ford\n\nSketches include-- \"The Dead String Quartet\", Super Bass-O-Matic 76, An Oval Office, David Eisenhower is Anti-Nixon, Thomas Jefferson denies slavery, The New Stoner Volunteer Army, Catherine the Great, Disgusting Jam, Autumm Fizz--The Carbonated Douche, \"Tomorrow With Tom Snyder\"."], [1783723192, 1783727340, "Saturday Night Live", "Raquel Welch with Phoebe Snow and John Sebastian", "S1 E18", "Live from New York, It's...Chevy Chase\n\nSketches include-- \"Get to the fall Chevy!\", Purina Rat Chow, Joseph Franklin's 10-letter Metric Alphabet, \"The Claudine Longet Ski Invitational\", \"One Flew Over The Hornest Nest\", Chevy tries to convince Raquel to take off her shirt, Baba Wawa, Bisexual Moment, The Muppets are finished on SNL."], [1783727340, 1783728771, "That '70s Show", "Prom Night", "S1 E19", "Prom night is fast approaching and Eric gets a motel room as part of his \"spontaneous\" plan to \"do it\" with Donna on the big night.  When Jackie finds out that Kelso asked slutty Pam Macy to prom, she gets Hyde to take her out of pity.  Fez wants to take his pretty English teacher to oneymooners,\" \"Shirley Temple Black,\" \"Vibramatic,\" \"Uncle Charlie's School,\" and \"Show Us Your Guns.\"\n\nLeon Redbone performed \"Shine On Harvest Moon.\""], [1783762480, 1783763956, "In Living Color", "Laquita Meets Billy Dee", "S2 E8", "Sketches include:\n\n\"\"Magenta's Acting School\"\"   \"\"Foundation for Golf Heritage\"\"   \"\"Evelyn Smith\"\"   \"\"Laquita Sings the Blues\"\""], [1783763956, 1783765205, "In Living Color", "Men on Vacation", "S2 E9", "Sketches include:\n\nA Lassie '90 Sequel / Amazing Grace - Rocky VI / Cousin Milly / PMS Defense System / Men on Vacation / 3rd Bass perform \"Product of the Environment\""], [1783765205, 1783765888, "Robot Chicken", "Suck It", "S2 E1", "Robot Chicken gets un-canceled! Learn tips for fighting terrorism! Mexico builds its greatest hero in \"The Six Million Peso Man.\" Skater McGee is a re-animated corpse; an extreme re-animated corpse! Two aliens from Space Invaders revolt. A nerd polishes a unicorn's magic horn. And it's Mr. & Mrs. Smith, '70s style in \"Mr. & Mrs. Brady\"! Space Ghost, Master Shake, and Peter Griffin come in."]]}, {"id": "80", "name": "I Heart 80s", "a": "i-heart-80s", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/iheart80s-v2.png", "progs": [[1783670918, 1783672465, "Pee-wee's Playhouse", "Beauty Makeover", "S1 E6", "Miss Yvonne is willing to give a beauty makeover to the next person who steps into the playhouse, and it ends up being Mrs. Steve! Then, the Cowntess has a tea party. You'll have the \"time\" of your life!"], [1783672465, 1783673846, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783673846, 1783675218, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783675218, 1783676526, "The Wonder Years", "Episode 7", "S1 E7", "I Heart 80s"], [1783676526, 1783678085, "The Wonder Years", "Episode 8", "S1 E8", "I Heart 80s"], [1783678085, 1783679533, "Jem and the Holograms", "Starbright (2): Colliding Stars", "S2 E2", "Horrified at the news of Ba Nee's impending blindness, Jerrica learns from her doctor that there is an experimental laser surgical procedure that could save Ba Nee's vision. However, the cost of the surgery is a staggering $250,000. Having canceled all their tour dates to star in the movie, Aja hits on the idea to divert funds from Starlight Music to cover the cost. But when they arrive there, the"], [1783679533, 1783680981, "Jem and the Holograms", "Starbright (3): Rising Star", "S2 E3", "During a dangerous motorcycle scene for the movie, Kimber is caught in the middle of a series of explosions set off by Roxy and Clash, and is almost killed. Infuriated, Jem and the Holograms quit the production permanently, along with most of the crew who witnessed the accident. Jem rallies the crew to continue the movie, but with a new plot and title: Starbright, while the Misfits' demanding beha"], [1783680981, 1783682481, "Teenage Mutant Ninja Turtles", "Episode 7", "S1 E7", "I Heart 80s"], [1783682481, 1783683974, "Teenage Mutant Ninja Turtles", "Episode 8", "S1 E8", "I Heart 80s"], [1783683974, 1783685518, "Pee-wee's Playhouse", "Restaurant", "S1 E7", "Pee-wee is the maitre d', waiter and cashier while playing restaurant. Customer Captain Carl orders everything on the menu only to learn that all they have are peanut-butter-and-jelly sandwiches! Also, Dixie is having a particularly bad \"day.\""], [1783685518, 1783687065, "Pee-wee's Playhouse", "Ants In Your Pants", "S1 E8", "The ants are loose, the ants are loose! While Pee Wee is playing house with Miss Yvonne and the Playhouse Gang, the ants sneak out of their farm, go marching into the Dinosaur Family's home, steal a cake and get all over everybody and everything. \"\"What\"\" will Pee Wee do? The 'Ants In Your Pants Dance!"], [1783687065, 1783688447, "The Goldbergs (2013)", "Stop Arguing and Start Thanking", "S1 E9", "When Murray's brother, Marvin, visits, there is a surprise in store."], [1783688447, 1783689826, "The Goldbergs (2013)", "Shopping", "S1 E10", "When Erica starts working at a local department store, Beverly's bargain-hunting dreams come true; Adam and Barry go to the racetrack with Pops."], [1783689826, 1783691675, "The Wonder Years", "Episode 9", "S1 E9", "I Heart 80s"], [1783691675, 1783693053, "The Wonder Years", "Episode 10", "S1 E10", "I Heart 80s"], [1783693053, 1783694500, "Jem and the Holograms", "The World Hunger Shindig", "S2 E4", "Jem and the Holograms are invited to perform at a concert benefitting the victims of world hunger. When The Misfits learn of the concert, they try to horn in. Sally Brand, the woman behind the World Hunger Shindig tells them they can perform, but can't be on the live album unless another group backs out. Eric Raymond schemes to keep the Holograms away from the concert and to make a tidy sum of mon"], [1783694500, 1783695949, "Jem and the Holograms", "Adventure in China", "S2 E5", "The Holograms are invited to perform a special concert in China. The Misfits tag along and take notice of Jem's reluctance to part with her JemStar earrings while going through customs. They steal the earrings, leading Jerrica and the Holograms in a race against time to recover them in time for the concert."], [1783695949, 1783697449, "Teenage Mutant Ninja Turtles", "Episode 9", "S1 E9", "I Heart 80s"], [1783697449, 1783698867, "Teenage Mutant Ninja Turtles", "Return of the Shredder", "S2 E1", "Just when the Turtles believe themselves rid of Shredder, tin-grin is able to persuade Krang to return him to Earth."], [1783698867, 1783700413, "Pee-wee's Playhouse", "Monster In the Playhouse", "S1 E9", "\"Look\" out because Mrs. Steve reports that there is a giant, one-eyed monster in town! He appears in the Playhouse, on the loose, and scares everyone! After Pee-wee makes the monster a snack, and Jambi grants Pee-wee's wish to understand the monster, the whole gang has a new friend! They even play a game of golf."], [1783700413, 1783701960, "Pee-wee's Playhouse", "The Cowboy and the Cowntess", "S1 E10", "The fabulous Miss Yvonne just asked Cowboy Curtis out for a date -- and now he's as nervous as a prairie critter who's just been...um, asked out for a date by Miss Yvonne! To calm Curtis down, Cowntess the Cow suggests a little \"\"date\"\" role-playing -- and suddenly Curtis finds himself with \"\"the most beautiful woman in Puppetland\"\" -- Pee Wee? \"\"Remember\"\" the secret word and you'll have a \"good\""], [1783701960, 1783703336, "The Goldbergs (2013)", "Kara-Te", "S1 E11", "Barry signs up for a holiday talent show at the school, but karate isn't approved as a talent; Pops coerces Erica into performing in the show."], [1783703336, 1783704714, "The Goldbergs (2013)", "You're Under Foot", "S1 E12", "When Beverly complains that Pops is spending too much time with her at home, she forces Murray to take him back to work at the furniture store. Adam reluctantly gives away his toy collection, hoping it will help him get his first kiss."], [1783704714, 1783706228, "The Wonder Years", "Heart of Darkness", "S2 E1", "Winnie starts hanging around the cool kids because she is now dating Kirk McCray."], [1783706228, 1783707737, "The Wonder Years", "Our Miss White", "S2 E2", "Kevin gets a crush on his English teacher, Miss White, who convinces him to play Robert Kennedy in a play she has written about Martin Luther King, Jr.. Only, he's having trouble getting her to see him as more than a 7th grader."], [1783707737, 1783709185, "Jem and the Holograms", "Last Resorts", "S2 E6", "Jem and The Holograms take a much needed vacation to a Colorado  ski resort owned by Rick Franklin, an old friend of Howard Sands. Mr. Franklin tells the Holograms that his resort is being threatened by another resort owned by Eric Raymond. Eric and the Misfits attempt to sabotage the resort, in order to bankrupt Franklin so that he will sell the resort to Eric. Meanwhile, Rio and Swenson, the han"], [1783709185, 1783710634, "Jem and the Holograms", "In Stitches", "S2 E7", "Several girl groups from all over the world are invited to take part in a rock fashion contest headed by Italian music promoter, Tony Cassini. Shana is a bit nervous about the competition and The Misfits try to rattle her by chipping away at her confidence. But the last laugh is on them when their own designer drops out of the contest. Unfortunately this prompts them to get Zipper, Eric's hired he"], [1783710634, 1783712055, "Teenage Mutant Ninja Turtles", "The Incredible Shrinking Turtles", "S2 E2", "The turtles seek out the fragments of the eye of Sarnoth, a crystal with unimaginable power. After finding the first fragment, Shredder steals it and uses it to shrink the turtles. Now Splinter and April must intervene. April is able to enlarge the Turtles, but our heroes lose in the end as Shredder escapes with the first fragment."], [1783712055, 1783713476, "Teenage Mutant Ninja Turtles", "It Came from Beneath the Sewers", "S2 E3", "While the Turtles and April O'Neil scour the city for the Second Fragment of the Eye of Zarnov, Shredder sheepishly reports to Krang that he has lost the First Fragment."], [1783713476, 1783715022, "Pee-wee's Playhouse", "Stolen Apples", "S1 E11", "Randy steals Mrs. Steve's crummy crab apples from her tree, and Mrs. Steve needs Pee-wee's help in finding him. Then, Pee-wee plays the hands game with Tito, and \"there\" are enough apples for everyone at snack time."], [1783715022, 1783716569, "Pee-wee's Playhouse", "The Gang's All Here", "S1 E12", "Get out your pencils and crayons, 'cause the gang at Pee Wee's Playhouse is sketching Pee Wee's favorite subject -- Pee Wee! The Playhouse Gang joins in the fun when Pee Wee-o assigns everyone a secret name-o. But then Pee Wee develops a severe case of shrunken head when Jambi the Genie's magic helps him out of the mouse hole -- and the entire gang wonders if he'll ever be \"okay\"."], [1783716569, 1783717949, "The Goldbergs (2013)", "The Other Smother", "S1 E13", "Beverly runs into her enemy, Betsy Rubenstone; Murray and Adam try to rent a video but are forced to pay a late fee."], [1783717949, 1783719330, "The Goldbergs (2013)", "You Opened the Door", "S1 E14", "Beverly insists on chaperoning when Dana and Adam go to their first school dance together; Murray decides to talk about the birds and the bees with Barry."], [1783719330, 1783720638, "The Wonder Years", "Christmas", "S2 E3", "Kevin and his brother try to convince their Dad to buy a color television. Kevin tries to find a present for Winnie after she unexpectedly gives him a present."], [1783720638, 1783722197, "The Wonder Years", "Steady as She Goes", "S2 E4", "Kevin continues to pine for Winnie, but is becoming frustrated with being alone - especially as Paul has Carla. Even though he's just looking for someone to make Winnie jealous, he ends up boyfriend to Becky Slater."], [1783722197, 1783723633, "Jem and the Holograms", "The Music Awards (1)", "S2 E8", "The Holograms and The Misfits become so focused on beating each other at the upcoming annual Music Awards that they neglect their duties to the Starlight Girls. Deidre, one of the girls is so hurt by this she runs away. Ba Nee, not wanting Deidre to go alone decides to come with her, and Krissie goes as well to keep an eye on them. Meanwhile, Video introduces the Holograms to Giselle Dvorak (Danse"], [1783723633, 1783725068, "Jem and the Holograms", "The Music Awards (2)", "S2 E9", "As Jerrica and the others continue their search for the girls, The Misfits stage a publicity stunt to garner more attention toward their appearance at the Music Awards. Deidre, Krissy, Ba Nee and their new friend, Danny run afoul of a couple of thugs, who force Danny to steal from a local electronics store for them. They manage to escape and are directed to Haven House, where Danse finds them and "], [1783725068, 1783726487, "Teenage Mutant Ninja Turtles", "The Mean Machines", "S2 E4", "Upon finding the second fragment of the Eye of Sarnoth, Shredder uses it as a power source for a supercomputer named Omnis, in the hopes of opening a portal to Dimension X. Meanwhile, the Turtles must deal with machines that suddenly go haywire all over the city."], [1783726487, 1783727902, "Teenage Mutant Ninja Turtles", "Curse of the Evil Eye", "S2 E5", "The Turtles are still on the search for the last fragment. Shredder finds the last fragment and connects all three to his helmet."], [1783727902, 1783729449, "Pee-wee's Playhouse", "Party", "S1 E13", "It's party time at the Playhouse and you're invited! The whole gang is here: Cowboy Curtis, Captain Carl, Reba the Mail Lady and the lovely Miss Yvonne! You'll want to join in the Hokey-Pokey, yell when you hear the secret word (\"\"this\"\") and play pin the tail on the...Globey."], [1783729449, 1783730994, "Pee-wee's Playhouse", "Episode 14", "S1 E14", "I Heart 80s"], [1783730994, 1783732375, "The Goldbergs (2013)", "Muscles Mirsky", "S1 E15", "Erica breaks a trust agreement with Beverly when she sneaks out to a college party and ends up needing her mother to rescue her; Barry tells Adam that men and women can't be friends."], [1783732375, 1783733752, "The Goldbergs (2013)", "Goldbergs Never Say Die!", "S1 E16", "Inspired by \"The Goonies,\" Adam recruits Barry, Emma and some friends to search for some missing family jewelry."], [1783733752, 1783735130, "The Wonder Years", "Just Between Me and You and Kirk and Paul and Carla and Becky", "S2 E5", "Kevin wants to know if Winnie likes him or Kirk. Kirk wants to know if Winnie like him or Kevin. Becky punches Kevin when she finds out he doesn't really like her."], [1783735130, 1783736581, "The Wonder Years", "Pottery Will Get You Nowhere", "S2 E6", "Norma begins taking a pottery class, but receives no support or encouragement from Jack."], [1783736581, 1783738032, "Jem and the Holograms", "The Rock Fashion Book", "S2 E10", "The Misfits try to ruin the Holograms's new rock fashion book. When their initial attempts fail, Pizzazz persuades her father to buy the rights to the book, putting the Misfits in charge of the project."], [1783738032, 1783739450, "Jem and the Holograms", "Broadway Magic", "S2 E11", "Eric incites greed and scandal by offering a $100,000 reward for anyone who can reveal Jem's real identity, while both groups are in New York City auditioning for the lead roles in a Broadway producer's new show."], [1783739450, 1783740870, "Teenage Mutant Ninja Turtles", "The Case of the Killer Pizzas", "S2 E6", "Shredder & Baxter Stockman switch meatballs on some pizzas, used as prizes in a contest, with some weird alien eggs from Dimension X. The Turtles must battle the Xenomorph-like creatures that hatch from the eggs in order to save the city."], [1783740870, 1783742291, "Teenage Mutant Ninja Turtles", "Enter: The Fly", "S2 E7", "Frustrated at Baxter's latest failure, Shredder contacts Krang in Dimension X and demands that Rocksteady and Bebop be sent to aid him."], [1783742291, 1783743837, "Pee-wee's Playhouse", "Episode 15", "S1 E15", "I Heart 80s"], [1783743837, 1783745383, "Pee-wee's Playhouse", "Episode 16", "S1 E16", "I Heart 80s"], [1783745383, 1783746759, "The Goldbergs (2013)", "Lame Gretzky", "S1 E17", "Adam tries to impress Murray with his ice hockey skills, while Murray tries to pretend he likes Adam's movies; Beverly hounds Erica about her S.A.T.s."], [1783746759, 1783748137, "The Goldbergs (2013)", "For Your Own Good", "S1 E18", "Murray retaliates when Beverly swaps out his favorite easy chair with something new; Barry tries to rescue Adam when he is bullied on the school bus."], [1783748137, 1783749621, "The Wonder Years", "Coda", "S2 E7", "Kevin feels that his piano lessons with Mrs. Carples aren't doing him any good. But Mrs. Carples feels that Kevin has got musical potential and sets him up against her best student, Ronald Hirschmuller."], [1783749621, 1783751106, "The Wonder Years", "Hiroshima, Mon Frere", "S2 E8", "Kevin and Paul settle on doing a hamster/maze experiment for science class, but Wayne threatens to put a stop to it."], [1783751106, 1783752524, "Jem and the Holograms", "In Search of the Stolen Album", "S2 E12", "As Jem and the Holograms prepare to release their debut album, Eric hires Zipper to steal it, so The Misfits can use the material for themselves. Pizzazz sends the Holograms anonymous letters with clues that will supposedly lead them to the stolen album, but lead them into danger instead. When they retrieve the album, they place a tape of French-speaking lessons for Eric Raymond to trick him."], [1783752524, 1783753943, "Jem and the Holograms", "Hot Time in Hawaii", "S2 E13", "The Misfits and The Holograms compete in the \"Battle of the Music Stars\", a Battle of the Network Stars type event in Honolulu. Kimber is kidnapped, and the Holograms have to find her in time to compete."], [1783753943, 1783755361, "Teenage Mutant Ninja Turtles", "Invasion of the Punk Frogs", "S2 E8", "The Neutrinos return to Earth after hearing in on the plan of Krang and Shredder to get rid of the turtles via brain-drain. Shredder finds interest in their Starmobile's ability to open dimension portals and tries to get his hands on it, and meanwhile the turtles try to get the Starmobile's main energy source running again."], [1783755361, 1783756779, "Teenage Mutant Ninja Turtles", "Splinter No More", "S2 E9", "Sensing Master Splinter's despair at his new life as a rat, the Turtles agree to use the small amount of mutagen that they have left to concoct a formula that will revert Splinter back into Yoshi."], [1783756779, 1783758325, "Pee-wee's Playhouse", "Episode 17", "S1 E17", "I Heart 80s"], [1783758325, 1783759872, "Pee-wee's Playhouse", "Episode 18", "S1 E18", "I Heart 80s"], [1783759872, 1783761252, "The Goldbergs (2013)", "The President's Fitness Test", "S1 E19", "Murray (Jeff Garlin) intervenes when Adam (Sean Giambrone) seeks Beverly's (Wendi McLendon-Covey) help to avoid a national physical fitness test. Barry (Troy Gentile) woos Erica's (Hayley Orrantia) French pen pal (guest star Bella Dayne)."], [1783761252, 1783762632, "The Goldbergs (2013)", "You're Not Invited", "S1 E20", "Adam is excited for his birthday party, but Barry thinks he should change the theme; Murray and Pops are captivated by the opening of Al Capone's safe."], [1783762632, 1783764102, "The Wonder Years", "Loosiers", "S2 E9", "When Kevin sees that Paul is being humiliated at basketball, he decides to go to Coach Cutlip to complain about how he thinks teams are being unfairly picked. Trying to teach him a lesson, Cutlip makes Kevin the new team captain."], [1783764102, 1783765579, "The Wonder Years", "Walk Out", "S2 E10", "Kevin along with kids from his school plan to schedule a walkout to protest the Vietnam War. However, when the assistant principal, Mr. Diperna, finds out about the planned walkout, he threatens to suspend all who participate."], [1783765579, 1783766809, "Jem and the Holograms", "The Princess and the Singer", "S2 E14", "Loosely based on the Mark Twain story The Prince and the Pauper, while touring the small European country of Morvania, Kimber meets Princess Adriana, the teenage heir to the throne who happens to look exactly like her. When Adriana escapes from her room, her power-hungry cousin Lexa hires her henchmen to track her down and bring her back. When Kimber and Adriana bump into each other, Lexa's henchm"]]}, {"id": "90", "name": "The Peach Pit", "a": "the-peach-pit", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/peachpit-v2.png", "progs": [[1783671510, 1783674407, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783674407, 1783677306, "Beverly Hills, 90210", "Stand (Up) and Deliver", "S1 E17", "Brenda, tired of being treated like a teen, moves out on her own into a shabby apartment owned by a hippie stand-up comedienne. Meanwhile, Brandon runs for junior class president against a fellow candidate, Michael, and has to deal with Kelly and Andrea vying to manage his campaign."], [1783677306, 1783680203, "Beverly Hills, 90210", "It's Only a Test", "S1 E18", "Brenda is filled with horror when she discovers a lump in her breast, which calls for a biopsy. Meanwhile, the upcoming SATs put extra pressure on everyone, especially Andrea and Steve during a study night together when an intimate moment happens between them."], [1783680203, 1783683101, "Beverly Hills, 90210", "April Is the Cruelest Month", "S1 E19", "As Brandon interviews Roger, the school's tennis star, he discovers that Roger's golden-boy appearance hides deeper demons. When the gang gets their SAT scores back, Donna becomes deflated by her low SAT score, which reveals her learning disability."], [1783683101, 1783685881, "Beverly Hills, 90210", "Spring Training", "S1 E20", "Brandon gets more than he bargained for when he and Steve volunteer to coach a Little League baseball team made up of spoiled little kids with smart mouths who are playing Peach Pit owner Nat's misfit team. Meanwhile, Jim (recovering from a back injury) howls at Brenda's request to keep a stray dog."], [1783685881, 1783688748, "Beverly Hills, 90210", "Spring Dance", "S1 E21", "Brenda tries to convince Andrea to ask Brandon to the spring dance, but Kelly beats her to it. Steve reluctantly takes Donna, who wears an elaborate gown that impedes sitting or dancing."], [1783688748, 1783691616, "Beverly Hills, 90210", "Home Again", "S1 E22", "The Walshes' excitement over Jim's promotion is short-lived when he reveals that it means moving back to Minnesota. Steve gets upset with Brandon over him leaving, as well as other problems. Meanwhile, Andrea offers herself to Brandon as a goodbye present, while Brenda faces the thought of moving away from Dylan."], [1783691616, 1783694441, "Beverly Hills, 90210", "Beach Blanket Brandon", "S2 E1", "After a home pregnancy test is inconclusive, Dylan and Kelly take Brenda to a gynecologist. The pregnancy scare turns out to be a false alarm, but Brenda is badly shaken by the experience. Cindy and Jim confront her after finding the pregnancy test box in the trash. Brenda breaks it off with Dylan because she is overwhelmed by the issues that their relationship has forced her to confront. Hoping t"], [1783694441, 1783697306, "Beverly Hills, 90210", "The Party Fish", "S2 E2", "While Brandon gets close to a fellow cabana girl at the beach club, named Sandy, a member takes Brandon under his wing with his hard-to-refuse offer which causes problems at home. Jim and Cindy discuss joining the beach club for the enjoyment. Meanwhile, Brenda finds an outlet to her emotions when she, Donna, Andrea and David being taking drama classes in summer school taught by Chris Sutier."], [1783697306, 1783700177, "Beverly Hills, 90210", "Summer Storm", "S2 E3", "Cindy's mothering instincts upset both Jim and Brenda after she brings an injured Dylan to recuperate at their house after he has a accident while surfing in dangerous conditions, while Dylan's father is arrested for income tax evasion. Kelly gets involved with a shy volleyball player named Kyle who is reluctant to make a move on her. Meanwhile, David and Donna are reluctantly paired for a Romeo a"], [1783700177, 1783703016, "Beverly Hills, 90210", "Anaconda", "S2 E4", "Steve invites Brandon, David and a few of their friends over at the beach club for an after-hours poker game and they all find themselves in trouble when their game is followed by a burglary of stereo equipment and a cash-poor Dylan becomes a suspect for he has lost his hotel suite and his money as well. Meanwhile, Brenda gets burned for sun worshiping with Donna."], [1783703016, 1783705854, "Beverly Hills, 90210", "Play It Again, David", "S2 E5", "Acting as a \"big brother\" to a 10-year-old boy, Brandon is asked to keep a secret that needs telling about his single mother's physical abuse. Meanwhile, Kelly fears a familial connection to David when his father, Mel, and her mother, Jackie, begin dating. So, Kelly becomes determined to keep them apart. Also, Brenda can't keep the absent Dylan from her thoughts while he is in Hawaii visiting his "], [1783705854, 1783708688, "Beverly Hills, 90210", "Pass/Not Pass", "S2 E6", "Chris, the acting teacher, asks Brenda to perform a scene with Andrea to bring her out of her shell. Brenda admits her crush on Chris to Andrea, who soon develops her own interest in him. The girls take Chris on a tour of the city, and Brenda is devastated when he seems more impressed with Andrea. Chris and Andrea share a good-night kiss. A jealous Brenda slaps Andrea hard during their scene. She "], [1783708688, 1783711526, "Beverly Hills, 90210", "Camping Trip", "S2 E7", "The gang takes off with plans to spend the weekend camping at Yosemite Park. A sudden monsoon forces the teens to seek refuge in a cramped one-bedroom cabin. Everyone quickly begins to get on each other's nerves. Steve and David go out for beer, but an elderly couple takes Steve's money and splits without buying him anything. The honeymooning couple in the next cabin supplies the kids with food an"], [1783711526, 1783714291, "Beverly Hills, 90210", "Wildfire", "S2 E8", "At the opening day of the new school year, Brenda becomes peeved when Dylan starts spending time with the new transfer student Emily Valentine, while she and Brandon also have eyes for each other. Meanwhile, David is reunited with Scott after he returns from his summer vacation in Oklahoma and finds that his friendship with David isn't as close as it used to be."], [1783714291, 1783717102, "Beverly Hills, 90210", "Ashes to Ashes", "S2 E9", "Brandon befriends a black family, the Ashes, which stirs up Beverly Hills when they move in near the Walshes. The siblings include Robby, a freshman photographer who volunteers to work at the Blaze, and his older sister whose boyfriend is roughed up by a racist security patrol. Meanwhile, Jim and Cindy try out a new \"state of the art\" house alarm system which is more of a nuisance than a help."], [1783717102, 1783719921, "Beverly Hills, 90210", "Necessity Is a Mother", "S2 E10", "Dylan cannot stand the fact that his free-spirited mother, Iris, has moved in with him. He begins drinking, skips school, and spends all of his time at a pool hall. Brenda resents Iris for abandoning Dylan as a child, and for trying to step in and control his every move. Cindy, however, forms a bond with Iris and joins her for a number of new-age experiences. Brandon tries to watch over Dylan, who"], [1783719921, 1783722753, "Beverly Hills, 90210", "Leading From the Heart", "S2 E11", "Brandon and Brenda's handicapped cousin, Bobby, visits the Walshes and a mutual attraction between him and Kelly is complicated more by others assumptions than by Bobby's wheelchair. Meanwhile, David tries asking Donna out on a date. Brenda finally gets her driver's license on the third try, but is hesitant to drive Brandon's car. Also, Emily joins the school newspaper just to be near Brandon."], [1783722753, 1783725590, "Beverly Hills, 90210", "Down and Out of District in Beverly Hills", "S2 E12", "Brandon submits one of Andrea's articles to a high school journalism contest. She wins the contest, but panics because a school district representative wants to conduct a home interview. Andrea asks her grandmother to say that she lives with her, but Rose does not want to play along. The school district initiates an investigation because they suspect that Andrea lives out of district. Andrea moves"], [1783725590, 1783728427, "Beverly Hills, 90210", "Halloween", "S2 E13", "Brenda, Dylan, Steve, Donna and Kelly attend a Halloween party. Donna dresses as a mermaid; but her fins inhibit dancing, walking, and trips to the bathroom. Kelly's seductive costume catches the eye of a college student. She goes upstairs to talk with him, then becomes uncomfortable. The guy accuses her of leading him on and tries to rape her. Brenda and Donna enter in the nick of time, and Steve"], [1783728427, 1783731266, "Beverly Hills, 90210", "The Next 50 Years", "S2 E14", "The students of West Beverly unearth a time capsule from 1941, and put together a capsule of their own. Mrs. Scanlon organizes a surprise party for Scott's birthday, and pushes David to round up the guests. Donna is the only person who wants to attend. Kelly, Steve, Brenda, Brandon and Emily reluctantly come to the party, but act like jerks and refuse to participate in the activities. David tries "], [1783731266, 1783734096, "Beverly Hills, 90210", "U4EA", "S2 E15", "Emily invites everyone to join her at an underground club. The location is a secret; the gang must exchange an egg at a convenience store for this information. The others leave without Steve and Andrea, who end up going to the wrong store and embarrassing themselves. Kelly is mortified when David drinks an entire bottle of whiskey, but Donna dances with him and has a good time. Emily slips a drug "], [1783734096, 1783736935, "Beverly Hills, 90210", "My Desperate Valentine", "S2 E16", "Emily refuses to accept the fact that Brandon no longer wants to see her. She slashes her own tires and pretends that her parents are out of town so that Brandon will invite her to stay over. She sneaks into his bedroom and tries to seduce him. After he makes it clear that he is not interested, she begins to make crank phone calls. Andrea discovers that Emily is the person who has been sending men"], [1783736935, 1783739779, "Beverly Hills, 90210", "Chuckie's Back", "S2 E17", "Chuck Wilson, Samantha Sanders' old sitcom co-star and Steve's childhood nemesis, transfers to West Beverly after being kicked out of private school. Steve is depressed when Kelly agrees to go to a dance with Chuck. Samantha orders Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783739779, 1783742647, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783742647, 1783746849, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783746849, 1783749717, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783749717, 1783752525, "Beverly Hills, 90210", "Everybody's Talkin' 'Bout It", "S2 E21", "Andrea is outraged when the school refuses to allow students to take part in a health survey that includes questions about sex. She goes before the school board and introduces a proposal to distribute condoms at West Beverly."], [1783752525, 1783755364, "Beverly Hills, 90210", "Baby Makes Five", "S2 E22", "Kelly confides in Brenda and Donna about her mother's pregnancy, but they can't keep a secret. David tells Donna that Mel is planning to propose, then learns about the pregnancy. He doesn't share the news with his father, who is clueless about Jackie's condition. Jackie assumes that Mel only wants to marry her to fulfill his obligation, so she dumps him.  Music: \"\"All 4 Love\"\" by Color Me Badd (#1"], [1783755364, 1783758231, "Beverly Hills, 90210", "Cardio Funk", "S2 E23", "Dylan's friend Sarah comes to an AA meeting. He offers his support, and she begins to rely on him. She seeks his help in throwing her abusive boyfriend out of the apartment.  Music: \"\"We Want the Funk\"\" by Gerardo (#16, 1991); \"\"Do Wah Diddy Diddy\"\" (Manfred Mann - #1, 1964), performed by the cast; \"\"Your Cheatin' Heart\"\" (Hank Williams), performed by Patricia Michel; \"\"Be Bop-a-Lul"], [1783758231, 1783761068, "Beverly Hills, 90210", "The Pit and the Pendulum", "S2 E24", "Brandon participates in a teen review committee that provides input to one of Jim's clients, who is building a gigantic new mall. Marcie, the developer's college-age daughter, aggressively pursues Brandon. Brandon is incensed to learn that the project would require the demolition of the Peach Pit. He squares off with Jim, who promises to stand up for Nat's interests. Brandon takes Marcie to the Pe"], [1783761068, 1783763936, "Beverly Hills, 90210", "Meeting Mr. Pony", "S2 E25", "Brenda is held up at gunpoint by an armed robber during an after-hours hold up at the Peach Pit. She starts having waking nightmares of the event and visits a psychiatrist who diagnoses Brenda with post traumatic stress disorder. Brenda identifies her attacker in a police line-up and is startled to learn that her attacker is only seventeen years old."], [1783763936, 1783766720, "Beverly Hills, 90210", "Things to Do on a Rainy Day", "S2 E26", "On a rainy Saturday afternoon, Brenda, Kelly, Donna and David head to the Bel Age Hotel to meet Donna's favorite pop group, Color Me Badd. David rents a room so that the foursome can get into the hotel. Donna sees her mother, supposedly at the hotel for a conference, and fears that she will get in trouble. Kelly lifts a key to the penthouse and gets to hang out with the group. Donna, fearing repri"]]}, {"id": "95", "name": "Prime Time", "a": "prime-time", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/prime-time-v2.png", "progs": [[1783672198, 1783673619, "Saved by the Bell", "Screech's Woman", "S1 E5", "In an attempt to cheer Screech up enough to complete their science project, Zack pretends to know a girl who is interested in Screech, but things soon become complicated."], [1783673619, 1783675039, "Saved by the Bell", "Aloha Slater", "S1 E6", "Slater's army father leaves it up to him as to whether they will move to Hawaii, and Zack wants to ensue Slater when he agrees to go so Kelly will be available. So, Zack circulates rumors that Slater is dying and is going to Hawaii for treatment. But when Slater finds out, he decides to turn the tables on Zack, and it all leads to Max throwing a farewell party for Slater at the Max where Slater re"], [1783675039, 1783676503, "In Living Color", "A Date With Grace Jones", "S1 E5", "Boxing greats find a child on their doorstep; a corporate climber hopes his date is suitable; a condo caters to a corpulent clientele; an interpreter introduces Ambassador Shirley Temple Black to her new post."], [1783676503, 1783677974, "In Living Color", "Jheri's Kids", "S1 E6", "A picky karate instructor; a specific chemical dependency; the creative process of Tracy Chapman; a yuppie couple at an earthy eatery; a businessman trying to be young."], [1783677974, 1783679558, "Sex and the City", "The Power of Female Sex", "S1 E5", "Carrie bumps into international party-girl Amalita and her latest man Carlo in a shoe store, who in turn introduce her to a French Architect, Gilles. He leaves Carrie $1,000 on the nightstand after a one-night stand. Charlotte meets Neville Morgan, a renowned artist, who paints pictures of her vagina for his latest exhibition."], [1783679558, 1783681070, "Sex and the City", "Secret Sex", "S1 E6", "Carrie and Mr. Big have their first official \"date\", but Carrie suspects Mr. Big is keeping her secret from his social circle. Miranda dates a man from her gym class, but she discovers a spanking video in Ted's apartment."], [1783681070, 1783683901, "Beverly Hills, 90210", "Perfect Mom", "S1 E7", "Brenda is mesmerized by Kelly's hip and glamorous mother Jackie, a former model. Kelly insists that her mother is not all that she appears to be. Jackie is a recovering addict, and begins hitting the bottle again after her boyfriend dumps her. Cindy is hurt when Brenda initially fails to ask her to be in a mother-daughter fashion show. They eventually agree to appear, and are joined by Andrea, who"], [1783683901, 1783686800, "Beverly Hills, 90210", "The 17-Year Itch", "S1 E8", "The Walshes celebrate their seventeenth anniversary, but Cindy feels dissatisfied because Jim is neglecting her for his work. She has a chance meeting with old flame Glen, a talented artist. The two spend a lot of time together, and share a kiss after Glen's opening. Brandon and Brenda take part in a college study on twins, but are distracted by their parents' marital problems. David becomes the n"], [1783686800, 1783688314, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783688314, 1783691101, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783691101, 1783692585, "Saved by the Bell", "The Substitute", "S1 E7", "After the school's drama teacher falls ill, a handsome substitute arrives, and quickly captivates the girls, much to the chagrin of the boys."], [1783692585, 1783694013, "Saved by the Bell", "Cream for a Day", "S1 E8", "Kelly is nominated for Homecoming Queen, but she's devastated when she gets a pimple on her nose. Zack then sells Kelly a substance Screech accidentally concocts which cleans zits up in minutes. But the one side effect is that it turns people's faces maroon."], [1783694013, 1783695487, "In Living Color", "Don King - The Early Years", "S1 E7", "\"Men on Books\"; a black leader's early years; the Jamaican sitcom \"Hey Mon\"; rappers Salt-n-Pepa hosting a cooking show; a wise men's-room attendant; a \"colorized\" classic from Ted Turner."], [1783695487, 1783696963, "In Living Color", "Endangered Species", "S1 E8", "Anton gives home-remodeling tips; \"President Jesse Jackson\" holds a press conference; a domestic dispute at a salon takes its toll on a client; \"Joan Embery\" shows an endangered species to \"Alan Thicke.\""], [1783696963, 1783698539, "Sex and the City", "The Monogamists", "S1 E7", "When she discovers that Big is dating other women, Carrie realizes that she desires a monogamous relationship with him. In the meantime, Samantha is having trouble being monogamous with her realtors. Charlotte dislikes the sexual desires of her new boyfriend."], [1783698539, 1783700096, "Sex and the City", "Three's a Crowd", "S1 E8", "Charlotte is dating Jack, who wants a threesome, but she is unsure. Carrie discovers that Mr. Big has an ex-wife, and feels threatened. Samantha is seeing a married man; when his wife finds out, she proposes a threesome to keep their marriage together. Miranda feels unattractive and looks for affirmation that she isn't."], [1783700096, 1783702993, "Beverly Hills, 90210", "The Gentle Art of Listening", "S1 E9", "Brenda becomes a trainee for a teen crisis hotline, although Andrea questions her devotion. Brenda violates the rules by taking a call after hours. The caller is a date rape victim, who suffers the same fate on three consecutive nights. Brenda is desperate to learn the girl's identity and help her. Brandon believes that a masseuse has a romantic interest in him. He also dodges a freshman admirer, "], [1783702993, 1783705891, "Beverly Hills, 90210", "Isn't It Romantic?", "S1 E10", "When Brenda finds herself falling in love with Dylan, it results in Brandon's wariness and Jim strongly opposed to it due to Dylan's lifestyle and his father who gets indicted for corporate financial fraud. Meanwhile, Steve meets a woman who will be speaking at an AIDS seminar at school which leads everyone into discussing condoms."], [1783705891, 1783707408, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (2)", "S1 E9", "Carlton and Will, babe magnets. Who will be first to get a date for Hilary's Halloween party?"], [1783707408, 1783708915, "The Fresh Prince of Bel-Air", "Kiss My Butler", "S1 E10", "It is Geoffrey's birthday and Will decides to set him up on a blind date as a gift. Will winds up thinking she is perfect and breaks up the two dancing at a nightclub. Later when Geoffrey comes home, he gives Will Helen's phone number stating she would be more fit for Will."], [1783708915, 1783710380, "Saved by the Bell", "Pinned to the Mat", "S1 E9", "During Career Week at school, Slater worries that continuing to focus on wrestling will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783710380, 1783711837, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783711837, 1783713311, "In Living Color", "Introducing...Homey D. Clown", "S1 E9", "Whizzer and Ice offer a seminar on making money; \"Andrea Dice Clay\" does her routine. Also: \"America's Funniest Security Camera Videos.\""], [1783713311, 1783714786, "In Living Color", "Vera DeMilo", "S1 E10", "An ad for a new celebrity toy; a forgetful Don Cornelius hosting \"Old Train\"; a female bodybuilding contest."], [1783714786, 1783716282, "Sex and the City", "The Turtle and the Hare", "S1 E9", "Mr. Big tells Carrie he's never going to marry again, which unsettles her. Miranda introduces the friends to the Rabbit, a mechanical aid, and Charlotte becomes addicted. Stanford Blatch proposes to Carrie as a cover, so he can inherit his part of the family fortune."], [1783716282, 1783717772, "Sex and the City", "The Baby Shower", "S1 E10", "The four women attend a baby shower for their one-time wild-child friend Laney in her new buttoned-down Connecticut-suburb environs. Carrie is forced to think about motherhood by her late period. Miranda regards the other guests as part of the cult of The Motherhood. Still-single Charlotte fears her dreams of being a wife and mother are slipping away. Samantha throws a \"no-baby shower\" in response"], [1783717772, 1783720671, "Beverly Hills, 90210", "B.Y.O.B.", "S1 E11", "Cindy and Jim get an interesting proposition from an eccentric, swinging couple while spending a weekend together in Palm Springs. With their parents away, the twins throw a house party and Brandon falls victim to the West Beverly High party scene when he ends up drinking a few too many tequilas, gets into a car accident, and is arrested for drunk driving."], [1783720671, 1783723539, "Beverly Hills, 90210", "One Man and a Baby", "S1 E12", "Brandon learns some pitfalls of parenthood when he starts dating Melissa, a senior girl who has a six-month-old baby. Meanwhile, Brenda and Kelly win free skydiving lessons on a radio call-in show. After a few days of skydiving practice, they decide to set aside their fears of falling and take the plunge, literally."], [1783723539, 1783725056, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783725056, 1783726574, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being to easy on the kids, she decides to make them cook Thanksgiving dinner. Carlton also invites his English teacher to the dinner."], [1783726574, 1783728061, "Saved by the Bell", "The Friendship Business", "S1 E11", "As part of an assignment for Business class, the gang forms a friendship bracelet company, but infighting soon leads to trouble and defection."], [1783728061, 1783729516, "Saved by the Bell", "The Mamas and the Papas", "S1 E12", "As a class project, the gang pairs up in mock marriages for the week. Slater's \"marriage\" to Jessie comes apart when he turns out to be the domineering type. Lisa's \"marriage\" to Screech is driving her crazy. Meanwhile, Slater tries to get Screech to break up Zack and Kelly's \"marriage\" so he can still have a chance with her."], [1783729516, 1783730989, "In Living Color", "Anton In The People's Court", "S1 E11", "Sketches include the homeless Anton defending himself in a people's court; a parody of rapper MC Hammer; Ted Turner's \"colorized classic\" version of \"The Kid.\""], [1783730989, 1783732463, "In Living Color", "Conspiracy", "S1 E12", "A cable repairman benefits when LaQuita tries to impress a producer. Also: a \"Ray Charles in Charge\" segment."], [1783732463, 1783734096, "Sex and the City", "The Drought", "S1 E11", "Carrie's relationship with Mr. Big has been going on for long enough that it is becoming less physical, especially after she farts in bed. Charlotte is dating a man who isn't interested in sex anymore thanks to the side-effects of Prozac. Samantha discovers that not having sex can be erotic. Miranda realizes that she hasn't had sex for months."], [1783734096, 1783735796, "Sex and the City", "Oh Come All Ye Faithful", "S1 E12", "After being introduced as \"a friend\" to his mother, Carrie realizes her relationship with Mr. Big is one-sided and breaks up with him. Miranda dates an up-and-coming playwright who is also an up-tight Catholic. Samantha falls in love with a perfect man, but he doesn't measure up to her requirements. Charlotte gets psychic readings to see if she'll ever marry."], [1783735796, 1783738681, "Beverly Hills, 90210", "Slumber Party", "S1 E13", "Brenda throws a slumber party and invites Kelly, Donna and Andrea over for the night. But the evening turns sour when Kelly's venomous girlfriend, Amanda Pacer, joins the party and starts a game which brings out secrets that threaten the friendships between all of them. Meanwhile, Brandon and Steve go out together for a night of cruising and club hopping in which they end up getting duped by two g"], [1783738681, 1783741580, "Beverly Hills, 90210", "East Side Story", "S1 E14", "The Walshes agree to let their th the entire school including Mr. Belding to "], [1783747524, 1783748997, "In Living Color", "Homey D. Clown Returns", "S1 E13", "Damon Wayans plays Homey the Clown; comedienne Samantha Kinison speaks on men and marriage."], [1783748997, 1783750473, "In Living Color", "Bigger Brothers", "S2 E1", "Sketches include:\n\nHey Mon/Hedley Hospital /  Sidekick /  Bigger Brothers /  Mudhead's Funeral / Men On Films II / Flava Flave makes an appearance / Queen Latifah performs"], [1783750473, 1783752079, "Sex and the City", "Take Me Out to the Ballgame", "S2 E1", "Carrie meets \"the new Yankee,\" Joe, at a baseball game, all the while preparing for her first post-breakup encounter with Big. Miranda gets fed up with the girls always talking about men. Samantha gets frustrated with James' \"deficiencies\". Charlotte dates a guy named Paul Ericson who has a tendency to adjust his package... a lot."], [1783752079, 1783753679, "Sex and the City", "The Awful Truth", "S2 E2", "Carrie accidentally suggests that her friend Susan Sharon leave her domineering, violent husband. Miranda builds up the courage to talk dirty in bed. Charlotte tries to replace the perfect man with the perfect dog. Samantha gets dragged to couples' therapy with James and tries to avoid talking about her real problem with their sex life."], [1783753679, 1783756577, "Beverly Hills, 90210", "A Fling in Palm Springs", "S1 E15", "David invites Steve, Kelly and Donna to his grandparents' luxurious Palm Springs home for President's Day weekend. He is embarrassed to find that his grandparents, who he believed were on a cruise, are actually at home. David meets a strange girl at a gas station and asks her over to the house. She brings friends for Steve, who is still trying to win back Kelly. Brenda plans to spend the weekend w"], [1783756577, 1783759473, "Beverly Hills, 90210", "Fame Is Where You Find It", "S1 E16", "Brandon is rollerblading in the park while the television show Keep It Together is filming an episode. The producers seek him out as an emergency replacement for one of the extras. He hits it off with the star, Lydia Leeds, and is considered for a recurring role. However, Lydia is only using him to make her leading man/boyfriend jealous so that he will end his holdout. Brenda fills in for Brandon "], [1783759473, 1783760971, "The Fresh Prince of Bel-Air", "Deck the Halls", "S1 E15", "Will realizes that Ashley has never experienced a real Christmas before and goes out of his way to let her have one. He decorates the inside of the mansion and also the outside fully, upsetting some of the neighbors."], [1783760971, 1783762484, "The Fresh Prince of Bel-Air", "The Lucky Charm", "S1 E16", "Philip may lose a superstitious client whom he advises not to make decisions based on Will's spontaneous remarks."], [1783762484, 1783763912, "Saved by the Bell", "King of the Hill", "S1 E15", "At Bayside High School in Palisades, California, conniving preppy Zack Morris makes a play for Kelly Kapowski, the new girl that he has a crush on, but so does transfer student, A.C. Slater. So, after Kelly gets a detention, Zack tries to ensue that he does in order to be in the same room with her."], [1783763912, 1783765334, "Saved by the Bell", "Save That Tiger", "S1 E16", "The cheerleader county competition arrives as well as the annual prank war with Valley and Bayside High. Jessie is asked to be the head cheerleader and Screech is to be the tiger mascot this year, which is crucial to the cheer leading routine. But two Valley guys kidnap Screech in retaliation for Zack and Slater's pranks against Valley."], [1783765334, 1783766717, "In Living Color", "Anton at the Recruiter", "S2 E2", "Sketches include:\n\n\"\"Anton Volunteers\"\"   \"\"Training Men the Wodehouse Way\"\"   \"\"Roseanne Sings America\"\"   \"\"2 Live Crew\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783671402, 1783672916, "The Wonder Years", "The Phone Call", "S1 E5", "Kevin tries to get up the courage to call Lisa Berlini. Paul tries to find out if Lisa likes Kevin, by consulting the Junior High grapevine."], [1783672916, 1783674426, "The Wonder Years", "Dance With Me", "S1 E6", "Kevin asks Lisa Berlini to a dance but she dumps him. Dejected by Lisa's rejection, Kevin finds himself asking Winnie to the dance, but he finds out she is going with her new boyfriend. In retaliation, Kevin tries to make Winnie jealous."], [1783674426, 1783675781, "Raising Hope", "Happy Halloween", "S1 E5", "When Sabrina's boyfriend can't make it to the deli guy's Halloween party, Jimmy offers to put on his costume and go in his place. Virginia takes Maw Maw, who is dressed as a cat, trick-or-treating while Burt plots ways to play tricks on Jimmy."], [1783675781, 1783677165, "Raising Hope", "Family Secrets", "S1 E6", "When a box containing videos of Hope's mother arrives from prison, Jimmy must decide whether or not to let Hope see them. Virginia explains that children need to be protected from the truth, leading Jimmy to question what exactly his parents have been keeping from him."], [1783677165, 1783678586, "Saved by the Bell", "Screech's Woman", "S1 E5", "In an attempt to cheer Screech up enough to complete their science project, Zack pretends to know a girl who is interested in Screech, but things soon become complicated."], [1783678586, 1783680005, "Saved by the Bell", "Aloha Slater", "S1 E6", "Slater's army father leaves it up to him as to whether they will move to Hawaii, and Zack wants to ensue Slater when he agrees to go so Kelly will be available. So, Zack circulates rumors that Slater is dying and is going to Hawaii for treatment. But when Slater finds out, he decides to turn the tables on Zack, and it all leads to Max throwing a farewell party for Slater at the Max where Slater re"], [1783680005, 1783681437, "That '70s Show", "That Disco Episode", "S1 E7", "The kids decide to go to a disco but Steven doesn't know how to dance so Mrs. Forman teaches him to dance. Mr. Pinciotti walks in on them in a compromising position and believes they're having an affair. Kelso gets jealous of Fez because he thinks he's putting the moves on Jackie."], [1783681437, 1783682868, "That '70s Show", "Drive-In", "S1 E8", "Eric and Donna go to the drive-in. Eric doesn't want Kelso and Jackie to go because they'd be competition but Donna invites them anyway. Fez's house parents think he's listening to the devil's music (a copy of Kiss' Destroyer album). Red and Kitty spend the evening out and almost get arrested."], [1783682868, 1783684381, "The Fresh Prince of Bel-Air", "Def Poet's Society", "S1 E7", "Will enters into an after school program, following the girls into a Poetry class he makes up a poem on the spot to impress the girls. After creating a poet, Christina asks to bring the made up poet to Poetry Night. After Jazz doesn't come through with an impostor, Will uses Geoffrey as the fake poet."], [1783684381, 1783687168, "The Fresh Prince of Bel-Air", "Someday Your Prince Will Be in Effect (1)", "S1 E8", "The family heads to the mall to pick up costumes for Hilary's Halloween Party, while Will and Carlton place a bet to see who can find a date for the party. Philip gets held up at a gadget store. Vivian sing in a Record-A-Song booth. Hilary forgets to take a hat off Ashley and walks out of the store with it, they get accused of theft."], [1783687168, 1783688549, "The Goldbergs (2013)", "Call Me When You Get There", "S1 E7", "Barry is thrilled at the freedom offered by his new driver's license, until Beverly lays down her rules of the road. Pops resists wearing a Life Alert necklace and is forced to call Adam when he needs help."], [1783688549, 1783689921, "The Goldbergs (2013)", "The Kremps", "S1 E8", "Beverly invites the Kremps -- the all-American and seemingly perfect new neighbors -- over for a barbecue."], [1783689921, 1783691229, "The Wonder Years", "Episode 7", "S1 E7", "Savage at Nite"], [1783691229, 1783692788, "The Wonder Years", "Episode 8", "S1 E8", "Savage at Nite"], [1783692788, 1783694174, "Raising Hope", "The Sniffles", "S1 E7", "When Hope catches a cold, Jimmy panics because the family does not have health insurance. Jimmy figures out a way to get a second job at Sabrina's grocery store so he can afford to take Hope to the pediatrician."], [1783694174, 1783695551, "Raising Hope", "Blue Dots", "S1 E8", "Jimmy decides to put Hope in an expensive daycare center, but meets an obstacle in the form of an old record from Burt's past, so the family decides to take matters in their own hands and deal with the law."], [1783695551, 1783697035, "Saved by the Bell", "The Substitute", "S1 E7", "After the school's drama teacher falls ill, a handsome substitute arrives, and quickly captivates the girls, much to the chagrin of the boys."], [1783697035, 1783698463, "Saved by the Bell", "Cream for a Day", "S1 E8", "Kelly is nominated for Homecoming Queen, but she's devastated when she gets a pimple on her nose. Zack then sells Kelly a substance Screech accidentally concocts which cleans zits up in minutes. But the one side effect is that it turns people's faces maroon."], [1783698463, 1783699893, "That '70s Show", "Thanksgiving", "S1 E9", "Laurie comes home for Thanksgiving with her friend Kate.  Eric is annoyed that he'll have to give up his room for their guest, until he sees how hot Kate is.  Jackie alerts Donna to the trouble she could be facing now that a college girl is sleeping in Eric's bed.  Kitty tries vainly to avoid her mother-in-law's phone calls as she prepares for Thanksgiving dinner."], [1783699893, 1783701324, "That '70s Show", "Sunday, Bloody Sunday", "S1 E10", "Red's mother spends a Sunday with them and drives everyone crazy, except Fez. She seems to have a certain fondness for him."], [1783701324, 1783702841, "The  will not lead to a successful job. As a result, he quits the sport, worrying Zack, who has bet on Slater winning his next match."], [1783714612, 1783716068, "Saved by the Bell", "Beauty and the Screech", "S1 E10", "Zack enlists Screech to tutor Kelly, when he finds out that she needs to pass an upcoming science test in order to go to a concert with him. When Screech and Kelly begin spending more time together than he'd expected, it makes him uncomfortable."], [1783716068, 1783717497, "That '70s Show", "Eric's Buddy", "S1 E11", "Eric has a new friend and Steven and Kelso can't stand it. Steven doesn't like him because he's rich and Eric doesn't give him a ride home anymore because Buddy has a Trans Am. Kelso, on the other hand, seems like a worried spouse. Eric starts to feel uncomfortable around him however when Buddy makes a move on him. Buddy apparently thought that Eric was also gay. And Red makes his first sale."], [1783717497, 1783718926, "That '70s Show", "The Best Christmas Ever", "S1 E12", "Red gives Eric 40 bucks to buy a Christmas tree and says that he can keep the change for his party. So Eric, Hyde and Kelso cut down a tree off the interstate and keep the money. They spend the money on beer and Kelso buys Jackie a Christmas present. Laurie spikes the punch with rum and Jackie's friend's are all attracted to Fez all of the sudden. Red has to work on Christmas Eve and not long afte"], [1783718926, 1783720443, "The Fresh Prince of Bel-Air", "Courting Disaster", "S1 E11", "Will joins the school basketball with Carlton already on it. Will becomes the star of the team and Carlton becomes jealous and the competition between the two starts. Carlton decides to steal the ball from Will and take the game winning shot."], [1783720443, 1783721961, "The Fresh Prince of Bel-Air", "Talking Turkey", "S1 E12", "Will's mom comes to the Banks' for Thanksgiving. She gets angry that the kids of the house leave all of the work to Geoffrey. After Vy criticizes Vivian for being s into labor."], [1783717114, 1783718591, "The Fresh Prince of Bel-Air", "The Cold War", "S3 E12", "Carlton is upset when Paula breaks up with him. She then pursues Will and they begin to date. After getting the picture of an ultrasound from the doctor, Philip & Vivian ask Geoffrey to hide it so they do not find the sex of the baby."], [1783718591, 1783720070, "The Fresh Prince of Bel-Air", "Mommy Nearest", "S3 E13", "Will's mother is in town after a broken engagement with Robert. She tells Will that after he graduates from high school, he can move back to Philadelphia. Will wants to stay in California for college."], [1783720070, 1783721548, "The Fresh Prince of Bel-Air", "Winner Takes Off", "S3 E14", "In an attempt to get back at Geoffrey, Will and Carlton give him a fake lottery ticket and trick him into thinking he won $26,000,000. As a response, Geoffrey quits and the boys must convince him to come back."], [1783721548, 1783723026, "The Fresh Prince of Bel-Air", "Robbing the Banks", "S3 E15", "Philip is quick to judge an ex-con Will urged him to hire as a handyman and temporary assistant after the house is robbed."], [1783723026, 1783724353, "The Fresh Prince of Bel-Air", "Bundle of Joy", "S3 E16", "As Vivian's delivery date approaches, the family fantasizes about what the baby will mean to each of them: Ashley feels all but invisible, Geoffrey feels overwhelmed by the family's demands, and Vivian feels like she's having triplets."], [1783724353, 1783725831, "The Fresh Prince of Bel-Air", "The Best Laid Plans", "S3 E17", "Will wants to take the next step in his relationship with his current girl Monique, but she has old fashioned ideas about sex before marriage. Will and Jazz set up a fake wedding. Monique, thinking they are married, is willing to consummate their marriage, saying that Will is a good and honest man. Will Will follow through on the devious plan, or will he come clean and tell the truth?"], [1783725831, 1783727308, "The Fresh Prince of Bel-Air", ic class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783736155, 1783737504, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783737504, 1783738953, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783738953, 1783740403, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783740403, 1783741847, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783741847, 1783743261, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783743261, 1783744664, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783744664, 1783746113, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783746113, 1783747490, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783747490, 1783748909, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."], [1783748909, 1783750358, "The Fresh Prince of Bel-Air", "Home is Where the Heart Attack Is", "S4 E10", "Will sneaks greasy, high-fat foods to Philip after he promises to diet and exercise, then blames himself when Philip has a heart attack."], [1783750358, 1783751776, "The Fresh Prince of Bel-Air", "Take My Cousin... Please", "S4 E11", "On academic probation, Will schemes to improve his grades by fixing up a newly divorced English professor with Hilary, who soon finds fault with the man, further jeopardizing Will's academic future."], [1783751776, 1783753224, "The Fresh Prince of Bel-Air", "You've Got to Be a Football Hero", "S4 E12", "Will uses booze to prove his manliness while competing with a hulking football hero who wants to score points with Jackie, and his fraternity brothers leave drunken Will in a cemetery, where he is haunted. Meanwhile, Ashley learns that beauty is in the eye of the beholder."], [1783753224, 1783754672, "The Fresh Prince of Bel-Air", "'Twas the Night Before Christening", "S4 E13", "Vivian promises god-motherhood of her child to both of her sisters, while Will hatches a harebrained scheme to get Boyz II Men to perform at baby Nicky's christening."], [1783754672, 1783756121, "The Fresh Prince of Bel-Air", "Sleepless in Bel-Air", "S4 E14", "Will pays for putting off studying for a midterm until the last minute, and Ashley pays for staying out late on her first date."], [1783756121, 1783757554, "The Fresh Prince of Bel-Air", "Who's the Boss", "S4 E15", "Carlton in charge. Will gets his feathers ruffled when his cousin becomes his boss at the Peacock Stop."], [1783757554, 1783759002, "The Fresh Prince of Bel-Air", "I Know Why the Caged Bird Screams", "S4 E16", "The big sports game is coming up and pranks against each team starts. Will steals the other teams statue and they retaliate by stealing Carlton, the team good luck charm. Phillip has the home alarm system upgraded and it causes problems."], [1783759002, 1783760450, "The Fresh Prince of Bel-Air", "When You Hit Upon a Star", "S4 E17", "Will becomes a jet-setter while dating a pop star."], [1783760450, 1783761898, "The Fresh Prince of Bel-Air", "Stop Will! In the Name of Love", "S4 E18", "A Valentine's double date finds Will treating Ashley like a kid and Ashley demanding r-e-s-p-e-c-t."], [1783761898, 1783763334, "The Fresh Prince of Bel-Air", "You'd Better Shop Around", "S4 E19", "Will goes with Phillip and Carlton to buy a new car. When Carlton wants Phillip to buy a car that Will thinks is dull, Will convinces Phillip to get a convertible. The owner of the lot offers Will a job and Will accepts. It isn't long that Will is the best salesman on the lot and he's being considered for an executive position so he drops out of school."], [1783763334, 1783764762, "The Fresh Prince of Bel-Air", "The Client", "S5 E1", "Ashley's success is going to Will's head. Phil decides that it would be best if Will did not manage Ashley any further. Upset, Will moves out for weeks, but eventually comes back. As soon he is back, Will learns that Ashley's success is going to her head as well and is upset to find that Ashley is turning into a Diva."], [1783764762, 1783766118, "The Fresh Prince of Bel-Air", "What's Will Got to Do With It?", "S5 E2", "Will helps Ashley make a big impression on a recording executive, but Philip is adamantly against her pursuing a singing career."]]}, {"id": "411", "name": "SBC Bulletin", "a": "sbc-bulletin", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/sbc-bulletin-v2.png", "progs": [[1783672263, 1783693863, "SBC Bulletin", "", "", "SBC Bulletin"], [1783693863, 1783715463, "SBC Bulletin", "", "", "SBC Bulletin"], [1783715463, 1783737063, "SBC Bulletin", "", "", "SBC Bulletin"], [1783737063, 1783758663, "SBC Bulletin", "", "", "SBC Bulletin"], [1783758663, 1783765899, "SBC Bulletin", "", "", "SBC Bulletin"]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
// back-to-top
(function(){var b=document.getElementById('btt');window.addEventListener('scroll',function(){b.classList.toggle('show',window.scrollY>400);},{passive:true});})();

(function(){var NAV=['index.html','channels.html','schedule.html','flix.html','this-week.html','access.html'];var ci=2;var sx=null;document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',function(e){if(sx===null)return;var dx=e.changedTouches[0].clientX-sx;sx=null;if(Math.abs(dx)<60)return;var ni=(ci+(dx<0?1:-1)+NAV.length)%NAV.length;location.href=NAV[ni];});})();
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});if(window.caches){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}}
</script>
</body></html>
