rs Steve to be nice to Chuck in the hopes of persuading him to appear in a reunion movie. Chuck taunts Steve about being adopted, and reveals that he knew about the adopti"], [1783657817, 1783660603, "Beverly Hills, 90210", "A Walsh Family Christmas", "S2 E18", "Steve arrives in Albuquerque and tracks down his grandfather, a diner owner. Al explains that his daughter gave up Steve because she was very young and wanted him to have a good home. He sadly reveals that Karen died in a car accident. Steve leaves flowers at her grave, and convinces an eccentric Santa-like charter pilot to fly him home for Christmas. Cindy is depressed about her first Christmas i"], [1783660603, 1783661997, "The Fresh Prince of Bel-Air", "My Brother's Keeper", "S2 E15", "Will has a game coming up with Malibu Prep in which a scout will be in the crowd. He meets a player from the other team. After learning that Marcus has a child Will must choose between being greedy or realizing what the scholarship would mean to Marcus."], [1783661997, 1783663392, "The Fresh Prince of Bel-Air", "Geoffrey Cleans Up", "S2 E16", "Geoffrey falls for the woman next door while thinking she is a butler. When he finds out she is just visiting and is worth 25 million dollars he must decide whether he wants to continue seeing her, or not."], [1783663392, 1783664735, "Saved by the Bell", "Fourth of July", "S3 E6", "Malibu Sands is preparing to hold the annual Miss Liberty beauty pageant, and Zack, one of the judges, is pressured by Mr. Carosi to rig the competition in Stacey's favor."], [1783664735, 1783666145, "Saved by the Bell", "Check Your Mate", "S3 E7", "The Bayside annual class chess championship against Valley is approaching and Screech is the undefeated champion, thanks to the lucky beret that Violet gave him. But an attractive girl from Valley steals the beret after coming on to Screech, leaving him in a dilemma and it also has Zack and Slater destined to lose $300 in a bet they made involving Screech winning the championship."], [1783666145, 1783667522, "In Living Color", "Men on Vacation", "S2 E26", "Best of episode of \"\"In Living Color.\"\" Sketches include:\n\n\"\"Amazing Grace - Rocky VI\"\"   \"\"Vera DeMilo: Veracosa, Mistress of Destruction\"\"   \"\"Mudhead's Funeral\"\"   \"\"Men On Vacation\"\"   \"\"Homey the Clown: When Homey Met Sally\"\""], [1783667522, 1783668733, "In Living Color", "Homey The Sellout: Part 2", "S3 E1", "Sketches include Pee Wee's Adult Adventure / Crown Heights Story / Misery II / Homey D Clown Part 2 Of 2 / The Head Detective"], [1783668733, 1783670613, "Sex and the City", "Easy Come, Easy Go", "S3 E9", "Big tells Carrie that he's leaving his wife. Miranda deals with her breakup and Steve moving out of the apartment. After meeting the MacDougal family matriarch, Charlotte maneuvers Trey into making an \"alrighty\" proposal. Samantha is upset when dating a hot guy with \"funky spunk\"."], [1783670613, 1783672456, "Sex and the City", "All or Nothing", "S3 E10", "Carrie feels guilty and wants to quit her affair with Big. Miranda enjoys phone sex with a co-worker from Chicago. Charlotte negotiates the terms of her prenuptial agreement with Trey's mother, Bunny. After celebrating her move to the new apartment in the exclusive Meatpacking District, Samantha's bout of the 'flu gives her a pessimistic outlook on life."], [1783672456, 1783676575, "Beverly Hills, 90210", "Fire and Ice", "S2 E19", "Brandon learns a lesson in dedication to a task and hard work when he falls for Tricia, a young ice skater with Olympic goals, whom he pleasantly distracts from her skating practice. Meanwhile, Brenda must deal with a back-stabbing boss at her boutique job in which Cindy offers Brenda a chance to get back at her."], [1783676575, 1783679360, "Beverly Hills, 90210", "A Competitive Edge", "S2 E20", "Brandon goes undercover for the Blaze to try and expose steroid use within the school's track team, and finds that Steve is involved after teammate Kyle tips Brandon about it. Brandon is then caught in a dilemma of how to expose the drug use without hurting Steve along with everyone else. Meanwhile, Brenda gets into a minor car accident with a con artist woman who's out for money."], [1783679360, 1783680754, "The Fresh Prince of Bel-Air", "Community Action", "S2 E17", "When Hillary is ordered to do community service at a free clinic, the doctor in charge becomes the antidote for her marriage-mindedness."], [1783680754, 1783682148, "The Fresh Prince of Bel-Air", "Ill Will", "S2 E18", "The family fears a steamy exposé when Geoffrey begins his memoirs, while Will fears the scalpel when he enters the hospital, kicking and screaming, for a tonsillectomy."], [1783682148, 1783683485, "Saved by the Bell", "My Boyfriend's Back", "S3 E8", "Zack and Stacey's relationship is going well until Stacey's boyfriend from Boston, Craig, surprises her at the beach club, leaving Zack devastated. Also, it's the annual ATV race and the gang decides to participate in it."], [1783683485, 1783684820, "Saved by the Bell", "Fake I.D.'s", "S3 E9", "Zack begins dating a college girl named Danielle, and asks Screech to make fake IDs in order that they can hang out with her at a club. However, things become complicated when the guys see Kelly's boyfriend, Jeff, there with another girl."]]}, {"id": "111", "name": "Savage at Nite", "a": "savage-at-nite", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/savage-at-nite-v4.png", "progs": [[1783589610, 1783591009, "Saved by the Bell", "Close Encounters Of The Nerd Kind", "S2 E12", "After Zack breaks the school's video camera, he and the gang pretend Screech is an alien in order to win a photo competition. However, their picture soon arouses government suspicion."], [1783591009, 1783592335, "That '70s Show", "I Love Cake", "S2 E7", "Eric freaks out when Donna says 'I love you,' and all he can think of to say in return is 'I love cake.'  Donna, not knowing how to deal with this, turns to Jackie for relationship advice.  Midge kicks Bob out of the house; he stays with the Formans and Red has to act as a go-between to try to mend their marriage.  Kelso gets a new leather jacket that he thinks makes him look like Marlon Brando, b"], [1783592335, 1783593671, "That '70s Show", "Sleepover", "S2 E8", "Donna finally sleeps with Eric, but when the guys find out that all they did was sleep, they tease him mercilessly.  Hyde gets a job at the FotoHut, and finds out that compared to his boss, he's a workaholic.  And Kitty has to work double shifts at the hospital, leaving Red to do the cooking."], [1783593671, 1783595065, "The Fresh Prince of Bel-Air", "Cased Up", "S2 E9", "A pompous lawyer who's dating Hilary is no fan of Will's after he's sideswiped by Will's roadster."], [1783595065, 1783596439, "The Fresh Prince of Bel-Air", "Hi-Ho Silver", "S2 E10", "Will and Carlton think a party guest stole the silverware."], [1783596439, 1783597736, "The Goldbergs (2013)", "DannyDonnieJoeJonJordan", "S2 E10", "Beverly is ordered to clean out the garage by Murray, who wants everything gone except for one trunk that he allows her to keep. Meanwhile, Adam and Barry discover Erica's old collection of New Kids on the Block memorabilia."], [1783597736, 1783599026, "The Goldbergs (2013)", "The Darryl Dawkins Dance", "S2 E11", "As the Sadie Hawkins dance approaches, Erica asks Beverly to help her find Barry a date to keep him away from Lainey. But Beverly comes up with a girl that shocks everyone. Meanwhile, Adam gets into a fight with his best friend...Pops."], [1783599026, 1783600391, "The Wonder Years", "Mom Wars", "S3 E4", "Kevin thinks his mother is being over-protective when she tries to stop him from playing tackle football after school."], [1783600391, 1783601779, "The Wonder Years", "On the Spot", "S3 E5", "Kevin joins the school play just to get out of Gym class, while Winnie and Paul seem to take it very seriously. Winnie has problems with her performance, and Kevin unexpectedly helps her during the show."], [1783601779, 1783603078, "Raising Hope", "Bro-gurt", "S2 E8", "Virginia encourages the family to submit their own inventions in the National Invention Convention Extravaganza, so they could win the cash prize. Burt and Andrew team up to create unusual flavored yogurt, while Sabrina and Jimmy create a new baby mop."], [1783603078, 1783604376, "Raising Hope", "The Men of New Natesville", "S2 E9", "After being encouraged to be more of a daredevil by Burt, Jimmy jumps at the chance of showing off his bolder side at a party at Frank's house. Frank and Jimmy realize they have shared a common high school bully, and when they try to take him down, they realize their old bully has changed."], [1783604376, 1783605786, "Saved by the Bell", "Running Zack", "S2 E13", "Zack is the key man at a track meet, but he can't run unless he finishes a project on his family's heritage. So on Mrs. Wentworth's advice, Zack visits an elderly Native American beatnik who tells him about his distant Indian heritage. But when tragedy strikes and Chief Henry dies from natural causes, Zack doesn't know if he can run for the school."], [1783605786, 1783607126, "Saved by the Bell", "The Last Dance", "S3 E1", "When Kelly gets a job at the Max, the attraction of Kelly to her boss Jeff Hunter causes her and Zack to break up for good at the annual costume ball. Meanwhile, Jessie and Slater plot to be elected prom king and queen, while the gang forms a new band called 'Zack Attack' to perform at the dance."], [1783607126, 1783608452, "That '70s Show", "Eric Gets Suspended", "S2 E9", "Donna is acting out over her parents' break up and takes up smoking. Eric gets caught holding one of her cigarettes in the school yard and is suspended. Even though Eric tries explaining what really happened, Red punishes him. Fez and Hyde go on a double date, set up by Fez's host parents; Hyde can't decide which girl he likes better. Jackie and Kelso argue over how many stuffed animals she can ha"], [1783608452, 1783609779, "That '70s Show", "Red's Birthday", "S2 E10", "It's Red's birthday and the roof collapses so Eric gets him some 2 x 4s to fix it. Bob and Midge take Red and Kitty out for dinner but they each bring a date and ditch them to do it in the car. Eric is mad at Donna for talking to Hyde about her parent's problems instead of talking to him."], [1783609779, 1783611173, "The Fresh Prince of Bel-Air", "The Butler Did It", "S2 E11", "Philip and Vivian take a weekend vacation and leave the kids home alone, Hilary and Carlton set up a video shoot with Bell Biv De Voe in their house, and then everyone must rush to clean up after Philip and Vivian decide to come home early."], [1783611173, 1783612561, "The Fresh Prince of Bel-Air", "Something for Nothing", "S2 E12", "Will gets lucky at a fundraiser and wins some money. When Will doesn't follow the club's tradition, it starts rumors about the Banks family. Ashley is too young to go to the fundraiser, so she and Geoffrey set up their own poker night."], [1783612561, 1783613854, "The Goldbergs (2013)", "Cowboy Country", "S2 E12", "Beverly can't accept Adam has deep feelings for Dana. Murray watches football with Lainey's dad."], [1783613854, 1783615150, "The Goldbergs (2013)", "Van People", "S2 E13", "When Murray takes Erica's car privileges away, Erica and Barry retaliate by buying their own shabby used black van. Meanwhile, Adam gets voted in the yearbook as \"nicest guy,\" which results in a suspension when he objects."], [1783615150, 1783616541, "The Wonder Years", "Odd Man Out", "S3 E6", "When Kevin and Paul get on each other's nerves, they try to become best friends with two other boys."], [1783616541, 1783617937, "The Wonder Years", "The Family Car", "S3 E7", "When the Arnold family car breaks down and Jack can't fix it, Kevin hopes his father will buy something more fancy."], [1783617937, 1783619240, "Raising Hope", "It's a Hopeful Life", "S2 E10", "In this \"It's a Wonderful Life\" themed episode, Jimmy is transported into a cinematic dreamlike state and watches on at a world where he never met Lucy. When he returns to reality he realizes that if Hope had never been born, his life wouldn't be as good. Meanwhile, Virginia, Burt and Maw Maw see a movie that bares a striking resemblance to their day-to-day lives."], [1783619240, 1783620542, "Raising Hope", "Mrs. Smartypants", "S2 E11", "When Hope shows signs of being a baby genius, the family pits themselves against one another to earn their GEDs. While attempting to secure his GED, Jimmy finds out that his old high school teacher, Mr. Swift, is teaching the class."], [1783620542, 1783621880, "Saved by the Bell", "Zack's Birthday Party", "S3 E2", "Due to Lisa's parents pulling some strings, the gang land summer jobs at Malibu Sands beach club, but Zack soon clashes with the owner Leon Carosi, and his initially abrasive daughter, Stacey."], [1783621880, 1783623217, "Saved by the Bell", "The Aftermath", "S3 E3", "Zack attempts to get back at Kelly by making her jealous when he brings another girl to The Max to dance to his and Kelly's favorite song. But the plan misfires greatly, with Zack taking the worst of it. Meanwhile, the rest of the gang prepares for Lisa's Sweet Sixteen birthday party, first when they get angry at Kelly for dumping Zack, then when they get even more angry at Zack for the way he tri"], [1783623217, 1783624541, "That '70s Show", "Laurie Moves Out", "S2 E11", "Laurie moves out and Red is annoyed when he finds out she moved in with a guy instead of with a girlfriend like she told him. She then moves back in when the guy goes back to his wife. Jackie suspects Kelso of being unfaithful."], [1783624541, 1783625867, "That '70s Show", "Eric's Stash", "S2 E12", "Eric's secret stash of money goes missing, and Hyde is the first and only suspect.  Hyde denies taking it, and everyone is shocked when the real culprit is revealed.  Fez and Kelso help Jackie prepare for a beauty pageant."], [1783625867, 1783627261, "The Fresh Prince of Bel-Air", "Christmas Show", "S2 E13", "On a family ski trip, the Banks find that they must come up with Christmas gifts from the heart after their belongings are stolen."], [1783627261, 1783628657, "The Fresh Prince of Bel-Air", "Hilary Gets a Life", "S2 E14", "Hilary must work for a caterer after her credit cards are cancelled."], [1783628657, 1783629956, "The Goldbergs (2013)", "Barry Goldberg's Day Off", "S2 E14", "Barry pretends to be sick so he can have an epic day off -- but things don't go as planned. Pops and Adam try to help salvage Barry's day."], [1783629956, 1783631253, "The Goldbergs (2013)", "Happy Mom, Happy Life", "S2 E15", "Dana and Adam are given a doll to parent for a school project, but end up in jeopardy of failing because of Beverly's \"grand-smothering.\" Meanwhile, Erica tries to get back at Barry for monopolizing her best friend's time by joining the JTP, however her plan doesn't go as expected."], [1783631253, 1783632630, "The Wonder Years", "The Pimple", "S3 E8", "Just when the Pruitts and their daughter Gina are coming to visit, Kevin gets a giant pimple. With only a few days until the Pruitts arrive, Kevin resorts to all kinds of methods to get rid of the unsightly blemish."], [1783632630, 1783634025, "The Wonder Years", "Math Class Squared", "S3 E9", "Kevin decides cheating is the only way to get ahead in math class."], [1783634025, 1783635327, "Raising Hope", "Gambling Again", "S2 E12", "When Burt starts gambling again to try and win back the items he lost 20 years ago, Jimmy and Virginia get addicted to gambling themselves, which causes them to forget about Shelley's play that Sabrina wrote and Hope stars in."], [1783635327, 1783636630, "Raising Hope", "Tarot Cards", "S2 E13", "Burt hires Barney to help him with his receipts during corporate tax season, and while caught up in the stress Burt accidentally makes a mean comment about Virginia's job, so she decides to change careers and become a tarot card reader. Meanwhile, Sabrina contemplates moving to Africa with Wyatt, upsetting Jimmy."], [1783636630, 1783637967, "Saved by the Bell", "The Game", "S3 E4", "After discovering that the vintage Mustang he wants to buy belongs to Mr. Carosi, Zack convinces him to lower the price by claiming that the gang can win the annual beach volleyball match, though their chances of victory seem slim at best."], [1783637967, 1783639378, "Saved by the Bell", "Operation Zack", "S3 E5", "Zack sprains his knee before the big basketball game, and while in hospital learns that Lisa is a part-time candy-striper. However, he also learns that he will need surgery to repair his knee and worries that it may go wrong."], [1783639378, 1783640704, "That '70s Show", "Hunting", "S2 E13", "Red and Bob take the guys deer hunting; Hyde chills out, Fez bags dinner using only a few primitive weapons, Kelso is a menace with his gun, and Red and Eric bond in the deer blind. Meanwhile, Kitty and Midge have a girls' night with Donna, Jackie and Laurie, but with nothing to talk about, the end up playing poker."], [1783640704, 1783642030, "That '70s Show", "Red's New Job", "S2 E14", "Eric gets a job at Price Mart as a cashier while Red gets one as a supervisor. Kelso tries to break up with Laurie because she wants a real relationship but Laurie threatens to tell Jackie about her and Kelso."], [1783642030, 1783643424, "The Fresh Prince of Bel-Air", "My Brother's Keeper", "S2 E15", "Will has a game coming up with Malibu Prep in which a scout will be in the crowd. He meets a player from the other team. After learning that Marcus has a child Will must choose between being greedy or realizing what the scholarship would mean to Marcus."], [1783643424, 1783644819, "The Fresh Prince of Bel-Air", "Geoffrey Cleans Up", "S2 E16", "Geoffrey falls for the woman next door while thinking she is a butler. When he finds out she is just visiting and is worth 25 million dollars he must decide whether he wants to continue seeing her, or not."], [1783644819, 1783646114, "The Goldbergs (2013)", "The Lost Boy", "S2 E16", "Adam attends a Phillies game with his dad and ends up lost in the stadium after Murray allows him to leave his seat on his own. Elsewhere, Beverly's guilt trip backfires when Erica and Barry drive off without her during an argument on their way home from the mall."], [1783646114, 1783647405, "The Goldbergs (2013)", "The Adam Bomb", "S2 E17", "Adam and Barry get in a prank war, while Erica tries to become a pop star."], [1783647405, 1783648765, "The Wonder Years", "Rock 'n Roll", "S3 E10", "When Kevin watches The Beatles on TV he notices a new kid at his school named Larry. Larry asks Kevin does he want to join his band. After turning him down Larry asks again but Kevin's dad tells him \"No.\" So he buys his own guitar. While in the band Larry tells Kevin and the other band members that he got them a gig which Kevin feels they are not ready for."], [1783648765, 1783650137, "The Wonder Years", "Don't You Know Anything About Women?", "S3 E11", "Kevin wants to take Susan Fisher to the dance, but she has a boyfriend, Donald Wallach. However, he hears rumors that they have broken up, so he's about to ask her until Donald interferes. Linda Sloan, his lab partner, suggests that they go as friends so they do.\n\nThey have a good time in the beginning, but it turns sour when while Linda is dancing with Steve Padway, Kevin dances with Susan and th"], [1783650137, 1783651427, "Raising Hope", "Jimmy's Fake Girlfriend", "S2 E14", "Bored and increasingly desperate for a distraction even they can afford, Burt and Virginia try out various hobbies, until they agree improvisation acting fits them scoundrels. Jimmy feels Sabrina a lost cause after her engagement with Wyatt."], [1783651427, 1783652728, "Raising Hope", "Sheer Madness", "S2 E15", "Jimmy and Sabrina continue building their relationship by learning more about their strange habits and childhood fears. Meanwhile, Virginia learns more about a habit Burt has been hiding from her for years."], [1783652728, 1783654071, "Saved by the Bell", "Fourth of July", "S3 E6", "Malibu Sands is preparing to hold the annual Miss Liberty beauty pageant, and Zack, one of the judges, is pressured by Mr. Carosi to rig the competition in Stacey's favor."], [1783654071, 1783655482, "Saved by the Bell", "Check Your Mate", "S3 E7", "The Bayside annual class chess championship against Valley is approaching and Screech is the undefeated champion, thanks to the lucky beret that Violet gave him. But an attractive girl from Valley steals the beret after coming on to Screech, leaving him in a dilemma and it also has Zack and Slater destined to lose $300 in a bet they made involving Screech winning the championship."], [1783655482, 1783656808, "That '70s Show", "Burning Down the House", "S2 E15", "With her parents away, Jackie plans on throwing a small, classy dinner party.  Kelso tries to turn it into a fun party, and invites everyone he knows; Jackie is upset, and when Kelso tries to fix things, he only ends up making them worse.  Hyde makes it with a snobby girl from school, but the guys don't believe him.  Red finds out that Bob wears a toupee, and then has to spend an uncomfortable eve"], [1783656808, 1783658134, "That '70s Show", "The First Time", "S2 E16", "Bob and Midge are getting ready to renew their vows. Kitty is upset because her close friend Midge didn't ask her as a bridesmaid while Red is Bob's best man. Eric and Donna have sex for the first time."], [1783658134, 1783659529, "The Fresh Prince of Bel-Air", "Community Action", "S2 E17", "When Hillary is ordered to do community service at a free clinic, the doctor in charge becomes the antidote for her marriage-mindedness."], [1783659529, 1783660922, "The Fresh Prince of Bel-Air", "Ill Will", "S2 E18", "The family fears a steamy exposé when Geoffrey begins his memoirs, while Will fears the scalpel when he enters the hospital, kicking and screaming, for a tonsillectomy."], [1783660922, 1783662212, "The Goldbergs (2013)", "I Drank the Mold", "S2 E18", "Adam's birthday sleepover goes awry while Barry and Erica compose a song to get Murray to appreciate music."], [1783662212, 1783663503, "The Goldbergs (2013)", "La Biblioteca Es Libros", "S2 E19", "Beverly arranges for Adam's teacher to tutor him in Spanish, a class she can't believe he's failing; at the same time, Barry gets a job delivering pizzas to impress Murray, but meanwhile, Erica is upset that her father hasn't acknowledged the fact that she has been working throughout her teen years."], [1783663503, 1783664900, "The Wonder Years", "The Powers That Be", "S3 E12", "Trouble begins in the Arnold household when Grandpa Arnold arrives and gives Kevin a dog - a responsibility Jack doesn't think Kevin can handle."], [1783664900, 1783666274, "The Wonder Years", "She, My Friend and I", "S3 E13", "Paul and his girlfriend Carla have a falling out. Wanting to make his friend feel better, Kevin offers to set Paul up with Winnie. At first Kevin is happy about the idea, but after awhile, he begins to wonder if he's made a mistake."], [1783666274, 1783667577, "Raising Hope", "Single White Female Role Model", "S2 E16", "Sabrina is arrested at a protest for civil disobedience, but her two-week sentence in jail is made even worse by a prison attendant who claims that they're old friends. Meanwhile, Virginia saves the Natesville mayor from a public scandal, but Jimmy's political encounter could threaten Sabrina's freedom."], [1783667577, 1783668880, "Raising Hope", "Spanks Butt, No Spanks", "S2 E17", "When a raccoon decides to take residency under the Chance's porch, Virginia and Sabrina work together to try and lure the critter out. Meanwhile, Hope's misbehavior has become such an issue that Virginia and Burt suggest that it might be time for Jimmy to spank her."], [1783668880, 1783670216, "Saved by the Bell", "My Boyfriend's Back", "S3 E8", "Zack and Stacey's relationship is going well until Stacey's boyfriend from Boston, Craig, surprises her at the beach club, leaving Zack devastated. Also, it's the annual ATV race and the gang decides to participate in it."], [1783670216, 1783671552, "Saved by the Bell", "Fake I.D.'s", "S3 E9", "Zack begins dating a college girl named Danielle, and asks Screech to make fake IDs in order that they can hang out with her at a club. However, things become complicated when the guys see Kelly's boyfriend, Jeff, there with another girl."], [1783671552, 1783672878, "That '70s Show", "Afterglow", "S2 E17", "Contrary to what she tells Eric, Donna's review of their first sexual encounter is not good--or private; Red celebrates his first paycheck and buys a motorcycle."], [1783672878, 1783674204, "That '70s Show", "Kitty and Eric's Night Out", "S2 E18", "Eric is forced to go on a date with his mom. He is embarrassed seeing sex and drugs with his mom. But he warms up to it. Fez gets a cute new girlfriend. Jackie has to admit that she is jealous and has feelings for Fez."], [1783674204, 1783675598, "The Fresh Prince of Bel-Air", "Eyes on the Prize", "S2 E19", "Needing a game show partner, Will must choose between bickering friends."], [1783675598, 1783676986, "The Fresh Prince of Bel-Air", "Those Were the Days", "S2 E20", "Philip and Vivian welcome a '60s radical, who arouses the FBI's interest and influences Will and Carlton to take action over the firing of a nonconformist teacher."], [1783676986, 1783678280, "The Goldbergs (2013)", "Just Say No", "S2 E20", "Erica tries to educate Beverly about voting. After losing a wrestling match, Barry wants to prove his athletic prowess. Adam makes a TV audition tape for Barry."], [1783678280, 1783679575, "The Goldbergs (2013)", "As You Wish", "S2 E21", "Murray's joy over Adam wanting to play a sport is short-lived once he discovers that it's fencing, and worse yet, he was inspired by a scene from \"The Princess Bride.\" Meanwhile, things don't go exactly as planned when Beverly tries to make a love connection between Barry's wrestling coach and Erica's voice teacher."], [1783679575, 1783680962, "The Wonder Years", "The St. Valentine's Day Massacre", "S3 E14", "To make up for being rude and insenstive to Winnie, Kevin makes her a Valentine's card, but it is accidently placed in Becky Slater's locker. When Becky finds the card, she thinks Kevin wants her back - setting the two up for a showdown."], [1783680962, 1783682348, "The Wonder Years", "The Tree House", "S3 E15", "When Kevin and his dad build a treehouse in the backyard, they discover they get a good view of an attractive neighbor planting her tomatoes. Meanwhile, Doug is in shock after having heard \"the talk\" from his dad."], [1783682348, 1783683650, "Raising Hope", "Poking Holes in the Story", "S2 E18", "Virginia agrees to be a live-in house sitter for her client and look after a troublesome teenage girl. Meanwhile, Maw Maw once again confuses Jimmy with her late husband Wilfrid, so Jimmy and Sabrina play along."]]}, {"id": "215", "name": "Bel-Air", "a": "bel-air", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/belair-v1.png", "progs": [[1783589462, 1783590856, "The Fresh Prince of Bel-Air", "Be My Baby Tonight", "S2 E23", "Ashley cringes when the family oohs and aahs over her relationship with Kevin , but Will chokes when she asks him about sex - and her curiosity about reproduction sends Will to a pregnancy counseling center."], [1783590856, 1783592230, "The Fresh Prince of Bel-Air", "Strip-Tease for Two", "S2 E24", "Will and Carlton lose their shirts investing on a tip - then take jobs as strippers to recoup their losses and get Vivian's bracelet out of hock."], [1783592230, 1783593625, "The Fresh Prince of Bel-Air", "How I Spent My Summer Vacation", "S3 E1", "Will returns home from spending the summer in Philadelphia with a new look that doesn't sit well with Uncle Phil."], [1783593625, 1783595020, "The Fresh Prince of Bel-Air", "Will Gets Committed", "S3 E2", "When the Banks family returns to its former neighborhood to help old friends after a destructive city-wide riot, Vivian reveals a surprise to Philip."], [1783595020, 1783596415, "The Fresh Prince of Bel-Air", "That's No Lady, That's My Cousin", "S3 E3", "Philip and Vivian tell the family they are expecting a baby. Hillary is expected to move out to make room for the baby. Ashley wants to fit in at a new school so she dresses like the girls Will is interested in."], [1783596415, 1783597810, "The Fresh Prince of Bel-Air", "Hilary Gets a Job", "S3 E4", "Hilary gets a job reporting weather on television."], [1783597810, 1783599205, "The Fresh Prince of Bel-Air", "Mama's Baby, Carlton's Maybe", "S3 E5", "Carlton prepares for a dinner date with his former girlfriend, Cindy (Lark Voorhees), forgiving her for rejecting him several months earlier, but when she arrives with a newborn baby named Carlton Jr., the entire Banks family is stunned."], [1783599205, 1783600599, "The Fresh Prince of Bel-Air", "P.S. I Love You", "S3 E6", "While Philip entertains rude, senile Judge Robertson, Will accepts expensive gifts from Lindsey Simon, a rich classmate who wants to buy his affection."], [1783600599, 1783601994, "The Fresh Prince of Bel-Air", "Here Comes the Judge", "S3 E7", "Will gets arrested for numerous parking tickets as Phil runs for judge against incumbent Judge Robertson."], [1783601994, 1783603389, "The Fresh Prince of Bel-Air", "Boyz in the Woods", "S3 E8", "Philip takes Will and Carlton on a camping trip that turns out to be a disaster when snow traps the unhappy campers."], [1783603389, 1783604784, "The Fresh Prince of Bel-Air", "A Night at the Oprah", "S3 E9", "The Bankses appear on Oprah's show and fail to invite Will on-stage, which may cause Philip to lose the election."], [1783604784, 1783606180, "The Fresh Prince of Bel-Air", "Asses to Ashes", "S3 E10", "Election results are in and Philip fights to remain cool amid lies by Judge Robertson, which prompt Will to confront the outspoken incumbent. Will Will go to far? Will he say what everyone is feeling? Will Judge Robertson be able to take it?"], [1783606180, 1783607535, "The Fresh Prince of Bel-Air", "A Funny Thing Happened on the Way to the Forum", "S3 E11", "When Philip backs out of taking Vivian to Lamaze class, Will reluctantly offers to be her coach. Will meets a single pregnant woman who is a sportswriter. She invites Will to attend a game with her, where she goes into labor."], [1783607535, 1783608929, "The Fresh Prince of Bel-Air", "The Cold War", "S3 E12", "Carlton is upset when Paula breaks up with him. She then pursues Will and they begin to date. After getting the picture of an ultrasound from the doctor, Philip & Vivian ask Geoffrey to hide it so they do not find the sex of the baby."], [1783608929, 1783610324, "The Fresh Prince of Bel-Air", "Mommy Nearest", "S3 E13", "Will's mother is in town after a broken engagement with Robert. She tells Will that after he graduates from high school, he can move back to Philadelphia. Will wants to stay in California for college."], [1783610324, 1783611719, "The Fresh Prince of Bel-Air", "Winner Takes Off", "S3 E14", "In an attempt to get back at Geoffrey, Will and Carlton give him a fake lottery ticket and trick him into thinking he won $26,000,000. As a response, Geoffrey quits and the boys must convince him to come back."], [1783611719, 1783613114, "The Fresh Prince of Bel-Air", "Robbing the Banks", "S3 E15", "Philip is quick to judge an ex-con Will urged him to hire as a handyman and temporary assistant after the house is robbed."], [1783613114, 1783614359, "The Fresh Prince of Bel-Air", "Bundle of Joy", "S3 E16", "As Vivian's delivery date approaches, the family fantasizes about what the baby will mean to each of them: Ashley feels all but invisible, Geoffrey feels overwhelmed by the family's demands, and Vivian feels like she's having triplets."], [1783614359, 1783615754, "The Fresh Prince of Bel-Air", "The Best Laid Plans", "S3 E17", "Will wants to take the next step in his relationship with his current girl Monique, but she has old fashioned ideas about sex before marriage. Will and Jazz set up a fake wedding. Monique, thinking they are married, is willing to consummate their marriage, saying that Will is a good and honest man. Will Will follow through on the devious plan, or will he come clean and tell the truth?"], [1783615754, 1783617148, "The Fresh Prince of Bel-Air", "The Alma Matter", "S3 E18", "Depressed and suicidal over having ruined his chances of attending Princeton University, Carlton is visited by his Guardian Angel, who shows him how awful the Banks family would be if he weren't alive."], [1783617148, 1783618542, "The Fresh Prince of Bel-Air", "Just Say Yo", "S3 E19", "Will is run down with work, school, and his girlfriend, and has trouble staying awake. He decides to take amphetamines to help him. Carlton asks will for vitamins and Will accidentally gives him the uppers. Carlton ends up in the hospital."], [1783618542, 1783619917, "The Fresh Prince of Bel-Air", "The Baby Comes Out", "S3 E20", "Vivian's baby is a week late, but family members and her visiting sisters are nowhere to be found when it's time to rush to the hospital."], [1783619917, 1783621312, "The Fresh Prince of Bel-Air", "You Bet Your Life", "S3 E21", "Heavyweight boxing champ Riddick Brown wreaks havoc with Carlton's mind and Will's face at a funky cafe-casino in Nevada, where the cousins have stopped on their way to check out a college for Will."], [1783621312, 1783622707, "The Fresh Prince of Bel-Air", "Ain't No Business Like Show Business", "S3 E22", "Will's friend Keith, a comedian from Philadelphia, visits Will and the Banks family. His sense of humor tickles Will's funny bone, causing Will to think that a career in comedy might work for him, too. Meanwhile, Vivian is away and Phillip demands the attention of his children in her absence."], [1783622707, 1783624102, "The Fresh Prince of Bel-Air", "The Way We Were", "S3 E23", "Philip and Vivian are celebrating their 25th wedding anniversary and the others put together a scrapbook. This is a flashback show with clips from the previous seasons as the scrapbook is put together."], [1783624102, 1783625496, "The Fresh Prince of Bel-Air", "Six Degrees of Graduation", "S3 E24", "Vy anticipates Will's graduation with enthusiasm, but there may be discord when she learns Will is failing music. To pass his music class, Will must sing at the graduation ceremony - with a class of eight-year-olds."], [1783625496, 1783626763, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (1)", "S4 E1", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783626763, 1783628129, "The Fresh Prince of Bel-Air", "Where There's a Will, There's a Way (2)", "S4 E2", "Will and Carlton begin their first year of college by moving into their own apartment, while Philip and Vivian enjoy their newborn son. Hilary learns that Trevor plans to propose marriage to her during an elaborate stunt on his TV news show."], [1783628129, 1783629495, "The Fresh Prince of Bel-Air", "All Guts, No Glory", "S4 E3", "Will withdraws from philosophy class at college because it seems too difficult. Later he realizes the professor was actually a good one who held stimulating discussions. He tries to get in the class again but can only attend without credit."], [1783629495, 1783630857, "The Fresh Prince of Bel-Air", "Father of the Year", "S4 E4", "While working at the school bookstore, Will sees how the women flock over a single dad, and decides to try and pass Nicky off as his son to meet the ladies. While doing so, a picture is taken of the two by Candace, who is the school photographer, and it is put in schools newspaper as \"Father of the year\"."], [1783630857, 1783632188, "The Fresh Prince of Bel-Air", "It's Better to Have Loved and Lost It...", "S4 E5", "After Will's friends guys rib Carlton about being a virgin, Miss Right appears and sweeps Carlton off his feet. Elsewhere, Geoffrey confesses a secret of his own."], [1783632188, 1783633508, "The Fresh Prince of Bel-Air", "Will Goes a-Courtin'", "S4 E6", "Will and Carlton form a rivalry against Philip because of their unpaid rent. Since Philip was receiving no money he decides to take action and sue them. Despite Will and Carlton being faced with this challenge they are prepared to fight back."], [1783633508, 1783634873, "The Fresh Prince of Bel-Air", "Hex and the Single Guy", "S4 E7", "Hilary drags the family to a psychic for a séance to say goodbye to Trevor. Will doesn't believe the psychic is for real and mocks him. Because of that, the psychic curses him and bad things happen later that day."], [1783634873, 1783636167, "The Fresh Prince of Bel-Air", "Blood is Thicker Than Mud", "S4 E8", "A bro with dough? Carlton's upper-class upbringing may make him unwelcome at a black fraternity."], [1783636167, 1783637503, "The Fresh Prince of Bel-Air", "Fresh Prince After Dark", "S4 E9", "Will breaks a date with Jackie to accompany Hilary to a Playboy Mansion reception for weather reporters being photographed for the magazine."], [1783637503, 1783638869, "The Fresh Prince of Bel-Air", "Home is Where the Heart Attack Is", "S4 E10", "Will sneaks greasy, high-fat foods to Philip after he promises to diet and exercise, then blames himself when Philip has a heart attack."], [1783638869, 1783640205, "The Fresh Prince of Bel-Air", "Take My Cousin... Please", "S4 E11", "On academic probation, Will schemes to improve his grades by fixing up a newly divorced English professor with Hilary, who soon finds fault with the man, further jeopardizing Will's academic future."], [1783640205, 1783641570, "The Fresh Prince of Bel-Air", "You've Got to Be a Football Hero", "S4 E12", "Will uses booze to prove his manliness while competing with a hulking football hero who wants to score points with Jackie, and his fraternity brothers leave drunken Will in a cemetery, where he is haunted. Meanwhile, Ashley learns that beauty is in the eye of the beholder."], [1783641570, 1783642935, "The Fresh Prince of Bel-Air", "'Twas the Night Before Christening", "S4 E13", "Vivian promises god-motherhood of her child to both of her sisters, while Will hatches a harebrained scheme to get Boyz II Men to perform at baby Nicky's christening."], [1783642935, 1783644301, "The Fresh Prince of Bel-Air", "Sleepless in Bel-Air", "S4 E14", "Will pays for putting off studying for a midterm until the last minute, and Ashley pays for staying out late on her first date."], [1783644301, 1783645650, "The Fresh Prince of Bel-Air", "Who's the Boss", "S4 E15", "Carlton in charge. Will gets his feathers ruffled when his cousin becomes his boss at the Peacock Stop."], [1783645650, 1783647016, "The Fresh Prince of Bel-Air", "I Know Why the Caged Bird Screams", "S4 E16", "The big sports game is coming up and pranks against each team starts. Will steals the other teams statue and they retaliate by stealing Carlton, the team good luck charm. Phillip has the home alarm system upgraded and it causes problems."], [1783647016, 1783648381, "The Fresh Prince of Bel-Air", "When You Hit Upon a Star", "S4 E17", "Will becomes a jet-setter while dating a pop star."], [1783648381, 1783649746, "The Fresh Prince of Bel-Air", "Stop Will! In the Name of Love", "S4 E18", "A Valentine's double date finds Will treating Ashley like a kid and Ashley demanding r-e-s-p-e-c-t."], [1783649746, 1783651098, "The Fresh Prince of Bel-Air", "You'd Better Shop Around", "S4 E19", "Will goes with Phillip and Carlton to buy a new car. When Carlton wants Phillip to buy a car that Will thinks is dull, Will convinces Phillip to get a convertible. The owner of the lot offers Will a job and Will accepts. It isn't long that Will is the best salesman on the lot and he's being considered for an executive position so he drops out of school."], [1783651098, 1783652444, "The Fresh Prince of Bel-Air", "The Client", "S5 E1", "Ashley's success is going to Will's head. Phil decides that it would be best if Will did not manage Ashley any further. Upset, Will moves out for weeks, but eventually comes back. As soon he is back, Will learns that Ashley's success is going to her head as well and is upset to find that Ashley is turning into a Diva."], [1783652444, 1783653800, "The Fresh Prince of Bel-Air", "What's Will Got to Do With It?", "S5 E2", "Will helps Ashley make a big impression on a recording executive, but Philip is adamantly against her pursuing a singing career."], [1783653800, 1783655156, "The Fresh Prince of Bel-Air", "Reality Bites", "S5 E3", "Will loses points as a role model for Nicky while visiting an ever-positive kiddie hero who brings joy to youngsters - but not to Will."], [1783655156, 1783656513, "The Fresh Prince of Bel-Air", "Grumpy Young Men", "S5 E4", "War breaks out when the girl Will likes plants a big one on Carlton."], [1783656513, 1783657870, "The Fresh Prince of Bel-Air", "Fresh Prince: The Movie", "S5 E5", "Will tells a tall tale about seeing a mob killing, then being placed in a witness-protection program in the backwoods of Alabama."], [1783657870, 1783659228, "The Fresh Prince of Bel-Air", "Will's Misery", "S5 E6", "The Banks hate the ugly golf shirts Hilary gives them - until they see Kareem Abdul-Jabbar wearing the same design."], [1783659228, 1783660585, "The Fresh Prince of Bel-Air", "Father Knows Best", "S5 E7", "To help Ashley out of a jam at school, Will poses as her father. Oh yeah, this is gonna work."], [1783660585, 1783661936, "The Fresh Prince of Bel-Air", "Soul Train", "S5 E8", "At a Soul Train reunion, middle-aged Philip feels like his train has left the station."], [1783661936, 1783663293, "The Fresh Prince of Bel-Air", "Love Hurts", "S5 E9", "Lisa humiliates Will by knocking out a guy with her self-defense moves."], [1783663293, 1783664649, "The Fresh Prince of Bel-Air", "Will's Up a Dirt Road", "S5 E10", "Will, in an attempt to impress Lisa, makes a photo of Jay Leno by night and sells the picture to an editor. However, Will doesn't know the editor works for a sleazy gossip magazine and ends up being sued for libel by Jay Leno."], [1783664649, 1783666005, "The Fresh Prince of Bel-Air", "Will Steps Out", "S5 E11", "To understand Philip's battle with the scale, Will dons a fat suit and gets a big fat lesson in empathy."], [1783666005, 1783667347, "The Fresh Prince of Bel-Air", "Same Game, Next Season", "S5 E12", "Will works so hard to impress Lisa's dad that he spends all his free time with his new best buddy."], [1783667347, 1783668695, "The Fresh Prince of Bel-Air", "Three's a Crowd", "S5 E13", "Will gets roped into a weekend ski trip with Carlton that quickly turns to disaster when their party arrives; meanwhile, back home, Hilary prepares to leave the nest."], [1783668695, 1783670053, "The Fresh Prince of Bel-Air", "It's a Wonderful Lie", "S5 E14", "Lisa tells Will is OK if he wants to go out with his friends one night and she will go out with her friends. They each lie about what they are going to do, and happen to both go to the same party. Worse, they find Ashley at the same party."], [1783670053, 1783671375, "The Fresh Prince of Bel-Air", "Bullets Over Bel-Air", "S5 E15", "A planned camping trip is cut short for Carlton and Will when a robber approaches them at an automated bank-teller machine - and fires a gun."], [1783671375, 1783672726, "The Fresh Prince of Bel-Air", "A Decent Proposal", "S5 E16", "Still in the hospital from being shot, Will thinks about his future. He asks Lisa to marry him."], [1783672726, 1783674084, "The Fresh Prince of Bel-Air", "Will is from Mars...", "S5 E17", "Thanks to relationship counseling, Will and Lisa hop to move on up to a new understanding in preparation for marriage. Meanwhile Hillary wants Geoffrey to work at her new home."], [1783674084, 1783675440, "The Fresh Prince of Bel-Air", "The Wedding Show (Psyche!)", "S5 E18", "Shafted! The engaged couple opts for flashy Vegas vows, complete with costumes. The tasteful theme: Shaft."], [1783675440, 1783676768, "The Fresh Prince of Bel-Air", "Slum Like It... Not!", "S5 E19", "Will vows Philip with his sound investment advice to buy Jazz's apartment building - but the tenants scream slumlord after Philip acts on Will's moneymaking tip."], [1783676768, 1783678122, "The Fresh Prince of Bel-Air", "As the Will Turns", "S5 E20", "Will finds out what it is like to have a woman in his life that controls things. Also, Will lands a part in a soap opera and begins to see himself as a major star, spending money to fit his new status."], [1783678122, 1783679471, "The Fresh Prince of Bel-Air", "Save the Last Trance for Me", "S5 E21", "Put into a trance by a stage hypnotist, Will behaves like a 4-year-old just as the family gears up for an interview with the admissions head of a private school."], [1783679471, 1783680823, "The Fresh Prince of Bel-Air", "To Thine Own Self Be Blue... and Gold", "S5 E22", "A family friend visits Philip. He asks WIll to do something illegal and Will tries to find a way to avoid the issue. Carlton and Hilary try to find a match in online dating and end up being matched with each other."], [1783680823, 1783682169, "The Fresh Prince of Bel-Air", "Cold Feet, Hot Body", "S5 E23", "Dinner date. The Banks host a gorgeous girl from Philly who tries to lure Will away from Lisa."], [1783682169, 1783683528, "The Fresh Prince of Bel-Air", "Love in an Elevator", "S5 E24", "Stuck and out of luck, Will spends his bachelor party trapped in an elevator with a feuding Carlton and Jazz."]]}, {"id": "411", "name": "SBC Bulletin", "a": "sbc-bulletin", "icon": "https://raw.githubusercontent.com/savagebroadcasting/savagebroadcasting.github.io/master/sbc-bulletin-v2.png", "progs": [[1783589859, 1783611459, "SBC Bulletin", "", "", "SBC Bulletin"], [1783611459, 1783633059, "SBC Bulletin", "", "", "SBC Bulletin"], [1783633059, 1783654659, "SBC Bulletin", "", "", "SBC Bulletin"], [1783654659, 1783676259, "SBC Bulletin", "", "", "SBC Bulletin"], [1783676259, 1783683603, "SBC Bulletin", "", "", "SBC Bulletin"]]}]};
const PX = 4.6;
const x = ts => (ts - D.t0) / 60 * PX + 150;
function fmt(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
const inner = document.getElementById('inner');
inner.style.width = (x(D.t1) + 40) + 'px';
let html = '<div id="ruler">';
for (let t = Math.ceil(D.t0/1800)*1800; t < D.t1; t += 1800)
  html += `<div class="tick" style="left:${x(t)}px">${fmt(t)}</div>`;
html += '</div>';
D.chans.forEach((c, ci) => {
  html += `<div class="row" id="ch-${c.id}"><a class="chlabel" href="channels.html#${c.a}" title="See everything on ${c.name}"><img src="${c.icon}" loading="lazy"><div><div class="chnum">CH ${c.id}</div><div class="chname">${c.name}</div></div></a>`;
  c.progs.forEach((p, pi) => {
    const w = (p[1]-p[0])/60*PX - 4;
    if (w < 14) return;
    const se = p[4] ? p[4] + ' · ' : '';
    html += `<div class="blk" data-c="${ci}" data-p="${pi}" data-s="${p[0]}" data-e="${p[1]}" style="left:${x(p[0])}px;width:${w}px">
      <div class="bshow">${p[2]}</div><div class="bmeta">${se}${p[3]||''}</div></div>`;
  });
  html += '</div>';
});
html += '<div id="nowline"></div>';
inner.innerHTML = html;
inner.addEventListener('click', e => {
  const b = e.target.closest('.blk'); if (!b) return;
  const p = D.chans[+b.dataset.c].progs[+b.dataset.p];
  document.getElementById('mcard').innerHTML =
    `<h3>${p[2]}</h3>` +
    (p[3] ? `<div class="mep">${p[3]}${p[4] ? ' — ' + p[4] : ''}</div>` : (p[4] ? `<div class="mep">${p[4]}</div>` : '')) +
    `<div class="mtime">${fmt(p[0])} – ${fmt(p[1])}</div>` +
    `<div class="mdesc">${p[5] || 'No description for this one — it’s a surprise.'}</div>` +
    `<div class="mclose">tap anywhere to close</div>`;
  document.getElementById('modal').style.display = 'flex';
});
function paint(){
  const now = Date.now()/1000;
  document.getElementById('nowline').style.left = x(now) + 'px';
  document.querySelectorAll('.blk').forEach(b => {
    b.classList.toggle('now', now >= +b.dataset.s && now < +b.dataset.e);
  });
  const age = Math.round((now - D.gen)/3600);
  document.getElementById('stamp').textContent = 'Schedule published ' +
    new Date(D.gen*1000).toLocaleString([], {weekday:'long', hour:'numeric', minute:'2-digit'}) +
    (age > 26 ? ' — see the Plex guide for live times.' : '');
}
paint(); setInterval(paint, 30000);
document.getElementById('guide').scrollLeft = Math.max(0, x(Date.now()/1000) - 260);
// arriving from By Channel: land on that channel's row
if (location.hash) {
  const row = document.querySelector(location.hash);
  if (row) {
    row.scrollIntoView({block:'center'});
    row.style.outline = '2px solid var(--yellow)';
    setTimeout(() => row.style.outline = '', 4000);
  }
}
</script>
