const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock() {
  const code = document.getElementById('code').value.trim().toUpperCase();
  try {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(code), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b(V.s), iterations:250000, hash:'SHA-256'}, km,
      {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(V.n)}, key, b(V.c));
    document.getElementById('content').innerHTML = new TextDecoder().decode(pt);
    document.getElementById('content').style.display = 'block';
    document.getElementById('gate').style.display = 'none';
  } catch(e) {
    document.getElementById('err').textContent = 'Not quite — dig it? Try again.';
  }
